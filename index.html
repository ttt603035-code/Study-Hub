<title>Study Dashboard — Unified</title>
<style>
/* ============================================================
   APPLE HUMAN INTERFACE — DARK THEME — UNIFIED DESIGN SYSTEM
   ============================================================ */
:root {
  --bg: #FFFFFF;
  --bg-elev: #F5F5F7;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F0F0F2;
  --bg-input: #FFFFFF;
  --bg-popover: #FFFFFF;
  --ink: #1D1D1F;
  --ink-secondary: #6E6E73;
  --ink-tertiary: #8E8E93;
  --ink-faint: #D1D1D6;
  --line: #D2D2D7;
  --line-light: #E5E5EA;
  --accent: #1D1D1F;
  --accent-hover: #333333;
  --green: #1D1D1F;
  --red: #555555;
  --orange: #666666;
  --yellow: #888888;
  --purple: #555555;
  --pink: #555555;
  --teal: #555555;

  --english: #1D1D1F;
  --english-tint: rgba(0,0,0,0.04);
  --chinese: #444444;
  --chinese-tint: rgba(0,0,0,0.03);
  --politic: #888888;
  --politic-tint: rgba(0,0,0,0.03);

  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --radius-pill: 999px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
  --blur: saturate(180%) blur(20px);

  --sidebar-w: 240px;
  --topbar-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
::selection { background: rgba(0,0,0,0.1); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #CCC; border-radius: 10px; }
::-webkit-scrollbar-track { background: transparent; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font: inherit; color: var(--ink); background: var(--bg-input); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px 12px; outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; }

/* ========== LAYOUT ========== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas: "sidebar topbar" "sidebar content";
  height: 100vh;
  overflow: hidden;
}

/* ========== SIDEBAR ========== */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-elev);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  gap: 20px;
  overflow-y: auto;
}
.sidebar-brand {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.02em;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 0;
}
.sidebar-brand .logo {
  display: none;
}

/* Apple Capsule Menu */
.capsule-menu {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.capsule-item {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}
.capsule-item:hover { background: var(--bg-card-hover); color: var(--ink); }
.capsule-item.active { background: var(--accent); color: #FFFFFF; }
.capsule-item .icon { font-size: 16px; width: 20px; text-align: center; }

/* Sidebar Subject Pills */
.sidebar-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-tertiary);
  padding: 0 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-subjects {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.subject-pill {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.12s ease;
}
.subject-pill:hover { background: var(--bg-card); color: var(--ink); }
.subject-pill.active { background: var(--bg-card); color: var(--ink); font-weight: 600; }
.subject-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.subject-pill .badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  background: var(--bg-card-hover);
  color: var(--ink-secondary);
}

/* ========== TOPBAR ========== */
.topbar {
  grid-area: topbar;
  background: rgba(255,255,255,0.85);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.topbar-title {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
}
.topbar-search {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.topbar-search input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border-radius: var(--radius-pill);
  background: var(--bg-card);
  border: 1px solid var(--line);
  font-size: 13px;
}
.topbar-search input:focus { border-color: var(--accent); background: var(--bg-input); }
.topbar-search .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--ink-tertiary);
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

/* Apple Capsule Button */
.apple-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.12s ease;
  white-space: nowrap;
}
.apple-btn:hover { background: var(--bg-card-hover); border-color: var(--ink-faint); }
.apple-btn:active { transform: scale(0.97); }
.apple-btn.primary { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.apple-btn.primary:hover { background: var(--accent-hover); color: #FFFFFF; }
.apple-btn.danger { color: #1D1D1F; border-color: rgba(0,0,0,0.1); }
.apple-btn.danger:hover { background: rgba(0,0,0,0.03); }
.apple-btn.small { padding: 5px 10px; font-size: 11px; }
.apple-btn.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }

/* ========== CONTENT AREA ========== */
.content {
  grid-area: content;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ========== QUIZ HUB STYLES ========== */
.quiz-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.section-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg-card);
  color: var(--ink-secondary);
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  user-select: none;
  transition: all 0.12s ease;
}
.pill:hover { background: var(--bg-card-hover); color: var(--ink); }
.pill.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.pill .pill-act { opacity: 0.5; font-size: 10px; padding: 0 3px; border-radius: 4px; }
.pill .pill-act:hover { opacity: 1; }
.pill.add { background: transparent; border: 1px dashed var(--ink-faint); color: var(--ink-tertiary); }
.pill.add:hover { border-color: var(--ink-secondary); color: var(--ink); }

.quiz-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-card);
  padding: 3px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  max-width: 300px;
}
.quiz-tab {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.12s ease;
}
.quiz-tab.active { background: var(--accent); color: #FFFFFF; }
.quiz-tab:hover:not(.active) { color: var(--ink); }

.quizset-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.quizset-bar label { font-size: 12px; color: var(--ink-tertiary); }
.quizset-bar select {
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--ink);
}

/* Question cards */
.q-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
  transition: border-color 0.15s ease;
}
.q-card:hover { border-color: var(--ink-faint); }
.q-meta { font-size: 10px; color: var(--ink-tertiary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.q-tool-btn {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-pill);
  background: var(--bg-elev);
  color: var(--ink-secondary);
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all 0.12s ease;
}
.q-tool-btn:hover { background: var(--bg-card-hover); color: var(--ink); }
.q-text { font-size: 14px; line-height: 1.7; margin-bottom: 12px; color: var(--ink); }
.q-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.q-opt {
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  background: var(--bg-elev);
  text-align: left;
  color: var(--ink);
  transition: all 0.12s ease;
  user-select: text;
}
.q-opt:hover { background: var(--bg-card-hover); border-color: var(--ink-faint); }
.q-opt.selected { border-color: #1D1D1F; background: rgba(0,0,0,0.03); }
.q-opt.correct { border-color: #1D1D1F; background: rgba(0,0,0,0.04); color: #1D1D1F; }
.q-opt.wrong { border-color: #AAA; background: rgba(0,0,0,0.03); color: #999; }
.q-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.q-actions button {
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.12s ease;
}
.q-actions button:hover { background: var(--bg-card-hover); }
.q-actions button:active { transform: scale(0.97); }
.q-actions button.primary { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.q-actions button.primary:hover { background: var(--accent-hover); }
.q-explain {
  margin-top: 10px;
  padding: 12px 14px;
  background: var(--bg-elev);
  border-left: 3px solid rgba(0,0,0,0.15);
  font-size: 12px;
  line-height: 1.7;
  color: var(--ink-secondary);
  border-radius: var(--radius-sm);
  display: none;
}
.q-explain.show { display: block; }
.q-status { margin-top: 8px; font-size: 12px; font-weight: 600; }
.q-status.ok { color: #1D1D1F; }
.q-status.err { color: #999; }

/* Reading area */
.reading-body {
  font-size: 15px;
  line-height: 2;
  color: var(--ink);
  white-space: pre-wrap;
  word-wrap: break-word;
}
.reading-body .word { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.reading-body .word:hover { background: rgba(0,0,0,0.04); }
.reading-body .hl-yellow { background: rgba(0,0,0,0.08); }
.reading-body .hl-blue { background: rgba(0,0,0,0.05); }
.reading-body .hl-pink { background: rgba(0,0,0,0.1); }
.reading-body .hl { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.reading-body .hl.has-note { box-shadow: inset 0 -2px 0 rgba(255,255,255,0.4); }
.reading-body .replaced { color: #666; font-weight: 600; }

.sel-menu {
  position: fixed;
  z-index: 5000;
  background: #1D1D1F;
  border: 1px solid #333;
  border-radius: var(--radius-pill);
  padding: 5px;
  display: flex;
  gap: 4px;
  box-shadow: var(--shadow-lg);
  font-size: 12px;
  backdrop-filter: var(--blur);
}
.sel-menu button {
  background: transparent;
  color: #FFFFFF;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all 0.12s;
}
.sel-menu button:hover { background: rgba(255,255,255,0.1); }
.sel-menu .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }

/* ====== QUIZ WORD SELECTION — Apple Books style ====== */
.q-selectable { user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;cursor:text; }
.q-word-token { display:inline;border-radius:3px;transition:background 0.1s ease;padding:0 1px;cursor:pointer; }
.q-word-token.qs-selected { background:rgba(162,132,94,0.28);border-radius:3px; }
.qs-float-menu { position:fixed;z-index:8000;background:#1D1D1F;border-radius:20px;padding:5px 6px;display:flex;gap:4px;box-shadow:0 6px 24px rgba(0,0,0,0.22);animation:floatMenuIn 0.14s cubic-bezier(0.25,1,0.5,1);pointer-events:all; }
@keyframes floatMenuIn { from{opacity:0;transform:scale(0.88) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)} }
.qs-float-btn { background:transparent;border:1px solid rgba(255,255,255,0.18);color:#fff;border-radius:14px;padding:5px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background 0.12s ease;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; }
.qs-float-btn:hover { background:rgba(255,255,255,0.14); }
.qs-float-btn.added { background:rgba(162,132,94,0.5);border-color:#A2845E; }
.q-word-token.qs-hl-persist { background:rgba(162,132,94,0.32);border-radius:3px; }

/* ======= MOBILE RESPONSIVE — Quiz Hub (#8) ======= */
@media (max-width: 640px) {
  .quiz-toolbar { gap:6px;padding:8px 10px;flex-wrap:wrap; }
  .quiz-toolbar .apple-btn { font-size:11px;padding:5px 9px;height:30px; }
  .section-pills { gap:4px; }
  .section-pills .pill { font-size:11px;padding:5px 9px; }
  .q-card { padding:12px 10px; }
  .q-text { font-size:14px !important; }
  .q-opt { font-size:13px;padding:10px 10px; }
  .q-actions button { font-size:12px;padding:8px 10px; }
  .qs-float-menu { left:8px !important;right:8px;width:auto;flex-wrap:wrap;border-radius:14px; }
  .qs-float-btn { font-size:11px;padding:5px 10px; }
  .quiz-tabs { gap:4px; }
  .quiz-tab { font-size:12px;padding:7px 12px; }
}

/* ========== STUDY RESOURCES STYLES ========== */
.res-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.res-stat-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.res-stat-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.res-stat-card .label { font-size: 11px; font-weight: 600; color: var(--ink-tertiary); text-transform: uppercase; letter-spacing: 0.04em; }
.res-stat-card .value { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.res-stat-card .sub { font-size: 11px; color: var(--ink-tertiary); }
.res-stat-card.countdown { background: var(--bg-card); border-color: var(--line); }
.res-stat-card.countdown .value { color: var(--ink); }

.res-filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.res-filter-bar label { font-size: 11px; font-weight: 600; color: var(--ink-tertiary); }
.res-filter-bar select {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--ink);
}

.res-section { margin-bottom: 30px; }
.res-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.res-section-head h3 {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.res-section-head .count-pill {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-tertiary);
  background: var(--bg-card);
  padding: 2px 9px;
  border-radius: var(--radius-pill);
}

.res-tab-bar {
  display: flex;
  gap: 4px;
  background: var(--bg-card);
  padding: 3px;
  border-radius: var(--radius-sm);
}
.res-tab-btn {
  border: none;
  background: transparent;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-tertiary);
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s ease;
}
.res-tab-btn.active { background: var(--accent); color: #FFFFFF; }
.res-tab-btn:hover:not(.active) { color: var(--ink-secondary); }

.resource-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.res-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  transition: all 0.15s ease;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.res-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.res-card.completed { opacity: 0.7; }
.res-card.completed .res-title { text-decoration: line-through; color: var(--ink-tertiary); }
.res-card::before {
  content: "";
  position: absolute;
  left: 16px; top: 0;
  width: 34px; height: 4px;
  border-radius: 0 0 4px 4px;
}
.res-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.res-title-wrap { display: flex; align-items: flex-start; gap: 8px; flex: 1; }
.res-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 2px solid var(--ink-faint);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  margin-top: 2px;
  transition: all 0.12s ease;
}
.res-check.checked { background: var(--green); border-color: var(--green); }
.res-check svg { width: 11px; height: 11px; color: #1D1D1F; opacity: 0; }
.res-check.checked svg { opacity: 1; }
.res-title { font-size: 13px; font-weight: 600; line-height: 1.4; flex: 1; }
.res-tool-btn { background: none; border: none; cursor: pointer; color: var(--ink-tertiary); font-size: 12px; padding: 2px 6px; border-radius: 4px; }
.res-tool-btn:hover { color: var(--ink); background: var(--bg-card-hover); }
.res-tool-btn.delete:hover { color: #1D1D1F; }
.res-path {
  font-size: 11px;
  color: var(--ink-tertiary);
  background: var(--bg-elev);
  padding: 6px 8px;
  border-radius: 6px;
  font-family: 'SF Mono', monospace;
  word-break: break-all;
  line-height: 1.4;
}
.res-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.pill-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  background: var(--bg-elev);
  color: var(--ink-secondary);
}
.res-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}
.res-date { font-size: 10px; color: var(--ink-tertiary); }

/* Exercise cards */
.exercise-list { display: flex; flex-direction: column; gap: 10px; }
.ex-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.15s ease;
}
.ex-card:hover { border-color: var(--ink-faint); }
.ex-card.pinned { border-color: #999; }
.ex-row { display: flex; align-items: center; gap: 10px; padding: 14px 16px; }
.ex-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 2px solid var(--ink-faint);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s ease;
}
.ex-check.checked { background: var(--accent); border-color: var(--accent); }
.ex-check svg { width: 11px; height: 11px; color: #1D1D1F; opacity: 0; }
.ex-check.checked svg { opacity: 1; }
.ex-body { flex: 1; min-width: 0; }
.ex-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.ex-title { font-size: 13px; font-weight: 600; }
.ex-card.completed .ex-title { color: var(--ink-tertiary); text-decoration: line-through; }
.ex-meta { font-size: 11px; color: var(--ink-tertiary); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
.ex-subject-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: var(--radius-pill);
  flex-shrink: 0;
}
.ex-status {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  flex-shrink: 0;
}
.ex-status.pending { background: rgba(0,0,0,0.03); color: #BBB; }
.ex-status.completed { background: rgba(0,0,0,0.05); color: #1D1D1F; }
.ex-tool-btn { background: none; border: none; cursor: pointer; color: var(--ink-tertiary); font-size: 13px; padding: 4px 6px; border-radius: 4px; flex-shrink: 0; }
.ex-tool-btn:hover { color: var(--ink); background: var(--bg-card-hover); }
.ex-tool-btn.pin.active { color: #1D1D1F; }
.ex-tool-btn.delete:hover { color: #1D1D1F; }

.priority-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-pill);
}
.priority-high { background: rgba(0,0,0,0.06); color: #1D1D1F; }
.priority-medium { background: rgba(0,0,0,0.04); color: #BBB; }
.priority-low { background: rgba(0,0,0,0.02); color: #888; }

.subtasks-area {
  background: var(--bg-elev);
  border-top: 1px solid var(--line);
  padding: 10px 16px 12px 46px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.subtask-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 12px;
  color: var(--ink-secondary);
}
.subtask-left { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: 1; }
.st-check {
  width: 15px; height: 15px;
  border-radius: 4px;
  border: 1.5px solid var(--ink-faint);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.st-check.checked { background: var(--ink-secondary); border-color: var(--ink-secondary); }
.st-check svg { width: 9px; height: 9px; color: var(--bg); opacity: 0; }
.st-check.checked svg { opacity: 1; }
.st-text.checked { text-decoration: line-through; color: var(--ink-tertiary); }
.st-due { font-size: 10px; color: #BBB; background: rgba(0,0,0,0.03); padding: 1px 6px; border-radius: 4px; font-weight: 600; }
.st-due.overdue { color: #1D1D1F; background: rgba(0,0,0,0.06); }

.drag-handle {
  cursor: grab;
  color: var(--ink-faint);
  font-size: 15px;
  padding: 4px 8px;
  user-select: none;
  display: inline-flex;
  align-items: center;
  border-radius: 4px;
  transition: all 0.12s ease;
}
.drag-handle:hover { color: var(--ink); background: var(--bg-card-hover); }

/* Score breakdown */
.score-overview-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}
.score-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  transition: all 0.15s ease;
  cursor: pointer;
}
.score-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.score-card-title {
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.score-numbers { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
.score-curr { font-size: 28px; font-weight: 800; }
.score-max { font-size: 13px; color: var(--ink-tertiary); }
.score-target-pill {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: var(--ink);
  background: rgba(0,0,0,0.03);
  padding: 2px 8px;
  border-radius: 6px;
}
.score-note-box {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  line-height: 1.6;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--ink-secondary);
  user-select: text;
}
.inline-highlight {
  background: rgba(0,0,0,0.08);
  color: #1D1D1F;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
  cursor: pointer;
}
.score-module-list {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.score-module-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--ink-secondary);
}
.score-module-item span:last-child { font-weight: 700; color: var(--ink); }

/* ========== SHARED STATS BAR (in sidebar bottom) ========== */
.sidebar-stats {
  margin-top: auto;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sidebar-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--ink-tertiary);
}
.sidebar-stat .num { font-weight: 700; color: var(--ink); font-size: 13px; }

/* ========== APPLE SHEET MODAL ========== */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 9000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: #FFFFFF;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  width: 560px;
  max-width: 92vw;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: sheetIn 0.2s ease-out;
}
.sheet.wide { width: 720px; }
.sheet.full { width: 100%; height: 100%; max-height: 100%; border-radius: 0; }
@keyframes sheetIn {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.sheet-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sheet-head h3 { font-size: 15px; font-weight: 700; }
.sheet-head .close-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #F0F0F2;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: #666;
  cursor: pointer;
}
.sheet-head .close-btn:hover { background: var(--bg-card-hover); }
.sheet-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.sheet-foot {
  padding: 12px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* Form fields in sheets */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--ink-tertiary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
.field input, .field select, .field textarea {
  width: 100%;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  background: var(--bg-card);
  font-size: 13px;
  color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #1D1D1F;
  color: #FFFFFF;
  padding: 10px 20px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  z-index: 10000;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; }

/* Study Suggest Sheet */
.suggest-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-card);
  padding: 3px;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
}
.suggest-tab {
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.12s ease;
}
.suggest-tab.active { background: var(--accent); color: #FFFFFF; }

.notes-editor {
  min-height: 200px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink);
  outline: none;
  overflow-y: auto;
}
.notes-editor:focus { border-color: var(--accent); }
.notes-toolbar {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  padding: 4px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
}
.notes-toolbar button {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.1s ease;
}
.notes-toolbar button:hover { background: var(--bg-card-hover); color: var(--ink); }

.link-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.link-card .link-info { flex: 1; }
.link-card .link-title { font-size: 13px; font-weight: 600; }
.link-card .link-url { font-size: 11px; color: #CCC; word-break: break-all; text-decoration: underline; }
.link-card .link-cat { font-size: 10px; color: var(--ink-tertiary); margin-top: 2px; }
.link-card .link-fav { font-size: 16px; cursor: pointer; }
.link-card .link-fav.active { color: #1D1D1F; font-weight: 700; }

/* Progress bars */
.progress-bar {
  height: 6px;
  border-radius: 3px;
  background: var(--bg-card-hover);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}

/* Subject Banner */
.subject-banner {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sb-top-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.sb-left h3 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sb-left p { font-size: 12px; color: var(--ink-tertiary); margin-top: 4px; }
.sb-scores { display: flex; align-items: center; gap: 24px; }
.sb-score-box { text-align: center; }
.sb-label { font-size: 10px; font-weight: 700; color: var(--ink-tertiary); text-transform: uppercase; }
.sb-val { font-size: 22px; font-weight: 800; margin-top: 2px; }

/* Word popup */
.word-pop {
  position: fixed;
  z-index: 5000;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  min-width: 220px;
  max-width: 320px;
  box-shadow: var(--shadow-lg);
  font-size: 12px;
}
.word-pop h4 { margin: 0 0 6px; font-size: 11px; color: var(--ink-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.word-pop .syn-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.word-pop .syn-chip { background: var(--bg-elev); padding: 4px 10px; border-radius: var(--radius-pill); cursor: pointer; font-size: 11px; color: var(--ink-secondary); }
.word-pop .syn-chip:hover { background: #FFF; color: #000; }
.word-pop .pop-actions { display: flex; gap: 6px; margin-top: 6px; }
.word-pop .pop-actions button {
  flex: 1;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 11px;
  color: var(--ink-secondary);
}
.word-pop .pop-actions button:hover { background: var(--bg-card-hover); color: var(--ink); }

/* Vocab & Wrong book items */
.list-item {
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.list-item h4 { margin: 0 0 4px; font-size: 13px; font-weight: 600; }
.list-item .meta { color: var(--ink-tertiary); font-size: 11px; }
.list-item .actions { margin-top: 6px; display: flex; gap: 6px; }
.list-item .actions button {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-secondary);
}
.list-item .actions button:hover { background: var(--bg-card-hover); color: var(--ink); }
.chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.chip { background: var(--bg-elev); color: var(--ink-secondary); padding: 2px 8px; border-radius: var(--radius-pill); font-size: 11px; border: 1px solid var(--line); }

.syn-group-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
}
.syn-group-card h4 { margin: 0 0 4px; font-size: 13px; font-weight: 600; }
.syn-group-card .chips .chip { background: var(--bg-elev); color: var(--ink); border: 1px solid var(--line); }
.syn-group-card .actions { margin-top: 6px; display: flex; gap: 6px; }
.syn-group-card .actions button {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  color: var(--ink-secondary);
}
.syn-group-card .actions button:hover { background: var(--bg-card-hover); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-tertiary);
  font-size: 13px;
  background: var(--bg-card);
  border: 1px dashed var(--line);
  border-radius: var(--radius);
}

/* Module edit rows */
.module-edit-row { display: grid; grid-template-columns: 2.2fr 1fr 1.2fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
.subtask-edit-row { display: grid; grid-template-columns: 2.5fr 1.3fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }

/* ============================================================
   APPLE HUMAN INTERFACE STYLE — DRAG & DROP AND ENHANCEMENTS
   ============================================================ */
.mod-section {
  transition: transform 0.28s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
  position: relative;
  margin-bottom: 24px;
}
.mod-section.dragging {
  opacity: 0.7;
  transform: scale(0.982);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
  border-radius: var(--radius);
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--accent);
}
.mod-section.drag-over {
  border: 2px dashed var(--accent);
  border-radius: var(--radius);
  background: var(--bg-elev);
}
.mod-drag-handle { display: none !important; }

/* ---- Stat card scroll — no outline, clean Apple anchor feel ---- */
.mod-section, .res-section { outline: none !important; }
*:focus { outline: none !important; box-shadow: none !important; }
.subtask-draggable:focus, .ex-unified-item:focus, .res-card:focus { outline: none !important; box-shadow: none !important; border-color: var(--line) !important; }
.subtask-draggable.st-is-dragging { box-shadow: 0 8px 30px rgba(0,0,0,0.16) !important; outline: none !important; }

/* ---- Sub-task drag & drop ---- */
.subtask-draggable {
  cursor: default;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
  border-radius: var(--radius-sm);
  transition: box-shadow 0.18s ease, transform 0.18s cubic-bezier(0.25,1,0.5,1);
  position: relative;
}
.subtask-draggable.st-is-dragging {
  opacity: 0.92;
  box-shadow: 0 8px 30px rgba(0,0,0,0.18), 0 0 0 2px var(--accent);
  transform: scale(1.025);
  z-index: 9999;
  background: var(--bg-card) !important;
  border-radius: var(--radius-sm);
}
.subtask-draggable.st-drag-over {
  box-shadow: 0 0 0 2px var(--accent) inset;
  background: var(--bg-elev);
}
.st-drag-grip {
  width: 18px;
  height: 18px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2.5px;
  flex-shrink: 0;
  opacity: 0.35;
  cursor: grab;
  transition: opacity 0.15s ease;
}
.st-drag-grip:hover { opacity: 0.7; }
.st-drag-grip span {
  display: block;
  width: 11px;
  height: 1.5px;
  background: var(--ink);
  border-radius: 2px;
}

/* ---- Learning Resources progress ---- */
.lr-item {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color 0.15s ease;
}
.lr-item:hover { border-color: var(--ink-faint); }
.lr-item-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
}
.lr-item-body {
  padding: 10px 14px 13px 14px;
  border-top: 1px solid var(--line-light);
  background: var(--bg-elev);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.lr-progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.lr-page-ctrl {
  display: flex;
  align-items: center;
  gap: 4px;
}
.lr-page-ctrl button {
  width: 26px;
  height: 26px;
  border: 1px solid var(--line);
  background: var(--bg-card);
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--ink);
  transition: all 0.12s ease;
  line-height: 1;
}
.lr-page-ctrl button:hover { background: var(--bg-card-hover); border-color: var(--ink-faint); }
.lr-page-ctrl input[type=number] {
  width: 52px;
  text-align: center;
  padding: 4px 6px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  background: var(--bg-card);
  color: var(--ink);
  -moz-appearance: textfield;
}
.lr-page-ctrl input[type=number]::-webkit-inner-spin-button { display: none; }
.lr-pct-badge {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-secondary);
  background: var(--bg-card);
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--line);
  white-space: nowrap;
}
.lr-total-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink-tertiary);
}
.lr-total-row input[type=number] {
  width: 60px;
  text-align: center;
  padding: 3px 6px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-size: 12px;
  background: var(--bg-card);
  color: var(--ink);
  -moz-appearance: textfield;
}
.lr-total-row input[type=number]::-webkit-inner-spin-button { display: none; }
.wb-practice-card {
  transition: all 0.2s ease;
}
.wb-opt {
  transition: all 0.15s ease;
}
.wb-opt:hover {
  background: var(--bg-card-hover);
  border-color: var(--ink-faint);
}
.wb-opt.selected {
  border-color: var(--accent);
  font-weight: 600;
  background: var(--bg-elev);
}
.wb-opt.correct {
  background: rgba(52, 199, 89, 0.15) !important;
  border-color: var(--green) !important;
  color: var(--green);
  font-weight: 700;
}
.wb-opt.wrong {
  background: rgba(255, 59, 48, 0.15) !important;
  border-color: var(--red) !important;
  color: var(--red);
  font-weight: 700;
}


.mod-touch-dragging {
  position: relative;
  z-index: 9999 !important;
  transform: scale(1.025);
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.28), 0 0 0 2px var(--accent) !important;
  transition: box-shadow 0.25s ease, transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
  background: var(--bg-card);
  border-radius: var(--radius);
  user-select: none;
  -webkit-user-select: none;
}


/* ============================================================
   SIDEBAR COLLAPSE STYLES
   ============================================================ */
.app {
  transition: grid-template-columns 0.28s cubic-bezier(0.25, 1, 0.5, 1);
}
.app.sidebar-collapsed {
  grid-template-columns: 0px 1fr !important;
}
.app.sidebar-collapsed .sidebar {
  padding-left: 0 !important;
  padding-right: 0 !important;
  opacity: 0 !important;
  pointer-events: none !important;
  border-right: none !important;
  overflow: hidden !important;
}
.sidebar {
  transition: opacity 0.2s ease, padding 0.28s ease, border-color 0.28s ease;
  overflow-x: hidden;
}


/* ============================================================
   ANTI-SELECTION & NO-TOUCH-CALLOUT FOR DRAGGING
   ============================================================ */
.mod-section,
.mod-section *,
.mod-drag-handle,
.mod-drag-handle * {
  -webkit-touch-callout: none !important;
  -webkit-user-select: none !important;
  user-select: none !important;
  -webkit-user-drag: none !important;
}
body.body-dragging-mod,
body.body-dragging-mod * {
  -webkit-touch-callout: none !important;
  -webkit-user-select: none !important;
  user-select: none !important;
  -webkit-user-drag: none !important;
  cursor: grabbing !important;
}

/* ============================================================
   FULL RESPONSIVE LAYOUT FIX — MAC / IPAD / IPHONE
   ============================================================ */
html,
body,
.app,
.sidebar,
.topbar,
.content,
.sheet-overlay,
.sheet,
.sheet-body,
.sheet-foot {
  max-width: 100%;
  overflow-x: hidden;
}

body {
  overflow-x: hidden;
}

.app > *,
.topbar > *,
.sidebar > *,
.content > *,
.sheet > *,
.sheet-body > *,
.res-section > *,
.subject-banner > *,
.q-card > *,
.ex-card > *,
.res-card > *,
.link-card > * {
  min-width: 0;
}

.content {
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

img, svg, video, canvas, iframe, table, pre, code {
  max-width: 100%;
}

.q-card,
.res-card,
.score-card,
.res-stat-card,
.subject-banner,
.list-item,
.syn-group-card,
.lr-item,
.ex-card,
.link-card,
.empty-state,
.score-note-box,
.sheet,
.word-pop,
.sel-menu,
.qs-float-menu {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
}

.apple-btn,
.q-actions button,
.q-tool-btn,
.res-tab-btn,
.quiz-tab,
.suggest-tab,
.pill,
.word-pop .pop-actions button,
.list-item .actions button,
.syn-group-card .actions button,
.notes-toolbar button {
  white-space: normal;
  word-break: break-word;
  min-width: 0;
}

.topbar-actions,
.quiz-toolbar,
.quizset-bar,
.q-actions,
.res-filter-bar,
.res-section-head,
.res-tab-bar,
.suggest-tabs,
.notes-toolbar,
.word-pop .pop-actions,
.list-item .actions,
.syn-group-card .actions,
.sb-scores,
.sheet-foot,
.explain-actions,

function srsIntervalMs(box) { return SRS_INTERVALS_DAY[Math.min(Math.max(box,0), SRS_INTERVALS_DAY.length-1)] * 86400000; }
function ensureSrs(obj) {
  if (typeof obj.srsBox !== 'number') obj.srsBox = 0;
  if (typeof obj.srsNext !== 'number') obj.srsNext = Date.now();
  if (typeof obj.srsReviews !== 'number') obj.srsReviews = 0;

  ensureSrs(obj);

function saveQuiz() {
  try {
    const json = JSON.stringify(quizState);
    localStorage.setItem(QUIZ_STORE_KEY, json);
    try { localStorage.setItem(QUIZ_BACKUP_KEY, json); } catch(_){}
  } catch(e) { toast('Quiz save failed: '+e.message); }
}
function loadQuiz() {
  try {
    let raw = localStorage.getItem(QUIZ_STORE_KEY);
    if (!raw) { const bak = localStorage.getItem(QUIZ_BACKUP_KEY); if(bak) raw = bak; }
    if (raw) {
      let parsed = JSON.parse(raw);
      parsed = migrateQuiz(parsed);
      quizState = Object.assign(quizState, parsed);
      quizState.activeQIndex = quizState.activeQIndex || {grammar:{},vocab:{}};
      quizState.answerLog = quizState.answerLog || {};
      quizState.wrongBook = quizState.wrongBook || [];
      quizState.highlights = quizState.highlights || [];
      quizState.wordBook = quizState.wordBook || [];
      quizState.synonymLibrary = quizState.synonymLibrary || [];
      quizState.quizSets = quizState.quizSets || [];
      quizState.currentQuizSetId = quizState.currentQuizSetId || {};
      quizState.activeQuizSetIds = quizState.activeQuizSetIds || {};
    }
  } catch(e) { console.error('Quiz load failed', e); }
}

function migrateQuiz(parsed) {
  const v = parsed.schemaVersion || 1;
  if (v < 5) {
    (parsed.vocabularyBook||[]).forEach(w => { ensureSrs(w); });
    (parsed.synonymLibrary||[]).forEach(g => { ensureSrs(g); });
  }
  if (v < 4) {
    parsed.quizSets = Array.isArray(parsed.quizSets) ? parsed.quizSets : [];
    parsed.currentQuizSetId = parsed.currentQuizSetId || {};
    (parsed.passages||[]).forEach(p => {
      if (!p.id) return;
      if (!parsed.quizSets.find(qs => qs.passageId === p.id)) {
        parsed.quizSets.push({ id:'qs_'+p.id+'_default', passageId:p.id, name:'1', createdAt:Date.now() });
      }
    });
    ['grammarQuestions','vocabularyQuestions'].forEach(k => {
      (parsed[k]||[]).forEach(q => {
        if (!q.quizSetId) {
          const def = parsed.quizSets.find(qs => qs.passageId === q.passageId);
          if (def) q.quizSetId = def.id;
        }
      });
    });
  }
  parsed.schemaVersion = QUIZ_SCHEMA;
  return parsed;
}

function uid(prefix='id') { return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function parseInlineHighlight(subj, str) {
  const escaped = esc(str);
  return escaped.replace(/==([^=]+)==/g, (m,p1) => `<span class="inline-highlight" onclick="removeInlineHighlight('${subj}','${esc(p1).replace(/'/g,"\\'")}')">${p1}</span>`);
}
function removeInlineHighlight(subj, word) {
  const sc = subjectScores[subj]; if(!sc||!sc.note) return;
  sc.note = sc.note.replace(`==${word}==`, word);
  saveResState(); render();
}
function matchesSearch(text, q) { if(!q) return true; return text.toLowerCase().includes(q.toLowerCase()); }

// ================================================================
//  PROGRESS
// ================================================================
function getSubjectProgress(subject) {
  const subEx = exercises.filter(e => !subject || e.subject === subject);
  let total = 0, done = 0;
  subEx.forEach(ex => {
    const sts = ex.subtasks || [];
    if (sts.length > 0) { total += sts.length; done += sts.filter(s=>s.completed).length; }
    else { total += 1; if(ex.status==='completed') done += 1; }
  });
  return { total, done, percent: total===0?0:Math.round(done/total*100) };
}

function renderGlobalSearch() {
  const q = appState.searchQuery;
  // Search across: quizzes, vocabulary, resources, notes, links, exercises
  const matchedPassages = quizState.passages.filter(p => matchesSearch(p.customName||'',q) || matchesSearch(p.title||'',q) || matchesSearch(p.content||'',q));
  const matchedGQ = quizState.grammarQuestions.filter(x => matchesSearch(x.question,q) || (x.options||[]).some(o=>matchesSearch(o,q)));
  const matchedVQ = quizState.vocabularyQuestions.filter(x => matchesSearch(x.question,q) || matchesSearch(x.synonymGroup||'',q));
  const matchedVocab = (quizState.wordBook||[]).filter(v => matchesSearch((v.text||v.word||''),q) || matchesSearch(v.meaning||'',q));
  const matchedResources = resources.filter(r => matchesSearch(r.title,q) || matchesSearch(r.path||'',q) || (r.tags||[]).some(t=>matchesSearch(t,q)));
  const matchedExercises = exercises.filter(e => matchesSearch(e.title,q) || (e.subtasks||[]).some(s=>matchesSearch(s.title,q)));
  const matchedLinks = (studySuggest.links||[]).filter(l => matchesSearch(l.title,q) || matchesSearch(l.url||'',q) || matchesSearch(l.description||'',q));

  let html = `<h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Search: "${esc(q)}"</h2>`;

  if (matchedPassages.length) html += `<div class="res-section"><div class="res-section-head"><h3>Passages <span class="count-pill">${matchedPassages.length}</span></h3></div><div>${matchedPassages.map(p=>`<div class="list-item"><h4>${esc(p.customName)}</h4><div class="meta">${esc((p.content||'').slice(0,120))}...</div></div>`).join('')}</div></div>`;
  if (matchedGQ.length) html += `<div class="res-section"><div class="res-section-head"><h3>Grammar Questions <span class="count-pill">${matchedGQ.length}</span></h3></div><div>${matchedGQ.slice(0,10).map(q=>`<div class="list-item"><h4>${esc(q.question.slice(0,100))}</h4><div class="meta">Answer: ${esc(q.answer)}</div></div>`).join('')}</div></div>`;

  if (matchedVocab.length) html += `<div class="res-section"><div class="res-section-head"><h3>Vocabulary <span class="count-pill">${matchedVocab.length}</span></h3></div><div>${matchedVocab.map(v=>`<div class="list-item"><h4>${esc(v.text||'')}</h4><div class="meta">${esc(v.meaning||'')}</div></div>`).join('')}</div></div>`;
  if (matchedResources.length) html += `<div class="res-section"><div class="res-section-head"><h3>Resources <span class="count-pill">${matchedResources.length}</span></h3></div><div class="resource-grid">${matchedResources.map(r=>resourceCard(r)).join('')}</div></div>`;
  if (matchedExercises.length) html += `<div class="res-section"><div class="res-section-head"><h3>Exercises <span class="count-pill">${matchedExercises.length}</span></h3></div><div class="exercise-list">${matchedExercises.map(e=>exerciseCard(e)).join('')}</div></div>`;
  if (matchedLinks.length) html += `<div class="res-section"><div class="res-section-head"><h3>Links <span class="count-pill">${matchedLinks.length}</span></h3></div><div>${matchedLinks.map(l=>`<div class="link-card"><div class="link-info"><div class="link-title">${esc(l.title)}</div><div class="link-url">${esc(l.url)}</div></div></div>`).join('')}</div></div>`;

  const total = matchedPassages.length+matchedGQ.length+matchedVQ.length+matchedVocab.length+matchedResources.length+matchedExercises.length+matchedLinks.length;
  if (!total) html += `<div class="empty-state">No results found for "${esc(q)}"</div>`;
  return html;
}

function normalizePassages() { quizState.passages.forEach((p,i) => { if(!p.id) p.id=uid('sec'); if(!p.customName) p.customName = p.title || ('Section '+(i+1)); }); }
function currentPassage() { return quizState.passages.find(p=>p.id===quizState.currentPassageId) || null; }

function renderSectionPillsHTML() {
  return quizState.passages.map(p => {
    const active = p.id === quizState.currentPassageId;
    return `<div class="pill ${active?'active':''}" title="${esc(p.customName)}">
      <span onclick="switchSection('${p.id}')" style="cursor:pointer">${esc(p.customName)}</span>
      <span class="pill-act" onclick="event.stopPropagation();renamePassage('${p.id}')">/</span>
      <span class="pill-act" onclick="event.stopPropagation();deletePassage('${p.id}')">×</span>
    </div>`;
  }).join('') + `<div class="pill add" onclick="addPassage()">+ New Section</div>`;
}

function switchSection(id) { quizState.currentPassageId = id; saveQuiz(); render(); }
function addPassage() {
  const name = prompt('Section name:');
  if (!name || !name.trim()) return;
  const p = { id:uid('sec'), customName:name.trim(), title:'', content:'' };
  quizState.passages.push(p);
  quizState.currentPassageId = p.id;
  saveQuiz(); render();
}
function renamePassage(id) {
  const p = quizState.passages.find(x=>x.id===id); if(!p) return;
  const name = prompt('Rename section:', p.customName);
  if (name===null) return;
  if (!name.trim()) { toast('Name cannot be empty'); return; }
  p.customName = name.trim(); saveQuiz(); render();
}
function deletePassage(id) {
  const p = quizState.passages.find(x=>x.id===id); if(!p) return;
  if (!confirm('Delete section "'+p.customName+'"? This removes all associated questions, highlights, and records.')) return;
  const gIds = quizState.grammarQuestions.filter(q=>q.passageId===id).map(q=>q.id);
  const vIds = quizState.vocabularyQuestions.filter(q=>q.passageId===id).map(q=>q.id);
  const removed = new Set([...gIds,...vIds]);
  quizState.grammarQuestions = quizState.grammarQuestions.filter(q=>q.passageId!==id);
  quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(q=>q.passageId!==id);
  quizState.highlights = quizState.highlights.filter(h=>h.passageId!==id);
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.passageId!==id && !removed.has(w.qId));
  quizState.quizSets = quizState.quizSets.filter(qs=>qs.passageId!==id);
  Object.keys(quizState.answerLog).forEach(k=>{ if(removed.has(k)) delete quizState.answerLog[k]; });
  const idx = quizState.passages.findIndex(x=>x.id===id);
  quizState.passages.splice(idx,1);
  quizState.currentPassageId = quizState.passages.length ? quizState.passages[Math.max(0,Math.min(idx,quizState.passages.length-1))].id : null;
  saveQuiz(); render();
}

// QuizSets
function getQuizSets(pid) { return quizState.quizSets.filter(qs=>qs.passageId===pid); }
function ensureDefaultQuizSet(pid) {
  const list = getQuizSets(pid);
  if (!list.length) { const qs = {id:uid('qs'),passageId:pid,name:'1',createdAt:Date.now()}; quizState.quizSets.push(qs); return qs; }
  return list[0];
}
function currentQuizSet() {
  const p = currentPassage(); if(!p) return null;
  const list = getQuizSets(p.id); if(!list.length) return ensureDefaultQuizSet(p.id);
  return list.find(x=>x.id===quizState.currentQuizSetId[p.id]) || list[0];
}
function getActiveQuizSetIds() {
  const p = currentPassage(); if(!p) return [];
  const list = getQuizSets(p.id); if(!list.length) return [];
  const stored = quizState.activeQuizSetIds[p.id];
  if (Array.isArray(stored) && stored.length) { const v = stored.filter(id=>list.some(x=>x.id===id)); if(v.length) return v; }
  const single = list.find(x=>x.id===quizState.currentQuizSetId[p.id]);
  return [single?.id || list[0].id];
}
function setActiveQuizSetIds(ids) {
  const p = currentPassage(); if(!p) return;
  quizState.activeQuizSetIds[p.id] = ids.slice();
  if (ids.length===1) quizState.currentQuizSetId[p.id] = ids[0];
  saveQuiz(); render();
}

function renderSectionTitleBarHTML() {
  const p = currentPassage();
  if (!p) return `<div style="font-size:14px;color:var(--ink-tertiary);margin-bottom:16px;">No sections. Click "+ New Section" or import JSON.</div>`;
  const sets = getQuizSets(p.id);
  if (!sets.length) ensureDefaultQuizSet(p.id);
  const allSets = getQuizSets(p.id);
  const activeIds = getActiveQuizSetIds();
  const activeSet = new Set(activeIds);
  const curVal = activeIds.length===allSets.length && allSets.length>1 ? '__all__' : (activeIds[0]||'');
  const opts = [`<option value="__all__" ${curVal==='__all__'?'selected':''}>All Sets (${allSets.length})</option>`,
    ...allSets.map(qs => {
      const gc = quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).length;
      const vc = quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).length;
      return `<option value="${esc(qs.id)}" ${curVal===qs.id?'selected':''}>${esc(qs.name)} (${gc+vc})</option>`;
    })].join('');

  const pool = [...quizState.grammarQuestions.filter(q=>q.passageId===p.id && activeSet.has(q.quizSetId)), ...quizState.vocabularyQuestions.filter(q=>q.passageId===p.id && activeSet.has(q.quizSetId))];
  const answeredCount = pool.filter(q => quizState.answerLog[q.id]).length;
  const progPercent = pool.length ? Math.round((answeredCount / pool.length) * 100) : 0;

  return `<div style="margin-bottom:16px;padding:16px;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);">

        <div style="font-size:12px;color:var(--ink-secondary);margin-top:2px;">Topic / Section · No intro text shown (Requirement 8)</div>

        <span style="background:var(--green)18;color:var(--green);padding:4px 12px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;">✓ 进度: <b>${answeredCount}/${pool.length}</b> (${progPercent}%)</span>
      </div>
    </div>
    <div class="quizset-bar" style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;border-top:1px dashed var(--line);padding-top:12px;">
      <label style="font-weight:600;font-size:13px;">Quiz Set:</label>
      <select onchange="onQuizSetChange(this.value)" style="padding:4px 8px;font-size:13px;">${opts}</select>
      <button class="apple-btn small" onclick="addQuizSet()">+ New</button>
      <button class="apple-btn small" onclick="renameCurrentQS()" ${curVal==='__all__'||!curVal?'disabled':''}>Rename</button>
      <button class="apple-btn small danger" onclick="deleteCurrentQS()" ${curVal==='__all__'||!curVal?'disabled':''}>Delete</button>
    </div>
  </div>`;
}

function savePassageTitle() {
  const el = document.getElementById('passageTitleEditable');
  if (!el) return;
  const p = currentPassage(); if(!p) return;
  const newTitle = (el.textContent||'').trim();
  if (newTitle) { p.title = newTitle; saveQuiz(); }
}
function onQuizSetChange(val) {
  const allSets = getQuizSets(currentPassage()?.id);
  if (val==='__all__') setActiveQuizSetIds(allSets.map(qs=>qs.id));
  else if (val) setActiveQuizSetIds([val]);
}
function addQuizSet() {
  const p = currentPassage(); if(!p) { toast('Create a section first'); return; }
  const list = getQuizSets(p.id);
  const name = prompt('Quiz set name:', String(list.length+1));
  if (name===null) return;
  const qs = {id:uid('qs'),passageId:p.id,name:(name||'').trim()||String(list.length+1),createdAt:Date.now()};
  quizState.quizSets.push(qs); quizState.currentQuizSetId[p.id]=qs.id;
  saveQuiz(); render();
}
function renameCurrentQS() {
  const ids = getActiveQuizSetIds(); if(!ids.length) return;
  const qs = quizState.quizSets.find(x=>x.id===ids[0]); if(!qs) return;
  const name = prompt('Rename:', qs.name); if(name===null) return;
  if(!name.trim()){toast('Empty');return;} qs.name=name.trim(); saveQuiz(); render();
}
function deleteCurrentQS() {
  const ids = getActiveQuizSetIds(); if(!ids.length) return;
  const qs = quizState.quizSets.find(x=>x.id===ids[0]); if(!qs) return;
  const gc = quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).length;
  const vc = quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).length;
  if(!confirm(`Delete "${qs.name}"? Removes ${gc+vc} questions.`)) return;
  const removed = new Set([...quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).map(q=>q.id),...quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).map(q=>q.id)]);
  quizState.grammarQuestions = quizState.grammarQuestions.filter(q=>q.quizSetId!==qs.id);
  quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(q=>q.quizSetId!==qs.id);
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.quizSetId!==qs.id && !removed.has(w.qId));
  Object.keys(quizState.answerLog).forEach(k=>{if(removed.has(k))delete quizState.answerLog[k];});
  quizState.quizSets = quizState.quizSets.filter(x=>x.id!==qs.id);
  const p = currentPassage();
  if(p){const list=getQuizSets(p.id); quizState.currentQuizSetId[p.id]=list[0]?.id||null;}
  saveQuiz(); render();
}

function renderQuestionsHTML() {
  const p = currentPassage();
  if (!p) return `<div class="empty-state">No section selected</div>`;
  const activeIds = getActiveQuizSetIds();
  const activeSet = new Set(activeIds);
  const isGrammar = quizState.activeTab === 'grammar';
  const pool = isGrammar
    ? quizState.grammarQuestions.filter(q=>q.passageId===p.id && activeSet.has(q.quizSetId))
    : quizState.vocabularyQuestions.filter(q=>q.passageId===p.id && activeSet.has(q.quizSetId));

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
    <div style="font-size:13px;color:var(--ink-secondary);font-weight:600;">${pool.length} questions in current view</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="apple-btn small primary" style="font-weight:700;" onclick="redoCurrentQuizSet()">↻ Redo This Set (重新做这套题)</button>
      <button class="apple-btn primary small" onclick="openQuestionEditor(null,'${isGrammar?'grammar':'vocab'}')">+ Add Question</button>
    </div>
  </div>`;

  if (!pool.length) {
    html += `<div class="empty-state">No questions in this set. Click "+ Add Question" or import JSON.</div>`;
    return html;
  }

  pool.forEach((q,i) => { html += renderQuestionCard(q, i+1, isGrammar?'grammar':'vocab'); });
  return html;
}

function renderQuestionCard(q, num, qType) {
  const log = quizState.answerLog[q.id];
  const inWb = quizState.wrongBook.some(w => w.qId === q.id || (w.question && w.question === q.question));

  // Tokenise text for word selection
  function tokenise(text, areaId) {
    return text.replace(/([^\s\p{P}]+)/gu, (m) =>
      `<span class="q-word-token" data-area="${areaId}" onpointerdown="qsWordDown(event,this)">${esc(m)}</span>`
    );
  }

  let html = `<div class="q-card" data-qid="${q.id}">
    <div class="q-meta">Q${num} · ${qType.toUpperCase()}${q.synonymGroup?' · '+esc(q.synonymGroup):''}</div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center;">
      <button class="q-tool-btn ${inWb ? 'active' : ''}" style="${inWb ? 'background:rgba(255,59,48,0.12);color:var(--red);font-weight:700;' : ''}" onclick="toggleQuestionWrongBook('${q.id}', '${qType}')">
        ${inWb ? 'In Wrong Book (取消)' : '+ Wrong Book'}
      </button>
      <button class="q-tool-btn" onclick="openAddVocabDialog('${esc(q.question).replace(/'/g,"\'")}', '', '${esc(q.question).replace(/'/g,"\'")}', '${appState.currentSubject}')">+ Vocabulary</button>
      <button class="q-tool-btn" onclick="openAddPhraseDialog('${esc(q.question).replace(/'/g,"\'")}', '', '${esc(q.question).replace(/'/g,"\'")}', '${appState.currentSubject}')">+ Phrase</button>
      <button class="q-tool-btn" onclick="openAddSynonymDialog('${q.id}')">Syn Synonyms</button>
    </div>
    <div class="q-text q-selectable" style="font-size:15px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.7;">${tokenise(q.question, 'q_'+q.id)}</div>
    <div class="q-options">`;

  q.options.forEach(opt => {
    const letter = (opt.match(/^([A-Z])[.\s、)]/) || [])[1] || opt[0];
    let cls = 'q-opt';
    if (log) { if(letter===q.answer) cls+=' correct'; else if(letter===log.chosen) cls+=' wrong'; }
    html += `<button class="${cls}" onclick="selectOption(this,'${letter}','${q.id}')">${esc(opt)}</button>`;
  });
  html += `</div>`;

  if (log) {
    html += `<div class="q-status ${log.correct?'ok':'err'}">${log.correct?'OK Correct':'X Wrong · Answer: '+esc(q.answer)}</div>`;
    html += `<div class="q-explain show" style="margin-top:8px;padding:12px;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius-sm);">
      <div style="font-weight:700;margin-bottom:6px;font-size:13px;">Explanation (答案解析):</div>
      <div class="q-selectable" style="line-height:1.8;">${tokenise(q.explanation||'No explanation provided.', 'exp_'+q.id)}</div>
      <div class="explain-actions" style="margin-top:10px;padding-top:8px;border-top:1px dashed var(--line);display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:11px;color:var(--ink-tertiary);font-weight:600;">点击或长按单词加入生词本</span>
        <button class="apple-btn small" onclick="openAddWordBookDialog('', '', 'Quiz Hub Q#${q.id}', '${appState.currentSubject}')">+ Manual Add</button>
      </div>
    </div>`;
  }

  html += `<div class="q-actions">
    <button class="primary" onclick="submitAnswer('${q.id}','${qType}')">Submit</button>
    <button onclick="showAnswer('${q.id}')">Show Answer</button>
    <button onclick="openQuestionEditor('${q.id}','${qType}')">Edit</button>
    <button onclick="deleteQuestion('${q.id}','${qType}')">Delete</button>
  </div></div>`;
  return html;
}

function redoCurrentQuizSet() {
  const p = currentPassage();
  if (!p) { toast('No section selected (请先选择章节)'); return; }
  const activeIds = getActiveQuizSetIds();
  const activeSet = new Set(activeIds);
  
  const grammarPool = quizState.grammarQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId));
  const vocabPool = quizState.vocabularyQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId));
  const allPool = [...grammarPool, ...vocabPool];

  if (!allPool.length) {
    toast('No questions in this set (本套题暂无题目)');
    return;
  }

  let answeredCount = 0;
  allPool.forEach(q => {
    if (quizState.answerLog[q.id]) answeredCount++;
  });

  if (!confirm(`确定要重新做一遍这套题吗？\n将清空本套题共 ${allPool.length} 道题目（已答 ${answeredCount} 题）的答题状态，以便重新自测练习！`)) {
    return;
  }

  allPool.forEach(q => {
    delete quizState.answerLog[q.id];
  });

  saveQuiz();
  renderSharedStats();
  render();
  toast('已重置！可以重新练习这套题了 ↻');
}

function redoAllWrongBookQuestions() {
  const p = currentPassage();
  const all = [...quizState.wrongBook];
  let filtered = p ? all.filter(w => w.passageId === p.id) : all;
  if (wbFilter === 'unresolved') filtered = filtered.filter(w => !w.completed);
  if (wbFilter === 'resolved') filtered = filtered.filter(w => w.completed);

  if (!filtered.length) { toast('No questions to reset'); return; }
  if (!confirm(`确定要重置当前视图下的 ${filtered.length} 道错题的答题状态吗？\n方便您重新从第一题自测刷题！`)) return;

  filtered.forEach(w => {
    w._chosen = null;
    w._checked = false;
  });
  wbCurrentIndex = 0;
  openQuizWrongBook(0, wbFilter);
  toast('错题已全部重置！请重新做题 ↻');
}

function toggleQuestionWrongBook(qId, qType) {
  const pool = qType === 'grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
  const q = pool.find(x => x.id === qId); if (!q) return;
  const idx = quizState.wrongBook.findIndex(w => w.qId === qId || w.question === q.question);
  if (idx !== -1) {
    quizState.wrongBook.splice(idx, 1);
    toast('Removed from Wrong Book (已取消)');
  } else {
    quizState.wrongBook.push({
      id: uid('wb'), qType, qId, passageId: q.passageId, quizSetId: q.quizSetId || null,
      question: q.question, options: q.options, correctAnswer: q.answer, yourAnswer: null,
      explanation: q.explanation || '', ts: Date.now(), completed: false
    });
    toast('Added to Wrong Book (已加入错题)');
  }
  saveQuiz();
  renderSharedStats();
  render();
}

function addSelectedOrPromptVocab(qId) {
  const selText = window.getSelection().toString().trim();
  let defaultExample = '';
  let defaultSource = 'Quiz Hub Q#' + qId;
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`) || document.querySelector(`.wb-practice-card`);

}

function addSelectedOrPromptPhrase(qId) {
  const selText = window.getSelection().toString().trim();
  let defaultExample = '';
  let defaultSource = 'Quiz Hub Q#' + qId;
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`) || document.querySelector(`.wb-practice-card`);

function selectOption(btn, letter, qId) {
  const card = btn.closest('.q-card');
  card.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  card._chosen = letter;
}

function submitAnswer(qId, qType) {
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`);
  const chosen = card?._chosen;
  if (!chosen) { toast('Select an option first'); return; }
  const pool = qType==='grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
  const q = pool.find(x=>x.id===qId); if(!q) return;
  const correct = chosen === q.answer;
  quizState.answerLog[qId] = { correct, chosen, ts: Date.now() };
  if (!correct) {
    quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
    quizState.wrongBook.push({id:uid('wb'),qType,qId,passageId:q.passageId,quizSetId:q.quizSetId||null,question:q.question,options:q.options,correctAnswer:q.answer,yourAnswer:chosen,explanation:q.explanation||'',ts:Date.now()});
  } else {
    quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
  }
  saveQuiz(); render();
}

function showAnswer(qId) {
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`);
  if (!card) return;
  const q = [...quizState.grammarQuestions,...quizState.vocabularyQuestions].find(x=>x.id===qId);
  if (!q) return;
  card.querySelectorAll('.q-opt').forEach(o => {
    const letter = (o.textContent.match(/^([A-Z])/) || [])[1];
    if (letter===q.answer) o.classList.add('correct');
  });
  const expEl = card.querySelector('.q-explain');
  if (expEl) { expEl.textContent = q.explanation||''; expEl.classList.add('show'); }
}

function deleteQuestion(qId, qType) {
  if (!confirm('Delete this question?')) return;
  if (qType==='grammar') quizState.grammarQuestions = quizState.grammarQuestions.filter(x=>x.id!==qId);
  else quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(x=>x.id!==qId);
  delete quizState.answerLog[qId];
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
  saveQuiz(); render();
}

// Question Editor
function openQuestionEditor(qId, qType) {
  const isNew = !qId;
  const p = currentPassage();
  const cur = currentQuizSet();
  let q;
  if (qId) {
    const pool = qType==='grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
    q = pool.find(x=>x.id===qId);
    if (!q) return;
    q = {...q, options:[...q.options]};
  } else {
    q = {id:uid(qType==='grammar'?'g':'v'),passageId:p?.id,quizSetId:cur?.id,question:'',options:['A. ','B. ','C. ','D. '],answer:'A',explanation:'',synonymGroup:''};
  }

  const optsHTML = q.options.map((o,i) => `<div class="field"><label>Option ${String.fromCharCode(65+i)}</label><input class="qopt" value="${esc(o)}" /></div>`).join('');
  const synHTML = qType==='vocab' ? `<div class="field"><label>Synonym Group</label><input id="qSyn" value="${esc(q.synonymGroup||'')}" /></div>` : '';

  openGenericSheet((isNew?'Add':'Edit')+' '+(qType==='grammar'?'Grammar':'Vocab')+' Question', `
    <div class="field"><label>Question</label><textarea id="qText">${esc(q.question)}</textarea></div>
    ${synHTML}${optsHTML}
    <div class="field"><label>Answer (A/B/C/D)</label><input id="qAns" value="${esc(q.answer)}" /></div>
    <div class="field"><label>Explanation</label><textarea id="qExp">${esc(q.explanation||'')}</textarea></div>
  `, [
    {text:'Cancel', onclick:()=>closeSheet('genericSheet')},
    {text:'Save', cls:'primary', onclick:()=>{
      q.question = document.getElementById('qText').value.trim();
      q.options = Array.from(document.querySelectorAll('.qopt')).map(i=>i.value.trim()).filter(Boolean);
      q.answer = document.getElementById('qAns').value.trim().toUpperCase();
      q.explanation = document.getElementById('qExp').value.trim();
      if(qType==='vocab') q.synonymGroup = (document.getElementById('qSyn')?.value||'').trim();
      if(!q.question || q.options.length<2) { toast('Incomplete'); return; }
      if(isNew) {
        if(qType==='grammar') quizState.grammarQuestions.push(q);
        else quizState.vocabularyQuestions.push(q);
      } else {
        const pool = qType==='grammar'?quizState.grammarQuestions:quizState.vocabularyQuestions;
        const idx = pool.findIndex(x=>x.id===q.id);
        if(idx>=0) pool[idx] = q;
      }
      saveQuiz(); closeSheet('genericSheet'); render();
    }}
  ]);
}
