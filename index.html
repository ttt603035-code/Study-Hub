let replacementMap = {};
function buildReadingHTML(content, hls) {
  const re = /[A-Za-z]+(?:[''][A-Za-z]+)?|\s+|[^A-Za-z\s]+/g;
  const tokens = [];
  let m;
  while((m=re.exec(content))!==null) tokens.push({text:m[0],start:m.index,end:m.index+m[0].length});
  const parts = tokens.map(t => {
    const isWord = /^[A-Za-z]/.test(t.text);
    if(isWord){const key=t.text.toLowerCase();const rep=replacementMap[key];const dt=rep||t.text;return{html:`<span class="word${rep?' replaced':''}" data-word="${esc(t.text)}" data-start="${t.start}" data-end="${t.end}">${esc(dt)}</span>`,start:t.start,end:t.end,wordText:t.text};}
    return{html:esc(t.text),start:t.start,end:t.end};
  });
  let html='';
  const hlWordsMap = new Map();
  (quizState.wordBook||[]).filter(w=>w.highlight).forEach(w => {
    hlWordsMap.set(w.text.toLowerCase(), w);
  });
  for(const part of parts){
    const activeH = hls.find(h=>{const s=h.charStart??-1;const e=h.charEnd??-1;return s>=0&&e>=0&&part.start>=s&&part.end<=e;});
    const wbkItem = part.wordText ? hlWordsMap.get(part.wordText.toLowerCase()) : null;
    if(activeH || wbkItem){
      const hid = activeH ? activeH.id : (wbkItem?.id || '');
      const color = activeH?.highlightColor || wbkItem?.highlightColor || 'medium-brown';
      let bg = 'rgba(162,132,94,0.35)', border = '#A2845E';
      if (color === 'light-brown' || color === 'yellow') { bg = 'rgba(212,186,148,0.28)'; border = '#D4BA94'; }
      if (true) { bg = 'rgba(115,88,53,0.48)'; border = '#735835'; }
      const cls = `hl hl-${color}` + ((activeH && activeH.note) ? " has-note":"");
      html+=`<span class="${cls}" style="background:${bg};border-bottom:2px solid ${border};border-radius:3px;padding:0 2px;cursor:pointer;" data-hid="${esc(hid)}">${part.html}</span>`;
    }
    else html+=part.html;
  }
  return html;
}

// ================================================================
//  QUIZ WORD SELECTION ENGINE (Apple Books style)
// ================================================================
let qsSelection = { tokens: [], anchorToken: null, floatMenu: null };

function qsWordDown(e, token) {
  if (e.button !== undefined && e.button !== 0) return;
  e.stopPropagation();
  if (e.cancelable) try { e.preventDefault(); } catch(_) {}

  // Long press for phrase, single click for word
  let pressTimer = null;
  let didLong = false;

  const startToken = token;
  const area = token.dataset.area;
  let endToken = token;

  // Clear previous
  qsClearSelection();

  const onMove = me => {
    const el = document.elementFromPoint(me.clientX, me.clientY);
    const t = el?.closest('.q-word-token');
    if (t && t.dataset.area === area) {
      endToken = t;
      qsHighlightRange(area, startToken, endToken);
    }
  };

  const onUp = () => {
    clearTimeout(pressTimer);
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    if (!didLong) {
      qsHighlightRange(area, startToken, endToken);
    }
    const tokens = Array.from(document.querySelectorAll(`.q-word-token.qs-selected`));
    if (tokens.length) qsShowFloatMenu(tokens);
  };

  pressTimer = setTimeout(() => {
    didLong = true;
    if (navigator.vibrate) try { navigator.vibrate(30); } catch(_) {}
    window.addEventListener('pointermove', onMove, { passive: true });
  }, 300);

  window.addEventListener('pointerup', onUp);
}

function qsHighlightRange(area, a, b) {
  const allTokens = Array.from(document.querySelectorAll(`.q-word-token[data-area="${area}"]`));
  const iA = allTokens.indexOf(a), iB = allTokens.indexOf(b);
  const lo = Math.min(iA, iB), hi = Math.max(iA, iB);
  allTokens.forEach((t, i) => {
    if (i >= lo && i <= hi) t.classList.add('qs-selected');
    else t.classList.remove('qs-selected');
  });
}

function qsClearSelection() {
  document.querySelectorAll('.q-word-token.qs-selected').forEach(t => t.classList.remove('qs-selected'));
  qsRemoveFloatMenu();
}

function qsRemoveFloatMenu() {
  const old = document.getElementById('qsFloatMenu');
  if (old) old.remove();
}

function qsShowFloatMenu(tokens) {
  qsRemoveFloatMenu();
  const text = tokens.map(t => t.textContent).join(' ').trim();
  if (!text) return;

  const rect = tokens[0].getBoundingClientRect();
  const alreadyIn = (quizState.wordBook||[]).some(w => w.text.toLowerCase() === text.toLowerCase());

  const menu = document.createElement('div');
  menu.id = 'qsFloatMenu';
  menu.className = 'qs-float-menu';
  menu.innerHTML = `
    <button class="qs-float-btn" onclick="qsHighlightWord('${text.replace(/'/g,"\\'")}')">Highlight</button>
    <button class="qs-float-btn${alreadyIn?' added':''}" id="qsAddBtn" onclick="qsAddToWordBook(this,'${text.replace(/'/g,"\\'")}')">
      ${alreadyIn ? '✓ Added' : '+ Word Book'}
    </button>
    <button class="qs-float-btn" onclick="qsAddToSynGroup('${text.replace(/'/g,"\\'")}')">+ Synonym</button>
    <button class="qs-float-btn" onclick="qsClearSelection()" style="padding:5px 8px;font-size:12px;opacity:0.6;">✕</button>
  `;
  document.body.appendChild(menu);

  requestAnimationFrame(() => {
    const margin = 8;
    const menuRect = menu.getBoundingClientRect();
    let left = rect.left + window.scrollX;
    left = Math.min(left, window.scrollX + window.innerWidth - menuRect.width - margin);
    left = Math.max(window.scrollX + margin, left);

    let top = rect.top + window.scrollY - menuRect.height - 10;
    if (top < window.scrollY + margin) top = rect.bottom + window.scrollY + 10;

    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
  });

  setTimeout(() => {
    const handler = ev => {
      if (!menu.contains(ev.target) && !ev.target.closest('.q-word-token')) {
        qsClearSelection();
        document.removeEventListener('pointerdown', handler);
      }
    };
    document.addEventListener('pointerdown', handler);
  }, 10);
}

function qsAddToWordBook(btn, text) {
  const alreadyIn = (quizState.wordBook||[]).some(w => w.text.toLowerCase() === text.toLowerCase());
  if (alreadyIn) { toast('已在生词本: ' + text); qsClearSelection(); return; }
  addToWordBook(text, { source: 'Quiz Hub', subject: appState.currentSubject, highlight: true });
  btn.textContent = '✓ Added';
  btn.classList.add('added');
  setTimeout(() => qsClearSelection(), 900);
}

function qsHighlightWord(text) {
  // Persist highlight to quizState.highlights
  const p = currentPassage();
  const hl = { id: uid('hl'), text, passageId: p?.id || '', ts: Date.now() };
  if (!quizState.highlights.some(h => h.text === text)) {
    quizState.highlights.push(hl);
    saveQuiz();
  }
  // Visual: mark all matching tokens with persistent class
  document.querySelectorAll('.q-word-token').forEach(t => {
    if (t.textContent === text) t.classList.add('qs-hl-persist');
  });
  toast('Highlighted: ' + text);
  qsClearSelection();
}

function qsAddToSynGroup(text) {
  qsClearSelection();
  // Open syn group picker
  const existing = (quizState.synonymLibrary||[]).map((g,i) =>
    `<div onclick="qsSynAddToGroup(${i},'${text.replace(/'/g,"\\'")}',this)" style="cursor:pointer;padding:10px 14px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg-card);margin-bottom:6px;transition:all 0.12s ease;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--line)'">
      <div style="font-size:12px;font-weight:700;color:var(--ink-secondary);margin-bottom:3px;">${esc(g.groupName||'Group '+(i+1))}</div>
      <div style="font-size:13px;color:var(--ink);">${(g.words||[]).slice(0,4).map(w=>esc(w)).join(' · ')}</div>
    </div>`
  ).join('') || `<div style="color:var(--ink-tertiary);font-size:13px;padding:8px 0;">No existing groups yet</div>`;

  openGenericSheet(`Add "${esc(text)}" to Synonym Group`, `
    <div style="margin-bottom:12px;">${existing}</div>
    <button class="apple-btn primary" style="width:100%;" onclick="qsSynCreateGroup('${text.replace(/'/g,"\\'")}')">+ Create New Group</button>
  `, [{ text: 'Cancel', onclick: () => closeSheet('genericSheet') }]);
}

function qsSynAddToGroup(idx, text, el) {
  const g = quizState.synonymLibrary[idx]; if (!g) return;
  if (!(g.words||[]).includes(text)) { g.words = [...(g.words||[]), text]; saveQuiz(); }
  toast(`Added "${text}" to "${g.groupName}"`);
  closeSheet('genericSheet');
}

function qsSynCreateGroup(text) {
  closeSheet('genericSheet');
  const name = prompt('New group name (e.g. "depend on"):', text);
  if (!name) return;
  quizState.synonymLibrary = quizState.synonymLibrary || [];
  quizState.synonymLibrary.push({ id: uid('sg'), groupName: name.trim(), words: [text], createdAt: Date.now() });
  saveQuiz();
  toast(`Created group "${name}" with "${text}"`);
}

function bindReadingEvents() {
  const body = document.getElementById('readingBody');
  if (!body) return;
  body.querySelectorAll('.word').forEach(w => {
    w.addEventListener('click', e => {
      const sel = window.getSelection();
      if(sel && sel.toString().trim().length>1) return;
      showWordPopup(w, e);
    });
  });
  body.querySelectorAll('.hl').forEach(h => {
    h.addEventListener('click', e => { e.stopPropagation(); openHighlightEditor(h.dataset.hid); });
  });

  // Selection menu
  body.addEventListener('mouseup', handleReadingSelection);
}

function handleReadingSelection() {
  const sel = window.getSelection();
  const menu = document.getElementById('selMenu');
  if(!sel||sel.rangeCount===0||sel.isCollapsed){menu.style.display='none';return;}
  const text = sel.toString().trim();
  if(!text){menu.style.display='none';return;}
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  if(rect.width===0){menu.style.display='none';return;}
  menu.style.display='flex';
  const w = menu.offsetWidth||300;
  let left = rect.left+rect.width/2-w/2;
  let top = rect.top-menu.offsetHeight-8;
  if(top<8) top=rect.bottom+8;
  left = Math.max(8,Math.min(left,window.innerWidth-w-8));
  menu.style.left=left+'px'; menu.style.top=top+'px';
  menu._selInfo = getSelectionOffsetInReading(range);
  menu._selText = text;
}

function getSelectionOffsetInReading(range) {
  const body = document.getElementById('readingBody');
  if(!body) return null;
  function findOff(node, isStart, offInNode) {
    let el = node.nodeType===1?node:node.parentElement;
    while(el&&el!==body&&!el.dataset?.start) el=el.parentElement;
    if(el?.dataset?.start!=null){const s=+el.dataset.start;const e=+el.dataset.end;return isStart?s:e;}
    return null;
  }
  const s=findOff(range.startContainer,true,range.startOffset);
  const e=findOff(range.endContainer,false,range.endOffset);
  if(s==null||e==null) return null;
  return{start:Math.min(s,e),end:Math.max(s,e)};
}

document.getElementById('selMenu').addEventListener('click', e => {
  const btn = e.target.closest('button'); if(!btn) return;
  const menu = document.getElementById('selMenu');
  const info = menu._selInfo; const text = menu._selText;
  if(!info||!text){menu.style.display='none';return;}
  const p = currentPassage(); if(!p){menu.style.display='none';return;}
  if(btn.dataset.color) addHighlight(p.id,info.start,info.end,text,btn.dataset.color,'');
  else if(btn.dataset.act==='note'){const note=prompt('Note:','');if(note!==null)addHighlight(p.id,info.start,info.end,text,'medium-brown',note.trim());}
  else if(btn.dataset.act==='vocab') addToWordBook(text.trim(), { source: 'Reading Passage', highlight: true, highlightColor: 'medium-brown' });
  menu.style.display='none'; window.getSelection().removeAllRanges();
});

function addHighlight(pid,start,end,text,color,note){
  quizState.wordBook = quizState.wordBook || [];
  const textVal = (text || '').trim();
  if (!textVal) return;
  const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
  if (exists) {
    exists.highlight = true;
    exists.highlightColor = color || 'dark-brown';
    if (note) exists.example = `Note: ${note}`;
    toast(`"${textVal}" 已在生词本中，设为棕色高亮 (${color})！`);
  } else {
    quizState.wordBook.push({
      id: uid('wbk'), text: textVal, meaning: note || 'Reading Highlight', example: 'Highlighted in passage',
      source: 'Reading Passage', subject: appState.currentSubject || 'english',
      dateAdded: todayISO(), addedAt: Date.now(), highlight: true, highlightColor: color || 'dark-brown', starred: false,
      charStart: start, charEnd: end, passageId: pid,
      srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
    });
    toast(`✓ 已转入生词本并高亮 (${color}): "${textVal}"`);
  }
  saveQuiz(); renderSharedStats(); render();
}

function openHighlightEditor(hid) {
  let w = (quizState.wordBook || []).find(x => x.id === hid || x.text === hid);
  if (!w && quizState.highlights) {
    const h = quizState.highlights.find(x => x.id === hid);
    if (h) {
      transferHighlightToWordBook(hid);
      w = quizState.wordBook.find(x => x.text.toLowerCase() === (h.selectedText||'').trim().toLowerCase());
    }
  }
  if (w) openEditWordBookDialog(w.id);
  else toast('请在生词本 (Word Book) 中查看和编辑该词');
}

function showWordPopup(wordEl) {
  const word = wordEl.dataset.word; const wl = word.toLowerCase();
  const pop = document.getElementById('wordPop');
  const groups = quizState.synonymLibrary.filter(g=>(g.words||[]).some(w=>w.toLowerCase()===wl));
  const inVocab = (quizState.wordBook||[]).find(v=>(v.text||v.word||'').toLowerCase()===wl);
  let html = `<h4>${esc(word)}</h4>`;
  if(groups.length){groups.forEach(g=>{const others=g.words.filter(w=>w.toLowerCase()!==wl);html+=`<div style="margin-bottom:6px"><div style="font-size:10px;color:var(--ink-tertiary);margin-bottom:4px">${esc(g.groupName||'Synonyms')}</div><div class="syn-list">${others.map(s=>`<span class="syn-chip" onclick="replaceWord('${wl}','${esc(s)}')">${esc(s)}</span>`).join('')}</div></div>`;});}
  else html+=`<div style="font-size:11px;color:var(--ink-tertiary);margin-bottom:6px">No synonym groups found.</div>`;
  html+=`<div class="pop-actions"><button onclick="delete replacementMap['${wl}'];document.getElementById('wordPop').style.display='none';render();">Reset</button><button onclick="addToVocabBook('${esc(word)}');document.getElementById('wordPop').style.display='none';">${inVocab?'In Vocab':'+ Vocab'}</button></div>`;
  pop.innerHTML=html; pop.style.display='block';
  const rect=wordEl.getBoundingClientRect();
  requestAnimationFrame(() => {
    const margin = 8;
    const popRect = pop.getBoundingClientRect();
    let left = rect.left + window.scrollX;
    left = Math.min(left, window.scrollX + window.innerWidth - popRect.width - margin);
    left = Math.max(window.scrollX + margin, left);

    let top = rect.bottom + window.scrollY + 6;
    if (top + popRect.height > window.scrollY + window.innerHeight - margin) {
      top = rect.top + window.scrollY - popRect.height - 6;
    }
    if (top < window.scrollY + margin) top = window.scrollY + margin;

    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
  });
}
function replaceWord(wl, rep) { replacementMap[wl]=rep; document.getElementById('wordPop').style.display='none'; render(); toast('Replaced with '+rep); }

document.addEventListener('mousedown', e => {
  const sel = document.getElementById('selMenu');
  if(sel.style.display!=='none'&&!sel.contains(e.target)&&!e.target.closest('#readingBody')) sel.style.display='none';
  const wp = document.getElementById('wordPop');
  if(wp.style.display!=='none'&&!wp.contains(e.target)&&!e.target.classList.contains('word')) wp.style.display='none';
});

function addToWordBook(text, extra={}) {
  text = (text||'').trim(); if(!text) return false;
  quizState.wordBook = quizState.wordBook || [];
  const exists = quizState.wordBook.find(v => v.text.toLowerCase() === text.toLowerCase());
  if(exists){ toast('已在生词本中: ' + text); return false; }
  quizState.wordBook.push({
    id: uid('wbk'), text, meaning: extra.meaning || '', example: extra.example || '',
    source: extra.source || 'Quiz Hub', subject: extra.subject || appState.currentSubject,
    dateAdded: todayISO(), addedAt: Date.now(), highlight: !!extra.highlight, starred: !!extra.starred,
    srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
  });
  saveQuiz(); renderSharedStats(); render(); toast('已存入: ' + text); return true;
}

function addToVocabBook(text, extra={}) {
  return addToWordBook(text, extra);
}

// ================================================================
//  UNIFIED WORD BOOK (生词本) — LEARNING & REVIEW SYSTEM
// ================================================================
let wbkSearchQ = '';
let wbkFilterSubj = 'all';
let wbkSort = 'dateDesc'; // 'dateDesc', 'alpha', 'highlight'
let wbkTab = 'all'; // 'all', 'due', 'highlight', 'starred'

function openQuizWordBook(searchQ = wbkSearchQ, filterSubj = wbkFilterSubj, filterSort = wbkSort, filterTab = wbkTab) {
  if (typeof searchQ === 'string') wbkSearchQ = searchQ;
  if (filterSubj) wbkFilterSubj = filterSubj;
  if (filterSort) wbkSort = filterSort;
  if (filterTab) wbkTab = filterTab;
  
  quizState.wordBook = quizState.wordBook || [];
  let items = [...quizState.wordBook];

  // Tab Filtering
  const now = Date.now();
  if (wbkTab === 'due') items = items.filter(w => (w.srsNext || 0) <= now);
  if (wbkTab === 'highlight') items = items.filter(w => w.highlight);
  if (wbkTab === 'starred') items = items.filter(w => w.starred);

  // Subject & Search Filtering
  if (wbkFilterSubj !== 'all') items = items.filter(w => w.subject === wbkFilterSubj);
  if (wbkSearchQ) {
    const q = wbkSearchQ.toLowerCase();
    items = items.filter(w => w.text.toLowerCase().includes(q) || (w.meaning||'').toLowerCase().includes(q) || (w.example||'').toLowerCase().includes(q) || (w.source||'').toLowerCase().includes(q));
  }

  // Sorting
  if (wbkSort === 'dateDesc') items.sort((a,b) => (b.addedAt||0) - (a.addedAt||0));
  if (wbkSort === 'alpha') items.sort((a,b) => a.text.localeCompare(b.text));
  if (wbkSort === 'highlight') items.sort((a,b) => (b.highlight?1:0) - (a.highlight?1:0) || (b.addedAt||0) - (a.addedAt||0));

  const totalCount = quizState.wordBook.length;
  const dueCount = quizState.wordBook.filter(w => (w.srsNext || 0) <= now).length;
  const hlCount = quizState.wordBook.filter(w => w.highlight).length;
  const stCount = quizState.wordBook.filter(w => w.starred).length;

  const subjOpts = `<option value="all">All Subjects</option>` + Object.keys(customSubjects).map(k => `<option value="${k}" ${k === wbkFilterSubj ? 'selected' : ''}>${esc(customSubjects[k].label)}</option>`).join('');

  const topBanner = `<div style="padding:16px;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;box-shadow:var(--shadow-sm);">
    <div>
      <div style="font-size:16px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:6px;">Word Book Review (生词本复习系统)</div>
      <div style="font-size:12px;color:var(--ink-secondary);margin-top:3px;">今日待复习: <b style="color:var(--orange);">${dueCount} 词</b> · 浅棕高亮: <b style="color:#A2845E;">${hlCount}</b> · 重点收藏: <b style="color:var(--yellow);">${stCount}</b></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="apple-btn primary" style="font-weight:700;padding:8px 16px;background:var(--accent);color:#fff;" onclick="startWordBookReview('due')">开始复习待记词 (${dueCount})</button>
      <button class="apple-btn" style="font-weight:600;" onclick="startWordBookReview('random')">🔀 随机抽词复习</button>
      <button class="apple-btn" style="font-weight:600;" onclick="startWordBookReview('all')">全量复习 (${totalCount})</button>
    </div>
  </div>`;

  const filterBar = `<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
    <div style="display:flex;gap:4px;flex-wrap:wrap;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius-sm);padding:3px;">
      <button class="res-tab-btn ${wbkTab === 'all' ? 'active' : ''}" onclick="openQuizWordBook(wbkSearchQ, wbkFilterSubj, wbkSort, 'all')">全部 (${totalCount})</button>
      <button class="res-tab-btn ${wbkTab === 'due' ? 'active' : ''}" style="${wbkTab === 'due' ? '' : 'color:var(--ink-tertiary);'}" onclick="openQuizWordBook(wbkSearchQ, wbkFilterSubj, wbkSort, 'due')">待复习 (${dueCount})</button>
      <button class="res-tab-btn ${wbkTab === 'highlight' ? 'active' : ''}" style="${wbkTab === 'highlight' ? 'background:#A2845E;color:#fff;' : 'color:#A2845E;'}" onclick="openQuizWordBook(wbkSearchQ, wbkFilterSubj, wbkSort, 'highlight')">高亮 (${hlCount})</button>
      <button class="res-tab-btn ${wbkTab === 'starred' ? 'active' : ''}" onclick="openQuizWordBook(wbkSearchQ, wbkFilterSubj, wbkSort, 'starred')">收藏 (${stCount})</button>
    </div>
    <div style="flex:1;min-width:160px;display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:6px 10px;">
      <span style="font-size:13px;color:var(--ink-tertiary);">⌕</span>
      <input type="text" placeholder="搜索生词、释义、来源…" value="${esc(wbkSearchQ)}" style="flex:1;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--ink);outline:none;" oninput="openQuizWordBook(this.value, wbkFilterSubj, wbkSort, wbkTab)"/>
    </div>
    <select style="height:34px;padding:0 10px;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--ink);" onchange="openQuizWordBook(wbkSearchQ, this.value, wbkSort, wbkTab)">${subjOpts}</select>
    <select style="height:34px;padding:0 10px;font-size:13px;font-weight:600;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--ink);" onchange="openQuizWordBook(wbkSearchQ, wbkFilterSubj, this.value, wbkTab)">
      <option value="dateDesc" ${wbkSort==='dateDesc'?'selected':''}>最新添加</option>
      <option value="alpha" ${wbkSort==='alpha'?'selected':''}>A → Z</option>
      <option value="highlight" ${wbkSort==='highlight'?'selected':''}>高亮置顶</option>
    </select>
    <button class="apple-btn primary" style="height:34px;padding:0 14px;font-size:13px;font-weight:700;" onclick="openAddWordBookDialog('', '', '', appState.currentSubject)">+ 录入</button>
  </div>`;

  const listHTML = items.length ? items.map(w => {
    const sColor = customSubjects[w.subject]?.color || 'var(--ink-tertiary)';
    const sLabel = customSubjects[w.subject]?.label || w.subject || 'General';
    const isHl = !!w.highlight;
    const hlCardStyle = isHl ? 'background:rgba(162,132,94,0.18);border:1px solid #A2845E;' : 'background:var(--bg-elev);border:1px solid var(--line);';
    const isDue = (w.srsNext || 0) <= now;

    return `<div class="list-item" style="display:flex;justify-content:space-between;align-items:flex-start;padding:14px;border-radius:var(--radius-sm);margin-bottom:10px;box-shadow:var(--shadow-sm);transition:all 0.2s ease;${hlCardStyle}">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <h4 style="font-size:17px;font-weight:800;margin:0;color:var(--ink);">${esc(w.text)}</h4>
          <span style="font-size:11px;padding:2px 8px;border-radius:4px;background:${sColor}18;color:${sColor};font-weight:600;">${esc(sLabel)}</span>
          ${w.source ? `<span style="font-size:11px;color:var(--ink-tertiary);background:var(--bg-card);padding:2px 6px;border-radius:4px;border:1px solid var(--line-light);">Src: ${esc(w.source)}</span>` : ''}
          ${isHl ? `<span style="font-size:11px;background:#A2845E;color:#fff;padding:2px 8px;border-radius:12px;font-weight:700;">Highlighted</span>` : ''}
          ${isDue ? `<span style="font-size:11px;background:var(--orange);color:#fff;padding:2px 8px;border-radius:12px;font-weight:700;">待复习</span>` : `<span style="font-size:11px;color:var(--green);font-weight:600;">已复习 (Box ${w.srsBox||0})</span>`}
          <span style="font-size:11px;color:var(--ink-tertiary);margin-left:auto;">Added: ${w.dateAdded || new Date(w.addedAt||Date.now()).toLocaleDateString()}</span>
        </div>
        <div class="meta" style="font-size:15px;color:var(--ink);font-weight:600;margin-bottom:4px;">${esc(w.meaning || '暂无释义')}</div>
        ${w.example ? `<div style="font-size:13px;color:var(--ink-secondary);font-style:italic;line-height:1.4;">"${esc(w.example)}"</div>` : ''}
      </div>
      <div class="actions" style="display:flex;gap:6px;margin-left:14px;flex-shrink:0;align-items:center;">
        <button class="apple-btn small" style="${isHl ? 'background:#A2845E;color:#fff;font-weight:700;border-color:#A2845E;' : 'color:#A2845E;font-weight:600;'}" onclick="toggleWordBookHighlight('${w.id}')">Highlight</button>
        <button class="apple-btn small ${w.starred ? 'active' : ''}" style="${w.starred ? 'color:var(--yellow);font-weight:700;' : ''}" onclick="toggleWordBookStar('${w.id}')"></button>
        <button class="apple-btn small" onclick="openEditWordBookDialog('${w.id}')">Edit</button>
        <button class="apple-btn small danger" onclick="deleteWordBookItem('${w.id}')">Delete</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state">在当前筛选下暂无生词记录！</div>`;

  openGenericSheet(`Word Book 生词本 (${quizState.wordBook.length})`, topBanner + filterBar + `<div style="max-height:430px;overflow-y:auto;">${listHTML}</div>`, [
    { text: 'Close', cls: 'primary', onclick: () => { closeSheet('genericSheet'); render(); } }
  ]);
}

function toggleWordBookHighlight(id) {
  const w = quizState.wordBook.find(x => x.id === id);
  if (w) {
    w.highlight = !w.highlight;
    saveQuiz();
    openQuizWordBook();
    toast(w.highlight ? '已设为高亮' : '已取消高亮');
  }
}

function toggleWordBookStar(id) {
  const w = quizState.wordBook.find(x => x.id === id);
  if (w) {

// ================================================================
//  WORD BOOK REVIEW MODE (生词本卡片复习系统)
// ================================================================
let wbkReviewSession = null;

function startWordBookReview(mode = 'due') {
  quizState.wordBook = quizState.wordBook || [];
  const now = Date.now();
  let queue = [];
  if (mode === 'due') {
    queue = quizState.wordBook.filter(w => (w.srsNext || 0) <= now);
    if (!queue.length) { toast('今日所有生词已复习完毕，转为全量随机复习'); queue = [...quizState.wordBook]; mode = 'random'; }
  } else if (mode === 'random') {
    queue = [...quizState.wordBook].sort(() => Math.random() - 0.5);
  } else {
    queue = [...quizState.wordBook];
  }

  if (!queue.length) { toast('生词本为空，请先录入或刷题时加入生词！'); return; }

  wbkReviewSession = { queue, index: 0, showMeaning: false, mode, total: queue.length };
  renderWordBookReviewCard();
}

function renderWordBookReviewCard() {
  if (!wbkReviewSession || !wbkReviewSession.queue.length) return;
  const cur = wbkReviewSession.queue[wbkReviewSession.index];
  if (!cur) {
    openGenericSheet('复习完成', `<div style="text-align:center;padding:30px;">
      <h3 style="font-size:22px;color:var(--green);margin-bottom:10px;">太棒了！本组共 ${wbkReviewSession.total} 个单词/短语已全部复习！</h3>
      <p style="color:var(--ink-secondary);font-size:14px;">继续保持每日复习，提升词汇记忆持久度与阅读速度！</p>
    </div>`, [{ text: '返回生词本', cls: 'primary', onclick: () => openQuizWordBook() }]);
    return;
  }

  const idx = wbkReviewSession.index;
  const total = wbkReviewSession.total;
  const isHl = !!cur.highlight;
  const sColor = customSubjects[cur.subject]?.color || 'var(--ink-tertiary)';
  const sLabel = customSubjects[cur.subject]?.label || cur.subject || 'General';

  const cardStyle = isHl ? 'background:rgba(162,132,94,0.18);border:2px solid #A2845E;' : 'background:var(--bg-elev);border:1px solid var(--line);';

  const headerBar = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:10px;">
    <span style="font-size:14px;font-weight:700;color:var(--accent);">复习进度: ${idx + 1} / ${total} (${wbkReviewSession.mode.toUpperCase()})</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="apple-btn small" onclick="wbkReviewSession.queue.sort(()=>Math.random()-0.5); wbkReviewSession.index=0; wbkReviewSession.showMeaning=false; renderWordBookReviewCard();">🔀 打乱顺序</button>
      <button class="apple-btn small" onclick="openQuizWordBook()">退出复习</button>
    </div>
  </div>`;

  let mainContent = `<div style="padding:28px 20px;border-radius:var(--radius);text-align:center;margin-bottom:20px;box-shadow:var(--shadow-md);transition:all 0.25s ease;${cardStyle}">
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <span style="font-size:11px;padding:3px 10px;border-radius:4px;background:${sColor}18;color:${sColor};font-weight:700;">${esc(sLabel)}</span>
      ${cur.source ? `<span style="font-size:11px;color:var(--ink-secondary);background:var(--bg-card);padding:3px 10px;border-radius:4px;border:1px solid var(--line);">Src: ${esc(cur.source)}</span>` : ''}
      ${isHl ? `<span style="font-size:11px;background:#A2845E;color:#fff;padding:3px 10px;border-radius:12px;font-weight:700;">Highlighted (浅棕高亮)</span>` : ''}
    </div>
    <div style="font-size:32px;font-weight:800;color:var(--ink);margin:24px 0;letter-spacing:-0.5px;">${esc(cur.text)}</div>`;

  if (!wbkReviewSession.showMeaning) {
    mainContent += `<div style="margin-top:30px;">
      <button class="apple-btn primary" style="width:100%;padding:14px;font-size:16px;font-weight:700;box-shadow:var(--shadow-sm);" onclick="wbkReviewSession.showMeaning = true; renderWordBookReviewCard();">👁 显示释义与例句 (Show Meaning)</button>
    </div>`;
  } else {
    mainContent += `<div style="margin-top:20px;padding-top:18px;border-top:1px dashed var(--line);text-align:left;background:var(--bg-card);padding:18px;border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);">
      <div style="font-size:13px;color:var(--ink-tertiary);font-weight:700;margin-bottom:4px;">释义 (Meaning):</div>
      <div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:12px;">${esc(cur.meaning || '暂无释义')}</div>
      ${cur.example ? `<div style="font-size:13px;color:var(--ink-tertiary);font-weight:700;margin-bottom:4px;">例句 (Example):</div>
      <div style="font-size:15px;color:var(--ink-secondary);font-style:italic;line-height:1.5;">"${esc(cur.example)}"</div>` : ''}
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <button class="apple-btn danger" style="flex:1;padding:12px;font-size:15px;font-weight:700;" onclick="markWordBookReviewItem('${cur.id}', 'forgot')">不会 (重复复习)</button>
      <button class="apple-btn primary" style="flex:1;padding:12px;font-size:15px;font-weight:700;background:var(--green);border-color:var(--green);" onclick="markWordBookReviewItem('${cur.id}', 'remembered')">✓ 记住了 (完成 / 增加间隔)</button>
    </div>`;
  }
  mainContent += `</div>`;

  const footerBar = `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
    <button class="apple-btn" onclick="wbkReviewStep(-1)" ${idx === 0 ? 'disabled' : ''}>← 上一词 (Prev)</button>
    <div style="display:flex;gap:8px;">
      <button class="apple-btn small" style="${isHl ? 'background:#A2845E;color:#fff;font-weight:700;border-color:#A2845E;' : 'color:#A2845E;font-weight:600;'}" onclick="toggleWordBookHighlight('${cur.id}'); renderWordBookReviewCard();">切换高亮</button>
      <button class="apple-btn small ${cur.starred ? 'active' : ''}" style="${cur.starred ? 'color:var(--yellow);font-weight:700;' : ''}" onclick="toggleWordBookStar('${cur.id}'); renderWordBookReviewCard();">收藏</button>
    </div>
    <button class="apple-btn" onclick="wbkReviewStep(1)" ${idx >= total - 1 ? 'disabled' : ''}>下一词 (Next) →</button>
  </div>`;

  openGenericSheet(`Word Book 卡片复习 (${idx + 1}/${total})`, headerBar + mainContent + footerBar, [
    { text: '结束复习返回列表', cls: 'primary', onclick: () => openQuizWordBook() }
  ]);
}

function wbkReviewStep(dir) {
  if (!wbkReviewSession) return;
  const newIdx = wbkReviewSession.index + dir;
  if (newIdx >= 0 && newIdx < wbkReviewSession.total) {
    wbkReviewSession.index = newIdx;
    wbkReviewSession.showMeaning = false;
    renderWordBookReviewCard();
  }
}

function markWordBookReviewItem(id, result) {
  const item = quizState.wordBook.find(x => x.id === id);
  if (item) {
    const now = Date.now();
    if (result === 'forgot') {
      item.srsBox = 0;
      item.srsNext = now; // due immediately or tomorrow
      item.srsLapses = (item.srsLapses || 0) + 1;
      toast('❌ 已标记为“不会”，将在近期复习队列中反复出现！');
    } else {
      item.srsBox = (item.srsBox || 0) + 1;
      // Spaced repetition intervals: 1d, 3d, 7d, 14d, 30d
      const days = [1, 3, 7, 14, 30][Math.min(4, item.srsBox)] || 1;
      item.srsNext = now + days * 86400000;
      item.srsReviews = (item.srsReviews || 0) + 1;
      toast(`✓ 记住了！已增加记忆间隔 (下次复习: ${days}天后)`);
    }
    saveQuiz();
    renderSharedStats();
  }
  if (wbkReviewSession.index < wbkReviewSession.total - 1) {
    wbkReviewStep(1);
  } else {
    toast('当前队列已刷完');
    openQuizWordBook();
  }
}

function addSelectedToWordBook(qId) {

function openAddSynonymDialog(qId) {

// ================================================================
//  WRONG BOOK — INTERACTIVE QUESTION PRACTICING INTERFACE
// ================================================================
let wbCurrentIndex = 0;
let wbFilter = 'all'; // 'all', 'unresolved', 'resolved'

function openQuizWrongBook(idx = 0, filter = wbFilter) {
  if (typeof idx === 'number') wbCurrentIndex = idx;
  if (filter) wbFilter = filter;
  const p = currentPassage();
  const all = [...quizState.wrongBook];
  let filtered = p ? all.filter(w => w.passageId === p.id) : all;
  if (wbFilter === 'unresolved') filtered = filtered.filter(w => !w.completed);
  if (wbFilter === 'resolved') filtered = filtered.filter(w => w.completed);

  if (wbCurrentIndex >= filtered.length) wbCurrentIndex = Math.max(0, filtered.length - 1);
  if (wbCurrentIndex < 0) wbCurrentIndex = 0;

  const totalAll = all.length;
  const totalUnres = all.filter(w => !w.completed).length;
  const totalRes = all.filter(w => w.completed).length;

  const filterBar = `<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
    <span style="font-size:12px;font-weight:700;color:var(--ink-secondary);margin-right:4px;">Filter:</span>
    <button class="apple-btn small ${wbFilter === 'all' && !p ? 'active' : ''}" onclick="quizState.currentPassageId=null;openQuizWrongBook(0, 'all')">All (${totalAll})</button>
    <button class="apple-btn small ${wbFilter === 'unresolved' ? 'active' : ''}" onclick="openQuizWrongBook(0, 'unresolved')">Unresolved (${totalUnres})</button>
    <button class="apple-btn small ${wbFilter === 'resolved' ? 'active' : ''}" onclick="openQuizWrongBook(0, 'resolved')">Resolved (${totalRes})</button>
    ${quizState.passages.map(pp => `<button class="apple-btn small ${pp.id === p?.id ? 'active' : ''}" onclick="quizState.currentPassageId='${pp.id}';openQuizWrongBook(0, '${wbFilter}')">${esc(pp.customName)}</button>`).join('')}
    <button class="apple-btn small primary" style="margin-left:auto;font-weight:700;" onclick="redoAllWrongBookQuestions()">↻ Reset All in View (全部重做)</button>
  </div>`;

  if (!filtered.length) {
    openGenericSheet('X Wrong Book Practice', filterBar + `<div class="empty-state">No wrong questions found in this filter!</div>`, [
      { text: 'Close', cls: 'primary', onclick: () => closeSheet('genericSheet') }
    ]);
    return;
  }

  const w = filtered[wbCurrentIndex];
  const qNum = wbCurrentIndex + 1;
  const total = filtered.length;
  const isResolved = !!w.completed;

  // Options rendering
  let optionsHTML = `<div class="q-options" style="margin-top:12px;margin-bottom:16px;">`;
  (w.options || []).forEach(opt => {
    const letter = (opt.match(/^([A-Z])[.\s、)]/) || [])[1] || opt[0];
    let cls = 'q-opt wb-opt';
    if (w._checked) {
      if (letter === w.correctAnswer) cls += ' correct';
      else if (letter === w._chosen) cls += ' wrong';
    } else if (w._chosen === letter) {
      cls += ' selected';
    }
    optionsHTML += `<button class="${cls}" style="text-align:left;width:100%;padding:10px 14px;margin-bottom:6px;border-radius:var(--radius-sm);border:1px solid var(--line);" onclick="selectWbOption(this, '${letter}', '${w.id}')">${esc(opt)}</button>`;
  });
  optionsHTML += `</div>`;

  // Explanation if checked
  let explainHTML = '';
  if (w._checked) {
    const isOk = w._chosen === w.correctAnswer;
    explainHTML = `<div class="q-status ${isOk ? 'ok' : 'err'}" style="margin-top:12px;padding:10px;border-radius:var(--radius-sm);background:${isOk?'rgba(52,199,89,0.1)':'rgba(255,59,48,0.1)'};color:${isOk?'var(--green)':'var(--red)'};font-weight:700;">

function selectWbOption(btn, letter, wbId) {
  const card = btn.closest('.wb-practice-card');
  card.querySelectorAll('.wb-opt').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (w) w._chosen = letter;
}

function checkWbAnswer(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  if (!w._chosen) { toast('Select an option first'); return; }
  w._checked = true;
  openQuizWrongBook(wbCurrentIndex, wbFilter);
}

function retryWbQuestion(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  w._chosen = null;
  w._checked = false;
  openQuizWrongBook(wbCurrentIndex, wbFilter);
  toast('Question reset for retry');
}

function toggleWbResolved(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  w.completed = !w.completed;
  saveQuiz();
  renderSharedStats();
  openQuizWrongBook(wbCurrentIndex, wbFilter);
  toast(w.completed ? 'Marked as completed / resolved!' : 'Added back to unresolved wrong book!');
}

function deleteWbQuestion(wbId) {
  if (!confirm('Delete this question from Wrong Book?')) return;
  quizState.wrongBook = quizState.wrongBook.filter(x => x.id !== wbId);
  saveQuiz();
  renderSharedStats();
  openQuizWrongBook(wbCurrentIndex, wbFilter);
  toast('Deleted from Wrong Book');
}

function retryWrong(wId) {
  retryWbQuestion(wId);
}

let srsSession = null;
function startSrsReview(mode, customList) {
  const source = mode==='vocab' ? (quizState.wordBook||[]) : quizState.synonymLibrary;
  source.forEach(ensureSrs);
  let queue;
  if(Array.isArray(customList)&&customList.length){customList.forEach(ensureSrs);queue=customList.slice();}
  else{const due=srsDueList(source);if(!due.length){toast('Nothing due! !');return;}queue=due.slice().sort(()=>Math.random()-0.5);}
  srsSession = {mode,queue,total:queue.length,done:0,showAnswer:false};
  renderSrsCard();
}

function renderSrsCard() {
  if(!srsSession||!srsSession.queue.length){
    openGenericSheet('! Review Complete',`<div style="text-align:center;padding:20px;font-size:14px;">Reviewed <b>${srsSession?.total||0}</b> items</div>`,
      [{text:'Close',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
    return;
  }
  const cur=srsSession.queue[0];const isVocab=srsSession.mode==='vocab';
  const frontHTML=isVocab?`<div style="font-size:28px;font-weight:700">${esc(cur.word)}</div>`:`<div style="font-size:22px;font-weight:700">${esc(cur.groupName||'Group')}</div><div style="color:var(--ink-tertiary);font-size:11px;margin-top:4px">${(cur.words||[]).length} words</div>`;
  const backHTML=isVocab?`<div style="font-size:15px;color:var(--ink)">${esc(cur.meaning||'')}</div>${cur.example?`<div style="margin-top:10px;padding:8px 12px;background:var(--bg-card);border-radius:8px;font-size:12px;color:var(--ink-secondary)">${esc(cur.example)}</div>`:''}`:`<div class="chips">${(cur.words||[]).map(w=>`<span class="chip" style="font-size:14px;padding:6px 14px">${esc(w)}</span>`).join('')}</div>`;

  const btnHTML = !srsSession.showAnswer
    ? `<button class="apple-btn primary" style="padding:10px 40px" onclick="srsSession.showAnswer=true;renderSrsCard();">Show Answer</button>`
    : `<div style="display:flex;gap:8px;justify-content:center">
        <button class="apple-btn" style="background:rgba(255,69,58,0.1);color:var(--red)" onclick="srsGradeCurrent('again')">Again</button>
        <button class="apple-btn" style="background:rgba(255,159,10,0.1);color:var(--orange)" onclick="srsGradeCurrent('hard')">Hard</button>
        <button class="apple-btn" style="background:rgba(48,209,88,0.1);color:var(--green)" onclick="srsGradeCurrent('good')">Good</button>
        <button class="apple-btn" style="background:rgba(10,132,255,0.1);color:var(--accent)" onclick="srsGradeCurrent('easy')">Easy</button>
      </div>`;

  openGenericSheet(`Rev Review · ${isVocab?'Vocabulary':'Synonyms'}`,`
    <div style="max-width:500px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-tertiary);margin-bottom:16px"><span>${srsSession.done+1}/${srsSession.total}</span><span>Box ${cur.srsBox||0}</span></div>
      <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center">
        ${frontHTML}
        <div style="width:100%;margin-top:20px;padding-top:20px;border-top:1px dashed var(--line);${srsSession.showAnswer?'':'display:none'}">${backHTML}</div>
      </div>
      <div style="margin-top:20px;text-align:center">${btnHTML}</div>
    </div>
  `,[{text:'End Review',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
}

function srsGradeCurrent(grade) {
  if(!srsSession) return;
  const cur=srsSession.queue.shift();
  srsGrade(cur,grade);
  srsSession.done++;srsSession.showAnswer=false;
  saveQuiz();renderSrsCard();
}

// Keyboard shortcuts for SRS
document.addEventListener('keydown', e => {
  if(!srsSession) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(!srsSession.showAnswer&&(e.code==='Space'||e.key==='Enter')){e.preventDefault();srsSession.showAnswer=true;renderSrsCard();}
  else if(srsSession.showAnswer){const map={1:'again',2:'hard',3:'good',4:'easy'};if(map[e.key]){e.preventDefault();srsGradeCurrent(map[e.key]);}}
});

function importQuizJSON() {

  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { try { importQuizData(JSON.parse(r.result)); toast('Imported OK'); } catch(err) { alert('Import failed: '+err.message); } };
    r.readAsText(f);
  };
  inp.click();
}

function importQuizData(data) {
  if(!data||typeof data!=='object') throw new Error('Invalid JSON');
  const passages = Array.isArray(data.passages)?data.passages:[];
  passages.forEach((p,i)=>{if(!p.id)p.id=uid('sec');if(!p.customName)p.customName=p.title||('Section '+(i+1));if(typeof p.content!=='string')p.content='';});
  quizState.passages=passages;
  quizState.quizSets=Array.isArray(data.quizSets)?data.quizSets:[];
  quizState.grammarQuestions=Array.isArray(data.grammarQuestions)?data.grammarQuestions:[];
  quizState.vocabularyQuestions=Array.isArray(data.vocabularyQuestions)?data.vocabularyQuestions:[];
  quizState.wordBook=Array.isArray(data.wordBook)?data.wordBook:(Array.isArray(data.vocabularyBook)?data.vocabularyBook:[]);
  quizState.synonymLibrary=Array.isArray(data.synonymLibrary)?data.synonymLibrary:[];
  quizState.highlights=Array.isArray(data.highlights)?data.highlights:[];
  quizState.wrongBook=Array.isArray(data.wrongBook)?data.wrongBook:[];
  quizState.answerLog=data.answerLog||{};
  quizState.currentQuizSetId=data.currentQuizSetId||{};
  quizState.currentPassageId=data.currentPassageId||(passages[0]&&passages[0].id)||null;
  quizState.highlights.forEach(h=>{if(!h.id)h.id=uid('hl');});
  quizState.quizSets.forEach(qs=>{if(!qs.id)qs.id=uid('qs');});
  passages.forEach(p=>{if(!quizState.quizSets.some(qs=>qs.passageId===p.id)){quizState.quizSets.push({id:uid('qs'),passageId:p.id,name:'1',createdAt:Date.now()});}});
  saveQuiz(); render();
}

}

  seed.grammarQuestions.forEach(q=>{if(!quizState.grammarQuestions.find(x=>x.id===q.id))quizState.grammarQuestions.push(q);});
  seed.vocabularyQuestions.forEach(q=>{if(!quizState.vocabularyQuestions.find(x=>x.id===q.id))quizState.vocabularyQuestions.push(q);});
  (seed.wordBook||[]).forEach(w=>{if(!quizState.wordBook.find(x=>x.text===w.text))quizState.wordBook.push(w);});
  seed.synonymLibrary.forEach(g=>{if(!quizState.synonymLibrary.find(x=>x.groupName===g.groupName))quizState.synonymLibrary.push(g);});
  if(!quizState.currentPassageId&&quizState.passages.length) quizState.currentPassageId=quizState.passages[0].id;
  saveQuiz(); render(); toast('Sample data loaded');
}

async function cloudUpload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token){alert('Token required');return;}
  try{
    toast('Uploading...');
    const body={description:'Quiz Backup',public:false,files:{[filename]:{content:JSON.stringify({version:'2.0',schemaVersion:QUIZ_SCHEMA,exportedAt:Date.now(),passages:quizState.passages,quizSets:quizState.quizSets,grammarQuestions:quizState.grammarQuestions,vocabularyQuestions:quizState.vocabularyQuestions,wordBook:quizState.wordBook,synonymLibrary:quizState.synonymLibrary,highlights:quizState.highlights,wrongBook:quizState.wrongBook,answerLog:quizState.answerLog,currentPassageId:quizState.currentPassageId,currentQuizSetId:quizState.currentQuizSetId},null,2)}}};
    let url='https://api.github.com/gists';let method='POST';
    if(gistId){url+='/'+gistId;method='PATCH';}
    const res=await fetch(url,{method,headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    quizMeta.gist={token,gistId:data.id||gistId,filename,lastSyncTs:Date.now()};
    try{localStorage.setItem(QUIZ_META_KEY,JSON.stringify(quizMeta));}catch(_){}
    toast('OK Uploaded');
  }catch(e){alert('Upload failed: '+e.message);}
}

async function cloudDownload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token||!gistId){alert('Token and Gist ID required');return;}
  if(!confirm('Overwrite local data with cloud?')) return;
  try{
    toast('Downloading...');
    const res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token}});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    const file=data.files?.[filename]||Object.values(data.files||{})[0];
    if(!file?.content) throw new Error('No data file');
    importQuizData(JSON.parse(file.content));
    toast('OK Downloaded');closeSheet('genericSheet');
  }catch(e){alert('Download failed: '+e.message);}
}

function renderModResources(subj) {
  let res = resources.filter(r => !subj || r.subject === subj);
  if (resViewState.filterSubject !== 'all') res = res.filter(r => r.subject === resViewState.filterSubject);
  if (resViewState.filterType !== 'all' && resViewState.filterType !== 'resources') return '';

  const notStarted = res.filter(r => r.status === 'not_started' || (r.startDate && r.startDate > todayISO()));
  const pending = res.filter(r => r.status === 'pending' && (!r.startDate || r.startDate <= todayISO()));
  const completed = res.filter(r => r.status === 'completed');
  let displayed = [...res];
  if (resViewState.resTab === 'not_started') displayed = notStarted;
  if (resViewState.resTab === 'pending') displayed = pending;
  if (resViewState.resTab === 'completed') displayed = completed;

  return `<div class="res-section mod-section" id="mod_resources" data-mod="resources">
    <div class="res-section-head" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">

function toggleLearningItem(id) {
  const lr = learningItems.find(x=>x.id===id); if(!lr) return;
  lr.completed = !lr.completed;
  if (lr.completed && lr.totalPages > 0) lr.currentPage = lr.totalPages;
  saveLearning(); render();
}
function deleteLearningItem(id) {
  if (!confirm('Delete this item?')) return;
  learningItems = learningItems.filter(x=>x.id!==id);
  saveLearning(); render();
}
function lrAdjustPage(id, delta) {
  const lr = learningItems.find(x=>x.id===id); if(!lr) return;
  lr.currentPage = Math.max(0, Math.min(lr.totalPages||9999, (lr.currentPage||0)+delta));
  if (lr.totalPages > 0 && lr.currentPage >= lr.totalPages) lr.completed = true;
  saveLearning(); render();
}
function lrSetPage(id, val) {
  const lr = learningItems.find(x=>x.id===id); if(!lr) return;
  const n = Math.max(0, Math.min(lr.totalPages||9999, parseInt(val)||0));
  lr.currentPage = n;
  if (lr.totalPages > 0 && n >= lr.totalPages) lr.completed = true;
  saveLearning(); render();
}
function lrSetTotal(id, val) {
  const lr = learningItems.find(x=>x.id===id); if(!lr) return;
  lr.totalPages = Math.max(1, parseInt(val)||1);
  lr.currentPage = Math.min(lr.currentPage, lr.totalPages);
  saveLearning(); render();
}

// ================================================================
//  EXERCISE BANK UNIFIED DRAG & DROP
// ================================================================
let exDragState = null;

function initExDrag() {
  const lists = document.querySelectorAll('[id^="exUnifiedList_"]');
  lists.forEach(list => {
    list.querySelectorAll('.ex-unified-item').forEach(item => {
      item.addEventListener('pointerdown', exPointerDown, { passive: false });
    });
  });
}

function exPointerDown(e) {
  if (e.target.closest('button,input,select,.st-check,.ex-check')) return;
  const item = e.currentTarget;
  const startX = e.clientX, startY = e.clientY;
  let timer = setTimeout(() => exDragStart(item), 380);

  const onMove = me => {
    const dx = Math.abs(me.clientX - startX), dy = Math.abs(me.clientY - startY);
    if (!exDragState && (dx > 8 || dy > 8)) { clearTimeout(timer); return; }
    if (exDragState) { if (me.cancelable) try { me.preventDefault(); } catch(_){} exDragMove(me); }
  };
  const onUp = () => {
    clearTimeout(timer);
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    if (exDragState) exDragEnd();
  };
  window.addEventListener('pointermove', onMove, { passive: false });
  window.addEventListener('pointerup', onUp);
}

function exDragStart(item) {
  if (window.getSelection) try { window.getSelection().removeAllRanges(); } catch(_){}
  if (navigator.vibrate) try { navigator.vibrate(40); } catch(_){}
  document.body.style.userSelect = 'none';
  document.body.style.webkitUserSelect = 'none';
  exDragState = { item };
  item.classList.add('st-is-dragging');
  toast('⠿ 长按拖拽排序');
}

function exDragMove(e) {
  if (!exDragState) return;
  const { item } = exDragState;
  const list = item.closest('[id^="exUnifiedList_"]');
  if (!list) return;
  list.querySelectorAll('.ex-unified-item').forEach(sib => {
    if (sib === item) return;
    const r = sib.getBoundingClientRect();
    if (e.clientY >= r.top && e.clientY <= r.bottom) {
      sib.classList.add('st-drag-over');
      exDragState.overItem = { el: sib, above: e.clientY < r.top + r.height / 2 };
    } else {
      sib.classList.remove('st-drag-over');
    }
  });
}

function exDragEnd() {
  if (!exDragState) return;
  const { item, overItem } = exDragState;
  item.classList.remove('st-is-dragging');
  if (overItem) {
    overItem.el.classList.remove('st-drag-over');
    const list = item.closest('[id^="exUnifiedList_"]');
    if (list) {
      if (overItem.above) list.insertBefore(item, overItem.el);
      else overItem.el.after(item);
    }
    // Persist new order to both arrays
    const allItems = Array.from(list.querySelectorAll('.ex-unified-item'));
    allItems.forEach((el, idx) => {
      const id = el.dataset.exuid, type = el.dataset.exutype;
      if (type === 'progress') { const lr = learningItems.find(x=>x.id===id); if(lr) lr.exOrder = idx; }
      else { const ex = exercises.find(x=>x.id===id); if(ex) ex.exOrder = idx; }
    });
    saveLearning(); saveResState();
  }
  document.body.style.userSelect = '';
  document.body.style.webkitUserSelect = '';
  exDragState = null;
}

    const r = sib.getBoundingClientRect();
    if (e.clientY >= r.top && e.clientY <= r.bottom) {
      sib.classList.add('st-drag-over');
      resDragState.overItem = { el: sib, above: e.clientY < r.top + r.height / 2 };
    } else sib.classList.remove('st-drag-over');
  });
}
function resDragEnd() {
  if (!resDragState) return;
  const { item, overItem } = resDragState;
  item.classList.remove('st-is-dragging');
  if (overItem) {
    overItem.el.classList.remove('st-drag-over');
    const list = item.closest('[id^="resDragList_"]');
    if (list) { if (overItem.above) list.insertBefore(item, overItem.el); else overItem.el.after(item); }
    Array.from(list.querySelectorAll('.res-card[data-resid]')).forEach((el, idx) => {
      const res = resources.find(x => x.id === el.dataset.resid); if (res) res.resOrder = idx;
    });
    saveResState();
  }
  document.body.style.userSelect=''; document.body.style.webkitUserSelect='';
  resDragState = null;
}

// ================================================================
//  TOUCH LONG-PRESS POINTER DRAG & DROP FOR 3 MODULES
// ================================================================
let modDragTimer = null;
let activeModDrag = null;

function blockModContextMenu(e) {
  if (activeModDrag || document.body.classList.contains('body-dragging-mod')) {
    if (e.cancelable) try { e.preventDefault(); } catch(err) {}
    e.stopPropagation();
    return false;
  }
}

function initModPointerDrag(e, modId) {
  if (e.target.closest('button, input, select, textarea, .q-card, .list-item, .ex-card, .res-card, .mod-drag-handle button')) return;
  const section = e.currentTarget;
  const startY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
  
  const isHandle = !!e.target.closest('.mod-drag-handle');
  const delay = isHandle ? 120 : 380;

  if (isHandle && e.cancelable && e.type === 'touchstart') {
    try { e.preventDefault(); } catch(err) {}
  }

  window.addEventListener('contextmenu', blockModContextMenu, { capture: true });

  clearTimeout(modDragTimer);
  modDragTimer = setTimeout(() => {
    startModPointerDrag(section, modId, startY);
  }, delay);

  function onMove(me) {
    const curY = me.clientY || (me.touches && me.touches[0] ? me.touches[0].clientY : startY);
    if (!activeModDrag && Math.abs(curY - startY) > 10) {
      clearTimeout(modDragTimer);
    }
    if (activeModDrag) {
      if (me.cancelable) try { me.preventDefault(); } catch(err) {}
      handleModPointerMove(curY);
    }
  }
  function onUp(ue) {
    clearTimeout(modDragTimer);
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    window.removeEventListener('pointercancel', onUp);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('touchend', onUp);
    if (!activeModDrag) {
      setTimeout(() => {
        window.removeEventListener('contextmenu', blockModContextMenu, { capture: true });
      }, 100);
    } else {
      endModPointerDrag();
    }
  }
  window.addEventListener('pointermove', onMove, { passive: false });
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);
}

function startModPointerDrag(section, modId, startY) {
  if (window.getSelection) {
    try { window.getSelection().removeAllRanges(); } catch(err) {}
  }
  document.body.classList.add('body-dragging-mod');
  section.classList.add('mod-touch-dragging');
  if (navigator.vibrate) try { navigator.vibrate(40); } catch(e) {}
  activeModDrag = { section, modId, startY };
  toast('⠿ 正在调整顺序：上下拖动以交换位置');
}

function handleModPointerMove(curY) {
  if (!activeModDrag) return;
  if (window.getSelection) {
    try { window.getSelection().removeAllRanges(); } catch(err) {}
  }
  const deltaY = curY - activeModDrag.startY;
  activeModDrag.section.style.transform = `scale(1.025) translateY(${deltaY}px)`;

  if (Math.abs(deltaY) > 90) {
    const dir = deltaY > 0 ? 1 : -1;
    const idx = modOrder.indexOf(activeModDrag.modId);
    const newIdx = idx + dir;
    if (newIdx >= 0 && newIdx < modOrder.length) {
      modOrder.splice(idx, 1);
      modOrder.splice(newIdx, 0, activeModDrag.modId);
      localStorage.setItem('study_mod_order_pro', JSON.stringify(modOrder));
      activeModDrag.section.classList.remove('mod-touch-dragging');
      activeModDrag.section.style.transform = '';
      const oldModId = activeModDrag.modId;
      activeModDrag = null;
      render();
      toast('✓ 排序已调整！');
      
      const newEl = document.querySelector(`.mod-section[data-mod="${oldModId}"]`);
      if (newEl) {
        startModPointerDrag(newEl, oldModId, curY);
      }
    }
  }
}

function endModPointerDrag() {
  if (!activeModDrag) return;
  activeModDrag.section.style.transform = '';
  activeModDrag.section.classList.remove('mod-touch-dragging');
  activeModDrag = null;
  document.body.classList.remove('body-dragging-mod');
  setTimeout(() => {
    window.removeEventListener('contextmenu', blockModContextMenu, { capture: true });
  }, 100);
  render();
  toast('✓ 排序已保存 (自动保持设置)');
}

function moveModuleOrder(modId, dir) {
  const idx = modOrder.indexOf(modId);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= modOrder.length) return;
  modOrder.splice(idx, 1);
  modOrder.splice(newIdx, 0, modId);
  localStorage.setItem('study_mod_order_pro', JSON.stringify(modOrder));
  render();
  toast('✓ 模块次序已调整！(保持上次顺序)');
}

function toggleSubtask(exId,stId) { const e=exercises.find(x=>x.id===exId);if(!e?.subtasks)return;const st=e.subtasks.find(s=>s.id===stId);if(st){st.completed=!st.completed;e.status=e.subtasks.every(s=>s.completed)?'completed':'pending';}saveResState();render(); }

function checkIsOverdue(due,completed) { if(completed||!due)return false; return due<todayISO(); }
function getOverdueCount() { let c=0;exercises.forEach(ex=>{if(ex.status!=='completed'&&checkIsOverdue(ex.dueDate,false))c++;(ex.subtasks||[]).forEach(st=>{if(!st.completed&&checkIsOverdue(st.dueDate,false))c++;});});return c; }
function getCountdownDays() {
  if(!countdownConfig.targetDate) return '-- Days';
  const t=new Date(countdownConfig.targetDate);const n=new Date();n.setHours(0,0,0,0);t.setHours(0,0,0,0);
  const d=Math.ceil((t-n)/(86400000));
  if(d>0) return d+' Days';if(d===0) return 'Today!';return 'Passed';
}

function updateSubjectField(key, field, val) {
  if (!customSubjects[key]) return;
  if (field === 'label') {
    customSubjects[key].label = val.trim() || key;
  } else if (field === 'color') {
    customSubjects[key].color = val;
    customSubjects[key].tint = val + '18';
    customSubjects[key].text = val;
  }
  saveResState();
  renderSharedStats();
  render();
  toast('Subject updated & synced!');
}

function moveSubjectOrder(key, dir) {
  const keys = Object.keys(customSubjects);
  const idx = keys.indexOf(key);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= keys.length) return;
  
  const newObj = {};
  keys.splice(idx, 1);
  keys.splice(newIdx, 0, key);
  keys.forEach(k => { newObj[k] = customSubjects[k]; });
  customSubjects = newObj;
  saveResState();
  openSubjectManagerModal();
  renderSharedStats();
  render();
}

function deleteSubjectManager(key) {
  const keys = Object.keys(customSubjects);
  if (keys.length <= 1) { toast('Cannot delete the last subject'); return; }
  if (!confirm(`Delete subject "${customSubjects[key]?.label}"?`)) return;
  delete customSubjects[key];
  if (subjectScores[key]) delete subjectScores[key];
  if (appState.currentSubject === key) {
    appState.currentSubject = Object.keys(customSubjects)[0];
  }
  saveResState();
  openSubjectManagerModal();
  renderSharedStats();
  render();
  toast('Subject deleted');
}

function exportAllData() {
  const backup = {
    version:'unified-2026',
    exportDate:new Date().toISOString(),
    appState,
    quizData:{...quizState},
    resources:{customSubjects,resources,exercises,subjectScores,countdownConfig,modOrder,studyTasks,learningItems},
    studySuggest
  };
  downloadJSON(backup,'study_dashboard_full_backup_'+todayISO()+'.json');
  toast('Full backup exported OK');
}

function importAllData(event) {
  const file = event.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.appState) appState = Object.assign(appState, data.appState);
      if(data.quizData) { importQuizData(data.quizData); }
      if(data.resources) {
        if(data.resources.customSubjects) customSubjects = data.resources.customSubjects;
        if(data.resources.resources) resources = data.resources.resources;
        if(data.resources.exercises) exercises = data.resources.exercises;
        if(data.resources.subjectScores) subjectScores = data.resources.subjectScores;
        if(data.resources.countdownConfig) countdownConfig = data.resources.countdownConfig;
        if(data.resources.modOrder) modOrder = data.resources.modOrder;
        if(data.resources.studyTasks) studyTasks = data.resources.studyTasks;
        if(data.resources.learningItems) learningItems = data.resources.learningItems;
      }
      if(data.studySuggest) studySuggest = data.studySuggest;
      saveAll(); render();
      toast('Backup imported OK');
    } catch(err) { alert('Import failed: '+err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function downloadJSON(obj, filename) {
  const blob = new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function refreshDashboard() {
  toast('↻ Refreshing Dashboard...');
  setTimeout(() => {
    try {
      window.location.reload();
    } catch(e) {
      loadAppState();
      render();
      toast('✓ Dashboard reloaded from LocalStorage');
    }
  }, 150);
}

// ================================================================
//  SHEET MANAGEMENT
// ================================================================
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

function openGenericSheet(title, bodyHTML, buttons) {
  document.getElementById('genericSheetTitle').textContent = title;
  document.getElementById('genericSheetBody').innerHTML = bodyHTML;
  const foot = document.getElementById('genericSheetFoot');
  foot.innerHTML = '';
  (buttons||[]).forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'apple-btn' + (b.cls?' '+b.cls:'');
    btn.textContent = b.text;
    btn.onclick = b.onclick;
    foot.appendChild(btn);
  });
  openSheet('genericSheet');
}

// Close sheets on overlay click
document.querySelectorAll('.sheet-overlay').forEach(ov => {
  ov.addEventListener('click', e => { if(e.target===ov) ov.classList.remove('open'); });
});

document.addEventListener('click', e => {
  if (!isMobileViewport() || sidebarCollapsed) return;
  if (e.target.closest('.sidebar') || e.target.closest('#topbarSidebarToggle')) return;
  sidebarCollapsed = true;
  localStorage.setItem('study_sidebar_collapsed_pro', JSON.stringify(sidebarCollapsed));
  initSidebarState();
});

// ================================================================
//  SIDEBAR TOGGLE & HIGHLIGHT TRANSFER FUNCTIONS
// ================================================================
const sidebarPref = localStorage.getItem('study_sidebar_collapsed_pro');
let sidebarCollapsed = window.innerWidth <= 768 ? true : (sidebarPref !== null ? JSON.parse(sidebarPref) : false);

function isMobileViewport() {
  return window.innerWidth <= 768;
}

function initSidebarState(forceMobileCollapsed = false) {
  const appEl = document.querySelector('.app');
  if (!appEl) return;
  if (isMobileViewport() && forceMobileCollapsed) {
    sidebarCollapsed = true;
  }
  if (sidebarCollapsed) appEl.classList.add('sidebar-collapsed');
  else appEl.classList.remove('sidebar-collapsed');
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  localStorage.setItem('study_sidebar_collapsed_pro', JSON.stringify(sidebarCollapsed));
  initSidebarState();
  toast(sidebarCollapsed ? '◀ 左侧导航栏已折叠' : '▶ 左侧导航栏已展开');
}

function handleResponsiveViewportChange() {
  if (isMobileViewport()) {
    sidebarCollapsed = true;
    initSidebarState(true);
    return;
  }
  const stored = localStorage.getItem('study_sidebar_collapsed_pro');
  sidebarCollapsed = stored !== null ? JSON.parse(stored) : false;
  initSidebarState();
}

function deleteHighlight(hid) {
  const h = (quizState.highlights || []).find(x => x.id === hid);
  if (!h) return;
  if (!confirm(`确定要删除 Highlight 摘录: "${h.selectedText}" 吗？`)) return;
  quizState.highlights = quizState.highlights.filter(x => x.id !== hid);
  saveQuiz();
  renderSharedStats();
  renderSuggestContent();
  render();
  toast('已删除 Highlight');
}

function transferHighlightToWordBook(hid) {
  const h = quizState.highlights.find(x => x.id === hid);
  if (!h) return;
  quizState.wordBook = quizState.wordBook || [];
  const textVal = (h.selectedText || '').trim();
  if (!textVal) return;
  
  const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
  if (exists) {
    exists.highlight = true;
    exists.example = exists.example || (h.note ? `Note: ${h.note}` : '');
    toast(`"${textVal}" 已在生词本中，已为您更新为浅棕色高亮！`);
  } else {
    quizState.wordBook.push({
      id: uid('wbk'), text: textVal, meaning: h.note || 'From reading passage highlight', example: `Highlighted in passage`,
      source: 'Reading Highlight', subject: appState.currentSubject,
      dateAdded: todayISO(), addedAt: Date.now(), highlight: true, starred: false,
      srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
    });
    toast(`已高亮并存入生词本: "${textVal}"`);
  }
  saveQuiz();
  renderSharedStats();
  renderSuggestContent();
  render();
}

function transferAllHighlightsToWordBook() {
  const hls = quizState.highlights || [];
  if (!hls.length) { toast('暂无任何 Highlights 记录'); return; }
  let count = 0;
  quizState.wordBook = quizState.wordBook || [];
  hls.forEach(h => {
    const textVal = (h.selectedText || '').trim();
    if (!textVal) return;
    const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
    if (exists) {
      exists.highlight = true;
    } else {
      quizState.wordBook.push({
        id: uid('wbk'), text: textVal, meaning: h.note || 'From reading passage highlight', example: `Highlighted in passage`,
        source: 'Reading Highlight', subject: appState.currentSubject,
        dateAdded: todayISO(), addedAt: Date.now(), highlight: true, starred: false,
        srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
      });
      count++;
    }
  });
  saveQuiz();
  renderSharedStats();
  renderSuggestContent();
  render();
  toast(`✓ 成功将 ${count} 个 Highlights 转入生词本并开启高亮！`);
}

// ================================================================
//  INIT
// ================================================================
loadAppState();
loadQuiz();
  // Auto-migrate legacy highlights into wordBook
  if (quizState.highlights && quizState.highlights.length) {
    quizState.wordBook = quizState.wordBook || [];
    quizState.highlights.forEach(h => {
      const textVal = (h.selectedText || '').trim();
      if (!textVal) return;
      const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
      if (exists) {
        exists.highlight = true;
        if (h.note && !exists.example) exists.example = `Note: ${h.note}`;
      } else {
        quizState.wordBook.push({
          id: h.id || uid('wbk'), text: textVal, meaning: h.note || 'Highlighted reading snippet', example: 'From reading passage highlight',
          source: 'Reading Passage', subject: appState.currentSubject || 'english',
          dateAdded: todayISO(), addedAt: h.timestamp || Date.now(), highlight: true, starred: false,
          charStart: h.charStart, charEnd: h.charEnd, passageId: h.passageId,
          srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
        });
      }
    });
    quizState.highlights = [];
    saveQuiz();
  }
if(!quizState.passages.length) loadSeedData();
exercises.forEach(ex => { if(!ex.priority) ex.priority='medium'; if(typeof ex.pinned!=='boolean') ex.pinned=false; (ex.subtasks||[]).forEach(st=>{if(!st.dueDate)st.dueDate='';}); });
resources.forEach(r => { if(!r.status) r.status='pending'; if(!r.startDate) r.startDate=r.createdAt||'2026-07-01'; });

// Set initial module
document.querySelectorAll('.capsule-item').forEach(el => el.classList.toggle('active', el.dataset.module===appState.currentModule));
document.getElementById('topbarTitle').textContent = appState.currentModule==='quiz'?'Quiz Hub':'Study Resources';

initSidebarState(true);
window.addEventListener('resize', handleResponsiveViewportChange);
window.addEventListener('orientationchange', handleResponsiveViewportChange);
render();
