function generateWeeklyPlan() {
  const tasks = [];
  const now = Date.now();
  
  const allRoadmap = Array.isArray(roadmapPlans) ? roadmapPlans : [];
  const activeRoadmap = allRoadmap.filter(p => p.status !== 'completed');
  const allVocab = Array.isArray(quizState.wordBook) ? quizState.wordBook : [];
  const dueVocab = allVocab.filter(w => w.srsNext <= now).length;
  const allSyn = Array.isArray(quizState.synonymLibrary) ? quizState.synonymLibrary : [];
  const dueSyn = allSyn.filter(s => s.srsNext <= now).length;
  const wrongCount = Array.isArray(quizState.wrongBook) ? quizState.wrongBook.length : 0;
  const allLr = Array.isArray(learningItems) ? learningItems : [];

  const baseDateStr = weeklyPlan.startDate || todayISO();
  const getTaskDate = (offset) => {
    const d = new Date(baseDateStr);
    d.setDate(d.getDate() + offset);
    return d.toISOString().slice(0, 10);
  };

  const customStr = weeklyPlan.customPrompt || "";
  const daysToExam = getClosestExamDays();

  // Logic: Adjust step by exam proximity
  let stepMultiplier = 1;
  if (daysToExam !== null) {
    if (daysToExam < 30) stepMultiplier = 0.5; // Focus on review, reduce new pages
    else if (daysToExam < 90) stepMultiplier = 1.2; // Intensive push
  }

  // Grammar
  const grammarBook = allLr.find(item => item.title && item.title.toLowerCase().includes('grammar'));
  const grammarStart = grammarBook ? grammarBook.currentPage : 37;
  let grammarStep = Math.round(8 * stepMultiplier);
  if (customStr.toLowerCase().includes('grammar')) grammarStep = Math.round(grammarStep * 1.5);

  tasks.push({ isSample: (localStorage.getItem('study_demo_data_removed') === 'true' ? false : true), 
    id:'w_grammar', category:'Grammar', title:grammarBook?grammarBook.title:'Grammar Book', 
    startProgress:grammarStart, currentProgress:grammarStart, targetProgress:grammarStart + grammarStep, 
    unit:'pages', status:'in_progress', priority:'High', list:'Study',
    date: getTaskDate(0), time: '09:00'
  });

  // Reading
  const readingBook = allLr.find(item => item.title && item.title.toLowerCase().includes('reading'));
  const readingStart = readingBook ? readingBook.currentPage : 50;
  let readingStep = Math.round(8 * stepMultiplier);
  tasks.push({ isSample: (localStorage.getItem('study_demo_data_removed') === 'true' ? false : true), 
    id:'w_reading', category:'Reading', title:readingBook?readingBook.title:'Reading Book', 
    startProgress:readingStart, currentProgress:readingStart, targetProgress:readingStart + readingStep, 
    unit:'pages', status:'in_progress', priority:'Medium', list:'Study',
    date: getTaskDate(1), time: '15:00'
  });

  // Vocabulary
  tasks.push({ isSample: (localStorage.getItem('study_demo_data_removed') === 'true' ? false : true), 
    id:'w_vocab', category:'Vocabulary', title:'Word Book SRS Review', 
    startProgress:0, currentProgress:0, targetProgress: dueVocab > 0 ? dueVocab : 30, 
    unit:'words', status:'in_progress', priority:'High', list:'Study',
    date: getTaskDate(0), time: '20:00'
  });

  if (customStr.toLowerCase().includes('sunday for review')) {
    tasks.push({ isSample: (localStorage.getItem('study_demo_data_removed') === 'true' ? false : true), id:'w_sun_review', title:'Sunday Weekly Review', date:getTaskDate(6), time:'20:00', priority:'High', list:'Study', status:'in_progress', startProgress:0, currentProgress:0, targetProgress:1, unit:'session' });
  }

  // Mock Test - Higher frequency when exam is close
  let mockCount = (daysToExam !== null && daysToExam < 60) ? 2 : 1;
  for(let i=0; i<mockCount; i++) {
    tasks.push({ isSample: (localStorage.getItem('study_demo_data_removed') === 'true' ? false : true), 
      id:'w_mock_'+i, category:'Practice', title:'Weekly Mock Test' + (mockCount>1 ? ' #'+(i+1) : ''), 
      startProgress:0, currentProgress:0, targetProgress:1, 
      unit:'test', status:'in_progress', priority:'Medium', list:'Study',
      date: getTaskDate(5 + i), time: '10:00'
    });
  }

  weeklyPlan.tasks = tasks;
  
  let sugg = `AI Analysis: ${dueVocab} words due. `;
  if (daysToExam !== null) {
    if (daysToExam < 30) sugg += "CRITICAL: Exam in <30 days. Plan shifted to simulations and error review.";
    else if (daysToExam < 90) sugg += "INTENSIVE: Mid-stage prep. High volume of practice assigned.";
    else sugg += "FOUNDATION: Building core skills steady pace.";
  }

  weeklyPlan.suggestion = sugg;
  saveWeeklyPlan();
}

function updateWeeklyTaskProgress(id, delta) {
  const task = weeklyPlan.tasks.find(t => t.id === id);
  if (task) {
    task.currentProgress = Math.max(task.startProgress, task.currentProgress + delta);
    task.status = task.currentProgress >= task.targetProgress ? 'completed' : 'in_progress';
    saveWeeklyPlan(); render();
  }
}

function markWeeklyTaskStatus(id, status) {
  const task = weeklyPlan.tasks.find(t => t.id === id);
  if (task) {
    task.status = status;
    if (status === 'completed') task.currentProgress = task.targetProgress;
    saveWeeklyPlan(); render();
  }
}

function getClosestExamDays() {
  if (!roadmapExams || roadmapExams.length === 0) return null;
  const today = new Date();
  const exams = roadmapExams.map(e => new Date(e.examDate)).filter(d => d >= today).sort((a, b) => a - b);
  if (exams.length === 0) return null;
  return Math.ceil(Math.abs(exams[0] - today) / (1000 * 60 * 60 * 24));
}

function dateInRange(tsOrDate, start, end){
  if(!tsOrDate) return false;
  const d = typeof tsOrDate === 'number' ? new Date(tsOrDate) : new Date(tsOrDate);
  if(isNaN(d)) return false;
  const s = start ? new Date(start+'T00:00:00') : new Date(0);
  const e = end ? new Date(end+'T23:59:59') : new Date(8640000000000000);
  return d >= s && d <= e;

function getQuizStatsBetween(start,end){

function getWeeklyReviewData(weekObj){

  const end = weekObj?.endDate || weeklyPlan.endDate;

  const vocabAdded = safeArray(quizState.wordBook).filter(w => dateInRange(w.addedAt || w.dateAdded, start, end)).length;
  const wrongReviewed = safeArray(quizState.wrongBook).filter(w => dateInRange(w.reviewedAt || w.lastReviewedAt || w.ts, start, end)).length;
  const subjectCounter = {};
  tasks.forEach(t=>{ const k = t.subject || t.category || 'Study'; subjectCounter[k] = (subjectCounter[k]||0) + (t.status==='completed'?2:1); });
  const mostActiveKey = Object.keys(subjectCounter).sort((a,b)=>subjectCounter[b]-subjectCounter[a])[0] || appState.currentSubject;
  const dayCounter = {};
  tasks.filter(t=>t.status==='completed').forEach(t=>{ if(t.date) dayCounter[t.date]=(dayCounter[t.date]||0)+1; });
  const bestDate = Object.keys(dayCounter).sort((a,b)=>dayCounter[b]-dayCounter[a])[0] || end || todayISO();

  const completedList = tasks.filter(t=>t.status==='completed').map(t=>t.title);
  return {
    completedTasks, totalTasks:tasks.length, completionRate:pct(completedTasks,tasks.length),

    quizAccuracy: quizStats.accuracy, quizTotal: quizStats.total,
    vocabAdded, wrongReviewed,
    resourcesUsed: usedTitles.length ? usedTitles.join(', ') : 'No resource activity recorded',

    completedList
  };
}

  return `<div class="roadmap-section"><div class="roadmap-section-head"><h3>History Archive</h3></div><div class="exercise-list">${weeklyPlan.history.map(h => `<div class="ex-card" style="padding: 16px; cursor:pointer;" onclick="viewArchivedWeek('${esc(h.startDate)}')"><div style="display:flex; justify-content:space-between; align-items:center; gap:12px;"><div><div style="font-weight:700;">Week ${h.week}</div><div style="font-size:12px; color:var(--ink-tertiary);">${h.startDate} — ${h.endDate}</div></div><div style="text-align:right;"><div style="font-size:18px; font-weight:800;">${h.completionRate || 0}%</div><div style="font-size:10px; color:var(--ink-tertiary);">Completion</div></div></div></div>`).join('')}</div></div>`;
}
function viewArchivedWeek(startDate) {
  const week = safeArray(weeklyPlan.history).find(h => h.startDate === startDate); if (!week) return;
  if (!week.reflection) week.reflection = '';
  if (!week.achievement) week.achievement = '';
  const wIdx = safeArray(weeklyPlan.history).indexOf(week);
  const tasksHtml = safeArray(week.tasks).map(t => `<div class="list-item" style="opacity: 0.9; margin-bottom:8px; padding:10px; border:1px solid var(--line); border-radius:8px;"><div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-weight:700; font-size:13px;">${esc(t.title)}</span><span class="roadmap-status ${t.status}" style="font-size:10px;">${roadmapStatusLabel(t.status)}</span></div><div style="font-size:11px; color:var(--ink-tertiary); margin-top:4px;">${t.date || ''} ${t.time || ''} · ${t.priority || 'Medium'} Priority</div></div>`).join('');
  const ae = "style=\"width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--bg-card);color:var(--ink);font-size:13px;line-height:1.6;resize:none;overflow:hidden;font-family:inherit;\" oninput=\"this.style.height='auto';this.style.height=this.scrollHeight+'px';\"";
  const numInput = (val,key) => `<input type="number" value="${val||0}" onchange="weeklyPlan.history[${wIdx}].${key}=+this.value||0;saveWeeklyPlan();" style="font-size:22px;font-weight:800;width:70px;text-align:center;border:1px solid var(--line);border-radius:6px;padding:2px 4px;background:var(--bg-card);color:var(--ink);">`;
  openGenericSheet(`Week ${week.week} Review`, `<div style="display:flex;flex-direction:column;gap:16px;">
    <div class="weekly-review-card" style="margin-top:0;">
      <div class="roadmap-section-head"><h3>Weekly Review</h3></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <div class="weekly-review-stat"><div class="label">Completion Rate</div>${numInput(week.completionRate,'completionRate')}%</div>
        <div class="weekly-review-stat"><div class="label">Study Time</div>${numInput(week.studyTime,'studyTime')}h</div>
        <div class="weekly-review-stat"><div class="label">Quiz Accuracy</div>${numInput(week.quizAccuracy,'quizAccuracy')}%</div>
        <div class="weekly-review-stat"><div class="label">Vocab Added</div>${numInput(week.vocabAdded,'vocabAdded')}</div>
        <div class="weekly-review-stat"><div class="label">Wrong Reviewed</div>${numInput(week.wrongReviewed,'wrongReviewed')}</div>
        <div class="weekly-review-stat"><div class="label">Quizzes Done</div>${numInput(week.quizzesCompleted,'quizzesCompleted')}</div>
      </div>
    </div>
    <div class="ai-summary-card">
      <div class="roadmap-section-head"><h3>AI Summary</h3></div>
      <textarea ${ae} oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';weeklyPlan.history[${wIdx}].aiSummaryHtml=this.value;saveWeeklyPlan();">${esc(week.aiSummaryHtml || '')}</textarea>
    </div>
    <div class="roadmap-section" style="padding:0; border:none; box-shadow:none;">
      <div class="roadmap-section-head"><h3>Task Snapshot</h3></div>
      <div style="max-height:240px; overflow-y:auto; padding-right:4px;">${tasksHtml}</div>
    </div>
    <div class="ai-summary-card">
      <div class="roadmap-section-head"><h3>Reflection</h3></div>
      <textarea ${ae} placeholder="Write your reflection for this week..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';weeklyPlan.history[${wIdx}].reflection=this.value;saveWeeklyPlan();">${esc(week.reflection)}</textarea>

function renderPromptEditor() {

// Progress Check
function getAllProgressQuestions(){
  const grammar = safeArray(quizState.grammarQuestions).map(q=>({...q,_pcType:'grammar'}));
  const vocabulary = safeArray(quizState.vocabularyQuestions).map(q=>({...q,_pcType:'vocabulary'}));
  const wrong = safeArray(quizState.wrongBook).map(w=>({id:'pc_wrong_'+(w.qId||w.id), question:w.question, options:w.options||[], answer:w.correctAnswer, explanation:w.explanation||'', _pcType:'wrong'}));
  return { grammar, vocabulary, reading: [], wrong, all:[...grammar,...vocabulary,...wrong] };
}
function startProgressCheck(mode){
  const pools = getAllProgressQuestions();
  if(!pools.all.length){ toast('Add Quiz Hub questions first.'); return; }
  const count = mode==='monthly' ? 30 : mode==='custom' ? Number(prompt('How many questions?', '15') || 15) : 12;
  const take = (arr,n)=>arr.sort(()=>Math.random()-0.5).slice(0,n);
  let selected = [...take(pools.grammar, Math.ceil(count*.35)), ...take(pools.vocabulary, Math.ceil(count*.35)), ...take(pools.wrong, Math.ceil(count*.30))];
  if(selected.length < count) selected = [...selected, ...take(pools.all.filter(q=>!selected.find(s=>s.id===q.id)), count-selected.length)];
  selected = selected.slice(0,count).map((q,i)=>({...q,_pcId:q._pcType+'_'+(q.id||i), _answer:''}));
  progressCheckState.active = { id:uid('pcheck'), mode, startedAt:Date.now(), questions:selected };
  progressCheckState.mode = mode; saveProgressCheck(); render();
}
function setProgressAnswer(idx, ans){ if(progressCheckState.active?.questions?.[idx]){ progressCheckState.active.questions[idx]._answer = ans; saveProgressCheck(); } }
function finishProgressCheck(){
  const active = progressCheckState.active; if(!active) return;
  const qs = safeArray(active.questions); const total = qs.length; if(!total){ progressCheckState.active=null; saveProgressCheck(); render(); return; }
  const by = {grammar:{c:0,t:0}, reading:{c:0,t:0}, vocabulary:{c:0,t:0}, wrong:{c:0,t:0}};
  qs.forEach(q=>{ const type = by[q._pcType] ? q._pcType : 'reading'; by[type].t++; if(String(q._answer||'').trim() === String(q.answer||'').trim()){ by[type].c++; } });
  const correct = Object.values(by).reduce((s,x)=>s+x.c,0);
  const prev = safeArray(progressCheckState.history)[0];
  const report = { id:active.id, mode:active.mode, date:todayISO(), completedAt:Date.now(), completionTime: Math.max(1, Math.round((Date.now()-active.startedAt)/60000)), total, correct, overall:pct(correct,total), grammar:pct(by.grammar.c,by.grammar.t), reading:pct(by.reading.c,by.reading.t), vocabulary:pct(by.vocabulary.c,by.vocabulary.t), wrong:pct(by.wrong.c,by.wrong.t), previousOverall: prev ? prev.overall : null, deltas:{ grammar: prev ? pct(by.grammar.c,by.grammar.t)-prev.grammar : null, reading: prev ? pct(by.reading.c,by.reading.t)-prev.reading : null, vocabulary: prev ? pct(by.vocabulary.c,by.vocabulary.t)-prev.vocabulary : null, wrong: prev ? pct(by.wrong.c,by.wrong.t)-prev.wrong : null, overall: prev ? pct(correct,total)-prev.overall : null } };
  progressCheckState.history = safeArray(progressCheckState.history); progressCheckState.history.unshift(report); progressCheckState.active = null; saveProgressCheck(); toast('Progress Report generated.'); render();
}
function deltaHtml(v){ if(v === null || typeof v === 'undefined' || isNaN(v)) return '<span style="font-size:12px;color:var(--ink-tertiary);">First check</span>'; const cls = v>=0?'progress-delta-up':'progress-delta-down'; return `<span class="${cls}">${v>=0?'↑ +':'↓ '}${v}%</span>`; }
function renderLearningInsights(report){
  if(!report) return '';
  const scores = [{k:'Grammar',v:report.grammar},{k:'Reading',v:report.reading},{k:'Vocabulary Recall',v:report.vocabulary},{k:'Wrong Questions',v:report.wrong}];
  const strengths = scores.filter(s=>s.v>=80).map(s=>s.k); const weaknesses = scores.filter(s=>s.v<70).map(s=>s.k);
  const focus = weaknesses.length ? weaknesses.slice(0,2).join(' + ') : scores.sort((a,b)=>a.v-b.v).slice(0,2).map(s=>s.k).join(' + ');
  return `<div class="ai-summary-card" style="margin-top:16px;"><div class="roadmap-section-head"><h3>Learning Insights</h3></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;"><div class="weekly-review-stat"><div class="label">Strengths</div><div class="value" style="font-size:16px;">${esc(strengths.join(', ') || 'Building consistency')}</div></div><div class="weekly-review-stat"><div class="label">Weaknesses</div><div class="value" style="font-size:16px;">${esc(weaknesses.join(', ') || 'No major weakness')}</div></div><div class="weekly-review-stat"><div class="label">Suggested Focus</div><div class="value" style="font-size:16px;">${esc(focus || 'Balanced Review')}</div></div></div></div>`;
}
function renderProgressReport(report){
  if(!report) return '';
  return `<div class="progress-check-card" style="margin-top:16px;"><div class="roadmap-section-head"><h3>Progress Report</h3><div style="font-size:12px;color:var(--ink-tertiary);">${esc(report.date)} · ${esc(report.mode)} check</div></div><div class="progress-report-grid"><div class="progress-report-stat"><div class="label">Overall Accuracy</div><div class="value">${report.overall}%</div>${deltaHtml(report.deltas?.overall)}</div><div class="progress-report-stat"><div class="label">Grammar Accuracy</div><div class="value">${report.grammar}%</div>${deltaHtml(report.deltas?.grammar)}</div><div class="progress-report-stat"><div class="label">Reading Accuracy</div><div class="value">${report.reading}%</div>${deltaHtml(report.deltas?.reading)}</div><div class="progress-report-stat"><div class="label">Vocabulary Accuracy</div><div class="value">${report.vocabulary}%</div>${deltaHtml(report.deltas?.vocabulary)}</div><div class="progress-report-stat"><div class="label">Wrong Question Accuracy</div><div class="value">${report.wrong}%</div>${deltaHtml(report.deltas?.wrong)}</div><div class="progress-report-stat"><div class="label">Completion Time</div><div class="value">${report.completionTime}m</div></div></div><div style="margin-top:10px;font-size:12px;color:var(--ink-tertiary);">Comparison with Previous Check: ${report.previousOverall === null ? 'This is your first saved check.' : `Overall ${deltaHtml(report.deltas.overall)}`}</div></div>${renderLearningInsights(report)}`;
}
function renderProgressCheck(container){
  const active = progressCheckState.active; const latest = safeArray(progressCheckState.history)[0];
  if(active){ container.innerHTML = `<div class="roadmap-page"><div class="roadmap-section"><div class="roadmap-section-head"><h3>Progress Check — ${esc(active.mode)}</h3><button class="apple-btn small danger" onclick="progressCheckState.active=null; saveProgressCheck(); render();">Cancel</button></div><div style="font-size:13px;color:var(--ink-secondary);margin-bottom:14px;">Generated from existing Quiz Hub questions. Answer all questions, then create your Progress Report.</div>${safeArray(active.questions).map((q,i)=>`<div class="progress-check-question"><div style="font-size:12px;font-weight:800;color:var(--ink-tertiary);text-transform:uppercase;margin-bottom:6px;">${esc(q._pcType)} · Question ${i+1}</div><div style="font-size:14px;font-weight:700;line-height:1.55;margin-bottom:10px;">${esc(q.question)}</div><div style="display:flex;flex-direction:column;gap:6px;">${safeArray(q.options).map(opt=>`<label style="display:flex;gap:8px;align-items:flex-start;font-size:13px;color:var(--ink-secondary);"><input type="radio" name="pc_${i}" ${q._answer===opt?'checked':''} onchange="setProgressAnswer(${i}, '${esc(opt).replace(/'/g,"\\'")}')"> <span>${esc(opt)}</span></label>`).join('')}</div></div>`).join('')}<button class="apple-btn primary" onclick="finishProgressCheck()">Complete Check</button></div></div>`; return; }
  container.innerHTML = `<div class="roadmap-page"><div class="roadmap-section"><div class="roadmap-section-head"><h3>Progress Check</h3></div><div style="font-size:13px;color:var(--ink-secondary);line-height:1.6;margin-bottom:16px;">Periodically evaluate learning progress with a practice test automatically generated from existing Quiz Hub questions. This is separate from Quiz Hub and creates a progress report after completion.</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;"><div class="progress-check-option" onclick="startProgressCheck('weekly')"><div style="font-weight:800;">Weekly Check</div><div style="font-size:12px;color:var(--ink-tertiary);">Short recurring assessment.</div></div><div class="progress-check-option" onclick="startProgressCheck('monthly')"><div style="font-weight:800;">Monthly Check</div><div style="font-size:12px;color:var(--ink-tertiary);">Broader practice test.</div></div><div class="progress-check-option" onclick="startProgressCheck('custom')"><div style="font-weight:800;">Custom Check</div><div style="font-size:12px;color:var(--ink-tertiary);">Choose the number of questions.</div></div></div></div>${renderProgressReport(latest)}<div class="roadmap-section" style="margin-top:16px;"><div class="roadmap-section-head"><h3>Previous Checks</h3></div>${safeArray(progressCheckState.history).length ? safeArray(progressCheckState.history).slice(0,8).map(r=>`<div class="list-item" style="display:flex;justify-content:space-between;align-items:center;gap:12px;"><div><strong>${esc(r.date)}</strong><div style="font-size:12px;color:var(--ink-tertiary);">${esc(r.mode)} · ${r.completionTime}m</div></div><div style="font-size:18px;font-weight:800;">${r.overall}%</div></div>`).join('') : '<div class="empty-state">No checks completed yet.</div>'}</div></div>`;
}

// ================================================================
//  INIT
// ================================================================
loadAppState();
if (!['quiz','roadmap','resources','weekly_planner','progress_check'].includes(appState.currentModule)) appState.currentModule = 'quiz';
loadQuiz();
if (quizState.highlights && quizState.highlights.length) {
  quizState.wordBook = quizState.wordBook || [];
  quizState.highlights.forEach(h => {
    const textVal = (h.selectedText || '').trim();
    if (!textVal) return;
    const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
    if (exists) { exists.highlight = true; if (h.note && !exists.example) exists.example = `Note: ${h.note}`; }
    else {
      quizState.wordBook.push({ id:h.id||uid('wbk'), text:textVal, meaning:h.note||'Highlighted snippet', example:'Reading highlight', source:'Reading Passage', subject:appState.currentSubject||'english', dateAdded:todayISO(), addedAt:h.timestamp||Date.now(), highlight:true, starred:false, srsBox:0, srsNext:Date.now(), srsReviews:0, srsLapses:0 });
    }
  });
  quizState.highlights = [];
  saveQuiz();
}
if(!quizState.passages.length) loadSeedData();
if (typeof syncWordBookMemory === 'function') syncWordBookMemory();
if (Array.isArray(resources)) {
  resources.forEach(r => { if(!r.status) r.status='pending'; if(!r.startDate) r.startDate=r.createdAt||'2026-07-01'; });
}
ensureFixedSidebarSubjects();
normalizeRoadmapMilestones();
normalizeRoadmapPlans();
normalizeRoadmapExams();
ensureMilestoneSubjectExpanded();
saveRoadmap();
updateNavigationActive();
initSidebarState(true);
window.addEventListener('resize', handleResponsiveViewportChange);
window.addEventListener('orientationchange', handleResponsiveViewportChange);
render();
</script>
