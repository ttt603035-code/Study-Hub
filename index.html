function selectOption(btn, letter, qId) {
  const card = btn.closest('.q-card');
  card.querySelectorAll('.q-opt').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  card._chosen = letter;
}

function submitAnswer(qId, qType) {
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`);
  const chosen = card?._chosen;
  if (!chosen) { toast('Select an option first'); return; }
  const pool = qType==='grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
  const q = pool.find(x=>x.id===qId); if(!q) return;
  const correct = chosen === q.answer;
  quizState.answerLog[qId] = { correct, chosen, ts: Date.now() };
  wordMemoryUpdateFromQuestion(q, correct);
  if (!correct) {
    // Auto-add to wrong book
    const q = quizState.vocabularyQuestions.find(x => x.id === qId) || quizState.grammarQuestions.find(x => x.id === qId);
    if (q) {
      const qType = quizState.vocabularyQuestions.find(x => x.id === qId) ? 'vocab' : 'grammar';
      quizState.wrongBook = safeArray(quizState.wrongBook).filter(w => w.qId !== qId);
      quizState.wrongBook.push({
        id: uid('wb'), qType: qType, qId: qId,
        passageId: q.passageId || null, quizSetId: q.quizSetId || null,
        question: q.question, options: q.options || [], correctAnswer: q.answer,
        yourAnswer: chosen, explanation: q.explanation || '', ts: Date.now(),
        completed: false, reviewed: false, lastReviewedAt: null,
        reviewStage: 0, nextReviewDate: todayISO(), lastReviewDate: null,
        reviewCount: 0, mastered: false, consecutiveCorrect: 0
      });
      saveQuiz(); renderSharedStats();
    }
    quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
    quizState.wrongBook.push({id:uid('wb'),qType,qId,passageId:q.passageId,quizSetId:q.quizSetId||null,question:q.question,options:q.options,correctAnswer:q.answer,yourAnswer:chosen,explanation:q.explanation||'',ts:Date.now(),completed:false,reviewStage:0,nextReviewDate:todayISO(),lastReviewDate:null,reviewCount:0,mastered:false,consecutiveCorrect:0});
  } else {
    quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
  }
  saveQuiz(); render();
}

function showAnswer(qId) {
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`);
  if (!card) return;
  const q = [...quizState.grammarQuestions,...quizState.vocabularyQuestions].find(x=>x.id===qId);
  if (!q) return;
  card.querySelectorAll('.q-opt').forEach(o => {
    const letter = (o.textContent.match(/^([A-Z])/) || [])[1];
    if (letter===q.answer) o.classList.add('correct');
  });
  const expEl = card.querySelector('.q-explain');
  if (expEl) { expEl.textContent = q.explanation||''; expEl.classList.add('show'); }
}

function deleteQuestion(qId, qType) {
  if (!confirm('Delete this question?')) return;
  if (qType==='grammar') quizState.grammarQuestions = quizState.grammarQuestions.filter(x=>x.id!==qId);
  else quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(x=>x.id!==qId);
  delete quizState.answerLog[qId];
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.qId!==qId);
  saveQuiz(); render();
}

// Question Editor
function openQuestionEditor(qId, qType) {
  const isNew = !qId;
  const p = currentPassage();
  const cur = currentQuizSet();
  let q;
  if (qId) {
    const pool = qType==='grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
    q = pool.find(x=>x.id===qId);
    if (!q) return;
    q = {...q, options:[...q.options]};
  } else {
    q = {id:uid(qType==='grammar'?'g':'v'),passageId:p?.id,quizSetId:cur?.id,question:'',options:['A. ','B. ','C. ','D. '],answer:'A',explanation:'',synonymGroup:''};
  }

  const optsHTML = q.options.map((o,i) => `<div class="field"><label>Option ${String.fromCharCode(65+i)}</label><input class="qopt" value="${esc(o)}" /></div>`).join('');
  const synHTML = qType==='vocab' ? `<div class="field"><label>Synonym Group</label><input id="qSyn" value="${esc(q.synonymGroup||'')}" /></div>` : '';

  openGenericSheet((isNew?'Add':'Edit')+' '+(qType==='grammar'?'Grammar':'Vocab')+' Question', `
    <div class="field"><label>Question</label><textarea id="qText">${esc(q.question)}</textarea></div>
    ${synHTML}${optsHTML}
    <div class="field"><label>Answer (A/B/C/D)</label><input id="qAns" value="${esc(q.answer)}" /></div>
    <div class="field"><label>Explanation</label><textarea id="qExp">${esc(q.explanation||'')}</textarea></div>
  `, [
    {text:'Cancel', onclick:()=>closeSheet('genericSheet')},
    {text:'Save', cls:'primary', onclick:()=>{
      q.question = document.getElementById('qText').value.trim();
      q.options = Array.from(document.querySelectorAll('.qopt')).map(i=>i.value.trim()).filter(Boolean);
      q.answer = document.getElementById('qAns').value.trim().toUpperCase();
      q.explanation = document.getElementById('qExp').value.trim();
      if(qType==='vocab') q.synonymGroup = (document.getElementById('qSyn')?.value||'').trim();
      if(!q.question || q.options.length<2) { toast('Incomplete'); return; }
      if(isNew) {
        if(qType==='grammar') quizState.grammarQuestions.push(q);
        else quizState.vocabularyQuestions.push(q);
      } else {
        const pool = qType==='grammar'?quizState.grammarQuestions:quizState.vocabularyQuestions;
        const idx = pool.findIndex(x=>x.id===q.id);
        if(idx>=0) pool[idx] = q;
      }
      saveQuiz(); closeSheet('genericSheet'); render();
    }}
  ]);
}

let replacementMap = {};
function buildReadingHTML(content, hls) {
  const re = /[A-Za-z]+(?:[''][A-Za-z]+)?|\s+|[^A-Za-z\s]+/g;
  const tokens = [];
  let m;
  while((m=re.exec(content))!==null) tokens.push({text:m[0],start:m.index,end:m.index+m[0].length});
  const parts = tokens.map(t => {
    const isWord = /^[A-Za-z]/.test(t.text);
    if(isWord){const key=t.text.toLowerCase();const rep=replacementMap[key];const dt=rep||t.text;return{html:`<span class="word${rep?' replaced':''}" data-word="${esc(t.text)}" data-start="${t.start}" data-end="${t.end}">${esc(dt)}</span>`,start:t.start,end:t.end,wordText:t.text};}
    return{html:esc(t.text),start:t.start,end:t.end};
  });
  let html='';
  const hlWordsMap = new Map();
  (quizState.wordBook||[]).filter(w=>w.highlight).forEach(w => {
    hlWordsMap.set(w.text.toLowerCase(), w);
  });
  for(const part of parts){
    const activeH = hls.find(h=>{const s=h.charStart??-1;const e=h.charEnd??-1;return s>=0&&e>=0&&part.start>=s&&part.end<=e;});
    const wbkItem = part.wordText ? hlWordsMap.get(part.wordText.toLowerCase()) : null;
    if(activeH || wbkItem){
      const hid = activeH ? activeH.id : (wbkItem?.id || '');
      const color = activeH?.highlightColor || wbkItem?.highlightColor || 'medium-brown';
      let bg = 'rgba(162,132,94,0.35)', border = '#A2845E';
      if (color === 'light-brown' || color === 'yellow') { bg = 'rgba(212,186,148,0.28)'; border = '#D4BA94'; }
      if (true) { bg = 'rgba(115,88,53,0.48)'; border = '#735835'; }
      const cls = `hl hl-${color}` + ((activeH && activeH.note) ? " has-note":"");
      html+=`<span class="${cls}" style="background:${bg};border-bottom:2px solid ${border};border-radius:3px;padding:0 2px;cursor:pointer;" data-hid="${esc(hid)}">${part.html}</span>`;
    }
    else html+=part.html;
  }
  return html;
}

// ================================================================
//  QUIZ WORD SELECTION ENGINE — 三端统一交互规则
//  手机：单击无操作 · 长按放行原生菜单 · 双击弹功能条
//  iPad：触屏单击/长按放行原生 · 鼠标右键弹功能条
//  桌面：仅鼠标右键弹功能条
// ================================================================
let qsSelection = { tokens: [], anchorToken: null, floatMenu: null };
/* 运行时标记当前操作是否来自触屏，iPad 用于区分触屏长按 vs 鼠标右键 */
let qsIsTouchPointer = false;

/* ---------- 1. 设备识别：手机 / iPad / 桌面 ---------- */
function detectQuizDeviceProfile() {
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const maxTouchPoints = navigator.maxTouchPoints || 0;
  const isIPad = /iPad/i.test(ua) || (platform === 'MacIntel' && maxTouchPoints > 1);
  const isIPhone = /iPhone|iPod/i.test(ua);
  const isAndroidPhone = /Android/i.test(ua) && /Mobile/i.test(ua);
  const isSmallTouchPhone = maxTouchPoints > 0 && window.matchMedia && window.matchMedia('(max-width: 767px)').matches && !isIPad;

  if (isIPhone || isAndroidPhone || isSmallTouchPhone) return { type: 'phone', isPhone: true, isIPad: false, isDesktop: false };
  if (isIPad) return { type: 'ipad', isPhone: false, isIPad: true, isDesktop: false };
  return { type: 'desktop', isPhone: false, isIPad: false, isDesktop: true };
}

const quizDeviceProfile = detectQuizDeviceProfile();

/* ---------- 2. pointerdown：手机手动双击检测，iPad/桌面完全放行 ---------- */
let qsLastTapInfo = { token: null, time: 0 };
let qsTouchTapState = { token: null, time: 0, count: 0 };
const QS_DOUBLE_TAP_MS = 300;
const QS_TRIPLE_TAP_MS = 560;

function qsOpenTokenFloatMenu(token) {
  qsClearSelection();
  const area = token.dataset.area;
  qsHighlightRange(area, token, token);
  const tokens = Array.from(document.querySelectorAll('.q-word-token.qs-selected'));
  if (tokens.length) qsShowFloatMenu(tokens);
}

function qsWordDown(e, token) {
  // 标记触屏来源（iPad 触屏 vs 鼠标区分用）
  if (e.pointerType === 'touch') {
    qsIsTouchPointer = true;
    const now = Date.now();
    if (qsTouchTapState.token === token && now - qsTouchTapState.time < QS_TRIPLE_TAP_MS) {
      qsTouchTapState.count += 1;
    } else {
      qsTouchTapState = { token, time: now, count: 1 };
    }
    qsTouchTapState.time = now;
    if (qsTouchTapState.count >= 3) {
      qsTouchTapState = { token: null, time: 0, count: 0 };
      e.preventDefault();
      e.stopPropagation();
      qsOpenTokenFloatMenu(token);
      return;
    }
  }

  if (quizDeviceProfile.type === 'phone') {
    const now = Date.now();
    if (qsLastTapInfo.token === token && now - qsLastTapInfo.time < QS_DOUBLE_TAP_MS) {
      // 手机双击同一单词 → 弹功能条
      qsLastTapInfo = { token: null, time: 0 };
      e.preventDefault();
      e.stopPropagation();
      qsOpenTokenFloatMenu(token);
    } else {
      // 单击 / 首次点击 → 仅记录，不 preventDefault（放行长按原生菜单）
      qsLastTapInfo = { token: token, time: now };
      e.stopPropagation();
    }
  }
  // iPad / 桌面：不拦截任何 pointerdown；iPad 触屏三连点会在上方触发
}

/* ---------- 3. contextmenu：iPad 鼠标右键弹浮窗，手机触屏长按放行 ---------- */
function qsWordContextMenu(e, token) {
  // 手机：屏蔽右键，让长按走系统原生菜单
  if (quizDeviceProfile.isPhone) return;
  // iPad 触屏长按会触发 contextmenu，放行让系统处理
  if (quizDeviceProfile.isIPad && qsIsTouchPointer) { qsIsTouchPointer = false; return; }
  // iPad 鼠标右键 / 桌面鼠标右键 → 弹功能浮窗
  e.preventDefault();
  e.stopPropagation();
  qsClearSelection();
  const area = token.dataset.area;
  qsHighlightRange(area, token, token);
  const tokens = Array.from(document.querySelectorAll(`.q-word-token.qs-selected`));
  if (tokens.length) qsShowFloatMenu(tokens);
}

function qsHighlightRange(area, a, b) {
  const allTokens = Array.from(document.querySelectorAll(`.q-word-token[data-area="${area}"]`));
  const iA = allTokens.indexOf(a), iB = allTokens.indexOf(b);
  const lo = Math.min(iA, iB), hi = Math.max(iA, iB);
  allTokens.forEach((t, i) => {
    if (i >= lo && i <= hi) t.classList.add('qs-selected');
    else t.classList.remove('qs-selected');
  });
}

function qsClearSelection() {
  document.querySelectorAll('.q-word-token.qs-selected').forEach(t => t.classList.remove('qs-selected'));
  qsRemoveFloatMenu();
}

let qsFloatMenuCloseHandler = null;
let qsFloatMenuGuardUntil = 0;

function qsRemoveFloatMenu() {
  const old = document.getElementById('qsFloatMenu');
  if (old) old.remove();
  if (qsFloatMenuCloseHandler) {
    document.removeEventListener('pointerdown', qsFloatMenuCloseHandler, true);
    qsFloatMenuCloseHandler = null;
  }
}

function memoryKey(word) { return String(word||'').trim().toLowerCase(); }
function memoryDisplayStatus(status) {
  if (status === 'Known') return 'Known';
  if (status === 'Learning') return 'Learning';
  return 'New';
}
function memoryNextReview(status, errorCount=0) {
  const day = 86400000;
  if (status === 'Known') return Date.now() + 30 * day;
  if (status === 'Learning') return Date.now() + (errorCount > 1 ? 7 : 3) * day;
  return Date.now() + day;
}
function wordMemoryEnsure(word, tag='Highlight', meta={}) {
  const text = String(word||'').trim();
  if (!text) return null;
  quizState.wordMemory = quizState.wordMemory || {};
  const key = memoryKey(text);
  let m = quizState.wordMemory[key];
  if (!m) {
    m = quizState.wordMemory[key] = {
      word: text,
      source: meta.source || '',
      sources: meta.source ? [meta.source] : [],
      context: meta.context || '',
      tags: [],
      reviewStatus: 'New',
      errorCount: 0,
      seenCount: 0,
      correctCount: 0,
      reviewCount: 0,
      lastSeenDate: todayISO(),
      createdAt: Date.now(),
      nextReview: memoryNextReview('New')
    };
  }
  if (tag && !m.tags.includes(tag)) m.tags.push(tag);
  if (meta.source) { m.source = meta.source; if (!m.sources.includes(meta.source)) m.sources.push(meta.source); }
  if (meta.context) m.context = meta.context;
  m.lastSeenDate = todayISO();
  m.seenCount = (m.seenCount || 0) + (meta.countSeen === false ? 0 : 1);
  if (!m.nextReview) m.nextReview = memoryNextReview(m.reviewStatus, m.errorCount);
  return m;
}
function wordMemoryLookup(word) {
  const key = memoryKey(word);
  const m = quizState.wordMemory?.[key];
  if (m) return m;
  const inWb = (quizState.wordBook||[]).find(w => memoryKey(w.text||w.word) === key);
  if (inWb) return wordMemoryEnsure(inWb.text || inWb.word, 'Word Book', {source:inWb.source||'Word Book', context:inWb.example||'', countSeen:false});
  const inSyn = (quizState.synonymLibrary||[]).find(g => (g.words||[]).some(w => memoryKey(w) === key));
  if (inSyn) return wordMemoryEnsure(word, 'Synonym', {source:'Synonyms', context:inSyn.groupName||'', countSeen:false});
  if (qsIsHighlighted && qsIsHighlighted(word)) return wordMemoryEnsure(word, 'Highlight', {source:'Highlight', countSeen:false});
  return null;
}
function wordMemoryContextFromToken(token) {
  const card = token?.closest?.('.q-card');
  const qid = card?.dataset?.qid || '';
  const q = qid ? [...quizState.grammarQuestions, ...quizState.vocabularyQuestions].find(x => x.id === qid) : null;
  return { source: q ? `Quiz Hub Q#${qid}` : 'Quiz Hub', context: q?.question || token?.closest?.('.q-text')?.textContent || '' };
}
function wordMemoryMarkKnown(word) {
  const m = wordMemoryEnsure(word, 'Word Book', {source:'Quiz Hub', countSeen:false});
  if (!m) return;
  m.reviewStatus = 'Known';
  m.reviewCount = (m.reviewCount || 0) + 1;
  m.nextReview = memoryNextReview('Known');
  const wb = (quizState.wordBook||[]).find(w => memoryKey(w.text||w.word) === memoryKey(word));
  if (wb) { wb.reviewStatus = 'Known'; wb.srsBox = Math.max(wb.srsBox||0, 5); wb.srsNext = m.nextReview; }
  saveQuiz();
  toast('Marked as Known');
  qsClearSelection();
}
function wordMemoryUpdateFromQuestion(q, correct) {
  if (!q || !quizState.wordMemory) return;
  const text = [q.question, ...(q.options||[]), q.explanation||''].join(' ').toLowerCase();
  Object.keys(quizState.wordMemory).forEach(key => {
    if (!key || !text.includes(key)) return;
    const m = quizState.wordMemory[key];
    m.lastSeenDate = todayISO();
    m.seenCount = (m.seenCount || 0) + 1;
    if (correct) {
      m.correctCount = (m.correctCount || 0) + 1;
      if ((m.correctCount || 0) >= 3 && (m.reviewCount || 0) > 0) m.reviewStatus = 'Known';
      else if (m.reviewStatus === 'New' && (m.seenCount || 0) > 1) m.reviewStatus = 'Learning';
    } else {
      m.errorCount = (m.errorCount || 0) + 1;
      m.reviewStatus = 'Learning';
    }
    m.nextReview = memoryNextReview(m.reviewStatus, m.errorCount || 0);
  });
}
function syncWordBookMemory() {
  quizState.wordMemory = quizState.wordMemory || {};
  (quizState.wordBook||[]).forEach(w => {
    const m = wordMemoryEnsure(w.text||w.word, 'Word Book', {source:w.source||'Word Book', context:w.example||'', countSeen:false});
    w.reviewStatus = m.reviewStatus;
    w.errorCount = m.errorCount || 0;
    w.seenCount = m.seenCount || 0;
    w.lastSeenDate = m.lastSeenDate;
    w.srsNext = m.nextReview || w.srsNext;
  });
  (quizState.highlights||[]).forEach(h => wordMemoryEnsure(h.text||h.selectedText, 'Highlight', {source:h.source||'Highlight', countSeen:false}));
  (quizState.synonymLibrary||[]).forEach(g => (g.words||[]).forEach(w => wordMemoryEnsure(w, 'Synonym', {source:'Synonyms', context:g.groupName||'', countSeen:false})));
}

function qsEscapeText(text) { return String(text || '').trim(); }
function qsNorm(text) { return String(text || '').trim().toLowerCase(); }
function qsIsHighlighted(text) {
  const n = qsNorm(text);
  return (quizState.highlights || []).some(h => qsNorm(h.text || h.selectedText) === n);
}
function qsShowFloatMenu(tokens) {

  const text = qsEscapeText(tokens.map(t => t.textContent).join(' '));

    btn.addEventListener('pointerdown', ev => ev.stopPropagation());

    menu.appendChild(btn);
  };

  addButton('Highlight', () => qsHighlightWord(text), highlighted ? 'added' : '');
  addButton('+ Synonym', () => qsAddToSynGroup(text));
  addButton(alreadyIn ? '✓' : '+', btn => qsAddToWordBook(btn, text), alreadyIn ? 'added' : '');
  if (highlighted) {
    addButton('Remove', () => qsRemoveHighlight(text), 'danger');
  }

  document.body.appendChild(menu);

  requestAnimationFrame(() => {
    const margin = 8;
    const menuRect = menu.getBoundingClientRect();
    const center = (firstRect.left + lastRect.right) / 2 + window.scrollX;
    let left = center - menuRect.width / 2;
    left = Math.min(left, window.scrollX + window.innerWidth - menuRect.width - margin);
    left = Math.max(window.scrollX + margin, left);

    let top = firstRect.top + window.scrollY - menuRect.height - 10;
    if (top < window.scrollY + margin) top = firstRect.bottom + window.scrollY + 10;

    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
  });

  qsFloatMenuCloseHandler = ev => {
    if (Date.now() < qsFloatMenuGuardUntil) return;
    if (!menu.contains(ev.target)) {
      qsClearSelection();
    }
  };
  setTimeout(() => {
    if (qsFloatMenuCloseHandler) document.addEventListener('pointerdown', qsFloatMenuCloseHandler, true);
  }, 10);
}

function qsHighlightWord(text) {

function bindReadingEvents() {

  if (!body) return;
  body.querySelectorAll('.word').forEach(w => {
    w.addEventListener('click', e => {
      const sel = window.getSelection();
      if(sel && sel.toString().trim().length>1) return;
      showWordPopup(w, e);
    });
  });

  });

function handleReadingSelection() {
  const sel = window.getSelection();
  const menu = document.getElementById('selMenu');
  if(!sel||sel.rangeCount===0||sel.isCollapsed){menu.style.display='none';return;}
  const text = sel.toString().trim();
  if(!text){menu.style.display='none';return;}
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  if(rect.width===0){menu.style.display='none';return;}
  menu.style.display='flex';
  const w = menu.offsetWidth||300;
  let left = rect.left+rect.width/2-w/2;
  let top = rect.top-menu.offsetHeight-8;
  if(top<8) top=rect.bottom+8;
  left = Math.max(8,Math.min(left,window.innerWidth-w-8));
  menu.style.left=left+'px'; menu.style.top=top+'px';
  menu._selInfo = getSelectionOffsetInReading(range);
  menu._selText = text;
}

function getSelectionOffsetInReading(range) {
  const body = document.getElementById('readingBody');
  if(!body) return null;
  function findOff(node, isStart, offInNode) {
    let el = node.nodeType===1?node:node.parentElement;
    while(el&&el!==body&&!el.dataset?.start) el=el.parentElement;
    if(el?.dataset?.start!=null){const s=+el.dataset.start;const e=+el.dataset.end;return isStart?s:e;}
    return null;
  }
  const s=findOff(range.startContainer,true,range.startOffset);
  const e=findOff(range.endContainer,false,range.endOffset);
  if(s==null||e==null) return null;
  return{start:Math.min(s,e),end:Math.max(s,e)};
}

document.getElementById('selMenu').addEventListener('click', e => {
  const btn = e.target.closest('button'); if(!btn) return;

  const info = menu._selInfo; const text = menu._selText;
  if(!info||!text){menu.style.display='none';return;}
  const p = currentPassage(); if(!p){menu.style.display='none';return;}
  if(btn.dataset.color) addHighlight(p.id,info.start,info.end,text,btn.dataset.color,'');

  else if(btn.dataset.act==='vocab') addToWordBook(text.trim(), { source: 'Reading Passage', highlight: true, highlightColor: 'medium-brown' });
  menu.style.display='none'; window.getSelection().removeAllRanges();
});

function addToWordBook(text, extra={}) {
  text = (text||'').trim(); if(!text) return false;
  quizState.wordBook = quizState.wordBook || [];
  const mem = wordMemoryEnsure(text, extra.tag || 'Word Book', { source: extra.source || 'Quiz Hub', context: extra.example || extra.context || '', countSeen:false });
  const exists = quizState.wordBook.find(v => v.text.toLowerCase() === text.toLowerCase());
  if(exists){
    exists.reviewStatus = mem.reviewStatus;
    exists.errorCount = mem.errorCount || 0;
    exists.seenCount = mem.seenCount || 0;
    exists.lastSeenDate = mem.lastSeenDate;
    saveQuiz(); if (!extra.silentToast) toast('Already in Word Book'); return false;
  }
  quizState.wordBook.push({
    id: uid('wbk'), text, meaning: extra.meaning || '', example: extra.example || '',
    source: extra.source || 'Quiz Hub', subject: extra.subject || 'english',
    dateAdded: todayISO(), addedAt: Date.now(), highlight: !!extra.highlight, starred: !!extra.starred,
    reviewStatus: mem.reviewStatus, errorCount: mem.errorCount || 0, seenCount: mem.seenCount || 0, lastSeenDate: mem.lastSeenDate,
    srsBox: 0, srsNext: mem.nextReview || Date.now(), srsReviews: 0, srsLapses: 0
  });
  saveQuiz(); renderSharedStats(); render(); if (!extra.silentToast) toast('Saved to Word Book'); return true;
}

function addToVocabBook(text, extra={}) {
  return addToWordBook(text, extra);
}

let wbkSearchQ = '';
let wbkSort = 'dateDesc'; // 'dateDesc', 'alpha', 'highlight'
let wbkTab = 'all'; // 'all', 'due', 'highlight', 'starred'

const WBK_LOCAL_TRANSLATION_OVERRIDES = {
  probably: '大概，很可能',
  approximately: '大约，大概',
  consequently: '因此，所以',
  accordingly: '相应地，因此',
  actually: '实际上，其实',
  especially: '尤其，特别',
  generally: '通常，一般来说',
  usually: '通常',
  perhaps: '也许，可能',
  therefore: '因此，所以',
  however: '然而，不过',
  although: '虽然，尽管',
  because: '因为',
  important: '重要的',
  different: '不同的'
};

function wbkLocalTranslation(word) {
  const key = String(word || '').trim().toLowerCase().replace(/^[^a-z]+|[^a-z]+$/g, '');
  return WBK_LOCAL_TRANSLATION_OVERRIDES[key] || '';
}

function wbkPostProcessTranslation(word, translated) {
  const local = wbkLocalTranslation(word);
  if (local) return local;

  let result = String(translated || '').trim();
  if (!result) return '';

  if (result.includes('、') && result.replace(/[、，,。\s]/g, '').length > 4) {
    const firstMeaning = result.split('、').map(s => s.trim()).filter(Boolean)[0];
    if (firstMeaning) result = firstMeaning;
  }

  return result;
}

async function batchAutoLookupWords() {
  const words = (quizState.wordBook || []).filter(w => !w.meaning || String(w.meaning).trim() === '');
  if (!words.length) {
    toast('🎉 所有单词已有中文释义！');
    return;
  }

  let successCount = 0;
  let failCount = 0;
  const total = words.length;
  const batchSize = 5;
  const batches = [];

  toast(`⏳ 正在处理 ${total} 个单词...`);

  for (let i = 0; i < words.length; i += batchSize) {
    batches.push(words.slice(i, i + batchSize));
  }

  for (let batch of batches) {
    const promises = batch.map(async (w) => {
      try {
        const wordText = String(w.text || w.word || '').trim();
        if (!wordText) {
          failCount++;
          return;
        }

        const localMeaning = wbkLocalTranslation(wordText);
        if (localMeaning) {
          w.meaning = localMeaning;
          successCount++;
          return;
        }

        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(wordText)}&langpair=en|zh-CN`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (data.responseData && data.responseData.translatedText) {
          const translated = wbkPostProcessTranslation(wordText, data.responseData.translatedText);
          if (translated && translated.toLowerCase() !== wordText.toLowerCase()) {
            w.meaning = translated;
            successCount++;
          } else {
            w.meaning = wordText;
            failCount++;
          }
        } else {
          failCount++;
        }
      } catch (e) {
        failCount++;
        console.warn(`查词失败: ${w.text || w.word || ''}`, e);
      }
    });

    await Promise.all(promises);

    const done = successCount + failCount;
    toast(`⏳ 已处理 ${done}/${total} 个单词 (成功: ${successCount}, 失败: ${failCount})`);
  }

  saveQuiz();
  renderSharedStats();
  openQuizWordBook(wbkSearchQ, null, wbkSort, wbkTab);
  toast(`✅ 完成！成功: ${successCount}, 失败: ${failCount}`);
}

let wbkReviewSession = null;

function startWordBookReview(mode = 'due') {
  quizState.wordBook = quizState.wordBook || [];
  syncWordBookMemory();
  const now = Date.now();
  const wbByKey = {}; (quizState.wordBook||[]).forEach(w => wbByKey[memoryKey(w.text||w.word)] = w);
  const memoryItems = Object.values(quizState.wordMemory||{}).map(m => ({ ...(wbByKey[memoryKey(m.word)] || {}), id:(wbByKey[memoryKey(m.word)]?.id || 'mem_'+memoryKey(m.word)), text:m.word, source:m.source||'Memory Center', example:m.context||'', srsNext:m.nextReview, highlight:(m.tags||[]).includes('Highlight'), _memoryOnly:!wbByKey[memoryKey(m.word)] }));
  let queue = [];
  if (mode === 'due') {
    queue = memoryItems.filter(w => (w.srsNext || 0) <= now);
    if (!queue.length) { toast('All due items completed. Starting full review.'); queue = [...memoryItems]; mode = 'random'; }
  } else if (mode === 'random') {
    queue = [...memoryItems].sort(() => Math.random() - 0.5);
  } else {
    queue = [...memoryItems];
  }

  if (!queue.length) { toast('Word Book is empty. Add words from Quiz Hub first.'); return; }

  wbkReviewSession = { queue, index: 0, showMeaning: false, mode, total: queue.length };
  renderWordBookReviewCard();
}

function wbkReviewStep(dir) {
  if (!wbkReviewSession) return;
  const newIdx = wbkReviewSession.index + dir;
  if (newIdx >= 0 && newIdx < wbkReviewSession.total) {
    wbkReviewSession.index = newIdx;
    wbkReviewSession.showMeaning = false;
    renderWordBookReviewCard();
  }
}

function markWordBookReviewItem(id, result) {
  let item = quizState.wordBook.find(x => x.id === id);
  if (!item && wbkReviewSession) item = wbkReviewSession.queue[wbkReviewSession.index];
  if (item) {
    const mem = wordMemoryEnsure(item.text || item.word, item._memoryOnly ? 'Highlight' : 'Word Book', {source:item.source||'Memory Center', context:item.example||'', countSeen:false});
    const now = Date.now();
    if (result === 'forgot') {
      item.srsBox = 0;
      item.srsNext = now; // due immediately or tomorrow
      item.srsLapses = (item.srsLapses || 0) + 1;
      mem.errorCount = (mem.errorCount || 0) + 1; mem.reviewCount = (mem.reviewCount || 0) + 1; mem.reviewStatus = 'Learning'; mem.nextReview = item.srsNext;
      toast('Marked as Learning');
    } else {
      item.srsBox = (item.srsBox || 0) + 1;
      // Spaced repetition intervals: 1d, 3d, 7d, 14d, 30d
      const days = [1, 3, 7, 14, 30][Math.min(4, item.srsBox)] || 1;
      item.srsNext = now + days * 86400000;
      item.srsReviews = (item.srsReviews || 0) + 1;
      mem.reviewCount = (mem.reviewCount || 0) + 1; mem.correctCount = (mem.correctCount || 0) + 1; mem.reviewStatus = mem.correctCount >= 2 ? 'Known' : 'Learning'; mem.nextReview = item.srsNext; item.reviewStatus = mem.reviewStatus;
      toast(`Review scheduled in ${days} days`);
    }
    saveQuiz();
    renderSharedStats();
  }
  if (wbkReviewSession.index < wbkReviewSession.total - 1) {
    wbkReviewStep(1);
  } else {
    toast('当前队列已刷完');
    openQuizWordBook();
  }
}

async function autoLookupWord() {
  const wordInput = document.getElementById('add_wbk_text');
  const meaningInput = document.getElementById('add_wbk_mean');
  if (!wordInput || !meaningInput) return;

  const word = wordInput.value.trim();
  if (!word) { toast('请先输入单词或短语'); return; }

  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-CN`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    if (data.responseData && data.responseData.translatedText) {
      const translated = String(data.responseData.translatedText || '').trim();
      if (!translated || translated.toLowerCase() === word.toLowerCase()) {
        toast('⚠️ 未找到有效翻译，请手动输入');
        return;
      }
      meaningInput.value = translated;
      meaningInput.dispatchEvent(new Event('input', { bubbles: true }));
      toast('✅ 中文释义已自动填充');
    } else {
      toast('⚠️ 查词失败，请手动输入');
    }
  } catch (e) {
    toast('❌ 网络请求失败，请手动输入');
    console.warn('Auto lookup error:', e);
  }
}

      if (highlight) wordMemoryEnsure(textVal, 'Highlight', {source:source||'Word Book', context:example||'', countSeen:false});

        toast('✓ 生词修改已保存！');

          exists.source = source || exists.source; exists.subject = 'english';

          toast('已更新生词: ' + textVal);

          quizState.wordBook.push({

            dateAdded: todayISO(), addedAt: Date.now(), highlight, starred, reviewStatus: mem.reviewStatus, errorCount: mem.errorCount||0, seenCount: mem.seenCount||0, lastSeenDate: mem.lastSeenDate,
            srsBox: 0, srsNext: mem.nextReview||Date.now(), srsReviews: 0, srsLapses: 0

      saveQuiz(); closeSheet('genericSheet'); renderSharedStats(); render();

    }}
  ]);

function addSelectedToWordBook(qId) {
  const selText = window.getSelection().toString().trim();
  let defaultExample = '';
  let defaultSource = 'Quiz Hub Q#' + qId;
  const card = document.querySelector(`.q-card[data-qid="${qId}"]`) || document.querySelector(`.wb-practice-card`);
  if (card) {

function checkWbAnswer(wbId) {

  w._checked = true;

}

function retryWbQuestion(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  w._chosen = null;
  w._checked = false;
  openQuizWrongBook(APP_GLOBALS.wbCurrentIndex, APP_GLOBALS.wbFilter);

}

function toggleWbResolved(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  w.completed = !w.completed;
  saveQuiz();
  renderSharedStats();
  openQuizWrongBook(APP_GLOBALS.wbCurrentIndex, APP_GLOBALS.wbFilter);
  toast(w.completed ? 'Marked as completed / resolved!' : 'Added back to unresolved wrong book!');
}

function deleteWbQuestion(wbId) {
  if (!confirm('Delete this question from Wrong Book?')) return;
  quizState.wrongBook = quizState.wrongBook.filter(x => x.id !== wbId);
  saveQuiz();
  renderSharedStats();
  openQuizWrongBook(APP_GLOBALS.wbCurrentIndex, APP_GLOBALS.wbFilter);
  toast('Deleted from Wrong Book');
}

function retryWrong(wId) {

}

let srsSession = null;
function startSrsReview(mode, customList) {
  const source = mode==='vocab' ? (quizState.wordBook||[]) : quizState.synonymLibrary;
  source.forEach(ensureSrs);
  let queue;
  if(Array.isArray(customList)&&customList.length){customList.forEach(ensureSrs);queue=customList.slice();}
  else{const due=srsDueList(source);if(!due.length){toast('Nothing due! !');return;}queue=due.slice().sort(()=>Math.random()-0.5);}
  srsSession = {mode,queue,total:queue.length,done:0,showAnswer:false};
  renderSrsCard();
}

function renderSrsCard() {
  if(!srsSession||!srsSession.queue.length){
    openGenericSheet('! Review Complete',`<div style="text-align:center;padding:20px;font-size:14px;">Reviewed <b>${srsSession?.total||0}</b> items</div>`,
      [{text:'Close',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
    return;
  }
  const cur=srsSession.queue[0];const isVocab=srsSession.mode==='vocab';
  const frontHTML=isVocab?`<div style="font-size:28px;font-weight:700">${esc(cur.word)}</div>`:`<div style="font-size:22px;font-weight:700">${esc(cur.groupName||'Group')}</div><div style="color:var(--ink-tertiary);font-size:11px;margin-top:4px">${(cur.words||[]).length} words</div>`;
  const backHTML=isVocab?`<div style="font-size:15px;color:var(--ink)">${esc(cur.meaning||'')}</div>${cur.example?`<div style="margin-top:10px;padding:8px 12px;background:var(--bg-card);border-radius:8px;font-size:12px;color:var(--ink-secondary)">${esc(cur.example)}</div>`:''}`:`<div class="chips">${(cur.words||[]).map(w=>`<span class="chip" style="font-size:14px;padding:6px 14px">${esc(w)}</span>`).join('')}</div>`;

  const btnHTML = !srsSession.showAnswer
    ? `<button class="apple-btn primary" style="padding:10px 40px" onclick="srsSession.showAnswer=true;renderSrsCard();">Show Answer</button>`
    : `<div style="display:flex;gap:8px;justify-content:center">
        <button class="apple-btn" style="background:rgba(255,69,58,0.1);color:var(--red)" onclick="srsGradeCurrent('again')">Again</button>
        <button class="apple-btn" style="background:rgba(255,159,10,0.1);color:var(--orange)" onclick="srsGradeCurrent('hard')">Hard</button>
        <button class="apple-btn" style="background:rgba(48,209,88,0.1);color:var(--green)" onclick="srsGradeCurrent('good')">Good</button>
        <button class="apple-btn" style="background:rgba(10,132,255,0.1);color:var(--accent)" onclick="srsGradeCurrent('easy')">Easy</button>
      </div>`;

  openGenericSheet(`Rev Review · ${isVocab?'Vocabulary':'Synonyms'}`,`
    <div style="max-width:500px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-tertiary);margin-bottom:16px"><span>${srsSession.done+1}/${srsSession.total}</span><span>Box ${cur.srsBox||0}</span></div>
      <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center">
        ${frontHTML}
        <div style="width:100%;margin-top:20px;padding-top:20px;border-top:1px dashed var(--line);${srsSession.showAnswer?'':'display:none'}">${backHTML}</div>
      </div>
      <div style="margin-top:20px;text-align:center">${btnHTML}</div>
    </div>
  `,[{text:'End Review',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
}

function srsGradeCurrent(grade) {
  if(!srsSession) return;
  const cur=srsSession.queue.shift();
  srsGrade(cur,grade);
  srsSession.done++;srsSession.showAnswer=false;
  saveQuiz();renderSrsCard();
}

// Keyboard shortcuts for SRS
document.addEventListener('keydown', e => {
  if(!srsSession) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(!srsSession.showAnswer&&(e.code==='Space'||e.key==='Enter')){e.preventDefault();srsSession.showAnswer=true;renderSrsCard();}
  else if(srsSession.showAnswer){const map={1:'again',2:'hard',3:'good',4:'easy'};if(map[e.key]){e.preventDefault();srsGradeCurrent(map[e.key]);}}
});

function exportQuizJSON() {
  const obj = {version:'2.0',schemaVersion:QUIZ_SCHEMA,exportedAt:Date.now(),passages:quizState.passages,quizSets:quizState.quizSets,grammarQuestions:quizState.grammarQuestions,vocabularyQuestions:quizState.vocabularyQuestions,wordBook:quizState.wordBook,synonymLibrary:quizState.synonymLibrary,highlights:quizState.highlights,wrongBook:quizState.wrongBook,wordMemory:quizState.wordMemory,answerLog:quizState.answerLog,currentPassageId:quizState.currentPassageId,currentQuizSetId:quizState.currentQuizSetId};
  downloadJSON(obj,'quiz_export_'+todayISO()+'.json');
  toast('Exported OK');
}

function importQuizJSON() {
  if(quizState.passages.length&&!confirm('This will OVERWRITE all quiz data. Continue?')) return;
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { try { importQuizData(JSON.parse(r.result)); toast('Imported OK'); } catch(err) { alert('Import failed: '+err.message); } };
    r.readAsText(f);
  };
  inp.click();
}

function importQuizData(data) {
  if(!data||typeof data!=='object') throw new Error('Invalid JSON');
  data = normalizeQuizImportPayload(data);
  const passages = Array.isArray(data.passages)?data.passages:[];
  passages.forEach((p,i)=>{if(!p.id)p.id=uid('sec');if(!p.customName)p.customName=p.title||('Section '+(i+1));if(typeof p.content!=='string')p.content='';});
  quizState.passages=passages;
  quizState.quizSets=Array.isArray(data.quizSets)?data.quizSets:[];
  quizState.grammarQuestions=Array.isArray(data.grammarQuestions)?data.grammarQuestions:[];
  quizState.vocabularyQuestions=Array.isArray(data.vocabularyQuestions)?data.vocabularyQuestions:[];
  quizState.wordBook=Array.isArray(data.wordBook)?data.wordBook:(Array.isArray(data.vocabularyBook)?data.vocabularyBook:[]);
  quizState.synonymLibrary=Array.isArray(data.synonymLibrary)?data.synonymLibrary:[];
  quizState.highlights=Array.isArray(data.highlights)?data.highlights:[];
  quizState.wrongBook=Array.isArray(data.wrongBook)?data.wrongBook:[];
  quizState.wordMemory=data.wordMemory||{};
  quizState.answerLog=data.answerLog||{};
  quizState.currentQuizSetId=data.currentQuizSetId||{};
  quizState.currentPassageId=data.currentPassageId||(passages[0]&&passages[0].id)||null;
  quizState.highlights.forEach(h=>{if(!h.id)h.id=uid('hl');});
  quizState.quizSets.forEach(qs=>{if(!qs.id)qs.id=uid('qs');});
  passages.forEach(p=>{if(!quizState.quizSets.some(qs=>qs.passageId===p.id)){quizState.quizSets.push({id:uid('qs'),passageId:p.id,name:'1',createdAt:Date.now()});}});
  saveQuiz(); render();
}

function clearAllQuiz() {
  if(!confirm('Clear ALL quiz data? This cannot be undone.')) return;
  quizState = {version:'2.0',schemaVersion:QUIZ_SCHEMA,passages:[],quizSets:[],grammarQuestions:[],vocabularyQuestions:[],wordBook:[],synonymLibrary:[],highlights:[],wrongBook:[],wordMemory:{},answerLog:{},currentPassageId:null,currentQuizSetId:{},activeQuizSetIds:{},activeTab:'grammar',activeQIndex:{grammar:{},vocab:{}}};
  saveQuiz(); render();
}

function loadSeedData() {
  localStorage.removeItem('study_demo_data_removed');
  if(quizState.passages.length&&!confirm('Merge sample data?')) return;
  const seed = getSeedData();
  seed.passages.forEach(p=>{if(!quizState.passages.find(x=>x.id===p.id))quizState.passages.push(p);});
  seed.grammarQuestions.forEach(q=>{if(!quizState.grammarQuestions.find(x=>x.id===q.id))quizState.grammarQuestions.push(q);});
  seed.vocabularyQuestions.forEach(q=>{if(!quizState.vocabularyQuestions.find(x=>x.id===q.id))quizState.vocabularyQuestions.push(q);});
  (seed.wordBook||[]).forEach(w=>{if(!quizState.wordBook.find(x=>x.text===w.text))quizState.wordBook.push(w);});
  seed.synonymLibrary.forEach(g=>{if(!quizState.synonymLibrary.find(x=>x.groupName===g.groupName))quizState.synonymLibrary.push(g);});
  if(!quizState.currentPassageId&&quizState.passages.length) quizState.currentPassageId=quizState.passages[0].id;
  saveQuiz(); render(); toast('Sample data loaded');
}

const AI_STUDIO_MODULES = [
  {key:'study_resource', label:'Study Resource'},
  {key:'study_roadmap', label:'Study Roadmap'},
  {key:'weekly_planner', label:'Weekly Planner'},
  {key:'wordbook', label:'Word Book'},
  {key:'synonyms', label:'Synonyms'},
  {key:'quiz', label:'Quiz Hub'}
];

let _aiWizardTab = 'study_resource';

function getAIStudioModuleLabel(tab) {
  return (AI_STUDIO_MODULES.find(m => m.key === tab) || {}).label || tab;
}

function getAIWizardPrompt(tab) {
  if (tab === 'weekly_planner' && typeof generateStudyPlanningPrompt === 'function') {
    return generateStudyPlanningPrompt();
  }
  return AI_WIZARD_PROMPTS[tab] || '';
}

function switchAIWizardTab(tab) {
  _aiWizardTab = tab || 'study_resource';
  const label = getAIStudioModuleLabel(_aiWizardTab);
  const prompt = getAIWizardPrompt(_aiWizardTab);
  const box = document.getElementById('aiWizardPromptBox');
  if (box) box.textContent = prompt || '';
  const select = document.getElementById('aiStudioModuleSelect');
  if (select && select.value !== _aiWizardTab) select.value = _aiWizardTab;
  const promptTitle = document.getElementById('aiStudioPromptTitle');
  if (promptTitle) promptTitle.textContent = label + ' Prompt';
  const importTitle = document.getElementById('aiStudioImportTitle');
  if (importTitle) importTitle.textContent = label + ' Import';
  const importButton = document.getElementById('aiStudioImportButton');
  if (importButton) importButton.textContent = 'Import';
  const prev = document.getElementById('aiImportPreview');
  if (prev) prev.textContent = 'Import status will appear here. Toast remains unchanged.';
  document.querySelectorAll('.ai-wizard-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === _aiWizardTab);
  });
  // 板块选择器：只在 quiz / passage tab 显示
  const passageSel = document.getElementById('aiStudioPassageSelector');
  if (passageSel) {
    const isQuizTab = (_aiWizardTab === 'quiz' || _aiWizardTab === 'passage');
    passageSel.style.display = isQuizTab ? '' : 'none';
    if (isQuizTab) refreshAIPassageSelector();
  }
}

function refreshAIPassageSelector() {
  const sel = document.getElementById('aiTargetPassage');
  if (!sel) return;
  const currentVal = sel.value;
  sel.innerHTML = quizState.passages.length
    ? quizState.passages.map(p => `<option value="${p.id}">${esc(p.customName || p.title || p.id)}</option>`).join('')
    : '<option value="">— 请先创建板块 —</option>';
  if (currentVal && sel.querySelector(`option[value="${currentVal}"]`)) sel.value = currentVal;
}

function copyAIWizardPrompt() {
  const prompt = getAIWizardPrompt(_aiWizardTab) || '';
  navigator.clipboard.writeText(prompt)
    .then(() => toast('✅ Prompt 已复制，去 AI 生成 JSON 后回来粘贴导入'))
    .catch(() => toast('复制失败，请手动选中复制'));
}

function downloadAIWizardPromptAsFile() {
  const prompt = getAIWizardPrompt(_aiWizardTab) || '';
  if (!prompt) { toast('没有可下载的 Prompt'); return; }
  const label = getAIStudioModuleLabel(_aiWizardTab) || _aiWizardTab;
  const filename = `quiz-hub-prompt-${_aiWizardTab}.txt`;
  const blob = new Blob([prompt], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`✅ 已下载 ${filename}，可直接发给 AI`);
}

function previewAIImport(tab) {
  const isWeeklyPlanner = tab === 'weekly_planner' || !!document.getElementById('importPlannerText');
  const raw = (document.getElementById(isWeeklyPlanner ? 'importPlannerText' : 'aiJsonPasteArea') || document.getElementById('aiJsonPasteArea'))?.value.trim();
  const prev = document.getElementById(isWeeklyPlanner ? 'plannerAIImportPreview' : 'aiImportPreview') || document.getElementById('aiImportPreview');
  if (!raw || !prev) return;

  if (isWeeklyPlanner) {
    try {
      let payload = null;
      let tasks = [];
      if (raw.startsWith('{')) {
        payload = JSON.parse(raw);
        tasks = Array.isArray(payload.tasks) ? payload.tasks : [];
      } else if (raw.startsWith('[')) {
        tasks = JSON.parse(raw);
      } else {
        tasks = raw.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
          const parts = line.split('|');
          return { subject: appState.currentSubject || 'english', goal: parts[0] || 'New Goal', target: parseInt(parts[1]) || 1, unit: parts[2] || 'pages' };
        });
      }

      const normalized = tasks.map(task => migrateTaskToGoal(task));
      const subjectCounts = {};
      normalized.forEach(task => {
        const subjectKey = detectSubjectKey ? detectSubjectKey(task.subject || '') : task.subject;
        const label = customSubjects[subjectKey]?.label || customSubjects[task.subject]?.label || task.subject || 'Uncategorized';
        subjectCounts[label] = (subjectCounts[label] || 0) + 1;
      });

      const lines = [];
      lines.push(`📅 任务数量：${normalized.length}`);
      if (payload?.startDate || payload?.endDate) lines.push(`🗓️ 周期：${payload?.startDate || weeklyPlan.startDate || '--'} ~ ${payload?.endDate || weeklyPlan.endDate || '--'}`);
      const distribution = Object.entries(subjectCounts).map(([label, count]) => `${label}: ${count}`).join(' · ');
      if (distribution) lines.push(`📚 科目分布：${distribution}`);
      if (payload?.suggestion) lines.push('💡 包含 AI 周建议');
      if (!normalized.length) lines.push('⚠️ 未检测到可导入的周计划任务，请确认 JSON 格式正确');
      prev.innerHTML = `<div style="background:var(--bg-elev);padding:10px;border-radius:var(--radius);border:1px solid var(--line-light);">${lines.join('<br>')}</div>`;
    } catch(e) {
      prev.innerHTML = `<div style="color:var(--red);padding:8px;">❌ JSON 格式错误：${e.message}</div>`;
    }
    return;
  }

  try {
    const clean = sanitizeJSON(raw);
    const data = JSON.parse(clean);
    let lines = [];
    if (data.passages?.length) lines.push(`📖 Passages: ${data.passages.length} 个`);
    if (data.grammarQuestions?.length) lines.push(`📝 Grammar 题: ${data.grammarQuestions.length} 题`);
    if (data.vocabularyQuestions?.length) lines.push(`📝 Vocabulary 题: ${data.vocabularyQuestions.length} 题`);
    if (data.wordBook?.length) lines.push(`📚 Word Book: ${data.wordBook.length} 个单词`);
    if (data.synonymLibrary?.length) lines.push(`🔗 Synonyms: ${data.synonymLibrary.length} 组`);
    if (data.resources?.length) lines.push(`📁 Study Resource: ${data.resources.length} 条`);
    if (!lines.length) lines.push('⚠️ 未检测到可导入的数据，请确认 JSON 格式正确');
    prev.innerHTML = `<div style="background:var(--bg-elev);padding:10px;border-radius:var(--radius);border:1px solid var(--line-light);">${lines.join('<br>')}</div>`;
  } catch(e) {
    prev.innerHTML = `<div style="color:var(--red);padding:8px;">❌ JSON 格式错误：${e.message}</div>`;
  }
}

function getImportedQuizSetName(data, passageId, importedSet, index = 0) {
  const importedPassage = Array.isArray(data?.passages) ? data.passages.find(p => !passageId || p.id === passageId) || data.passages[index] || data.passages[0] : null;
  const base = (importedSet && importedSet.name && importedSet.name !== '1') ? importedSet.name : (importedPassage?.customName || importedPassage?.title || '');
  if (base && String(base).trim()) return String(base).trim().slice(0, 42);
  const count = getQuizSets(passageId).length + index + 1;
  return 'Text ' + count;
}

function uniqueQuizSetName(base, passageId, usedNames) {
  const existingNames = new Set(getQuizSets(passageId).map(qs => String(qs.name || '').trim()));
  let name = String(base || 'Text').trim() || 'Text';
  let n = 2;
  while (existingNames.has(name) || usedNames.has(name)) {
    name = `${base} ${n++}`;
  }
  usedNames.add(name);
  return name;
}

function confirmAIImport(tab) {
  const raw = document.getElementById('aiJsonPasteArea')?.value.trim();
  if (!raw) { toast('请先粘贴 JSON'); return; }
  let data;
  try {
    const clean = sanitizeJSON(raw);
    data = normalizeQuizImportPayload(JSON.parse(clean));
  } catch(e) {
    const msg = e.message || '';
    let hint = '⚠️ JSON 解析失败。原因：explanation 需要输出为数组格式。';
    if (msg.includes('Unexpected token')) {
      hint += ' 检查是否有未转义的引号或换行。';
    } else if (msg.includes('Bad control character')) {
      hint += ' 字符串中包含未转义的换行符。';
    }
    const finalMsg = 'JSON 格式错误：' + msg + '。' + hint;
    toast(finalMsg);
    const preview = document.getElementById('aiImportPreview');
    if (preview) preview.textContent = finalMsg;
    return;
  }

  const mode = document.querySelector('input[name="aiImportMode"]:checked')?.value || 'merge';
  const overwrite = mode === 'overwrite';

  if (overwrite && !confirm('覆盖模式会替换现有数据，确认继续？')) return;

  // 在 prepareQuizSetImport 之前检测并询问
  if (tab === 'quiz' || tab === 'passage') {
    const targetPassageId = document.getElementById('aiTargetPassage')?.value;
    const hasQuizSets = Array.isArray(data.quizSets) && data.quizSets.length > 0;
    if (!hasQuizSets && mode !== 'overwrite' && targetPassageId) {
      const totalQuestions = (data.grammarQuestions?.length || 0) + (data.vocabularyQuestions?.length || 0);
      const confirmMsg = `检测到导入的 JSON 没有包含 Quiz Set 分组信息。\n\n本次共 ${totalQuestions} 道题目，将自动放入一个全新的 Quiz Set 中。\n\n是否继续？`;
      if (!confirm(confirmMsg)) {
        toast('已取消导入');
        return;
      }
    }
  }

  try {
    if (tab === 'quiz' || tab === 'passage') {
      // 获取目标板块
      const targetPassageId = document.getElementById('aiTargetPassage')?.value;
      const forcePassage = document.getElementById('aiForcePassage')?.checked !== false;

      const hasMultipleQuizSets = Array.isArray(data.quizSets) && data.quizSets.length > 1;

      if (hasMultipleQuizSets) {
        // ===== 核心修复：JSON 已包含多个 quizSet 时，保留原始分组，不强制合并到 Imported Set =====
        const grammar = Array.isArray(data.grammarQuestions) ? data.grammarQuestions : [];
        const vocab = Array.isArray(data.vocabularyQuestions) ? data.vocabularyQuestions : [];
        const importedSets = data.quizSets;

        if (targetPassageId && forcePassage) {
          // 强制板块只修正 passageId，不改变 quizSet 的 id/name，也不新增 JSON 里的 passages。
          data.passages = [];
        }

        importedSets.forEach((qs, index) => {
          if (!qs.id) qs.id = uid('qs');
          qs.passageId = (targetPassageId && forcePassage) ? targetPassageId : (qs.passageId || targetPassageId || quizState.currentPassageId);
          if (!qs.name || !String(qs.name).trim()) qs.name = 'Test ' + (index + 1);
          if (!qs.createdAt) qs.createdAt = Date.now();
        });

        const firstSetId = importedSets[0]?.id;
        const ensureImportedSet = (setId, fallbackIndex) => {
          let targetSet = importedSets.find(qs => qs.id === setId);
          if (!targetSet) {
            targetSet = {
              id: setId || uid('qs'),
              passageId: targetPassageId || quizState.currentPassageId,
              name: 'Test ' + (fallbackIndex + 1),
              createdAt: Date.now()
            };
            importedSets.push(targetSet);
          }
          if (targetPassageId && forcePassage) targetSet.passageId = targetPassageId;
          if (!targetSet.name || !String(targetSet.name).trim()) targetSet.name = 'Test ' + (fallbackIndex + 1);
          return targetSet;
        };

        const grammarBySet = {};
        const vocabBySet = {};
        grammar.forEach(q => {
          const set = q.quizSetId || firstSetId;
          if (!grammarBySet[set]) grammarBySet[set] = [];
          grammarBySet[set].push(q);
        });
        vocab.forEach(q => {
          const set = q.quizSetId || firstSetId;
          if (!vocabBySet[set]) vocabBySet[set] = [];
          vocabBySet[set].push(q);
        });

        Object.keys(grammarBySet).forEach((setId, index) => {
          const targetSet = ensureImportedSet(setId, index);
          grammarBySet[setId].forEach(q => {
            q.passageId = targetSet.passageId || targetPassageId;
            q.quizSetId = targetSet.id;
            if (!q.id || quizState.grammarQuestions.find(x => x.id === q.id)) q.id = uid('g');
            quizState.grammarQuestions.push(q);
          });
        });

        Object.keys(vocabBySet).forEach((setId, index) => {
          const targetSet = ensureImportedSet(setId, index);
          vocabBySet[setId].forEach(q => {
            q.passageId = targetSet.passageId || targetPassageId;
            q.quizSetId = targetSet.id;
            if (!q.id || quizState.vocabularyQuestions.find(x => x.id === q.id)) q.id = uid('v');
            quizState.vocabularyQuestions.push(q);
          });
        });

        importedSets.forEach(qs => {
          qs.passageId = (targetPassageId && forcePassage) ? targetPassageId : (qs.passageId || targetPassageId || quizState.currentPassageId);
          const existing = quizState.quizSets.find(x => x.id === qs.id);
          if (!existing) {
            quizState.quizSets.push(qs);
          } else if (qs.name && qs.name !== 'Imported Set') {
            existing.name = qs.name;
            if (qs.passageId) existing.passageId = qs.passageId;
          }
        });

        const activePassageId = targetPassageId || importedSets[0]?.passageId;
        if (activePassageId && importedSets.length) {
          quizState.currentQuizSetId = quizState.currentQuizSetId || {};
          quizState.activeQuizSetIds = quizState.activeQuizSetIds || {};
          quizState.currentQuizSetId[activePassageId] = importedSets[0].id;
          quizState.activeQuizSetIds[activePassageId] = importedSets.map(qs => qs.id);
        }

      } else if (targetPassageId && forcePassage) {
        // ===== 强制使用选中板块：仅在 JSON 没有多个 quizSet 时才合并 =====
        data.passages = []; // 清空，防止新增板块

        const grammar = Array.isArray(data.grammarQuestions) ? data.grammarQuestions : [];
        const vocab = Array.isArray(data.vocabularyQuestions) ? data.vocabularyQuestions : [];
        const allQuestions = grammar.concat(vocab);

        if (mode === 'merge') {
          // 合并模式：全部题目进当前 Quiz Set
          const targetSet = currentQuizSet() || ensureDefaultQuizSet(targetPassageId);
          allQuestions.forEach(q => {
            q.passageId = targetPassageId;
            q.quizSetId = targetSet.id;
            q.id = uid(grammar.includes(q) ? 'g' : 'v');
          });
          data.quizSets = [];

        } else {
          // new_set 模式（默认）：自动创建一个新 Quiz Set，名称避免重名
          const existingSets = getQuizSets(targetPassageId);
          const usedNames = new Set(existingSets.map(qs => String(qs.name || '').trim()));
          let baseName = 'Imported Set';
          let finalName = baseName;
          let counter = 1;
          while (usedNames.has(finalName)) {
            finalName = `${baseName} ${counter++}`;
          }
          const newSet = { id: uid('qs'), passageId: targetPassageId, name: finalName, createdAt: Date.now() };
          allQuestions.forEach(q => {
            q.passageId = targetPassageId;
            q.quizSetId = newSet.id;
            q.id = uid(grammar.includes(q) ? 'g' : 'v');
          });
          data.quizSets = [newSet];
          data.currentQuizSetId = { [targetPassageId]: newSet.id };
          data.activeQuizSetIds = { [targetPassageId]: [newSet.id] };
        }

        // 导入 quizSets（强制模式只 push，不 overwrite，避免破坏其他板块数据）
        if (data.quizSets?.length) {
          data.quizSets.forEach(qs => {
            if (!quizState.quizSets.find(x => x.id === qs.id)) quizState.quizSets.push(qs);
          });
        }

        // 导入题目
        grammar.forEach(q => {
          if (quizState.grammarQuestions.find(x => x.id === q.id)) q.id = uid('g');
          quizState.grammarQuestions.push(q);
        });
        vocab.forEach(q => {
          if (quizState.vocabularyQuestions.find(x => x.id === q.id)) q.id = uid('v');
          quizState.vocabularyQuestions.push(q);
        });

        if (data.currentQuizSetId) quizState.currentQuizSetId = Object.assign(quizState.currentQuizSetId || {}, data.currentQuizSetId);
        if (data.activeQuizSetIds) quizState.activeQuizSetIds = Object.assign(quizState.activeQuizSetIds || {}, data.activeQuizSetIds);

      } else {
        // ===== 非强制模式：走原有逻辑（含 overwrite） =====

        // passages
        if (data.passages?.length) {
          if (overwrite) { quizState.passages = data.passages; }
          else { data.passages.forEach(p => {
            if (!p.id) p.id = uid('sec');
            if (!quizState.passages.find(x => x.id === p.id)) quizState.passages.push(p);
          }); }
        }

        // quizSets
        if (data.quizSets?.length) {
          if (overwrite) { quizState.quizSets = data.quizSets; }
          else { data.quizSets.forEach(qs => {
            if (!qs.id) qs.id = uid('qs');
            if (!quizState.quizSets.find(x => x.id === qs.id)) quizState.quizSets.push(qs);
          }); }
        }
        // auto-create quizSets for passages without one
        quizState.passages.forEach(p => {
          if (!quizState.quizSets.some(qs => qs.passageId === p.id)) {
            quizState.quizSets.push({ id: uid('qs'), passageId: p.id, name: '1', createdAt: Date.now() });
          }
        });

        // questions
        if (data.grammarQuestions?.length) {
          if (overwrite) { quizState.grammarQuestions = data.grammarQuestions; }
          else { data.grammarQuestions.forEach(q => {
            if (!q.id) q.id = uid('g');
            if (quizState.grammarQuestions.find(x => x.id === q.id)) q.id = uid('g');
            quizState.grammarQuestions.push(q);
          }); }
        }
        if (data.vocabularyQuestions?.length) {
          if (overwrite) { quizState.vocabularyQuestions = data.vocabularyQuestions; }
          else { data.vocabularyQuestions.forEach(q => {
            if (!q.id) q.id = uid('v');
            if (quizState.vocabularyQuestions.find(x => x.id === q.id)) q.id = uid('v');
            quizState.vocabularyQuestions.push(q);
          }); }
        }

        if (data.currentQuizSetId) quizState.currentQuizSetId = Object.assign(quizState.currentQuizSetId || {}, data.currentQuizSetId);
        if (data.activeQuizSetIds) quizState.activeQuizSetIds = Object.assign(quizState.activeQuizSetIds || {}, data.activeQuizSetIds);
      }
    }
    if (tab === 'wordbook' || (!tab && data.wordBook?.length)) {
      const wb = data.wordBook || [];
      if (overwrite) { quizState.wordBook = wb; }
      else { wb.forEach(w => { if (!w.id) w.id = uid('wbk'); if (!quizState.wordBook.find(x=>x.text===w.text)) quizState.wordBook.push(w); }); }
    }
    if (tab === 'synonyms' || (!tab && data.synonymLibrary?.length)) {
      const sl = data.synonymLibrary || [];
      if (overwrite) { quizState.synonymLibrary = sl; }
      else { sl.forEach(g => { if (!quizState.synonymLibrary.find(x=>x.groupName===g.groupName)) quizState.synonymLibrary.push(g); }); }
    }
    if (tab === 'study_resource' || (!tab && data.resources?.length)) {
      const sr = data.resources || [];
      if (overwrite) { resources = sr; }
      else { sr.forEach(r => { if (!r.id) r.id = uid('r'); if (!resources.find(x=>x.id===r.id)) resources.push(r); }); }
      saveResState();
    }
    if (data.currentQuizSetId) quizState.currentQuizSetId = Object.assign(quizState.currentQuizSetId || {}, data.currentQuizSetId);
    if (data.activeQuizSetIds) quizState.activeQuizSetIds = Object.assign(quizState.activeQuizSetIds || {}, data.activeQuizSetIds);
    if (!quizState.currentPassageId && quizState.passages.length) quizState.currentPassageId = quizState.passages[0].id;
    saveQuiz(); render();
    toast(mode === 'new_set' ? '✅ 已导入到新的 Quiz Set！' : '✅ 导入成功！');
    closeSheet('genericSheet');
  } catch(e) {
    toast('导入出错：' + e.message);
  }
}

async function cloudUpload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token){alert('Token required');return;}
  try{
    toast('Uploading...');
    const body={description:'Quiz Backup',public:false,files:{[filename]:{content:JSON.stringify({version:'2.0',schemaVersion:QUIZ_SCHEMA,exportedAt:Date.now(),passages:quizState.passages,quizSets:quizState.quizSets,grammarQuestions:quizState.grammarQuestions,vocabularyQuestions:quizState.vocabularyQuestions,wordBook:quizState.wordBook,synonymLibrary:quizState.synonymLibrary,highlights:quizState.highlights,wrongBook:quizState.wrongBook,wordMemory:quizState.wordMemory,answerLog:quizState.answerLog,currentPassageId:quizState.currentPassageId,currentQuizSetId:quizState.currentQuizSetId},null,2)}}};
    let url='https://api.github.com/gists';let method='POST';
    if(gistId){url+='/'+gistId;method='PATCH';}
    const res=await fetch(url,{method,headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    quizMeta.gist={token,gistId:data.id||gistId,filename,lastSyncTs:Date.now()};
    try{localStorage.setItem(QUIZ_META_KEY,JSON.stringify(quizMeta));}catch(_){}
    toast('OK Uploaded');
  }catch(e){alert('Upload failed: '+e.message);}
}

async function cloudDownload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token||!gistId){alert('Token and Gist ID required');return;}
  if(!confirm('Overwrite local data with cloud?')) return;
  try{
    toast('Downloading...');
    const res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token}});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    const file=data.files?.[filename]||Object.values(data.files||{})[0];
    if(!file?.content) throw new Error('No data file');
    importQuizData(JSON.parse(file.content));
    toast('OK Downloaded');closeSheet('genericSheet');
  }catch(e){alert('Download failed: '+e.message);}
}

function normalizeRoadmapStatus(status) {
  const s = String(status || '').toLowerCase().trim().replace(/[\s-]+/g, '_');
  if (['completed','complete','done','finished','finish'].includes(s)) return 'completed';
  if (['in_progress','progress','started','pending','ongoing'].includes(s)) return 'in_progress';
  return 'not_started';
}
function roadmapStatusLabel(status) {
  if (status === 'completed') return 'Completed';
  if (status === 'in_progress') return 'In Progress';
  return 'Not Started';
}
function roadmapSubjectLabel(key) { return customSubjects[key]?.label || key || 'Subject'; }
function roadmapSubjectOptions(selected) {
  return getSidebarSubjectKeys().map(k => `<option value="${k}" ${k===selected?'selected':''}>${esc(roadmapSubjectLabel(k))}</option>`).join('');
}
function detectSubjectKey(text) {
  const q = String(text || '').toLowerCase().replace(/[^a-z\u4e00-\u9fff]/g, '');
  if (!q) return '';
  const aliases = { english:['english','eng'], chinese:['chinese','中文','语文'], politic:['politics','politic','政治'], collegeEnglish:['collegeenglish','cet','大学英语'] };
  for (const k of getSidebarSubjectKeys()) {
    const label = (customSubjects[k]?.label || k).toLowerCase().replace(/[^a-z\u4e00-\u9fff]/g, '');
    if (q === label || q.includes(label) || label.includes(q)) return k;
  }
  for (const [k, arr] of Object.entries(aliases)) if (arr.some(a => q === a || q.includes(a))) return k;
  return '';
}
function parseMonthNameDate(str) {
  const months = {jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,jul:7,july:7,aug:8,august:8,sep:9,sept:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
  const s = String(str || '').trim();
  let m = s.match(/\b([A-Za-z]+)\s*[–—-]\s*([A-Za-z]+)\s+(20\d{2}|19\d{2})\b/);
  if (m && months[m[1].toLowerCase()]) return `${m[3]}-${String(months[m[1].toLowerCase()]).padStart(2,'0')}-01`;
  m = s.match(/\b([A-Za-z]+)\s+(20\d{2}|19\d{2})\b/);
  if (m && months[m[1].toLowerCase()]) return `${m[2]}-${String(months[m[1].toLowerCase()]).padStart(2,'0')}-01`;
  m = s.match(/\b(20\d{2}|19\d{2})[\.\/-](\d{1,2})(?:[\.\/-](\d{1,2}))?\b/);
  if (m) return `${m[1]}-${String(parseInt(m[2])).padStart(2,'0')}-${String(parseInt(m[3]||'1')).padStart(2,'0')}`;
  m = s.match(/\b(\d{1,2})[\.\/-](\d{1,2})[\.\/-](20\d{2}|19\d{2})\b/);
  if (m) return `${m[3]}-${String(parseInt(m[1])).padStart(2,'0')}-${String(parseInt(m[2])).padStart(2,'0')}`;
  return '';
}
function normalizePlanDate(dateStr) {
  if (!dateStr) return '';
  const s = String(dateStr).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d{4}-\d{2}$/.test(s)) return s + '-01';
  return parseMonthNameDate(s) || '';
}
function formatDate(dateStr) {
  if (!dateStr) return 'Not set';
  const d = new Date(dateStr + 'T00:00:00');
  if (Number.isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function formatMilestoneRange(start, finish) {
  if (!start && !finish) return 'Dates not set';
  if (!start) return `Until ${formatDate(finish)}`;
  if (!finish) return `From ${formatDate(start)}`;
  const s = new Date(start + 'T00:00:00');
  const f = new Date(finish + 'T00:00:00');
  if (Number.isNaN(s.getTime()) || Number.isNaN(f.getTime())) return `${formatDate(start)} – ${formatDate(finish)}`;
  const sameYear = s.getFullYear() === f.getFullYear();
  const sameMonth = sameYear && s.getMonth() === f.getMonth();
  if (sameMonth) return s.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  const left = s.toLocaleDateString('en-US', { month:'long' });
  const right = f.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  return sameYear ? `${left} – ${right}` : `${formatDate(start)} – ${formatDate(finish)}`;
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const t = new Date(dateStr + 'T00:00:00');
  const n = new Date(); n.setHours(0,0,0,0);
  if (Number.isNaN(t.getTime())) return null;
  return Math.ceil((t - n) / 86400000);
}
function normalizeRoadmapMilestones() {
  roadmapMilestones = (roadmapMilestones || []).map((m, idx) => ({
    id: m.id || uid('rm'),
    title: m.title || `Milestone ${idx + 1}`,
    startDate: normalizePlanDate(m.startDate || m.start || ''),
    targetFinishDate: normalizePlanDate(m.targetFinishDate || m.finishDate || m.finish || m.endDate || ''),
    status: normalizeRoadmapStatus(m.status),
    notes: m.notes || '',
    order: typeof m.order === 'number' ? m.order : idx,
    createdAt: m.createdAt || todayISO()
  }));
  if (!roadmapMilestones.length) roadmapMilestones = JSON.parse(JSON.stringify(sampleRoadmapMilestones));
}
function getOrderedMilestones() {
  normalizeRoadmapMilestones();
  return [...roadmapMilestones].sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
}
function findMilestoneForDate(dateStr) {
  const date = normalizePlanDate(dateStr);
  const milestones = getOrderedMilestones();
  if (!date) return milestones[0]?.id || '';
  const exact = milestones.find(m => (!m.startDate || m.startDate <= date) && (!m.targetFinishDate || date <= m.targetFinishDate));
  if (exact) return exact.id;
  const after = milestones.find(m => m.startDate && date < m.startDate);
  return after?.id || milestones[milestones.length - 1]?.id || '';
}
function normalizeRoadmapPlans() {
  normalizeRoadmapMilestones();
  roadmapPlans = (roadmapPlans || []).map((p, idx) => {
    const startDate = normalizePlanDate(p.startDate || p.start || '');
    const targetFinishDate = normalizePlanDate(p.targetFinishDate || p.finishDate || p.finish || p.endDate || '');
    const subject = customSubjects[p.subject] ? p.subject : detectSubjectKey(p.subject || p.subjectLabel || '') || appState.currentSubject || 'english';
    let milestoneId = p.milestoneId;
    if (!roadmapMilestones.find(m => m.id === milestoneId)) milestoneId = findMilestoneForDate(startDate || targetFinishDate);
    const sp = (p.startProgress !== undefined && p.startProgress !== null && p.startProgress !== '') ? Number(p.startProgress) : 0;
    const tp = (p.targetProgress !== undefined && p.targetProgress !== null && p.targetProgress !== '') ? Number(p.targetProgress) : 1;
    const cp = (p.currentProgress !== undefined && p.currentProgress !== null && p.currentProgress !== '') ? Number(p.currentProgress) : sp;
    const un = p.unit || 'pages';
    return {
      id: p.id || uid('rp'), milestoneId, subject,
      title: p.title || 'Untitled Plan', startDate, targetFinishDate,
      status: normalizeRoadmapStatus(p.status), notes: p.notes || '',
      order: typeof p.order === 'number' ? p.order : idx,
      createdAt: p.createdAt || todayISO(),
      startProgress: sp, targetProgress: tp, currentProgress: cp, unit: un
    };
  });
}
function normalizeRoadmapExams() {
  roadmapExams = (roadmapExams || []).map((e, idx) => ({
    id: e.id || uid('rex'),
    subject: customSubjects[e.subject] ? e.subject : detectSubjectKey(e.subject || e.subjectLabel || '') || appState.currentSubject || 'english',
    title: e.title || 'Exam', examDate: normalizePlanDate(e.examDate || e.targetDate || e.date || ''),
    notes: e.notes || '', createdAt: e.createdAt || todayISO(), order: typeof e.order === 'number' ? e.order : idx
  }));
}
function getRoadmapOrderedPlans() {
  normalizeRoadmapPlans();
  return [...roadmapPlans].sort((a,b) => (a.order ?? 0) - (b.order ?? 0));
}
function getCurrentMilestoneId() {
  const today = todayISO();
  const milestones = getOrderedMilestones();
  return (milestones.find(m => m.startDate && m.targetFinishDate && m.startDate <= today && today <= m.targetFinishDate)
    || milestones.find(m => m.status === 'in_progress')
    || milestones.find(m => m.startDate && today < m.startDate)
    || milestones[0] || {}).id || '';
}
function ensureMilestoneExpanded() {
  const currentId = getCurrentMilestoneId();
  if (!roadmapMilestoneExpanded || typeof roadmapMilestoneExpanded !== 'object') {
    roadmapMilestoneExpanded = {};
    getOrderedMilestones().forEach(m => { roadmapMilestoneExpanded[m.id] = (m.id === currentId); });
  }
  getOrderedMilestones().forEach(m => { if (typeof roadmapMilestoneExpanded[m.id] !== 'boolean') roadmapMilestoneExpanded[m.id] = (m.id === currentId); });
}
function toggleMilestone(id) { ensureMilestoneExpanded(); roadmapMilestoneExpanded[id] = !roadmapMilestoneExpanded[id]; saveRoadmap(); render(); }
function getRoadmapPlanProgress(plan) {
  const title = normTitle(plan.title);
  const lrMatches = learningItems.filter(lr => (!plan.subject || lr.subject === plan.subject) && title && (normTitle(lr.title).includes(title) || title.includes(normTitle(lr.title))));
  const exMatches = exercises.filter(ex => (!plan.subject || ex.subject === plan.subject) && title && (normTitle(ex.title || ex.name).includes(title) || title.includes(normTitle(ex.title || ex.name))));
  const vals = [];
  lrMatches.forEach(lr => vals.push(lr.totalPages > 0 ? Math.min(100, Math.round((lr.currentPage || 0) / lr.totalPages * 100)) : (lr.completed ? 100 : 0)));
  exMatches.forEach(ex => {
    if (ex.subtasks && ex.subtasks.length) vals.push(Math.round(ex.subtasks.filter(st=>st.completed).length / ex.subtasks.length * 100));
    else vals.push(ex.status === 'completed' ? 100 : (ex.status === 'pending' ? 50 : 0));
  });
  if (vals.length) return { percent: Math.round(vals.reduce((a,b)=>a+b,0)/vals.length), synced:true };
  if (plan && plan.targetProgress !== undefined && plan.targetProgress !== null && plan.targetProgress !== '' && Number(plan.targetProgress) > Number(plan.startProgress || 0)) {
    const sp = Number(plan.startProgress || 0);
    const tp = Number(plan.targetProgress || 1);
    const cp = (plan.currentProgress !== undefined && plan.currentProgress !== null && plan.currentProgress !== '') ? Number(plan.currentProgress) : sp;
    const pct = Math.round(((cp - sp) / (tp - sp)) * 100);
    return { percent: Math.max(0, Math.min(100, pct)), synced:false };
  }
  return { percent: plan.status === 'completed' ? 100 : (plan.status === 'in_progress' ? 50 : 0), synced:false };
}
function getMilestonePlans(msId) { return getRoadmapOrderedPlans().filter(p => p.milestoneId === msId); }
function getMilestoneProgress(ms) {
  const plans = getMilestonePlans(ms.id);
  if (plans.length) return Math.round(plans.reduce((sum,p)=>sum+getRoadmapPlanProgress(p).percent,0)/plans.length);
  return ms.status === 'completed' ? 100 : (ms.status === 'in_progress' ? 50 : 0);
}

function updateRoadmapPlanField(planId, field, value, noRender) {
  const plan = safeArray(roadmapPlans).find(p => p.id === planId);
  if (plan) {
    plan[field] = value;
    if (field === 'startProgress' || field === 'targetProgress') {
      const sp = Number(plan.startProgress || 0);
      const tp = Number(plan.targetProgress || 1);
      const cp = (plan.currentProgress !== undefined && plan.currentProgress !== null && plan.currentProgress !== '') ? Number(plan.currentProgress) : sp;
      plan.currentProgress = Math.max(sp, Math.min(tp, cp));
      if (plan.currentProgress >= tp && tp > sp) plan.status = 'completed';
      else if (plan.status === 'completed' && plan.currentProgress < tp) plan.status = 'in_progress';
    }
    saveRoadmap();
    if (!noRender) render();

      const planStartDate = normalizePlanDate(sItem.startDate || startDate || '');

      const notesArr = [];

      if (targetStr && !planFinishDate) notesArr.push(`Target: ${targetStr}`);
      if (sItem.notes) notesArr.push(sItem.notes);
      const planNotes = notesArr.join(' · ');

      const tasksArr = (Array.isArray(sItem.tasks) ? sItem.tasks : (sItem.task ? [sItem.task] : (sItem.title ? [sItem.title] : (rawSubj ? [rawSubj] : ['Untitled Task'])))).map(t => (t && typeof t === 'object') ? (t.title || t.name || t.label || 'Untitled Task') : t);

    });

    const msPlans = newPlans.filter(p => p.milestoneId === msId);
    if (msPlans.length > 0) {
      if (msPlans.every(p => p.status === 'completed')) msStatus = 'completed';

    }

      status: msStatus,

function parseAIStudyPlan(raw) {
  const text=String(raw||'').replace(/\r/g,'').trim(); const warnings=[]; if(!text)return{milestones:[],plans:[],warnings:['Paste a study plan before importing.']};
  const blocks=text.split(/\n\s*(?:-{3,}|—{3,}|_{3,})\s*\n/g).map(b=>b.trim()).filter(Boolean);
  const milestones=[]; const plans=[];
  blocks.forEach((block,idx)=>{
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean); let curMilestone=null; let subject='', title='', startDate='', targetFinishDate='', status='not_started', notes=[]; let inNotes=false;
    lines.forEach((line,li)=>{ const clean=line.replace(/^[-*•]\s*/,'').trim(); const kv=clean.match(/^([^:：]+)\s*[:：]\s*(.*)$/); const key=kv?kv[1].toLowerCase().trim():''; const val=kv?kv[2].trim():'';
      if(inNotes && (!kv || !/^(milestone|phase|subject|title|start|finish|target|end|status|notes?)$/i.test(key))){notes.push(clean);return;}
      if(kv){
        if(key.includes('milestone')||key.includes('phase')) curMilestone = val || clean.replace(/^Milestone\s*\d*\s*[:：-]?\s*/i,'') || `Imported Milestone ${idx+1}`;
        else if(key.includes('subject')) subject=detectSubjectKey(val)||subject;
        else if(key.includes('title')||key.includes('plan')) title=val||title;
        else if(key.includes('start')) startDate=normalizePlanDate(val)||startDate;
        else if(key.includes('finish')||key.includes('target')||key.includes('end')) targetFinishDate=normalizePlanDate(val)||targetFinishDate;
        else if(key.includes('status')) status=normalizeRoadmapStatus(val);
        else if(key.includes('note')){inNotes=true;if(val)notes.push(val);}
      } else {
        const msMatch=clean.match(/^Milestone\s*\d*\s*(.*)$/i); if(msMatch){curMilestone=msMatch[1].trim()||`Imported Milestone ${idx+1}`; return;}
        const maybe=detectSubjectKey(clean); if(!subject&&maybe&&clean.length<40)subject=maybe; else if(!title && !curMilestone)title=clean; else if(!title && curMilestone && li>0)title=clean; else notes.push(clean);
      }
    });
    if(curMilestone) milestones.push({id:uid('rm'),title:curMilestone,startDate,targetFinishDate,status,notes:notes.join('\n').trim(),order:0,createdAt:todayISO()});
    if(title){ if(!subject){subject=appState.currentSubject||'english'; warnings.push(`Block ${idx+1}: Subject not recognized; assigned to ${roadmapSubjectLabel(subject)}.`);} plans.push({id:uid('rp'),subject,title,startDate,targetFinishDate,status,notes:notes.join('\n').trim(),order:0,createdAt:todayISO()}); }
    if(!curMilestone && !title) warnings.push(`Block ${idx+1}: No milestone or plan title recognized.`);
  });
  return {milestones,plans,warnings};
}
function applyImportedRoadmap(parsed, mode) {
  if(mode==='replace'){roadmapMilestones=[]; roadmapPlans=[];}
  let msOrder=roadmapMilestones.length?Math.max(...roadmapMilestones.map(m=>m.order||0))+1:0;
  const importedMilestones=[];
  parsed.milestones.forEach((m,i)=>{const item={...m,id:uid('rm'),order:msOrder+i}; roadmapMilestones.push(item); importedMilestones.push(item);});
  normalizeRoadmapMilestones();
  let pOrder=roadmapPlans.length?Math.max(...roadmapPlans.map(p=>p.order||0))+1:0;
  parsed.plans.forEach((p,i)=>{ const milestoneId = importedMilestones.find(m => p.startDate && (!m.startDate || m.startDate<=p.startDate) && (!m.targetFinishDate || p.startDate<=m.targetFinishDate))?.id || findMilestoneForDate(p.startDate||p.targetFinishDate); roadmapPlans.push({...p,id:uid('rp'),milestoneId,order:pOrder+i}); });
  normalizeRoadmapPlans(); saveRoadmap(); closeSheet('genericSheet'); render(); toast(mode==='replace'?'Roadmap replaced':'Roadmap merged');
}

function normalizeResourceOrders(shouldSave = false) {
  if (!Array.isArray(resources)) resources = [];

  const nextOrderBySubject = {};
  let changed = false;

  resources.forEach(r => {
    const subjectKey = r.subject || '__general';
    if (nextOrderBySubject[subjectKey] === undefined) nextOrderBySubject[subjectKey] = 0;

    const order = Number(r.order);
    if (r.order === undefined || r.order === null || Number.isNaN(order)) {
      r.order = nextOrderBySubject[subjectKey]++;
      changed = true;
    } else {
      nextOrderBySubject[subjectKey] = Math.max(nextOrderBySubject[subjectKey], order + 1);
    }
  });

  if (changed && shouldSave) saveResState();
  return changed;
}

function sortResourcesByOrder(list) {
  normalizeResourceOrders(false);
  return [...(list || [])].sort((a, b) => {
    const ao = Number.isFinite(Number(a.order)) ? Number(a.order) : 0;
    const bo = Number.isFinite(Number(b.order)) ? Number(b.order) : 0;
    return ao - bo;
  });
}
