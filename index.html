// Resource Card — Compact Grid Card
function resourceCard(r) {
  if (r.currentPage === undefined || r.currentPage === null || r.currentPage === '') r.currentPage = 0;
  if (r.totalPages === undefined || r.totalPages === null || r.totalPages === '' || Number(r.totalPages) <= 0) r.totalPages = 100;
  const cp = Number(r.currentPage || 0);
  const tp = Number(r.totalPages || 100);
  let resPct = tp > 0 ? Math.round((cp / tp) * 100) : 0;
  if (r.status === 'completed' || cp >= tp) resPct = 100;
  resPct = Math.max(0, Math.min(100, resPct));

  const isDone = r.status==='completed';
  const isNotStarted = r.status==='not_started'||(r.startDate&&r.startDate>todayISO());
  const pathText = String(r.path || '');
  const pathLower = pathText.toLowerCase().trim();
  const pathBase = pathLower.split(/[?#]/)[0];
  const rawType = String(r.type || '').toLowerCase().trim();
  let fileType = 'OTHER';
  if (rawType.includes('pdf') || pathBase.endsWith('.pdf')) fileType = 'PDF';
  else if (rawType.includes('doc') || pathBase.endsWith('.docx') || pathBase.endsWith('.doc')) fileType = 'DOCX';
  else if (rawType.includes('video') || /\.(mp4|mov|m4v|avi|mkv|webm)$/.test(pathBase) || /(youtube\.com|youtu\.be|vimeo\.com)/.test(pathLower)) fileType = 'VIDEO';
  else if (rawType.includes('folder') || /[\\/]$/.test(pathText) || (!/\.[a-z0-9]{2,6}$/.test(pathBase) && /^[a-z]:[\\/]/i.test(pathText))) fileType = 'FOLDER';
  else if (rawType.includes('web') || /^https?:\/\//.test(pathLower)) fileType = 'WEB';
  else if (rawType.includes('link') || /^[a-z]+:\/\//.test(pathLower)) fileType = 'LINK';

  const subjectLabel = customSubjects[r.subject]?.label || r.subject || 'General';
  const tags = Array.isArray(r.tags) ? r.tags.filter(Boolean) : [];
  const dateVal = r.createdAt || r.startDate || '';
  const dateText = dateVal ? `${r.createdAt ? 'Added' : 'Start'} ${formatDate(dateVal)}` : 'Added date not set';
  const safePath = encodeURIComponent(pathText);

  return `<div class="res-card subtask-draggable ${isDone?'completed':''}" data-resid="${r.id}">
    <div class="res-resource-main-row">
      <div class="st-drag-grip" title="长按拖拽排序"><span></span><span></span><span></span></div>
      <span class="res-file-badge type-${fileType.toLowerCase()}">${fileType}</span>
      <div class="res-title" title="${esc(r.title)}">${esc(r.title)}</div>
      <div class="res-resource-controls">
        <div class="res-check ${isDone?'checked':''}" onclick="toggleResourceStatus('${r.id}')" title="Toggle complete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L19 7"/></svg>
        </div>
        <div class="res-resource-menu-wrap">
          <button class="res-more-btn" type="button" aria-label="Resource actions">⋯</button>
          <div class="res-resource-menu" role="menu">
            ${pathText ? `<a class="res-menu-item" href="${esc(pathText)}" target="_blank" rel="noopener">Open File</a>` : `<span class="res-menu-item disabled">Open File</span>`}
            ${pathText ? `<details class="res-path-reveal"><summary>Reveal Path</summary><div class="res-menu-path">${esc(pathText)}</div></details>` : `<span class="res-menu-item disabled">Reveal Path</span>`}
            ${pathText ? `<button class="res-menu-item" onclick="if(navigator.clipboard){navigator.clipboard.writeText(decodeURIComponent('${safePath}')).then(()=>toast('Path copied')).catch(()=>toast('Copy failed'));}else{toast('Copy failed');}">Copy Path</button>` : `<span class="res-menu-item disabled">Copy Path</span>`}
            <button class="res-menu-item" onclick="openEditResourceModal('${r.id}')">Edit</button>
            <button class="res-menu-item danger" onclick="deleteResource('${r.id}')">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 第二行：科目标识与 Pages 控制行合并 -->
    <div class="res-resource-meta-row" style="display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-top: 6px;">
      <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
        ${tags.length ? `<div class="res-tags">${tags.map(t=>`<span class="pill-tag">${esc(t)}</span>`).join('')}</div><span class="res-meta-dot">•</span>` : ''}
        <span class="res-subject-label">${esc(subjectLabel)}</span>
      </div>
      <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 11px; color: var(--ink-tertiary);" onclick="event.stopPropagation()">
        <span style="display: flex; align-items: center; gap: 4px;">Pages: <input aria-label="Current page" type="number" value="${cp}" onchange="updateResourcePageField('${esc(r.id)}', 'currentPage', +this.value||0)" style="font-size:11px;width:38px;text-align:center;border:1px solid var(--line);border-radius:4px;padding:1px 3px;background:var(--bg-card);color:var(--ink);"> / <input aria-label="Total pages" type="number" value="${tp}" onchange="updateResourcePageField('${esc(r.id)}', 'totalPages', +this.value||100)" style="font-size:11px;width:38px;text-align:center;border:1px solid var(--line);border-radius:4px;padding:1px 3px;background:var(--bg-card);color:var(--ink);"></span>
        <div style="display: flex; gap: 4px; align-items: center;">
          <button class="apple-btn small" type="button" onclick="updateResourcePageProgress('${esc(r.id)}', 1)">+1</button>
          <button class="apple-btn small" type="button" onclick="updateResourcePageProgress('${esc(r.id)}', -1)">-1</button>
          <button class="apple-btn small" type="button" onclick="markResourcePageDone('${esc(r.id)}')">Done</button>
        </div>
      </div>
    </div>

    <!-- 第三行：进度条与百分比 -->
    <div style="display: flex; align-items: center; gap: 8px; margin-top: 6px; margin-bottom: 6px;">
      <div class="progress-bar" style="flex: 1; height: 4px; border-radius: 999px; background: var(--bg-elev); overflow: hidden;"><div class="progress-fill" style="width: ${resPct}%; height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.3s ease;"></div></div>
      <span style="font-size: 11px; font-weight: 700; color: var(--ink-tertiary); min-width: 32px; text-align: right;">${resPct}%</span>
    </div>

    <!-- 第四行：日期 -->
    <div class="res-resource-date">${esc(dateText)}</div>
  </div>`;
}

function updateResourcePageField(resId, field, value) {
  const r = (resources || []).find(x => x.id === resId);
  if (r) {
    r[field] = Number(value || 0);
    const cp = Number(r.currentPage || 0);
    const tp = Number(r.totalPages || 100);
    r.currentPage = Math.max(0, Math.min(tp, cp));
    if (tp > 0) {
      const pct = Math.round((r.currentPage / tp) * 100);
      r.progress = pct;
      r.percent = pct;
    }
    if (r.currentPage >= tp && tp > 0) r.status = 'completed';
    else if (r.status === 'completed' && r.currentPage < tp) r.status = 'in_progress';
    syncResourceToTasks(r);
    saveResState();
    render();
  }
}

function updateResourcePageProgress(resId, delta) {
  const r = (resources || []).find(x => x.id === resId);
  if (r) {
    const cp = Number(r.currentPage || 0);
    const tp = Number(r.totalPages || 100);
    if (delta > 0) {
      r.currentPage = Math.min(tp, cp + delta);
    } else {
      r.currentPage = Math.max(0, cp + delta);
    }
    if (tp > 0) {
      const pct = Math.round((r.currentPage / tp) * 100);
      r.progress = pct;
      r.percent = pct;
    }
    if (r.currentPage >= tp && tp > 0) r.status = 'completed';
    else if (r.status === 'completed' && r.currentPage < tp) r.status = 'in_progress';
    syncResourceToTasks(r);
    saveResState();
    render();
  }
}

function markResourcePageDone(resId) {
  const r = (resources || []).find(x => x.id === resId);
  if (r) {
    const tp = Number(r.totalPages || 100);
    r.currentPage = tp;
    r.progress = 100;
    r.percent = 100;
    r.status = 'completed';
    syncResourceToTasks(r);
    saveResState();
    render();
  }
}

// Resource Actions
function toggleResourceStatus(id) {
  try {
    const r = (resources || []).find(x => x.id === id);
    if (r) {
      r.status = r.status === 'completed' ? 'pending' : 'completed';
      if (r.status === 'completed') {
        if (r.totalPages > 0) r.currentPage = r.totalPages;
        r.progress = 100;
        r.percent = 100;
      }
      syncResourceToTasks(r);
      saveResState();
      render();
    }
  } catch (e) { console.error("Toggle resource error", e); }
}

function deleteResource(id) {
  try {
    if (!confirm('Delete this resource?')) return;
    resources = (resources || []).filter(x => x.id !== id);
    saveResState();
    render();
  } catch (e) { console.error("Delete resource error", e); }
}

function getCountdownDays() {
  try {
    if (!countdownConfig || !countdownConfig.targetDate) return '-- Days';
    const t = new Date(countdownConfig.targetDate);
    const n = new Date();
    n.setHours(0, 0, 0, 0);
    t.setHours(0, 0, 0, 0);
    const d = Math.ceil((t - n) / (86400000));
    if (isNaN(d)) return '-- Days';
    if (d > 0) return d + ' Days';
    if (d === 0) return 'Today!';
    return 'Passed';
  } catch (e) {
    console.error("Countdown calculation error", e);
    return '-- Days';
  }
}

// Note selection highlight for Study Resources
function handleNoteSelection(subj) {
  try {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const text = sel.toString().trim();
    if (!text) return;
    const sc = subjectScores[subj];
    if (!sc || !sc.note) return;
    if (sc.note.includes(text) && !sc.note.includes('==' + text + '==')) {
      sc.note = sc.note.replace(text, '==' + text + '==');
      sel.removeAllRanges();
      saveResState();
      render();
    }
  } catch (e) { console.error("Note selection error", e); }
}

function updateSubjectField(key, field, val) {
  if (!customSubjects[key]) return;
  if (field === 'label') {
    customSubjects[key].label = val.trim() || key;
  } else if (field === 'color') {
    customSubjects[key].color = val;
    customSubjects[key].tint = val + '18';
    customSubjects[key].text = val;
  }
  saveResState();
  renderSharedStats();
  render();
  toast('Subject updated & synced!');
}

function moveSubjectOrder(key, dir) {
  const keys = Object.keys(customSubjects);
  const idx = keys.indexOf(key);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= keys.length) return;
  
  const newObj = {};
  keys.splice(idx, 1);
  keys.splice(newIdx, 0, key);
  keys.forEach(k => { newObj[k] = customSubjects[k]; });
  customSubjects = newObj;
  saveResState();
  openSubjectManagerModal();
  renderSharedStats();
  render();
}

function deleteSubjectManager(key) {
  const keys = Object.keys(customSubjects);
  if (keys.length <= 1) { toast('Cannot delete the last subject'); return; }

    appState.currentSubject = Object.keys(customSubjects)[0];
  }
  saveResState();
  openSubjectManagerModal();
  renderSharedStats();
  render();
  toast('Subject deleted');
}

function safeJsonParseForStats(raw) {
  try { return JSON.parse(raw); } catch (_) { return null; }
}

function estimateLocalStorageBytes() {
  let bytes = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i) || '';
    const val = localStorage.getItem(key) || '';
    bytes += (key.length + val.length) * 2;
  }
  return bytes;
}

function formatBytes(bytes) {
  const n = Number(bytes) || 0;
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(n < 10240 ? 1 : 0) + ' KB';
  return (n / 1024 / 1024).toFixed(2) + ' MB';
}

function countDataEntries(value) {
  if (Array.isArray(value)) return value.length;
  if (value && typeof value === 'object') {
    if (Array.isArray(value.passages) || Array.isArray(value.quizSets) || Array.isArray(value.grammarQuestions) || Array.isArray(value.vocabularyQuestions)) {
      return safeArray(value.passages).length + safeArray(value.quizSets).length + safeArray(value.grammarQuestions).length + safeArray(value.vocabularyQuestions).length + safeArray(value.wordBook).length + safeArray(value.synonymLibrary).length + safeArray(value.wrongBook).length + Object.keys(value.wordMemory || {}).length;
    }
    if (Array.isArray(value.collections)) return value.collections.length;
    if (Array.isArray(value.tasks) || Array.isArray(value.history)) return safeArray(value.tasks).length + safeArray(value.history).length;
    if (Array.isArray(value.links)) return value.links.length + (value.notes ? 1 : 0);
    return Object.keys(value).length;
  }
  return value ? 1 : 0;
}

function getLocalDataInventory() {
  const rows = [];
  let totalEntries = 0;
  let totalBytes = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const raw = localStorage.getItem(key) || '';
    const parsed = safeJsonParseForStats(raw);
    const entries = countDataEntries(parsed !== null ? parsed : raw);
    const bytes = (String(key || '').length + raw.length) * 2;
    totalEntries += entries;
    totalBytes += bytes;
    rows.push({ key, entries, bytes, type: parsed === null ? 'text' : (Array.isArray(parsed) ? 'array' : typeof parsed) });
  }
  rows.sort((a,b) => b.bytes - a.bytes);
  return { rows, totalEntries, totalBytes };
}

function handleAllLocalDataImport(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      const storage = parsed && parsed.localStorage;
      if (!storage || typeof storage !== 'object' || Array.isArray(storage)) throw new Error('备份文件无效：缺少 localStorage 对象');
      const count = Object.keys(storage).length;
      if (!confirm(`确定导入 ${count} 个本地存储项吗？这会替换当前本地数据。建议先导出备份。`)) return;
      localStorage.clear();
      Object.keys(storage).forEach(key => {
        const value = storage[key];
        localStorage.setItem(key, value == null ? '' : String(value));
      });
      toast('备份已导入，正在刷新...');
      setTimeout(() => location.reload(), 400);
    } catch (err) {
      alert('导入失败：' + (err && err.message ? err.message : err));
    }
  };
  reader.readAsText(file);
}

function clearAllLocalData() {
  const inv = getLocalDataInventory();
  if (!inv.rows.length) { toast('没有可清空的本地数据'); return; }
  const confirmText = prompt(`将清空 ${inv.rows.length} 个本地存储项（${formatBytes(inv.totalBytes)}）。请输入 DELETE 继续。`);
  if (confirmText !== 'DELETE') { toast('已取消清空'); return; }
  localStorage.clear();
  toast('本地数据已清空，正在刷新...');
  setTimeout(() => location.reload(), 400);
}

function openGenericSheet(title, bodyHTML, buttons) {
  const inReview = _isReviewModeActive();
  // Review Center normally renders Word Book / Wrong Book / Synonyms inside the page.
  // Settings is different: when opened from Review it must be a real centered modal.
  const forceOverlayInReview = inReview && title === 'System Control Panel';

  const reviewSheet = inReview ? document.querySelector('#reviewCenterPage #genericSheet') : null;
  const reviewSheetInner = inReview ? document.querySelector('#reviewCenterPage #genericSheetInner') : null;
  const sheetInner = reviewSheetInner || document.getElementById('genericSheetInner');
  const sheet = reviewSheet || document.getElementById('genericSheet');

  if (inReview && !forceOverlayInReview) {
    _setGenericSheetAsReviewInline(sheet, sheetInner);
  } else {
    _setGenericSheetAsOverlay(sheet, sheetInner);
  }

  const titleEl = (inReview ? document.querySelector('#reviewCenterPage #genericSheetTitle') : null) || document.getElementById('genericSheetTitle');
  const bodyEl = (inReview ? document.querySelector('#reviewCenterPage #genericSheetBody') : null) || document.getElementById('genericSheetBody');
  const foot = (inReview ? document.querySelector('#reviewCenterPage #genericSheetFoot') : null) || document.getElementById('genericSheetFoot');
  if (titleEl) titleEl.textContent = title;
  if (bodyEl) bodyEl.innerHTML = bodyHTML;
  if (foot) foot.innerHTML = '';
  (buttons||[]).forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'apple-btn' + (b.cls?' '+b.cls:'');
    btn.textContent = b.text;
    btn.onclick = b.onclick;
    if (foot) foot.appendChild(btn);
  });

  if (inReview && !forceOverlayInReview) {
    // Keep Review tab content embedded: no dark overlay, no duplicated modal title row.
    if (sheet) sheet.classList.remove('open');
  } else {
    openSheet('genericSheet');
  }
  if (typeof applyAppLanguage === 'function') setTimeout(applyAppLanguage, 0);
}

function transferHighlightToWordBook(hid) {
  const h = quizState.highlights.find(x => x.id === hid);
  if (!h) return;
  quizState.wordBook = quizState.wordBook || [];
  const textVal = (h.selectedText || '').trim();
  if (!textVal) return;
  
  const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());

  } else {

      id: uid('wbk'), text: textVal, meaning: h.note || 'From reading passage highlight', example: `Highlighted in passage`,
      source: 'Reading Highlight', subject: appState.currentSubject,
      dateAdded: todayISO(), addedAt: Date.now(), highlight: true, starred: false,
      srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
    });
    toast(`已高亮并存入生词本: "${textVal}"`);
  }
  saveQuiz();
  renderSharedStats();
  renderSuggestContent();
  render();
}

function transferAllHighlightsToWordBook() {
  const hls = quizState.highlights || [];
  if (!hls.length) { toast('暂无任何 Highlights 记录'); return; }
  let count = 0;
  quizState.wordBook = quizState.wordBook || [];

    if (!textVal) return;
    const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
    if (exists) {

    } else {
      quizState.wordBook.push({

function getDayOfWeek(dateStr) {

  if (isNaN(d.getTime())) return null;
  return ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][d.getDay()];
}

function calculateOverallCompletion() {
  if (!weeklyPlan.history.length) return 0;
  const sum = weeklyPlan.history.reduce((a, b) => a + (b.completionRate || 0), 0);
  return Math.round(sum / weeklyPlan.history.length);
}

function processNextWeek(mode, lastTasks = []) {
  // Update dates
  weeklyPlan.currentWeek++;
  const nextStart = new Date(weeklyPlan.endDate);
  nextStart.setDate(nextStart.getDate() + 1);
  const nextEnd = new Date(nextStart);
  nextEnd.setDate(nextEnd.getDate() + 6);
  
  weeklyPlan.startDate = nextStart.toISOString().slice(0, 10);
  weeklyPlan.endDate = nextEnd.toISOString().slice(0, 10);
  weeklyPlan.status = 'In Progress';

  if (mode === 'ai') {
    generateWeeklyPlan(lastTasks);
  } else if (mode === 'duplicate') {
    weeklyPlan.tasks = lastTasks.filter(t => t.status !== 'completed').map(t => {
      const migrated = migrateTaskToGoal(t);
      return { ...migrated, id: 'w_dup_' + Date.now() + Math.random(), current: 0, weekStart: weeklyPlan.startDate, weekEnd: weeklyPlan.endDate };
    });
    weeklyPlan.suggestion = "Goals carried over from previous week. Focus on completing these first.";
  } else {
    weeklyPlan.tasks = [];
    weeklyPlan.suggestion = "Fresh start. Add goals manually or use AI Regenerate.";
  }

  saveWeeklyPlan();
  closeSheet('genericSheet');
  toast('✓ New week generated');
  render();
}

function generateWeeklySplitPrompt() {

  return `你是一个学习规划助手。请根据我本周的学习总目标，帮我拆分成每天可以导入 Apple Reminders 的具体任务。

📅 本周时间范围：${ws} ~ ${we}

🎯 本周总目标：

${goalsText}

${customStr ? '📝 我的自定义要求：\n' + customStr + '\n' : ''}
请帮我：
1. 将以上每个总目标按天拆分，分配到本周每一天
2. 每天的任务要具体可执行（如"完成第38~40页"、"复习15个单词"）
3. 考虑任务难度，前半周可以多做，后半周留出缓冲和复习时间
4. 如果有考试倒计时，请优先安排高频考点内容
5. 每个任务都要有真实日期，日期必须在本周时间范围内

当前系统科目分类：
${categoryList}

输出要求：
- 只输出合法 JSON
- 不要输出 Markdown
- 不要使用 \`\`\`json 代码块
- 不要输出解释文字
- 不需要 time 字段
- notes 可填可不填；如果没有特别备注，填空字符串 ""
- 必须包含 category 字段，快捷指令会根据 category 放入对应的 Reminders List

JSON 格式必须严格如下：

{
  "reminderList": "学习计划",
  "tasks": [
    {
      "date": "YYYY-MM-DD",
      "category": "${categoryExample}",
      "subject": "${categoryExample}",
      "title": "完成 Grammar Book 第 38~40 页",
      "duration": "45分钟",
      "notes": "补充说明，可为空"
    }
  ]
}

字段规则：
- date：必须是真实日期，格式为 YYYY-MM-DD，例如 ${ws}
- category：必须严格从“当前系统科目分类”中选择一个，不能输出其他分类名
- subject：填写科目名称，通常与 category 相同；如果任务更具体，也可以写更具体的科目/模块
- title：填写适合直接放进 Apple Reminders 的具体任务标题，不要太长
- duration：填写预计用时，例如 30分钟、45分钟、1小时
- notes：填写页码范围、复习重点、注意事项等；没有就填 ""
- 如果无法判断分类，请选择最接近的系统科目，不要新增 Other、Review、General 等分类，除非它们已经出现在“当前系统科目分类”中

请现在只输出 JSON。`;
}

function importWeekly(mode) {
  const holder = document.getElementById('importPlannerText') || document.getElementById('plannerAIImportText');
  const text = holder?.value.trim();
  if (!text) { toast('请先粘贴 JSON'); return; }
  try {
    let imported = [];
    let payload = null;
    if (text.startsWith('{')) {
      payload = JSON.parse(text);
      imported = Array.isArray(payload.tasks) ? payload.tasks.map(t => migrateTaskToGoal(t)) : [];
    } else if (text.startsWith('[')) {
      imported = JSON.parse(text).map(t => migrateTaskToGoal(t));
    } else {
      const lines = text.split('\n').map(line => line.trim()).filter(Boolean);
      imported = lines.map(l => {
        const p = l.split('|');
        return {
          id:'w_goal_'+Date.now()+Math.random(),
          subject: appState.currentSubject || 'english',
          goal: p[0] || 'New Goal',
          current: 0,
          target: parseInt(p[1]) || 1,
          unit: p[2] || 'pages',
          status:'in_progress',
          weekStart: weeklyPlan.startDate || todayISO(),
          weekEnd: weeklyPlan.endDate || todayISO()
        };
      });
    }
    if (!imported.length) {
      toast('未检测到可导入的周计划任务');
      return;
    }
    if (payload) {
      if (payload.startDate) weeklyPlan.startDate = String(payload.startDate);
      if (payload.endDate) weeklyPlan.endDate = String(payload.endDate);
      if (payload.suggestion) weeklyPlan.suggestion = String(payload.suggestion);
    }
    if (mode === 'replace') weeklyPlan.tasks = imported;
    else weeklyPlan.tasks.push(...imported);
    weeklyPlan.status = 'In Progress';
    saveWeeklyPlan();
    render();
    closeSheet('genericSheet');
    toast('✓ Plan imported');
  } catch(e) {
    toast('Import failed: ' + e.message);
  }
}

function migrateTaskToGoal(t) {
  // Migrate old task format to new goal format
  if (t.goal && t.target !== undefined) return t; // Already new format
  return {
    id: t.id || ('w_goal_' + Date.now() + Math.random()),
    subject: t.subject || 'english',
    goal: t.title || t.goal || 'Untitled Goal',
    current: t.current || t.currentProgress || 0,

    status: t.status || 'in_progress',
    weekStart: t.weekStart || weeklyPlan.startDate || todayISO(),
    weekEnd: t.weekEnd || weeklyPlan.endDate || todayISO()
  };
}

let weeklyTaskDragState = null;
function initWeeklyTaskDrag() {
  const list = document.getElementById('weeklyTaskList');
  if (!list) return;
  list.querySelectorAll('.st-drag-grip').forEach(grip => {
    grip.onpointerdown = e => {
      const item = e.target.closest('.ex-card');
      if (!item) return;
      weeklyTaskDragState = { item, startY: e.clientY };
      item.classList.add('st-is-dragging');
      
      const onMove = me => {
        if (!weeklyTaskDragState) return;
        const sibs = Array.from(list.querySelectorAll('.ex-card:not(.st-is-dragging)'));
        const over = sibs.find(s => {
          const r = s.getBoundingClientRect();
          return me.clientY > r.top && me.clientY < r.bottom;
        });
        if (over) {
          const r = over.getBoundingClientRect();
          if (me.clientY < r.top + r.height/2) over.before(item);
          else over.after(item);
        }
      };
      const onUp = () => {
        item.classList.remove('st-is-dragging');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        // Persist order
        const newIds = Array.from(list.querySelectorAll('.ex-card')).map(el => el.dataset.taskId);
        const reordered = [];
        newIds.forEach(id => { const t = weeklyPlan.tasks.find(x => x.id === id); if(t) reordered.push(t); });
        weeklyPlan.tasks = reordered;
        saveWeeklyPlan();
        weeklyTaskDragState = null;
      };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
    };
  });
}

function initResourceDrag() {
  const lists = document.querySelectorAll('[id^="resDragList_"]');

  lists.forEach(list => {
    if (list.dataset.resourceDragReady === 'true') return;
    list.dataset.resourceDragReady = 'true';

    list.querySelectorAll('.st-drag-grip').forEach(grip => {
      grip.onpointerdown = e => {
        const item = e.target.closest('.res-card');
        if (!item || e.button === 2) return;

        e.preventDefault();
        e.stopPropagation();

        const startRect = item.getBoundingClientRect();
        const pointerOffsetX = e.clientX - startRect.left;
        const pointerOffsetY = e.clientY - startRect.top;

        let draggingItem = item;
        let dragGhost = item.cloneNode(true);
        let currentBeforeEl = null;
        let hasMoved = false;
        let rafId = null;
        let latestX = e.clientX;
        let latestY = e.clientY;

        if (navigator.vibrate) navigator.vibrate(10);

        document.body.classList.add('resource-dragging');

        draggingItem.classList.add('res-drag-placeholder');
        draggingItem.style.width = `${startRect.width}px`;
        draggingItem.style.height = `${startRect.height}px`;

        dragGhost.classList.add('res-drag-lift');
        dragGhost.classList.remove('res-drag-placeholder');
        dragGhost.style.width = `${startRect.width}px`;
        dragGhost.style.height = `${startRect.height}px`;
        dragGhost.style.left = `${startRect.left}px`;
        dragGhost.style.top = `${startRect.top}px`;
        dragGhost.style.pointerEvents = 'none';

        document.body.appendChild(dragGhost);

        const moveGhost = (clientX, clientY) => {
          const x = clientX - pointerOffsetX;
          const y = clientY - pointerOffsetY;

          dragGhost.style.transform = `translate3d(${x - startRect.left}px, ${y - startRect.top}px, 0) scale(1.04) rotate(-0.5deg)`;
        };

        const getCards = () => {
          return Array.from(list.querySelectorAll('.res-card:not(.res-drag-lift)'));
        };

        const getSiblings = () => {
          return Array.from(list.querySelectorAll('.res-card:not(.res-drag-placeholder):not(.res-drag-lift)'));
        };

        const snapshotRects = () => {
          const map = new Map();
          getCards().forEach(card => {
            map.set(card, card.getBoundingClientRect());
          });
          return map;
        };

        const animateLayout = oldRects => {
          getCards().forEach(card => {
            if (card === draggingItem) return;

            const oldRect = oldRects.get(card);
            if (!oldRect) return;

            const newRect = card.getBoundingClientRect();
            const dx = oldRect.left - newRect.left;
            const dy = oldRect.top - newRect.top;

            if (!dx && !dy) return;

            card.style.transition = 'none';
            card.style.transform = `translate3d(${dx}px, ${dy}px, 0)`;

            requestAnimationFrame(() => {
              card.style.transition = 'transform 0.28s cubic-bezier(0.22, 1, 0.36, 1)';
              card.style.transform = '';
            });
          });
        };

        const edgeScroll = clientY => {
          const listRect = list.getBoundingClientRect();
          const threshold = 50;
          const speed = 8;

          if (clientY < listRect.top + threshold) {
            list.scrollTop -= speed;
            return true;
          } else if (clientY > listRect.bottom - threshold) {
            list.scrollTop += speed;
            return true;
          }

          return false;
        };

        const findInsertBefore = clientY => {
          const siblings = getSiblings();
          if (!siblings.length) return null;

          let nearest = null;
          let nearestRect = null;
          let minDistance = Infinity;

          siblings.forEach(sibling => {
            const rect = sibling.getBoundingClientRect();
            const centerY = rect.top + rect.height / 2;
            const distance = Math.abs(clientY - centerY);

            if (distance < minDistance) {
              minDistance = distance;
              nearest = sibling;
              nearestRect = rect;
            }
          });

          if (!nearest || !nearestRect) return null;

          const nearestCenterY = nearestRect.top + nearestRect.height / 2;

          if (clientY >= nearestCenterY) {
            return nearest.nextElementSibling;
          }

          return nearest;
        };

        const reorderByPointer = clientY => {
          const beforeEl = findInsertBefore(clientY);

          if (beforeEl === currentBeforeEl) return;
          if (beforeEl === draggingItem) return;

          const oldRects = snapshotRects();

          list.insertBefore(draggingItem, beforeEl || null);

          currentBeforeEl = beforeEl;
          animateLayout(oldRects);

          if (navigator.vibrate) navigator.vibrate(4);
        };

        const onPointerMove = e => {
          latestX = e.clientX;
          latestY = e.clientY;
          hasMoved = true;

          edgeScroll(e.clientY);

          if (rafId) return;

          rafId = requestAnimationFrame(() => {
            rafId = null;
            moveGhost(latestX, latestY);
            reorderByPointer(latestY);
          });
        };

        const persistResourceOrder = () => {
          const orderedIds = Array.from(list.querySelectorAll('.res-card'))
            .map(el => el.dataset.resid)
            .filter(Boolean);

          if (!orderedIds.length) return;

          normalizeResourceOrders(false);

          const orderedSet = new Set(orderedIds);
          const listKey = String(list.id || '').replace(/^resDragList_/, '');
          const isAllList = !listKey || listKey === 'all';
          const scopedResources = sortResourcesByOrder(resources.filter(r => isAllList || String(r.subject || '') === listKey));
          const visibleSlotIndexes = [];

          scopedResources.forEach((resource, index) => {
            if (orderedSet.has(String(resource.id))) visibleSlotIndexes.push(index);
          });

          orderedIds.forEach((id, index) => {
            const slotIndex = visibleSlotIndexes[index];
            const resource = resources.find(r => String(r.id) === String(id));
            if (slotIndex !== undefined && resource) scopedResources[slotIndex] = resource;
          });

          scopedResources.forEach((resource, index) => {
            resource.order = index;
          });

          if (typeof saveResState === 'function') {
            saveResState();
          } else {
            localStorage.setItem('study_resources_pro', JSON.stringify(resources));
          }
        };

        const cleanup = () => {
          if (rafId) {
            cancelAnimationFrame(rafId);
            rafId = null;
          }

          draggingItem.classList.remove('res-drag-placeholder');
          draggingItem.style.width = '';
          draggingItem.style.height = '';

          if (dragGhost) {
            dragGhost.classList.add('res-drag-drop');
            setTimeout(() => {
              dragGhost?.remove();
              dragGhost = null;
            }, 180);
          }

          getCards().forEach(card => {
            card.style.transition = '';
            card.style.transform = '';
          });

          document.body.classList.remove('resource-dragging');

          window.removeEventListener('pointermove', onPointerMove);
          window.removeEventListener('pointerup', onPointerUp);
          window.removeEventListener('pointercancel', onPointerUp);
        };

        const onPointerUp = () => {
          cleanup();

          if (hasMoved) {
            persistResourceOrder();
            if (navigator.vibrate) navigator.vibrate(8);
          }
        };

        moveGhost(e.clientX, e.clientY);

        window.addEventListener('pointermove', onPointerMove, { passive: false });
        window.addEventListener('pointerup', onPointerUp, { once: true });
        window.addEventListener('pointercancel', onPointerUp, { once: true });
      };
    });
  });
}

function getTaskProgression(task) {
  const cur = Number(task.current || 0);
  const tgt = Number(task.target || 1);
  const isCompleted = task.status === 'completed';
  return {
    startProgress: isCompleted ? tgt : cur,
    targetProgress: isCompleted ? tgt + (task.unit === 'pages' ? (task.target - task.current || 8) : task.target) : Math.max(tgt, cur),
    shouldContinue: true,
    wasCompleted: isCompleted
  };
}

function generateWeeklyPlan(lastWeekTasks) {
  const goals = [];
  const now = Date.now();

  const allRoadmap = Array.isArray(roadmapPlans) ? roadmapPlans : [];
  const activeRoadmap = allRoadmap.filter(p => p.status !== 'completed');
  const allVocab = Array.isArray(quizState.wordBook) ? quizState.wordBook : [];
  const dueVocab = allVocab.filter(w => w.srsNext <= now).length;
  const allSyn = Array.isArray(quizState.synonymLibrary) ? quizState.synonymLibrary : [];
  const dueSyn = allSyn.filter(s => s.srsNext <= now).length;
  const wrongCount = Array.isArray(quizState.wrongBook) ? quizState.wrongBook.length : 0;
  const allLr = Array.isArray(learningItems) ? learningItems : [];

  const ws = weeklyPlan.startDate || todayISO();
  const we = weeklyPlan.endDate || todayISO();
  const customStr = weeklyPlan.customPrompt || "";
  const daysToExam = getClosestExamDays();

  // Logic: Adjust step by exam proximity
  let stepMultiplier = 1;
  if (daysToExam !== null) {
    if (daysToExam < 30) stepMultiplier = 0.5;
    else if (daysToExam < 90) stepMultiplier = 1.2;
  }

  // Helper to find matching task from last week
  const findLastTask = (keyword, idPrefix) => {
    const arr = Array.isArray(lastWeekTasks) ? lastWeekTasks : [];
    return arr.find(t => {
      if (idPrefix && t.id && String(t.id).startsWith(idPrefix)) return true;
      const goal = String(t.goal || t.title || '').toLowerCase();
      return keyword && goal.includes(keyword.toLowerCase());
    });
  };

  // Grammar Goal
  const grammarBook = allLr.find(item => item.title && item.title.toLowerCase().includes('grammar'));
  const grammarBase = grammarBook ? grammarBook.currentPage : 37;
  let grammarStep = Math.round(8 * stepMultiplier);
  if (customStr.toLowerCase().includes('grammar')) grammarStep = Math.round(grammarStep * 1.5);

  const grammarLast = findLastTask('grammar', 'w_grammar');
  let grammarStart = grammarBase;
  if (grammarLast) {
    const prog = getTaskProgression(grammarLast);
    grammarStart = prog.wasCompleted ? prog.targetProgress : prog.startProgress;
  }
  goals.push({
    id:'w_grammar', subject:'english',
    goal: (grammarBook ? grammarBook.title : 'Grammar Book') + ' 第 ' + grammarStart + '~' + (grammarStart + grammarStep) + ' 页',
    current: grammarStart, target: grammarStart + grammarStep,
    unit:'pages', status:'in_progress', weekStart: ws, weekEnd: we
  });

  // Reading Goal
  const readingBook = allLr.find(item => item.title && item.title.toLowerCase().includes('reading'));
  const readingBase = readingBook ? readingBook.currentPage : 50;
  let readingStep = Math.round(8 * stepMultiplier);

  const readingLast = findLastTask('reading', 'w_reading');
  let readingStart = readingBase;
  if (readingLast) {
    const prog = getTaskProgression(readingLast);
    readingStart = prog.wasCompleted ? prog.targetProgress : prog.startProgress;
  }
  goals.push({
    id:'w_reading', subject:'english',
    goal: (readingBook ? readingBook.title : 'Reading Book') + ' 第 ' + readingStart + '~' + (readingStart + readingStep) + ' 页',
    current: readingStart, target: readingStart + readingStep,
    unit:'pages', status:'in_progress', weekStart: ws, weekEnd: we
  });

  // Vocabulary Goal
  const vocabLast = findLastTask('词汇', 'w_vocab');
  const vocabBase = 0;
  let vocabStep = dueVocab > 0 ? dueVocab : 30;

  let vocabStart = vocabBase;
  if (vocabLast) {
    const prog = getTaskProgression(vocabLast);
    vocabStart = prog.wasCompleted ? prog.targetProgress : prog.startProgress;
  }
  goals.push({
    id:'w_vocab', subject:'english',
    goal: 'SRS 词汇复习 ' + (vocabStart + vocabStep) + ' 词',
    current: vocabStart, target: vocabStart + vocabStep,
    unit:'words', status:'in_progress', weekStart: ws, weekEnd: we
  });

  // Mock Test Goal
  const mockLast = findLastTask('模拟', 'w_mock');
  let mockCount = (daysToExam !== null && daysToExam < 60) ? 3 : 1;
  let mockStart = 0;
  if (mockLast) {
    const prog = getTaskProgression(mockLast);
    mockStart = prog.wasCompleted ? prog.targetProgress : prog.startProgress;
  }
  goals.push({
    id:'w_mock', subject:'english',
    goal: '完成 ' + (mockStart + mockCount) + ' 套模拟测试',
    current: mockStart, target: mockStart + mockCount,
    unit:'tests', status:'in_progress', weekStart: ws, weekEnd: we
  });

  // Carry over custom tasks from last week that were not completed
  if (Array.isArray(lastWeekTasks)) {
    lastWeekTasks.forEach(t => {
      if (t.id && (String(t.id).startsWith('w_goal_') || String(t.id).startsWith('w_dup_') || String(t.id).startsWith('w_carry_'))) {
        const prog = getTaskProgression(t);
        if (!prog.wasCompleted) {
          goals.push({
            id: 'w_carry_' + Date.now() + Math.random(),
            subject: t.subject || 'english',
            goal: t.goal || t.title || 'Carry-over Goal',
            current: prog.startProgress,
            target: prog.targetProgress,
            unit: t.unit || 'pages',
            status: 'in_progress',
            weekStart: ws,
            weekEnd: we
          });
        }
      }
    });
  }

  weeklyPlan.tasks = goals;

  let sugg = `AI Analysis: ${dueVocab} words due. `;
  if (daysToExam !== null) {
    if (daysToExam < 30) sugg += "CRITICAL: Exam in <30 days. Plan shifted to simulations and error review.";
    else if (daysToExam < 90) sugg += "INTENSIVE: Mid-stage prep. High volume of practice assigned.";
    else sugg += "FOUNDATION: Building core skills at a steady pace.";
  }

  weeklyPlan.suggestion = sugg;
  saveWeeklyPlan();
}

function updateWeeklyTaskProgress(id, delta) {
  const task = weeklyPlan.tasks.find(t => t.id === id);
  if (task) {
    task.current = Math.max(0, (task.current || 0) + delta);
    task.status = task.current >= task.target ? 'completed' : 'in_progress';
    saveWeeklyPlan(); render();
  }
}

function markWeeklyTaskStatus(id, status) {
  const task = weeklyPlan.tasks.find(t => t.id === id);
  if (task) {
    task.status = status;
    if (status === 'completed') task.current = task.target;
    saveWeeklyPlan(); render();
  }
}

function getClosestExamDays() {
  if (!roadmapExams || roadmapExams.length === 0) return null;
  const today = new Date();
  const exams = roadmapExams.map(e => new Date(e.examDate)).filter(d => d >= today).sort((a, b) => a - b);
  if (exams.length === 0) return null;
  return Math.ceil(Math.abs(exams[0] - today) / (1000 * 60 * 60 * 24));
}

function getCurrentStudyStage(){

  return safeArray(roadmapMilestones).find(m => (m.startDate||'') <= today && today <= (m.targetFinishDate||'')) || safeArray(roadmapMilestones).find(m=>m.status==='in_progress') || {title:'General Preparation'};

function getQuizStatsBetween(start,end){
  const logs = Object.entries(quizState.answerLog || {}).filter(([id,l]) => dateInRange(l.ts, start, end));
  const correct = logs.filter(([id,l]) => !!l.correct).length;
  return { total:logs.length, correct, accuracy:pct(correct, logs.length) };
}
function getWeeklyReviewData(weekObj){
  const tasks = safeArray(weekObj?.tasks || weeklyPlan.tasks);
  const start = weekObj?.startDate || weeklyPlan.startDate;
  const end = weekObj?.endDate || weeklyPlan.endDate;
  const completedTasks = tasks.filter(t=>t.status==='completed').length;
  const quizStats = getQuizStatsBetween(start,end);
  const vocabAdded = safeArray(quizState.wordBook).filter(w => dateInRange(w.addedAt || w.dateAdded, start, end)).length;
  const wrongReviewed = safeArray(quizState.wrongBook).filter(w => dateInRange(w.reviewedAt || w.lastReviewedAt || w.ts, start, end)).length;
  const subjectCounter = {};
  tasks.forEach(t=>{ const k = t.subject || t.category || 'Study'; subjectCounter[k] = (subjectCounter[k]||0) + (t.status==='completed'?2:1); });
  const mostActiveKey = Object.keys(subjectCounter).sort((a,b)=>subjectCounter[b]-subjectCounter[a])[0] || appState.currentSubject;
  const dayCounter = {};
  tasks.filter(t=>t.status==='completed').forEach(t=>{ if(t.date) dayCounter[t.date]=(dayCounter[t.date]||0)+1; });
  const bestDate = Object.keys(dayCounter).sort((a,b)=>dayCounter[b]-dayCounter[a])[0] || end || todayISO();
  const usedTitles = safeArray(resources).filter(r=>r.status==='completed' || r.status==='pending').slice(0,5).map(r=>r.title);
  const completedList = tasks.filter(t=>t.status==='completed').map(t=>t.title);
  return {
    completedTasks, totalTasks:tasks.length, completionRate:pct(completedTasks,tasks.length),
    studyTime: Math.round((completedTasks * 0.75) * 10)/10,
    quizAccuracy: quizStats.accuracy, quizTotal: quizStats.total,
    vocabAdded, wrongReviewed,
    resourcesUsed: usedTitles.length ? usedTitles.join(', ') : 'No resource activity recorded',
    mostActiveSubject: customSubjects[mostActiveKey]?.label || mostActiveKey || 'Study',
    bestStudyDay: bestDate,
    completedList
  };
}

function detectStudyMilestones(){

  const vocabCount = safeArray(quizState.wordBook).length;
  if(vocabCount >= 500) add('vocab_500','500 Vocabulary Mastered');
  if(vocabCount >= 1000) add('vocab_1000','1000 Vocabulary Mastered');
  if(safeArray(learningItems).some(i => /grammar/i.test(i.title||'') && (i.completed || (Number(i.totalPages)>0 && Number(i.currentPage) >= Number(i.totalPages))))) add('grammar_foundation','Grammar Foundation Completed');
  if(safeArray(learningItems).some(i => /reading/i.test(i.title||'') && (i.completed || (Number(i.totalPages)>0 && Number(i.currentPage) >= Number(i.totalPages))))) add('reading_book_1','Reading Book 1 Finished');
  if(Object.keys(quizState.answerLog || {}).length >= 1 || safeArray(weeklyPlan.history).some(h=>safeArray(h.tasks).some(t=>/mock/i.test(t.title||'') && t.status==='completed'))) add('mock_test','Mock Test Completed');
  saveStudyMilestones();
}

function generateStudyPlanningPrompt(){
  const exam = getExamInfoForPrompt();
  const stage = getCurrentStudyStage();
  const progress = getSidebarSubjectKeys().map(k => `${customSubjects[k]?.label || k}: ${getSubjectProgress(k).percent}%`).join('\n');

  // ===== 完整获取 Study Roadmap 所有计划 =====
  const allPlans = safeArray(roadmapPlans);

  // 按阶段分组
  const milestones = safeArray(roadmapMilestones);
  let roadmapText = '';
  milestones.forEach(ms => {
    const msPlans = allPlans.filter(p => p.milestoneId === ms.id);
    if (msPlans.length === 0) return;
    roadmapText += `\n【${ms.title}】(${roadmapStatusLabel(ms.status)})\n`;
    msPlans.forEach(p => {
      roadmapText += `  - ${p.title} (${roadmapSubjectLabel(p.subject)}): ${roadmapStatusLabel(p.status)}, ${formatDate(p.startDate)} ~ ${formatDate(p.targetFinishDate)}${p.notes ? ' · ' + p.notes : ''}\n`;
    });
  });

  // 如果有未分配里程碑的计划，单独列出
  const unassigned = allPlans.filter(p => !p.milestoneId || !milestones.find(m => m.id === p.milestoneId));
  if (unassigned.length) {
    roadmapText += '\n【未分配阶段】\n';
    unassigned.forEach(p => {
      roadmapText += `  - ${p.title} (${roadmapSubjectLabel(p.subject)}): ${roadmapStatusLabel(p.status)}, ${formatDate(p.startDate)} ~ ${formatDate(p.targetFinishDate)}${p.notes ? ' · ' + p.notes : ''}\n`;
    });
  }

  // 如果没有计划，显示提示
  if (!roadmapText) roadmapText = '暂无 Roadmap 计划。';

  const examText = safeArray(roadmapExams).map(e =>
    `- ${e.title} (${roadmapSubjectLabel(e.subject)}): ${formatDate(e.examDate)}`
  ).join('\n') || 'No exams set.';

  const resourceText = safeArray(resources).map(r =>
    `- ${r.title}: ${r.status || 'pending'}${r.tags?.length ? ' · ' + r.tags.join(', ') : ''}`
  ).join('\n') || 'No resources yet.';

  const weeklyGoals = safeArray(weeklyPlan.tasks).map(t => {
    const subjLabel = (customSubjects[t.subject]?.label) || t.subject || 'General';
    const cur = t.current || 0;
    const tgt = t.target || 1;
    return `- [${t.status==='completed'?'x':' '}] [${subjLabel}] ${t.goal || t.title} — ${cur}/${tgt} ${t.unit || ''}`;
  }).join('\n') || 'No weekly goals yet.';

  // Build last week completion summary from history
  const lastWeek = safeArray(weeklyPlan.history)[0];
  const lastWeekSummary = lastWeek ? safeArray(lastWeek.tasks).map(t => {
    const subjLabel = (customSubjects[t.subject]?.label) || t.subject || 'General';
    const cur = t.current || 0;
    const tgt = t.target || 1;
    const status = t.status === 'completed' ? '已完成' : '未完成（当前 ' + cur + '/' + tgt + '）';
    return `- [${subjLabel}] ${t.goal || t.title} — ${status}`;
  }).join('\n') : 'No previous week data.';

  return `You are my study-planning coach. Create a practical next-week study plan using my current StudyHub data.

📅 **Current Week:** ${weeklyPlan.startDate || 'Not set'} ~ ${weeklyPlan.endDate || 'Not set'}

📚 **Study Roadmap (完整版):**
${roadmapText}

📖 **Study Resources:**
${resourceText}

📊 **Current Progress:**
${progress}
- Quiz questions completed: ${Object.keys(quizState.answerLog || {}).length}
- Vocabulary learned: ${safeArray(quizState.wordBook).length}
- Wrong questions in review: ${safeArray(quizState.wrongBook).length}

📆 **上周完成情况：**
${lastWeekSummary}

🎯 **Weekly Goals:**
${weeklyGoals}

📋 **Exams:**
${examText}

${exam.days !== null ? `\n⏰ **Closest Exam:** ${exam.title || 'Exam'} in ${exam.days} days (${exam.date})` : ''}
${stage.title ? `\n📍 **Current Study Stage:** ${stage.title}` : ''}

Please produce:
1. Priorities for this week
2. A day-by-day weekly schedule (Mon ~ Sun)
3. Review checkpoints
4. Suggested focus areas
Do not assume access to StudyHub beyond the data above.`;
}

function copyAIPrompt(){
  const prompt = generateStudyPlanningPrompt();
  const oldToast = 'Prompt copied.';
  if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(prompt).then(()=>toast(oldToast)).catch(()=>fallbackCopyPrompt(prompt)); }
  else fallbackCopyPrompt(prompt);
}
function fallbackCopyPrompt(text){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px'; document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); toast('Prompt copied.'); }catch(e){ toast('Copy failed'); }
  document.body.removeChild(ta);
}

// Override current plan render to add editable tasks, prompt copy, weekly review, motivation, summary, and milestones.
function _renderGroupedWeeklyTasks() {
  const tasks = safeArray(weeklyPlan.tasks);
  if (!tasks.length) return '<div class="empty-state" style="padding:24px 14px;">No tasks this week.</div>';
  const groups = {};
  tasks.forEach((task, idx) => {
    let subj = task.subject || task.category || 'uncategorized';
    if (!customSubjects[subj]) {
      const detected = detectSubjectKey(subj);
      if (detected && customSubjects[detected]) subj = detected;
      else {
        subj = 'uncategorized';
        if (!customSubjects[subj]) {
          customSubjects[subj] = { label: task.category || 'Uncategorized', color: '#999', tint: 'rgba(0,0,0,0.04)', text: '#999' };
        }
      }
    }
    if (!groups[subj]) groups[subj] = [];
    groups[subj].push({ task, idx });
  });
  const order = getSidebarSubjectKeys ? getSidebarSubjectKeys() : Object.keys(customSubjects);
  const sortedKeys = [];
  order.forEach(k => { if (groups[k]) sortedKeys.push(k); });
  Object.keys(groups).forEach(k => { if (!sortedKeys.includes(k)) sortedKeys.push(k); });
  return sortedKeys.map(key => {
    const items = groups[key];
    const subjLabel = customSubjects[key]?.label || key;
    const subjColor = customSubjects[key]?.color || '#999';
    return `<div class="wk-group" data-subject="${esc(key)}">
      <div class="wk-group-head" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="wk-group-arrow">▼</span>
        <span class="wk-group-label" style="display:flex;align-items:center;gap:6px;">
          <span style="width:8px;height:8px;border-radius:3px;background:${subjColor};display:inline-block;"></span>
          ${esc(subjLabel)}
        </span>
        <span class="wk-group-count">${items.filter(i=>i.task.status==='completed').length}/${items.length}</span>
      </div>
      <div class="wk-group-body">
        ${items.map(i => renderWeeklyTaskCard(i.task, i.idx)).join('')}
      </div>
    </div>`;
  }).join('');
}

// Progress Check
function getAllProgressQuestions(){
  const grammar = safeArray(quizState.grammarQuestions).map(q=>({...q,_pcType:'grammar'}));
  const vocabulary = safeArray(quizState.vocabularyQuestions).map(q=>({...q,_pcType:'vocabulary'}));
  const wrong = safeArray(quizState.wrongBook).map(w=>({id:'pc_wrong_'+(w.qId||w.id), question:w.question, options:w.options||[], answer:w.correctAnswer, explanation:w.explanation||'', _pcType:'wrong'}));
  return { grammar, vocabulary, reading: [], wrong, all:[...grammar,...vocabulary,...wrong] };
}
function startProgressCheck(mode){
  const pools = getAllProgressQuestions();
  if(!pools.all.length){ toast('Add Quiz Hub questions first.'); return; }
  if (mode === 'custom') {
    miniPrompt('How many questions?', '15', val => {
      const count = Number(val || 15) || 15;
      _doStartProgressCheck(mode, count, pools);
    });
    return;
  }
  const count = mode==='monthly' ? 30 : 12;
  _doStartProgressCheck(mode, count, pools);
}
function _doStartProgressCheck(mode, count, pools){
  const take = (arr,n)=>arr.sort(()=>Math.random()-0.5).slice(0,n);
  let selected = [...take(pools.grammar, Math.ceil(count*.35)), ...take(pools.vocabulary, Math.ceil(count*.35)), ...take(pools.wrong, Math.ceil(count*.30))];
  if(selected.length < count) selected = [...selected, ...take(pools.all.filter(q=>!selected.find(s=>s.id===q.id)), count-selected.length)];
  selected = selected.slice(0,count).map((q,i)=>({...q,_pcId:q._pcType+'_'+(q.id||i), _answer:''}));
  progressCheckState.active = { id:uid('pcheck'), mode, startedAt:Date.now(), questions:selected };
  progressCheckState.mode = mode; saveProgressCheck(); render();
}
function setProgressAnswer(idx, ans){ if(progressCheckState.active?.questions?.[idx]){ progressCheckState.active.questions[idx]._answer = ans; saveProgressCheck(); } }
function finishProgressCheck(){
  const active = progressCheckState.active; if(!active) return;
  const qs = safeArray(active.questions); const total = qs.length; if(!total){ progressCheckState.active=null; saveProgressCheck(); render(); return; }

function checkBackupReminder() {
  const meta = getBackupMeta();
  if (meta.remindTomorrow && Date.now() < meta.remindTomorrow) return;
  if (meta.dismissed && Date.now() < meta.dismissed) return;
  if (!meta.lastExportTime) return;

  showBackupReminder();
}

const EBINGHAUS_INTERVALS = [1, 3, 7, 15, 30, 60];
let _wbPracticeState = null;

function initWrongBookEbbinghausFields(w) {
  if (!w) return w;
  if (w.reviewStage === undefined) w.reviewStage = 0;
  if (w.nextReviewDate === undefined) w.nextReviewDate = todayISO();
  if (w.lastReviewDate === undefined) w.lastReviewDate = null;
  if (w.reviewCount === undefined) w.reviewCount = 0;
  if (w.mastered === undefined) w.mastered = false;
  if (w.consecutiveCorrect === undefined) w.consecutiveCorrect = 0;
  if (w.completed && !w.mastered) w.mastered = true;
  return w;
}

function migrateWrongBookToEbbinghaus() {
  quizState.wrongBook = safeArray(quizState.wrongBook);
  quizState.wrongBook.forEach(initWrongBookEbbinghausFields);
  saveQuiz();
}

function calculateNextReview(wrongItem) {
  if (!wrongItem) return null;
  if ((wrongItem.reviewStage || 0) >= EBINGHAUS_INTERVALS.length) {
    wrongItem.mastered = true;
    return null;
  }
  const days = EBINGHAUS_INTERVALS[wrongItem.reviewStage || 0];
  const date = new Date();
  date.setDate(date.getDate() + days);
  return date.toISOString().slice(0, 10);
}

function handleWrongBookReview(wrongId, isCorrect) {
  const item = safeArray(quizState.wrongBook).find(w => w.id === wrongId);
  if (!item) return;
  initWrongBookEbbinghausFields(item);
  item.lastReviewDate = todayISO();
  item.lastReviewedAt = Date.now();
  item.reviewCount = (item.reviewCount || 0) + 1;

  if (isCorrect) {
    item.consecutiveCorrect = (item.consecutiveCorrect || 0) + 1;
    item.reviewStage = (item.reviewStage || 0) + 1;
    item.nextReviewDate = calculateNextReview(item);
    if (item.reviewStage >= EBINGHAUS_INTERVALS.length) {
      item.mastered = true;
      item.completed = true;
      toast('🎉 恭喜！本题已完全掌握！');
    } else {
      toast(`✅ 正确！${EBINGHAUS_INTERVALS[item.reviewStage]}天后再次复习`);
    }
  } else {
    item.consecutiveCorrect = 0;
    item.reviewStage = 0;
    item.mastered = false;
    item.completed = false;
    item.nextReviewDate = calculateNextReview(item);
    toast('❌ 答错了，明天再来复习这道题');
  }
  saveQuiz();
  renderSharedStats();
}

function getDueWrongBookQuestions() {
  const today = todayISO();
  return safeArray(quizState.wrongBook).map(initWrongBookEbbinghausFields).filter(w => {
    if (w.mastered || w.completed) return false;
    if (!w.nextReviewDate) return true;
    return w.nextReviewDate <= today;
  });
}

function getWrongBookMasteredRate() {
  const list = safeArray(quizState.wrongBook);
  if (!list.length) return 0;
  return Math.round((list.filter(w => w.mastered || w.completed).length / list.length) * 100);
}

function _wrongBookText(val) {
  if (val === null || typeof val === 'undefined') return '';
  if (Array.isArray(val)) return val.map(_wrongBookText).filter(Boolean).join(', ');
  if (typeof val === 'object') return val.text || val.label || val.value || val.answer || JSON.stringify(val);
  return String(val);
}
function _wrongBookCorrect(w) {
  return _wrongBookText(w?.correctAnswer ?? w?.answer ?? w?.correct ?? w?.correct_answer ?? '');
}
function _wrongBookUser(w) {
  return _wrongBookText(w?.yourAnswer ?? w?.userAnswer ?? w?.selectedAnswer ?? w?.selected ?? w?.user_answer ?? '');
}
function _wrongBookExplanation(w) {
  return _wrongBookText(w?.explanation ?? w?.explain ?? w?.analysis ?? w?.reason ?? '');
}
function _wrongBookStripChoicePrefix(s) {
  return _wrongBookText(s).trim().replace(/^[A-H][\.|\)|、]\s*/i, '').trim();
}
function _wrongBookOptionMatches(opt, ans, idx) {
  const option = _wrongBookText(opt).trim();
  const answer = _wrongBookText(ans).trim();
  if (!option || !answer) return false;
  const lowerOpt = option.toLowerCase();
  const lowerAns = answer.toLowerCase();
  const letter = 'ABCDEFGH'[idx] || '';
  if (letter && (lowerAns === letter.toLowerCase() || lowerAns === `${letter.toLowerCase()}.` || lowerAns === `${letter.toLowerCase()})`)) return true;
  if (lowerOpt === lowerAns) return true;
  if (_wrongBookStripChoicePrefix(lowerOpt) === _wrongBookStripChoicePrefix(lowerAns)) return true;
  return false;
}
function _wrongBookOptionLabel(opt, idx) {
  const raw = _wrongBookText(opt);
  return /^[A-H][\.|\)|、]\s*/i.test(raw.trim()) ? esc(raw) : `<span style="font-weight:800;margin-right:6px;color:var(--ink-tertiary);">${'ABCDEFGH'[idx] || idx + 1}.</span>${esc(raw)}`;
}
function _wrongBookIsCorrectSelection(w, optIdx, optVal) {
  return _wrongBookOptionMatches(optVal, _wrongBookCorrect(w), optIdx);
}
function _wrongBookDaysUntil(dateStr) {
  if (!dateStr) return '';
  const start = new Date(todayISO() + 'T00:00:00');
  const end = new Date(dateStr + 'T00:00:00');
  const diff = Math.ceil((end - start) / 86400000);
  if (diff <= 0) return '今天';
  return `${diff} 天后`;
}
function _wrongBookStageLabel(w) {
  initWrongBookEbbinghausFields(w);
  if (w.mastered || w.completed) return '已掌握';
  return `第 ${Math.min((w.reviewStage || 0) + 1, EBINGHAUS_INTERVALS.length)} 次复习 / 共 ${EBINGHAUS_INTERVALS.length} 次`;
}
function _wrongBookStatusBadge(w) {
  initWrongBookEbbinghausFields(w);
  if (w.mastered || w.completed) return `<span class="roadmap-status completed" style="text-transform:none;letter-spacing:0;">已掌握</span>`;
  if (getDueWrongBookQuestions().some(d => d.id === w.id)) return `<span class="roadmap-status in_progress" style="text-transform:none;letter-spacing:0;background:rgba(255,159,10,.12);color:var(--orange);">今日待复习</span>`;
  return `<span class="roadmap-status not_started" style="text-transform:none;letter-spacing:0;">进行中</span>`;
}

  return `

      <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
        <div style="font-weight:750;font-size:14px;line-height:1.55;">${idx + 1}. ${qText}</div>
        ${_wrongBookStatusBadge(w)}
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--ink-secondary);flex-wrap:wrap;">
        <span>复习阶段：${_wrongBookStageLabel(w)}</span>
        <span>下次复习：${w.mastered || w.completed ? '已完成' : esc(w.nextReviewDate || '今天')} ${(!w.mastered && !w.completed && w.nextReviewDate) ? `(${_wrongBookDaysUntil(w.nextReviewDate)})` : ''}</span>
        <span>已复习：${w.reviewCount || 0} 次</span>
      </div>
      <div style="display:flex;gap:12px;font-size:12px;color:var(--ink-tertiary);flex-wrap:wrap;">
        ${answerHtml}
      </div>
      <div style="font-size:12px;color:var(--ink-secondary);margin-top:4px;line-height:1.5;background:var(--bg-elev);padding:6px 10px;border-radius:6px;border-left:3px solid var(--accent);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">
        ${esc(explanation || '暂无解析')}
      </div>
      <div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;flex-wrap:wrap;">
        <button class="apple-btn small" onclick="startWrongBookPracticeById('${esc(w.id)}')">Practice</button>
        <button class="apple-btn small" onclick="toggleWrongBookMastered('${esc(w.id)}')">${w.mastered || w.completed ? 'Unmaster' : 'Mark Mastered'}</button>
        <button class="apple-btn small danger" onclick="deleteWrongBookItem('${esc(w.id)}')">Delete</button>
      </div>
    </div>
  `;
}

function startWrongBookPracticeById(id) {
  migrateWrongBookToEbbinghaus();
  const fullList = safeArray(quizState.wrongBook).filter(w => !w.completed && !w.mastered);
  const filteredIdx = fullList.findIndex(w => w.id === id);
  startWrongBookPractice(filteredIdx >= 0 ? filteredIdx : 0, fullList);
}

function startWrongBookPractice(startIdx = 0, customList) {
  migrateWrongBookToEbbinghaus();
  const list = (Array.isArray(customList) ? customList : safeArray(quizState.wrongBook).filter(w => !w.completed && !w.mastered)).map(initWrongBookEbbinghausFields);
  if (!list.length) {
    toast('All questions mastered! Great job.');
    return;
  }
  let idx = typeof startIdx === 'number' ? startIdx : 0;
  if (idx < 0 || idx >= list.length) idx = 0;
  _wbPracticeState = { list, idx, showAnswer: false, selected: null, selectedIndex: null, mode: 'practice' };
  renderWrongBookPractice();
}

function startEbbinghausReview() {
  const dueList = getDueWrongBookQuestions();
  if (!dueList.length) {
    toast('🎉 今天没有需要复习的错题！');
    return;
  }
  _wbPracticeState = {
    list: dueList,
    idx: 0,
    showAnswer: false,
    selected: null,
    selectedIndex: null,
    mode: 'ebbinghaus'
  };
  renderWrongBookPractice();
}

function renderWrongBookPractice() {
  if (!_wbPracticeState) return;
  const { list, idx, showAnswer } = _wbPracticeState;
  const w = list[idx];
  if (!w) {
    renderWrongBookListView();
    return;
  }
  initWrongBookEbbinghausFields(w);
  const stageNow = Math.min((w.reviewStage || 0) + 1, EBINGHAUS_INTERVALS.length);
  const nextDays = EBINGHAUS_INTERVALS[w.reviewStage || 0] || 0;
  const pct = Math.round(((idx + (showAnswer ? 1 : 0)) / list.length) * 100);
  const progressHtml = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:12px;color:var(--ink-secondary);gap:10px;flex-wrap:wrap;">
      <span>Question ${idx + 1} / ${list.length}</span>
      <span>复习进度: 第 ${stageNow} 次复习 / 共 ${EBINGHAUS_INTERVALS.length} 次&nbsp;&nbsp;|&nbsp;&nbsp;下次复习: ${nextDays ? nextDays + ' 天后' : '完成后掌握'}</span>
    </div>
    <div class="progress-bar" style="height:6px;margin-bottom:16px;"><div class="progress-fill" style="width:${pct}%;"></div></div>
  `;

  const options = safeArray(w.options || w.choices || w.opts);
  const optionsHtml = options.map((opt, optIdx) => {
    let cls = 'q-opt';
    const isCorrect = _wrongBookIsCorrectSelection(w, optIdx, opt);
    const isSelected = _wbPracticeState.selectedIndex === optIdx;
    if (showAnswer) {
      if (isCorrect) cls += ' correct';
      else if (isSelected) cls += ' wrong';
    } else if (isSelected) {
      cls += ' selected';
    }
    return `<button class="${cls}" onclick="selectWrongBookOption(${optIdx})" ${showAnswer ? 'disabled' : ''}>${_wrongBookOptionLabel(opt, optIdx)}</button>`;
  }).join('');
  const selectedIsCorrect = _wbPracticeState.selectedIndex !== null && options[_wbPracticeState.selectedIndex] !== undefined
    ? _wrongBookIsCorrectSelection(w, _wbPracticeState.selectedIndex, options[_wbPracticeState.selectedIndex])
    : false;

  const answerHtml = showAnswer ? `
    <div class="q-status ${selectedIsCorrect ? 'ok' : 'err'}" style="margin-top:10px;">
      ${selectedIsCorrect ? '✓ Correct!' : '✗ Wrong'}
    </div>
    <div class="q-explain show" style="margin-top:10px;">
      <strong>Correct Answer:</strong> ${esc(_wrongBookCorrect(w) || 'Not recorded')}<br>
      <strong>Your Answer:</strong> ${esc(_wrongBookText(_wbPracticeState.selected) || 'Not selected')}<br>
      ${_wrongBookExplanation(w) ? `<strong>Explanation:</strong> ${esc(_wrongBookExplanation(w))}` : ''}
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
      ${selectedIsCorrect ? `<button class="apple-btn primary" onclick="masterWrongBookItem('${esc(w.id)}')">Mark Mastered</button>` : ''}
      <button class="apple-btn primary" onclick="nextWrongBookQuestion()">Next</button>
      <button class="apple-btn" onclick="renderWrongBookListView()">Back to List</button>
    </div>
  ` : `
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
      <button class="apple-btn primary" onclick="checkWrongBookAnswer()">Check Answer</button>
      <button class="apple-btn" onclick="renderWrongBookListView()">Back to List</button>
    </div>
  `;

  const body = `
    ${progressHtml}
    <div class="q-card">
      <div class="q-meta" style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
        <span>${_wbPracticeState.mode === 'ebbinghaus' ? '艾宾浩斯今日复习' : 'Wrong Book Practice'}</span>
        ${_wrongBookStatusBadge(w)}
      </div>
      <div class="q-text" style="font-size:15px;font-weight:700;line-height:1.6;">${esc(w.question || w.prompt || '')}</div>
      <div class="q-options">${optionsHtml || '<div class="empty-state" style="padding:14px 12px;">No options saved for this question.</div>'}</div>
      ${answerHtml}
    </div>
  `;

  const bodyEl = document.getElementById('genericSheetBody');
  const titleEl = document.getElementById('genericSheetTitle');
  if (bodyEl) bodyEl.innerHTML = body;
  if (titleEl) titleEl.textContent = _wbPracticeState.mode === 'ebbinghaus' ? 'Wrong Book — 今日复习' : 'Wrong Book — Practice';
  if (!bodyEl) {
    openGenericSheet(_wbPracticeState.mode === 'ebbinghaus' ? 'Wrong Book — 今日复习' : 'Wrong Book — Practice', body, [{text:'Close', cls:'primary', onclick:()=>closeSheet('genericSheet')}]);
  }
  const sheetInner = document.getElementById('genericSheetInner');
  if (sheetInner) sheetInner.className = 'sheet wide';
}

function selectWrongBookOption(optIdx) {
  if (!_wbPracticeState || _wbPracticeState.showAnswer) return;
  const w = _wbPracticeState.list[_wbPracticeState.idx];
  const options = safeArray(w?.options || w?.choices || w?.opts);
  _wbPracticeState.selectedIndex = optIdx;
  _wbPracticeState.selected = options[optIdx];
  renderWrongBookPractice();
}

function checkWrongBookAnswer() {
  if (!_wbPracticeState || _wbPracticeState.selectedIndex === null) { toast('Please select an answer'); return; }
  const w = _wbPracticeState.list[_wbPracticeState.idx];
  const options = safeArray(w?.options || w?.choices || w?.opts);
  const isCorrect = !!w && _wrongBookIsCorrectSelection(w, _wbPracticeState.selectedIndex, options[_wbPracticeState.selectedIndex]);
  _wbPracticeState.showAnswer = true;
  if (w) handleWrongBookReview(w.id, isCorrect);
  renderWrongBookPractice();
}

function nextWrongBookQuestion() {
  if (!_wbPracticeState) return;
  _wbPracticeState.idx++;
  _wbPracticeState.showAnswer = false;
  _wbPracticeState.selected = null;
  _wbPracticeState.selectedIndex = null;
  renderWrongBookPractice();
}

function masterWrongBookItem(id) {
  const w = safeArray(quizState.wrongBook).find(x => x.id === id);
  if (w) {
    initWrongBookEbbinghausFields(w);
    w.completed = true;
    w.mastered = true;
    w.reviewed = true;
    w.reviewStage = EBINGHAUS_INTERVALS.length;
    w.nextReviewDate = null;
    w.lastReviewDate = todayISO();
    saveQuiz(); renderSharedStats();
    toast('Marked as mastered');
  }
  nextWrongBookQuestion();
}

function toggleWrongBookMastered(id) {
  const w = safeArray(quizState.wrongBook).find(x => x.id === id);
  if (w) {
    initWrongBookEbbinghausFields(w);
    const next = !(w.completed || w.mastered);
    w.completed = next;
    w.mastered = next;
    if (next) {
      w.reviewStage = EBINGHAUS_INTERVALS.length;
      w.nextReviewDate = null;
      w.lastReviewDate = todayISO();
    } else {
      w.reviewStage = 0;
      w.nextReviewDate = todayISO();
      w.consecutiveCorrect = 0;
    }
    saveQuiz(); renderSharedStats();
    renderWrongBookListView();
  }
}

function deleteWrongBookItem(id) {
  if (!confirm('Delete this wrong question?')) return;
  quizState.wrongBook = safeArray(quizState.wrongBook).filter(x => x.id !== id);
  saveQuiz(); renderSharedStats();
  renderWrongBookListView();
}

let reviewImportType = 'wordbook';

function reviewFallbackCopyText(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    toast('Prompt 已复制');
  } catch (e) {
    toast('复制失败，请手动选中复制');
  }
  document.body.removeChild(ta);
}

function reviewCopyPrompt(type) {
  const prompt = REVIEW_IMPORT_TYPES[type]?.prompt || '';
  if (!prompt) return;
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(prompt).then(() => toast('Prompt 已复制')).catch(() => reviewFallbackCopyText(prompt));
  } else {
    reviewFallbackCopyText(prompt);
  }
}

function reviewParseImportJSON(text) {
  return JSON.parse(typeof sanitizeJSON === 'function' ? sanitizeJSON(text) : String(text || '').trim());
}

function reviewExtractImportItems(data, config) {
  if (Array.isArray(data)) return data;
  for (const key of (config.aliases || [config.target])) {
    if (Array.isArray(data?.[key])) return data[key];
  }
  return [];
}

function initReviewImportWrongBookFields(item) {
  if (!item.id) item.id = uid('wb');
  if (!item.qType) item.qType = 'grammar';
  if (!item.qId) item.qId = item.question ? ('manual_' + memoryKey(item.question).slice(0, 24)) : uid('q');
  if (!Array.isArray(item.options)) item.options = item.options ? [String(item.options)] : [];
  item.question = String(item.question || '').trim();
  item.correctAnswer = String(item.correctAnswer || item.answer || '').trim();
  item.yourAnswer = item.yourAnswer ?? '';
  item.explanation = normalizeQuizExplanationValue(item.explanation || item.analysis || item.reason || '');
  if (typeof item.completed !== 'boolean') item.completed = false;
  if (typeof item.reviewStage !== 'number') item.reviewStage = 0;
  if (!item.nextReviewDate) item.nextReviewDate = todayISO();
  if (!('lastReviewDate' in item)) item.lastReviewDate = null;
  if (typeof item.reviewCount !== 'number') item.reviewCount = 0;
  if (typeof item.mastered !== 'boolean') item.mastered = false;
  if (typeof item.consecutiveCorrect !== 'number') item.consecutiveCorrect = 0;
  if (!item.ts) item.ts = Date.now();
  return (typeof initWrongBookEbbinghausFields === 'function') ? initWrongBookEbbinghausFields(item) : item;
}

function reviewNormalizeImportItem(item, target, index = 0) {
  const obj = (item && typeof item === 'object') ? { ...item } : {};
  if (target === 'wordBook') {
    if (!obj.id) obj.id = uid('wbk');
    obj.text = String(obj.text || obj.word || obj.phrase || '').trim();
    obj.meaning = String(obj.meaning || obj.translation || obj.cn || '').trim();
    obj.example = String(obj.example || '').trim();
    obj.subject = obj.subject || 'english';
    obj.source = obj.source || 'Review Import';
    obj.dateAdded = obj.dateAdded || todayISO();
    obj.addedAt = obj.addedAt || Date.now() + index;
    if (typeof obj.highlight !== 'boolean') obj.highlight = false;
    if (typeof obj.starred !== 'boolean') obj.starred = false;
    ensureSrs(obj);
  } else if (target === 'synonymLibrary') {
    if (!obj.id) obj.id = uid('syn');
    obj.groupName = String(obj.groupName || obj.name || obj.core || obj.word || 'Group').trim();
    obj.words = Array.isArray(obj.words) ? obj.words.map(w => String(w || '').trim()).filter(Boolean) : [];
    obj.notes = String(obj.notes || obj.meaning || obj.description || '').trim();
    ensureSrs(obj);
  } else if (target === 'wrongBook') {
    initReviewImportWrongBookFields(obj);
  }
  return obj;
}

function reviewImportKey(item, target) {
  if (target === 'wordBook') return memoryKey(item.text || item.word || item.id || '');
  if (target === 'synonymLibrary') return memoryKey(item.groupName || (item.words || []).join('|') || item.id || '');
  if (target === 'wrongBook') return item.qId ? String(item.qId) : memoryKey(item.question || item.id || '');
  return String(item.id || JSON.stringify(item));
}

function reviewImportPreview(type) {
  const text = document.getElementById('reviewImportText')?.value?.trim();
  const status = document.getElementById('reviewImportStatus');
  if (!text || !status) return;

  try {
    const data = reviewParseImportJSON(text);
    const config = REVIEW_IMPORT_TYPES[type] || REVIEW_IMPORT_TYPES.wordbook;
    const items = reviewExtractImportItems(data, config);

    if (!items.length) {
      status.innerHTML = `⚠️ 未检测到 ${config.label} 数据`;
      return;
    }

    status.innerHTML = `
      <div style="background:var(--bg-elev);padding:10px;border-radius:var(--radius);border:1px solid var(--line-light);">
        ✅ 检测到 ${items.length} 条 ${config.label} 数据<br>
        <span style="font-size:11px;color:var(--ink-tertiary);white-space:pre-wrap;">
          示例：${esc(JSON.stringify(items[0], null, 2).slice(0, 180))}...
        </span>
      </div>
    `;
  } catch (e) {
    status.innerHTML = `❌ JSON 格式错误：${esc(e.message)}`;
  }
}

function reviewImportExecute(type) {
  const text = document.getElementById('reviewImportText')?.value?.trim();
  const status = document.getElementById('reviewImportStatus');
  if (!text || !status) { toast('请先粘贴 JSON'); return; }

  const mode = document.querySelector('input[name="reviewImportMode"]:checked')?.value || 'merge';

  try {
    const data = reviewParseImportJSON(text);
    const config = REVIEW_IMPORT_TYPES[type] || REVIEW_IMPORT_TYPES.wordbook;
    const target = config.target;
    const items = reviewExtractImportItems(data, config).map((item, idx) => reviewNormalizeImportItem(item, target, idx)).filter(item => {
      if (target === 'wordBook') return !!item.text;
      if (target === 'synonymLibrary') return !!item.groupName && item.words.length > 0;
      if (target === 'wrongBook') return !!item.question;
      return true;
    });

    if (!items.length) { toast('未检测到有效数据'); return; }

    const existing = Array.isArray(quizState[target]) ? quizState[target] : [];
    let importedCount = items.length;
    let skippedCount = 0;

    if (mode === 'overwrite') {
      quizState[target] = items;
    } else {
      const existingKeys = new Set(existing.map(item => reviewImportKey(item, target)).filter(Boolean));
      const newItems = items.filter(item => {
        const key = reviewImportKey(item, target);
        if (key && existingKeys.has(key)) return false;
        if (key) existingKeys.add(key);
        return true;
      });
      skippedCount = items.length - newItems.length;
      importedCount = newItems.length;
      quizState[target] = [...existing, ...newItems];
    }

    if (typeof syncWordBookMemory === 'function' && (target === 'wordBook' || target === 'synonymLibrary')) syncWordBookMemory();
    saveQuiz();
    renderSharedStats();
    renderReviewCenter(_reviewCenterActiveTab);
    const newStatus = document.getElementById('reviewImportStatus');
    const msg = `✅ 成功导入 ${importedCount} 条 ${config.label} 数据（${mode === 'overwrite' ? '覆盖' : '合并'}模式）${skippedCount ? `，跳过重复 ${skippedCount} 条` : ''}`;
    if (newStatus) newStatus.innerHTML = msg;
    toast(`✅ 已导入 ${importedCount} 条 ${config.label}`);
  } catch (e) {
    status.innerHTML = `❌ 导入失败：${esc(e.message)}`;
    toast('导入失败：' + e.message);
  }
}

function getReviewPromptConfig(type) {

function renderReviewPromptPanel(container) {
  if (!container) return;
  if (!_reviewPromptType) _reviewPromptType = 'wordbook';

  _reviewCenterActiveTab = tab || 'wordbook';
  appState.currentModule = 'review';
  if (typeof saveAppState === 'function') saveAppState();
  _setReviewNavActive();
  _reviewCenterRendering = true;
  const body = _prepareReviewMainShell();
  if (_reviewCenterActiveTab === 'prompt') {
    renderReviewPromptPanel(body);
  } else if (_reviewCenterActiveTab === 'wrongbook') {
    if (_reviewOrigOpenQuizWrongBook) _reviewOrigOpenQuizWrongBook(...args);

  }
  _normalizeReviewMainShell();
  _setReviewNavActive();
  _reviewCenterRendering = false;
  if (typeof applyAppLanguage === 'function') setTimeout(applyAppLanguage, 0);
}

}

function getI18nDict() {
  return appLanguage === 'zh' ? I18N_ZH : I18N_EN;
}

function i18nTextValue(value) {
  const dict = getI18nDict();
  const raw = String(value || '');
  const trimmed = raw.trim();
  if (!trimmed || !dict[trimmed]) return raw;
  return raw.replace(trimmed, dict[trimmed]);
}

function applyAppLanguage(root = document.body) {
  if (!root) return;
  document.documentElement.lang = appLanguage === 'zh' ? 'zh-CN' : 'en';
  const langBtn = document.getElementById('btnLangToggle');
  if (langBtn) langBtn.textContent = appLanguage === 'zh' ? 'EN' : '中文';

  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      const parent = node.parentElement;
      if (!parent) return NodeFilter.FILTER_REJECT;
      if (parent.closest('textarea,input,select,pre,code,script,style,[data-no-i18n],[contenteditable]')) return NodeFilter.FILTER_REJECT;
      if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node => {
    node.nodeValue = i18nTextValue(node.nodeValue);
  });

  document.querySelectorAll('input[placeholder], textarea[placeholder], button[title], [title]').forEach(el => {
    if (el.closest('[data-no-i18n],[contenteditable]')) return;
    if (el.placeholder) el.placeholder = i18nTextValue(el.placeholder);
    if (el.title) el.title = i18nTextValue(el.title);
    if (el.getAttribute && el.getAttribute('aria-label')) el.setAttribute('aria-label', i18nTextValue(el.getAttribute('aria-label')));
  });
}

function setAppLanguageFromSettings(lang) {

}

  appLanguage = appLanguage === 'zh' ? 'en' : 'zh';

}
