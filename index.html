const HL_PRESET_COLORS = [
  { name: 'yellow', color: '#FFE15C', emoji: '🟡' },
  { name: 'green',  color: '#A8E6A3', emoji: '🟢' },
  { name: 'blue',   color: '#A8D8FF', emoji: '🔵' },
  { name: 'purple', color: '#D5B8FF', emoji: '🟣' },
  { name: 'pink',   color: '#FFB8C9', emoji: '🔴' },
  { name: 'orange', color: '#FFD8A8', emoji: '🟠' }
];

let _hlMenuState = { qId: null, passageId: null, hlId: null, selectedText: '', isUpdate: false };

function renderExplanationWithHighlights(text, qId, passageId) {
  if (!text) return esc('No explanation provided.');
  const highlights = (quizState.highlights || []).filter(h => h.qId === qId && h.source === 'Quiz Explanation');
  if (!highlights.length) return esc(text);

  // Sort highlights by position in text (longest first to handle overlaps)
  const sorted = highlights.map(h => {
    const idx = text.indexOf(h.text);
    return { ...h, idx };
  }).filter(h => h.idx >= 0).sort((a, b) => a.idx - b.idx || b.text.length - a.text.length);

  if (!sorted.length) return esc(text);

  // Build the highlighted HTML
  let result = '';
  let lastIdx = 0;
  const used = new Set();

  for (const h of sorted) {
    if (used.has(h.idx) && sorted.filter(s => s.idx === h.idx).length > 1) continue;
    if (h.idx < lastIdx) continue; // skip overlapping

    // Add text before this highlight
    if (h.idx > lastIdx) {
      result += esc(text.slice(lastIdx, h.idx));
    }

    result += `<span class="explanation-highlight" data-hl-id="${esc(h.id)}" style="background:${esc(h.color || '#FFE15C')};" onclick="onHighlightClick(event, '${esc(h.id)}')">${esc(h.text)}</span>`;
    lastIdx = h.idx + h.text.length;
    used.add(h.idx);
  }

  // Add remaining text
  if (lastIdx < text.length) {
    result += esc(text.slice(lastIdx));
  }

  return result;
}

function onHighlightClick(event, hlId) {
  event.preventDefault();
  event.stopPropagation();

  const hl = (quizState.highlights || []).find(h => h.id === hlId);
  if (!hl) return;

  _hlMenuState = {
    qId: hl.qId,
    passageId: hl.passageId,
    hlId: hlId,
    selectedText: hl.text,
    isUpdate: true
  };

  showHighlightFloatMenu(event.target, true);
}

function showHighlightFloatMenu(anchorEl, showRemove) {
  hideHighlightFloatMenu();
  hideColorPickerPanel();

  const menu = document.getElementById('hlFloatMenu');
  if (!menu) return;

  let btns = `<button class="hl-float-btn" onclick="onHlColorBtnClick()">🎨 Color</button>`;
  if (showRemove) {
    btns += `<button class="hl-float-btn danger" onclick="removeHighlight(_hlMenuState.hlId)">✕ Remove</button>`;
  }
  menu.innerHTML = btns;
  menu.style.display = 'flex';

  // Position near the anchor element
  const rect = anchorEl.getBoundingClientRect();
  const menuW = 220;
  let left = rect.left + rect.width / 2 - menuW / 2;
  let top = rect.top - 48;

  if (left < 8) left = 8;
  if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
  if (top < 8) top = rect.bottom + 8;

  menu.style.left = left + 'px';
  menu.style.top = top + 'px';

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('pointerdown', _hlFloatMenuCloseHandler, true);
  }, 50);
}

let _hlFloatMenuCloseHandler = function(e) {
  const menu = document.getElementById('hlFloatMenu');
  const picker = document.getElementById('colorPickerPanel');
  if (menu && !menu.contains(e.target) && (!picker || !picker.contains(e.target))) {
    hideHighlightFloatMenu();
    hideColorPickerPanel();
  }
};

function hideHighlightFloatMenu() {
  const menu = document.getElementById('hlFloatMenu');
  if (menu) menu.style.display = 'none';
  document.removeEventListener('pointerdown', _hlFloatMenuCloseHandler, true);
}

function onHlColorBtnClick() {
  showColorPicker(_hlMenuState.selectedText, _hlMenuState.qId, _hlMenuState.hlId);
}

function showColorPicker(selectedText, qId, hlId) {
  const panel = document.getElementById('colorPickerPanel');
  const presetsEl = document.getElementById('colorPickerPresets');
  if (!panel || !presetsEl) return;

  // Find current color for this highlight
  const existingHl = hlId ? (quizState.highlights || []).find(h => h.id === hlId) : null;
  const currentColor = existingHl ? existingHl.color : '';

  // Render preset swatches
  presetsEl.innerHTML = HL_PRESET_COLORS.map(c =>
    `<div class="color-swatch${c.color === currentColor ? ' selected' : ''}" style="background:${c.color};" title="${c.name}" onclick="onPresetColorSelected('${c.color}','${c.name}')"></div>`
  ).join('');

  // Position near the float menu
  const menu = document.getElementById('hlFloatMenu');
  if (menu && menu.style.display !== 'none') {
    const rect = menu.getBoundingClientRect();
    panel.style.left = rect.left + 'px';
    panel.style.top = (rect.bottom + 6) + 'px';
  } else {
    // Position near selection
    const sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
      const range = sel.getRangeAt(0);
      const rect = range.getBoundingClientRect();
      panel.style.left = (rect.left + rect.width / 2 - 120) + 'px';
      panel.style.top = (rect.bottom + 8) + 'px';
    }
  }

  // Make sure it stays in viewport
  const panelLeft = parseInt(panel.style.left) || 0;
  if (panelLeft + 280 > window.innerWidth) {
    panel.style.left = (window.innerWidth - 290) + 'px';
  }

  panel.classList.add('open');
}

function hideColorPickerPanel() {
  const panel = document.getElementById('colorPickerPanel');
  if (panel) panel.classList.remove('open');
}

function onPresetColorSelected(color, colorName) {
  applyHighlight(_hlMenuState.selectedText, _hlMenuState.qId, color, colorName, _hlMenuState.hlId);
  hideColorPickerPanel();
  hideHighlightFloatMenu();
}

function applyHighlight(text, qId, color, colorName, hlId) {
  if (!text || !text.trim()) return;
  text = text.trim();

  quizState.highlights = quizState.highlights || [];

  if (hlId) {
    // Update existing highlight
    const hl = quizState.highlights.find(h => h.id === hlId);
    if (hl) {
      hl.color = color;
      hl.colorName = colorName || 'custom';
      saveQuiz();
      render();
      toast('颜色已更新');
      return;
    }
  }

  // Create new highlight
  const newHl = {
    id: 'hl_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    text: text,
    color: color,
    colorName: colorName || 'custom',
    passageId: _hlMenuState.passageId || '',
    qId: qId,
    source: 'Quiz Explanation',
    ts: Date.now()
  };
  quizState.highlights.push(newHl);
  saveQuiz();
  render();
  toast('已高亮');
}

function removeHighlight(hlId) {
  if (!hlId) return;
  quizState.highlights = (quizState.highlights || []).filter(h => h.id !== hlId);
  saveQuiz();
  hideHighlightFloatMenu();
  hideColorPickerPanel();
  render();
  toast('高亮已移除');
}

function bindExplanationSelection() {
  const content = document.getElementById('mainContent');
  if (!content) return;

  // Listen for text selection end on explanation areas
  content.addEventListener('pointerup', function(e) {
    // Ignore if clicking on highlight or float menu
    if (e.target.closest('.explanation-highlight') || e.target.closest('.hl-float-menu') || e.target.closest('.color-picker-panel')) return;

    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) return;

    const selectedText = sel.toString().trim();
    if (!selectedText) return;

    // Check if the selection is within an explanation area
    const anchorNode = sel.anchorNode;
    if (!anchorNode) return;

    const expEl = anchorNode.parentElement ? anchorNode.parentElement.closest('[data-exp-qid]') : null;
    if (!expEl) return;

    const qId = expEl.dataset.expQid;
    const passageId = currentPassage()?.id || '';

    _hlMenuState = {
      qId: qId,
      passageId: passageId,
      hlId: null,
      selectedText: selectedText,
      isUpdate: false
    };

    // Show float menu with Color button only
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();

    const menu = document.getElementById('hlFloatMenu');
    if (!menu) return;

    menu.innerHTML = `<button class="hl-float-btn" onclick="onHlColorBtnClick()">🎨 Color</button>`;
    menu.style.display = 'flex';

    const menuW = 160;
    let left = rect.left + rect.width / 2 - menuW / 2;
    let top = rect.top - 48;
    if (left < 8) left = 8;
    if (left + menuW > window.innerWidth - 8) left = window.innerWidth - menuW - 8;
    if (top < 8) top = rect.bottom + 8;

    menu.style.left = left + 'px';
    menu.style.top = top + 'px';

    setTimeout(() => {
      document.addEventListener('pointerdown', _hlFloatMenuCloseHandler, true);
    }, 50);
  });

  // Handle click on already-highlighted text (via event delegation — the onclick is inline)
  // Already handled by onHighlightClick via inline onclick on .explanation-highlight spans
}

// Bind on initial load
setTimeout(() => bindExplanationSelection(), 100);

// Re-bind after render
const _origRenderV4 = render;
render = function() {
  _origRenderV4();
  // Re-bind explanation selection after render
  setTimeout(() => bindExplanationSelection(), 50);
};

// --- 1. Locate Button: scroll to first unanswered or active question ---
function locateCurrentQuestion() {
  const p = currentPassage();
  if (!p) { toast('No section selected'); return; }
  const activeIds = getActiveQuizSetIds();
  const activeSet = new Set(activeIds);
  const isGrammar = quizState.activeTab === 'grammar';
  const pool = isGrammar
    ? quizState.grammarQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId))
    : quizState.vocabularyQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId));

  // Find first unanswered
  const firstUnanswered = pool.find(q => !quizState.answerLog[q.id]);
  const targetId = firstUnanswered ? firstUnanswered.id : (pool.length ? pool[0].id : null);
  if (!targetId) { toast('No questions to locate'); return; }

  const card = document.querySelector(`.q-card[data-qid="${targetId}"]`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.style.transition = 'box-shadow 0.3s ease, border-color 0.3s ease';
    card.style.boxShadow = '0 0 0 3px var(--accent)';
    card.style.borderColor = 'var(--accent)';
    setTimeout(() => { card.style.boxShadow = ''; card.style.borderColor = ''; }, 1800);
    toast('Located Q' + (pool.indexOf(firstUnanswered || pool[0]) + 1));
  } else {
    toast('Question card not in view');
  }
}

// --- 4. Wrong Book Quick Add (+) Button ---
function addToWrongBookQuick(qId, qType) {
  const pool = qType === 'grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
  const q = pool.find(x => x.id === qId);
  if (!q) return;
  const exists = quizState.wrongBook.some(w => w.qId === qId || w.question === q.question);
  if (exists) {
    toast('已在错题本中');
    return;
  }
  const log = quizState.answerLog[qId];
  quizState.wrongBook.push({
    id: uid('wb'), qType, qId,
    passageId: q.passageId || null, quizSetId: q.quizSetId || null,
    question: q.question, options: q.options || [], correctAnswer: q.answer,
    yourAnswer: log ? log.chosen : null, explanation: q.explanation || '',
    ts: Date.now(), completed: false, reviewed: false, lastReviewedAt: null,
    reviewStage: 0, nextReviewDate: todayISO(), lastReviewDate: null,
    reviewCount: 0, mastered: false, consecutiveCorrect: 0
  });
  saveQuiz();
  renderSharedStats();
  toast('已加入错题本 ✅');
}

// --- 5. Today Panel ---
function openTodayPanel() {
  const today = todayISO();
  const now = Date.now();

  // Wrong Book: items with nextReviewDate <= today and not mastered
  const dueWrong = safeArray(quizState.wrongBook).map(initWrongBookEbbinghausFields)
    .filter(w => !w.mastered && !w.completed && (!w.nextReviewDate || w.nextReviewDate <= today));
  const wrongCount = dueWrong.length;

  // Word Book: items with srsNext <= now
  const dueWords = safeArray(quizState.wordBook).filter(w => {
    ensureSrs(w);
    return w.srsNext <= now;
  });
  const wordCount = dueWords.length;

  const totalDue = wrongCount + wordCount;

  const bodyHtml = `
    <div style="display:flex;flex-direction:column;gap:16px;">
      <div style="text-align:center;padding:8px 0;">
        <div style="font-size:36px;font-weight:800;letter-spacing:-0.03em;">${totalDue}</div>
        <div style="font-size:12px;color:var(--ink-tertiary);font-weight:600;margin-top:4px;">今日待复习项目</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="res-stat-card" style="cursor:pointer;" onclick="closeSheet('genericSheet');setTimeout(()=>openReviewCenter('wrongbook'),200);setTimeout(()=>startEbbinghausReview(),400);">
          <div class="label">❌ 错题待复习</div>
          <div class="value">${wrongCount}</div>
          <div class="sub">Wrong Book</div>
        </div>
        <div class="res-stat-card" style="cursor:pointer;" onclick="closeSheet('genericSheet');setTimeout(()=>openReviewCenter('wordbook'),200);">
          <div class="label">📘 单词待复习</div>
          <div class="value">${wordCount}</div>
          <div class="sub">Word Book</div>
        </div>
      </div>
      ${totalDue > 0 ? `
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        ${wrongCount > 0 ? `<button class="apple-btn primary" onclick="closeSheet('genericSheet');setTimeout(()=>openReviewCenter('wrongbook'),200);setTimeout(()=>startEbbinghausReview(),400);">开始复习错题 (${wrongCount})</button>` : ''}
        ${wordCount > 0 ? `<button class="apple-btn primary" onclick="closeSheet('genericSheet');setTimeout(()=>{if(typeof startWordBookReview==='function')startWordBookReview('due');else openReviewCenter('wordbook');},200);">开始复习单词 (${wordCount})</button>` : ''}
      </div>` : `<div class="empty-state" style="padding:16px;">🎉 今天没有待复习的内容！</div>`}
    </div>
  `;

  openGenericSheet('📅 Today', bodyHtml, [
    { text: 'Close', cls: 'primary', onclick: () => closeSheet('genericSheet') }
  ]);
}

// --- 6. File Import Enhancement — Generic file import helper ---
function _genericImportFromFile(textareaId, statusId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.style.display = 'none';
  document.body.appendChild(input);
  input.addEventListener('change', function(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) { document.body.removeChild(input); return; }
    const statusEl = statusId ? document.getElementById(statusId) : null;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const text = ev.target.result;
        if (!text || !text.trim()) {
          toast('文件为空');
          if (statusEl) statusEl.textContent = '❌ 文件为空';
          document.body.removeChild(input);
          return;
        }
        JSON.parse(text); // validate
        const ta = document.getElementById(textareaId);
        if (ta) {
          ta.value = text;
          ta.dispatchEvent(new Event('input'));
        }
        if (statusEl) statusEl.textContent = '✅ 文件已读取，请点击导入按钮完成导入。';
        toast('✅ 文件读取成功');
      } catch (err) {
        toast('❌ JSON 格式错误：' + err.message);
        if (statusEl) statusEl.textContent = '❌ JSON 格式错误：' + err.message;
      }
      document.body.removeChild(input);
    };
    reader.onerror = function() {
      toast('❌ 文件读取失败');
      document.body.removeChild(input);
    };
    reader.readAsText(file);
  });
  input.click();
}

// Reading file import
function importReadingFromFile() {
  _genericImportFromFile('readingImportText', null);
  // Wait for file to load, then auto-import
  const checkAndImport = setInterval(() => {
    const ta = document.getElementById('readingImportText');
    if (ta && ta.value.trim()) {
      clearInterval(checkAndImport);
      importReadingJSON();
    }
  }, 300);
  setTimeout(() => clearInterval(checkAndImport), 15000);
}

// Study Resource file import
function importResourceFromFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.style.display = 'none';
  document.body.appendChild(input);
  input.addEventListener('change', function(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) { document.body.removeChild(input); return; }
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const text = ev.target.result;
        const data = JSON.parse(text);
        const items = Array.isArray(data) ? data : (data.resources || data.items || [data]);
        let imported = 0;
        items.forEach(item => {
          if (!item || typeof item !== 'object') return;
          if (!item.id) item.id = uid('res');
          if (!item.subject) item.subject = appState.currentSubject || 'english';
          if (!item.status) item.status = 'pending';
          if (!item.startDate) item.startDate = todayISO();
          if (!item.createdAt) item.createdAt = todayISO();
          if (!item.tags) item.tags = [];
          resources.push(item);
          imported++;
        });
        saveResState();
        render();
        toast(`✅ 已导入 ${imported} 条资源`);
      } catch (err) {
        toast('❌ JSON 格式错误：' + err.message);
      }
      document.body.removeChild(input);
    };
    reader.onerror = function() { toast('❌ 文件读取失败'); document.body.removeChild(input); };
    reader.readAsText(file);
  });
  input.click();
}
