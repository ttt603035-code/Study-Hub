<title>Study Dashboard — Unified</title>
<style>
/* ============================================================
   APPLE HUMAN INTERFACE — DARK THEME — UNIFIED DESIGN SYSTEM
   ============================================================ */
:root {
  --bg: #FFFFFF;
  --bg-elev: #F5F5F7;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F0F0F2;
  --bg-input: #FFFFFF;
  --bg-popover: #FFFFFF;
  --ink: #1D1D1F;
  --ink-secondary: #6E6E73;
  --ink-tertiary: #8E8E93;
  --ink-faint: #D1D1D6;
  --line: #D2D2D7;
  --line-light: #E5E5EA;
  --accent: #1D1D1F;
  --accent-hover: #333333;
  --green: #1D1D1F;
  --red: #555555;
  --orange: #666666;
  --yellow: #888888;
  --purple: #555555;
  --pink: #555555;
  --teal: #555555;

  --english: #1D1D1F;
  --english-tint: rgba(0,0,0,0.04);
  --chinese: #444444;
  --chinese-tint: rgba(0,0,0,0.03);
  --politic: #888888;
  --politic-tint: rgba(0,0,0,0.03);

  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --radius-pill: 999px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
  --blur: saturate(180%) blur(20px);

  --sidebar-w: 240px;
  --topbar-h: 56px;
}



* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
::selection { background: rgba(0,0,0,0.1); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #CCC; border-radius: 10px; }
::-webkit-scrollbar-track { background: transparent; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font: inherit; color: var(--ink); background: var(--bg-input); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 8px 12px; outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
textarea { resize: vertical; }

/* ========== LAYOUT ========== */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-areas: "sidebar topbar" "sidebar content";
  height: 100vh;
  overflow: hidden;
}

/* ========== SIDEBAR ========== */
.sidebar {
  grid-area: sidebar;
  background: var(--bg-elev);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  padding: 16px 12px;
  gap: 20px;
  overflow-y: auto;
}
.sidebar-brand {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.02em;
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 0;
}
.sidebar-brand .logo {
  display: none;
}

/* Apple Capsule Menu */
.capsule-menu {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 4px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.capsule-item {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}
.capsule-item:hover { background: var(--bg-card-hover); color: var(--ink); }
.capsule-item.active { background: var(--accent); color: #FFFFFF; }
.capsule-item .icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-nav-wrap { display: flex; flex-direction: column; gap: 8px; }
.sidebar-divider { height: 1px; background: var(--line); margin: -4px 8px 0; opacity: 0.75; flex-shrink: 0; }
.capsule-item[data-action] { color: var(--ink-secondary); }
.capsule-item[data-action]:active, .capsule-item[data-module]:active, .capsule-item[data-resource-nav]:active { transform: scale(0.985); }
.sidebar-ia { display:flex; flex-direction:column; gap:10px; }
.sidebar-ia-section { display:flex; flex-direction:column; gap:6px; }
.sidebar-ia-head { padding:0 8px; display:flex; align-items:center; justify-content:space-between; gap:8px; cursor:pointer; user-select:none; }
.sidebar-ia-title { font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-tertiary); }
.sidebar-ia-caret { width:16px; height:16px; display:flex; align-items:center; justify-content:center; color:var(--ink-tertiary); font-size:11px; transition:transform .2s cubic-bezier(0.25,1,0.5,1); }
.sidebar-ia-section.collapsed .sidebar-ia-caret { transform:rotate(-90deg); }
.sidebar-ia-content { max-height:260px; opacity:1; overflow:hidden; transition:max-height .22s cubic-bezier(0.25,1,0.5,1), opacity .18s ease, transform .22s cubic-bezier(0.25,1,0.5,1); }
.sidebar-ia-section.collapsed .sidebar-ia-content { max-height:0; opacity:0; transform:translateY(-4px); pointer-events:none; }

/* Sidebar Subject Pills */
.sidebar-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-tertiary);
  padding: 0 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sidebar-subjects {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.subject-pill {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.12s ease;
}
.subject-pill:hover { background: var(--bg-card); color: var(--ink); }
.subject-pill.active { background: var(--bg-card); color: var(--ink); font-weight: 600; }
.subject-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.subject-pill .badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  background: var(--bg-card-hover);
  color: var(--ink-secondary);
}

/* ========== TOPBAR ========== */
.topbar {
  grid-area: topbar;
  background: rgba(255,255,255,0.85);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.topbar-title {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
}
.topbar-search {
  flex: 1;
  max-width: 400px;
  position: relative;
}
.topbar-search input {
  width: 100%;
  padding: 8px 12px 8px 36px;
  border-radius: var(--radius-pill);
  background: var(--bg-card);
  border: 1px solid var(--line);
  font-size: 13px;
}
.topbar-search input:focus { border-color: var(--accent); background: var(--bg-input); }
.topbar-search .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--ink-tertiary);
}
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

/* Apple Capsule Button */
.apple-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.12s ease;
  white-space: nowrap;
}
.apple-btn:hover { background: var(--bg-card-hover); border-color: var(--ink-faint); }
.apple-btn:active { transform: scale(0.97); }
.apple-btn.primary { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.apple-btn.primary:hover { background: var(--accent-hover); color: #FFFFFF; }
.apple-btn.danger { color: #1D1D1F; border-color: rgba(0,0,0,0.1); }
.apple-btn.danger:hover { background: rgba(0,0,0,0.03); }
.apple-btn.small { padding: 5px 10px; font-size: 11px; }
.apple-btn.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }

/* AI Studio — shared Apple HIG module import surface */
.ai-studio-panel {
  padding: 16px;
  background: var(--bg-card);
  background: color-mix(in srgb, var(--bg-card) 88%, transparent);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
}
.ai-studio-title {
  font-weight: 800;
  font-size: 17px;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.ai-studio-module-row {
  display: grid;
  grid-template-columns: 88px minmax(180px, 320px);
  gap: 10px;
  align-items: center;
  margin-bottom: 14px;
}
.ai-studio-module-row > label,
.ai-studio-kicker {
  font-size: 12px;
  font-weight: 800;
  color: var(--ink-tertiary);
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
.ai-studio-select-wrap { position: relative; }
.ai-studio-select-wrap::after {
  content: "⌄";
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-54%);
  pointer-events: none;
  font-size: 16px;
  color: var(--ink-secondary);
}
.ai-studio-select {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  border-radius: 14px;
  padding: 10px 36px 10px 14px;
  border: 1px solid var(--line);
  background: var(--bg-input);
  background: linear-gradient(180deg, color-mix(in srgb, var(--bg-input) 92%, white 8%), var(--bg-input));
  color: var(--ink);
  font-size: 14px;
  font-weight: 700;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), var(--shadow);
  transition: border-color .14s ease, box-shadow .14s ease, background .14s ease;
}
.ai-studio-select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,0,0,0.06), var(--shadow);
}
.ai-studio-divider {
  height: 1px;
  background: var(--line-light);
  margin: 14px 0;
}
.ai-studio-section { display: flex; flex-direction: column; gap: 10px; }
.ai-studio-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}
.ai-studio-section-title {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-top: 2px;
}
.ai-studio-prompt-box {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 12px;
  font-size: 11px;
  color: var(--ink-secondary);
  line-height: 1.6;
  white-space: pre-wrap;
  max-height: 180px;
  overflow-y: auto;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  cursor: text;
  user-select: text;
  -webkit-user-select: text;
}
.ai-studio-import-mode {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--ink-secondary);
}
.ai-studio-import-mode label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
}
.ai-studio-import-mode > label:first-child {
  font-weight: 800;
  color: var(--ink-secondary);
  cursor: default;
}
.ai-studio-import-textarea {
  width: 100%;
  min-height: 190px;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 12px;
  line-height: 1.55;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--bg-elev);
  color: var(--ink);
  resize: vertical;
}
.ai-studio-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.ai-studio-status {
  min-height: 38px;
  background: var(--bg-elev);
  border: 1px solid var(--line-light);
  border-radius: 14px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--ink-tertiary);
  line-height: 1.5;
}
@media (max-width: 720px) {
  .ai-studio-module-row { grid-template-columns: 1fr; }
  .ai-studio-select { min-height: 42px; }
}

/* ========== CONTENT AREA ========== */
.content {
  grid-area: content;
  overflow-y: auto;
  padding: 24px 32px 80px;
}

/* ========== QUIZ HUB STYLES ========== */
.quiz-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.section-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
  min-width: 0;
}
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--bg-card);
  color: var(--ink-secondary);
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
  cursor: pointer;
  user-select: none;
  transition: all 0.12s ease;
}
.pill:hover { background: var(--bg-card-hover); color: var(--ink); }
.pill.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.pill .pill-act { opacity: 0.5; font-size: 10px; padding: 0 3px; border-radius: 4px; }
.pill .pill-act:hover { opacity: 1; }
.pill.add { background: transparent; border: 1px dashed var(--ink-faint); color: var(--ink-tertiary); }
.pill.add:hover { border-color: var(--ink-secondary); color: var(--ink); }

.quiz-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-card);
  padding: 3px;
  border-radius: var(--radius);
  margin-bottom: 16px;
  max-width: 300px;
}
.quiz-tab {
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.12s ease;
}
.quiz-tab.active { background: var(--accent); color: #FFFFFF; }
.quiz-tab:hover:not(.active) { color: var(--ink); }

.quizset-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.quizset-bar label { font-size: 12px; color: var(--ink-tertiary); }
.quizset-bar select {
  font-size: 13px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-card);
  border: 1px solid var(--line);
  color: var(--ink);
}

/* Question cards */
.q-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
  transition: border-color 0.15s ease;
}
.q-card:hover { border-color: var(--ink-faint); }
.q-meta { font-size: 10px; color: var(--ink-tertiary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.q-tool-btn {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-pill);
  background: var(--bg-elev);
  color: var(--ink-secondary);
  border: 1px solid var(--line);
  cursor: pointer;
  transition: all 0.12s ease;
}
.q-tool-btn:hover { background: var(--bg-card-hover); color: var(--ink); }
.q-text { font-size: 14px; line-height: 1.7; margin-bottom: 12px; color: var(--ink); }
.q-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.q-opt {
  padding: 12px 16px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  background: var(--bg-elev);
  text-align: left;
  color: var(--ink);
  transition: all 0.12s ease;
  user-select: text;
}
.q-opt:hover { background: var(--bg-card-hover); border-color: var(--ink-faint); }
.q-opt.selected { border-color: #1D1D1F; background: rgba(0,0,0,0.03); }
.q-opt.correct { border-color: #1D1D1F; background: rgba(0,0,0,0.04); color: #1D1D1F; }
.q-opt.wrong { border-color: #AAA; background: rgba(0,0,0,0.03); color: #999; }
.q-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.q-actions button {
  padding: 7px 14px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--line);
  background: var(--bg-card);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.12s ease;
}
.q-actions button:hover { background: var(--bg-card-hover); }
.q-actions button:active { transform: scale(0.97); }
.q-actions button.primary { background: var(--accent); color: #FFFFFF; border-color: var(--accent); }
.q-actions button.primary:hover { background: var(--accent-hover); }
.q-explain {
  margin-top: 10px;
  padding: 12px 14px;
  background: var(--bg-elev);
  border-left: 3px solid rgba(0,0,0,0.15);
  font-size: 12px;
  line-height: 1.7;
  color: var(--ink-secondary);
  border-radius: var(--radius-sm);
  display: none;
}
.q-explain.show { display: block; }
.q-status { margin-top: 8px; font-size: 12px; font-weight: 600; }
.q-status.ok { color: #1D1D1F; }
.q-status.err { color: #999; }

/* Reading area */
.reading-body {
  font-size: 15px;
  line-height: 2;
  color: var(--ink);
  white-space: pre-wrap;
  word-wrap: break-word;
}
.reading-body .word { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.reading-body .word:hover { background: rgba(0,0,0,0.04); }
.reading-body .hl-yellow { background: rgba(0,0,0,0.08); }
.reading-body .hl-blue { background: rgba(0,0,0,0.05); }
.reading-body .hl-pink { background: rgba(0,0,0,0.1); }
.reading-body .hl { cursor: pointer; border-radius: 2px; padding: 0 1px; }
.reading-body .hl.has-note { box-shadow: inset 0 -2px 0 rgba(255,255,255,0.4); }
.reading-body .replaced { color: #666; font-weight: 600; }

.sel-menu {
  position: fixed;
  z-index: 5000;
  background: #1D1D1F;
  border: 1px solid #333;
  border-radius: var(--radius-pill);
  padding: 5px;
  display: flex;
  gap: 4px;
  box-shadow: var(--shadow-lg);
  font-size: 12px;
  backdrop-filter: var(--blur);
}
.sel-menu button {
  background: transparent;
  color: #FFFFFF;
  border: 1px solid rgba(255,255,255,0.2);
  padding: 6px 12px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: all 0.12s;
}
.sel-menu button:hover { background: rgba(255,255,255,0.1); }
.sel-menu .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }

/* ====== QUIZ WORD SELECTION — Apple Books style ====== */
.q-selectable { user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;cursor:text; }
.q-word-token { display:inline;border-radius:4px;transition:background 0.14s ease, box-shadow 0.14s ease;padding:0 2px;cursor:pointer; }
.q-word-token:hover { background:rgba(162,132,94,0.12); }
.q-word-token.qs-selected { background:rgba(162,132,94,0.28);box-shadow:inset 0 -1px 0 rgba(162,132,94,0.35); }
.q-word-token.qs-hl-persist { background:rgba(162,132,94,0.34);box-shadow:inset 0 -1px 0 rgba(115,88,53,0.45); }
.q-word-token.qs-memory { background:rgba(162,132,94,0.18);box-shadow:inset 0 -1px 0 rgba(162,132,94,0.30); }
.q-word-token[data-memory-tip] { position:relative; }
.q-word-token[data-memory-tip]:hover::after { content:attr(data-memory-tip); position:absolute; left:50%; bottom:100%; transform:translateX(-50%) translateY(-6px); background:rgba(29,29,31,0.92); color:#fff; border-radius:10px; padding:5px 8px; font-size:11px; font-weight:650; white-space:nowrap; z-index:20; pointer-events:none; box-shadow:var(--shadow-lg); }
.memory-status-pill { display:inline-flex; align-items:center; height:22px; padding:0 9px; border-radius:999px; font-size:10px; font-weight:800; border:1px solid var(--line); background:var(--bg-card); color:var(--ink-secondary); }
.memory-status-pill.new { color:var(--ink); background:rgba(162,132,94,0.15); border-color:rgba(162,132,94,0.35); }
.memory-status-pill.learning { color:var(--ink); background:rgba(0,0,0,0.04); }
.memory-status-pill.known { color:var(--bg); background:var(--accent); border-color:var(--accent); }
.qs-float-menu { position:fixed;z-index:8000;background:rgba(29,29,31,0.94);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:5px;display:flex;gap:4px;box-shadow:0 10px 30px rgba(0,0,0,0.26);animation:floatMenuIn 0.16s cubic-bezier(0.25,1,0.5,1);pointer-events:all;max-width:calc(100vw - 16px);overflow-x:auto; }
@keyframes floatMenuIn { from{opacity:0;transform:scale(0.92) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)} }
.qs-float-btn { background:transparent;border:1px solid rgba(255,255,255,0.16);color:#fff;border-radius:13px;padding:6px 12px;font-size:12px;font-weight:650;cursor:pointer;white-space:nowrap;transition:background 0.14s ease,border-color 0.14s ease,transform 0.14s ease;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; }
.qs-float-btn:hover { background:rgba(255,255,255,0.14); }
.qs-float-btn:active { transform:scale(0.97); }
.qs-float-btn.added { background:rgba(162,132,94,0.5);border-color:#A2845E; }

/* ======= MOBILE RESPONSIVE — Quiz Hub (#8) ======= */
@media (max-width: 640px) {
  .quiz-toolbar { gap:6px;padding:8px 10px;flex-wrap:wrap; }
  .quiz-toolbar .apple-btn { font-size:11px;padding:5px 9px;height:30px; }
  .section-pills { gap:4px; }
  .section-pills .pill { font-size:11px;padding:5px 9px; }
  .q-card { padding:12px 10px; }
  .q-text { font-size:14px !important; }
  .q-opt { font-size:13px;padding:10px 10px; }
  .q-actions button { font-size:12px;padding:8px 10px; }
  .qs-float-menu { left:8px !important;right:8px;width:auto;flex-wrap:wrap;border-radius:14px; }
  .qs-float-btn { font-size:11px;padding:5px 10px; }
  .quiz-tabs { gap:4px; }
  .quiz-tab { font-size:12px;padding:7px 12px; }
}

/* ========== STUDY RESOURCES STYLES ========== */
.res-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.res-stat-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.res-stat-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.res-stat-card .label { font-size: 11px; font-weight: 600; color: var(--ink-tertiary); text-transform: uppercase; letter-spacing: 0.04em; }
.res-stat-card .value { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.res-stat-card .sub { font-size: 11px; color: var(--ink-tertiary); }
.res-stat-card.countdown { background: var(--bg-card); border-color: var(--line); }
.res-stat-card.countdown .value { color: var(--ink); }

.res-filter-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.res-filter-bar label { font-size: 11px; font-weight: 600; color: var(--ink-tertiary); }
.res-filter-bar select {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  color: var(--ink);
}

.res-section { margin-bottom: 30px; }
.res-section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.res-section-head h3 {

}

.ex-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 2px solid var(--ink-faint);
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s ease;
}
.ex-check.checked { background: var(--accent); border-color: var(--accent); }

}

/* ========== SHARED STATS BAR (in sidebar bottom) ========== */

/* ========== APPLE SHEET MODAL ========== */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 9000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: #FFFFFF;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  width: 560px;
  max-width: 92vw;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: sheetIn 0.2s ease-out;
}
.sheet.wide { width: 720px; }
.sheet.full { width: 100%; height: 100%; max-height: 100%; border-radius: 0; }
@keyframes sheetIn {
  from { opacity: 0; transform: translateY(10px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.sheet-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sheet-head h3 { font-size: 15px; font-weight: 700; }
.sheet-head .close-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #F0F0F2;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  color: #666;
  cursor: pointer;
}
.sheet-head .close-btn:hover { background: var(--bg-card-hover); }
.sheet-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.sheet-foot {
  padding: 12px 20px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* Form fields in sheets */
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--ink-tertiary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.03em; }
.field input, .field select, .field textarea {
  width: 100%;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
  background: var(--bg-card);
  font-size: 13px;
  color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #1D1D1F;
  color: #FFFFFF;
  padding: 10px 20px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 500;
  z-index: 10000;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
}
.toast.show { opacity: 1; }


/* ========== STUDY ROADMAP 2.0 ========== */
.roadmap-page { display: flex; flex-direction: column; gap: 20px; }
.roadmap-hero { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.roadmap-card {
  background: var(--bg-card);

}
.roadmap-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.roadmap-kicker { font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-tertiary); margin-bottom: 8px; }

.roadmap-mini-stat { background: var(--bg-elev); border: 1px solid var(--line-light); border-radius: var(--radius-sm); padding: 10px; }
.roadmap-mini-stat .num { font-size: 18px; font-weight: 800; }
.roadmap-mini-stat .label { font-size: 10px; color: var(--ink-tertiary); font-weight: 700; text-transform: uppercase; margin-top: 2px; }
.roadmap-section { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow); }
.roadmap-section-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.roadmap-section-head h3 { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
.roadmap-subject-group { border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--bg-elev); overflow: hidden; margin-bottom: 12px; }
.roadmap-subject-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 16px; cursor:pointer; transition: background 0.15s ease; }
.roadmap-subject-head:hover { background: var(--bg-card-hover); }
.roadmap-subject-title { display:flex; align-items:center; gap:10px; font-size:14px; font-weight:800; }
.roadmap-subject-dot { width:9px; height:9px; border-radius:50%; background: var(--ink-tertiary); }
.roadmap-disclosure { width:18px; height:18px; display:flex; align-items:center; justify-content:center; color:var(--ink-tertiary); transition: transform 0.18s cubic-bezier(0.25,1,0.5,1); font-size:13px; }

.roadmap-plan-list { display: flex; flex-direction: column; gap: 10px; }
.roadmap-plan-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: start;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  cursor:pointer;
  transition: transform 0.18s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
}
.roadmap-plan-card:hover { border-color: var(--ink-faint); transform: translateY(-1px); }
.roadmap-plan-card.dragging, .roadmap-event.dragging { opacity: 0.55; transform: scale(0.99); }
.roadmap-plan-card.drag-over, .roadmap-event.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,0,0,0.08); }
.roadmap-grip { width: 18px; padding-top: 3px; cursor: grab; display: grid; grid-template-columns: repeat(2, 3px); gap: 3px; opacity: 0.45; }
.roadmap-grip span { width: 3px; height: 3px; background: var(--ink-tertiary); border-radius: 50%; }
.roadmap-plan-title { font-size: 14px; font-weight: 800; color: var(--ink); margin-bottom: 5px; }
.roadmap-plan-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: 11px; color: var(--ink-tertiary); }
.roadmap-status { display: inline-flex; align-items: center; height: 22px; padding: 0 9px; border-radius: var(--radius-pill); font-size: 10px; font-weight: 800; letter-spacing: 0.01em; border: 1px solid var(--line); background: var(--bg-card); color: var(--ink-secondary); }
.roadmap-status.not_started { color: var(--ink-tertiary); }
.roadmap-status.in_progress { color: var(--ink); background: rgba(0,0,0,0.04); }
.roadmap-status.completed { color: var(--bg); background: var(--accent); border-color: var(--accent); }
.roadmap-notes { margin-top: 8px; font-size: 12px; color: var(--ink-secondary); line-height: 1.55; }
.roadmap-plan-progress { margin-top:10px; display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
.roadmap-plan-progress small { font-size:10px; color:var(--ink-tertiary); font-weight:700; }
.roadmap-actions { display: flex; gap: 6px; align-items: center; flex-wrap:wrap; justify-content:flex-end; }
.roadmap-timeline { position: relative; padding-left: 18px; display: flex; flex-direction: column; gap: 18px; }
.roadmap-timeline::before { content: ""; position: absolute; left: 5px; top: 8px; bottom: 8px; width: 1px; background: var(--line); }
.roadmap-month { position: relative; }
.roadmap-month::before { content: ""; position: absolute; left: -17px; top: 3px; width: 9px; height: 9px; border-radius: 50%; background: var(--bg-card); border: 2px solid var(--accent); }
.roadmap-month-title { font-size: 13px; font-weight: 800; margin-bottom: 8px; }
.roadmap-event { display: grid; grid-template-columns: auto 1fr auto; gap:10px; align-items:start; padding: 10px 12px; border: 1px solid var(--line-light); background: var(--bg-elev); border-radius: var(--radius-sm); margin-bottom: 6px; cursor:pointer; transition: transform 0.18s cubic-bezier(0.25,1,0.5,1), border-color 0.18s ease, box-shadow 0.18s ease; }
.roadmap-event:hover { border-color: var(--ink-faint); }
.roadmap-event-label { font-size: 13px; font-weight: 700; color: var(--ink); }
.roadmap-event-kind { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--ink-tertiary); white-space: nowrap; }
.roadmap-exam-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap:10px; }
.roadmap-exam-card { background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--radius); padding:14px; cursor:pointer; transition:transform 0.18s cubic-bezier(0.25,1,0.5,1), border-color 0.18s ease; }
.roadmap-exam-card:hover { transform:translateY(-1px); border-color:var(--ink-faint); }
.roadmap-exam-title { font-size:14px; font-weight:800; margin-bottom:6px; }
.roadmap-exam-days { font-size:26px; font-weight:800; letter-spacing:-0.03em; margin:8px 0 2px; }
.roadmap-import-warning { background: rgba(255,149,0,0.10); border:1px solid rgba(255,149,0,0.35); color: var(--ink); border-radius:var(--radius); padding:10px 12px; font-size:12px; line-height:1.5; margin-bottom:10px; }
.roadmap-preview-list { max-height:300px; overflow:auto; display:flex; flex-direction:column; gap:8px; }
@media (max-width: 900px) { .roadmap-hero { grid-template-columns: 1fr; } }
@media (max-width: 640px) {
  .roadmap-plan-card, .roadmap-event { grid-template-columns: auto 1fr; }
  .roadmap-actions { grid-column: 2; justify-content: flex-start; }
  .roadmap-progress-stats { grid-template-columns: 1fr; }
}

.roadmap-milestones-list { display:flex; flex-direction:column; gap:12px; }
.roadmap-milestone-card { background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--radius-lg); overflow:hidden; transition:transform 0.18s cubic-bezier(0.25,1,0.5,1), border-color 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease; }
.roadmap-milestone-card:hover { border-color:var(--ink-faint); }
.roadmap-milestone-card.dragging { opacity:0.55; transform:scale(0.99); }
.roadmap-milestone-card.drag-over { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,0,0,0.08); }
.roadmap-milestone-card.collapsed .roadmap-milestone-body { display:none; }
.roadmap-milestone-card.collapsed .roadmap-disclosure { transform:rotate(-90deg); }
.roadmap-milestone-head { display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:start; padding:16px; cursor:pointer; background:var(--bg-card); }
.roadmap-milestone-index { font-size:11px; color:var(--ink-tertiary); font-weight:800; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:4px; }
.roadmap-milestone-title { display:flex; align-items:center; gap:8px; font-size:18px; font-weight:800; letter-spacing:-0.02em; margin-bottom:6px; }
.roadmap-milestone-body { padding:12px; display:flex; flex-direction:column; gap:12px; }
.roadmap-milestone-subject { background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
.roadmap-milestone-subject-head { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 12px; border-bottom:1px solid var(--line-light); cursor:pointer; transition:background 0.18s ease; }
.roadmap-milestone-subject-head:hover { background:var(--bg-card-hover); }
.roadmap-milestone-subject-title { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; }
.roadmap-subject-caret { width:16px; color:var(--ink-tertiary); font-size:12px; line-height:1; transition:transform 0.2s cubic-bezier(0.25,1,0.5,1); }
.roadmap-milestone-subject.collapsed .roadmap-subject-caret { transform:rotate(-90deg); }
.roadmap-milestone-plan-list { padding:10px; display:flex; flex-direction:column; gap:8px; max-height:1200px; opacity:1; overflow:hidden; transition:max-height 0.22s cubic-bezier(0.25,1,0.5,1), opacity 0.18s ease, padding-top 0.22s cubic-bezier(0.25,1,0.5,1), padding-bottom 0.22s cubic-bezier(0.25,1,0.5,1); }
.roadmap-milestone-subject.collapsed .roadmap-milestone-plan-list { max-height:0; opacity:0; padding-top:0; padding-bottom:0; }
.roadmap-overall-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.roadmap-overall-summary { background:var(--bg-elev); border:1px solid var(--line); border-radius:var(--radius); padding:16px; }
@media (max-width: 800px) { .roadmap-overall-grid { grid-template-columns:1fr; } .roadmap-milestone-head { grid-template-columns:auto 1fr; } .roadmap-milestone-head .roadmap-actions { grid-column:2; justify-content:flex-start; } }

/* Weekly Review / Progress Check Enhancements */
.study-overview-dashboard {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.65fr);
  gap: 16px;
  margin-bottom: 20px;
}
.study-overview-card, .milestone-panel-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow);
}
.study-overview-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
.study-overview-title { font-size:18px; font-weight:800; letter-spacing:-0.025em; }
.study-overview-sub { font-size:12px; color:var(--ink-tertiary); margin-top:3px; }
.study-overview-grid {
  display:grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}
.study-overview-stat {
  background: var(--bg-elev);
  border: 1px solid var(--line-light);
  border-radius: var(--radius);
  padding: 11px 12px;
  min-width: 0;
}
.study-overview-stat .label { font-size:10px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-tertiary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.study-overview-stat .value { font-size:20px; line-height:1.05; font-weight:800; letter-spacing:-.03em; color:var(--ink); margin-top:5px; }
.study-overview-stat .sub { font-size:11px; color:var(--ink-tertiary); margin-top:3px; }
.milestone-panel-list { display:flex; flex-direction:column; gap:8px; }
.milestone-panel-item {
  display:flex;
  align-items:center;
  gap:8px;
  padding:9px 10px;
  background:var(--bg-elev);
  border:1px solid var(--line-light);
  border-radius:var(--radius-sm);
  font-size:12px;
  font-weight:700;
  color:var(--ink-secondary);
}
.milestone-panel-badge { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--accent); color:var(--bg); font-size:12px; font-weight:900; flex:0 0 auto; }
.unlock-progress { height:6px; border-radius:999px; background:var(--bg-card-hover); overflow:hidden; margin-top:12px; }
.unlock-progress-fill { height:100%; border-radius:999px; background:var(--accent); transition:width .3s ease; }
.module-content-stack { display:flex; flex-direction:column; gap:0; }
@media (max-width: 980px) { .study-overview-dashboard { grid-template-columns:1fr; } .study-overview-grid { grid-template-columns:repeat(3, minmax(0,1fr)); } }
@media (max-width: 640px) { .study-overview-card, .milestone-panel-card { padding:14px; } .study-overview-grid { grid-template-columns:repeat(2, minmax(0,1fr)); gap:8px; } .study-overview-stat .value { font-size:18px; } }
.ai-summary-card, .weekly-review-card, .progress-check-card, .milestone-card { 
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow);
}
.motivation-grid, .weekly-review-grid, .progress-report-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
  gap: 10px;
}
.motivation-stat, .weekly-review-stat, .progress-report-stat {
  background: var(--bg-elev);
  border: 1px solid var(--line-light);
  border-radius: var(--radius);
  padding: 12px;
}
.motivation-stat .label, .weekly-review-stat .label, .progress-report-stat .label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--ink-tertiary);
}
.motivation-stat .value, .weekly-review-stat .value, .progress-report-stat .value {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.03em;
  color: var(--ink);
  margin-top: 4px;
}
.progress-check-option { display:flex; align-items:flex-start; gap:10px; padding:12px; border:1px solid var(--line); border-radius:var(--radius); background:var(--bg-elev); cursor:pointer; }
.progress-check-option:hover { border-color: var(--ink-faint); }
.progress-check-question { background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:10px; }
.progress-delta-up { color: var(--green); font-size:12px; font-weight:800; }
.progress-delta-down { color: var(--red); font-size:12px; font-weight:800; }
@media (max-width: 720px) { .motivation-grid, .weekly-review-grid, .progress-report-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

/* Study Suggest Sheet */
.suggest-tabs {
  display: flex;
  gap: 2px;
  background: var(--bg-card);
  padding: 3px;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
}
.suggest-tab {
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.12s ease;
}
.suggest-tab.active { background: var(--accent); color: #FFFFFF; }

.notes-editor {
  min-height: 200px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink);
  outline: none;
  overflow-y: auto;
}
.notes-editor:focus { border-color: var(--accent); }
.notes-toolbar {
  display: flex;
  gap: 4px;
  margin-bottom: 8px;
  padding: 4px;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
}
.notes-toolbar button {
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-secondary);
  cursor: pointer;
  transition: all 0.1s ease;
}
.notes-toolbar button:hover { background: var(--bg-card-hover); color: var(--ink); }

.link-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.link-card .link-info { flex: 1; }
.link-card .link-title { font-size: 13px; font-weight: 600; }
.link-card .link-url { font-size: 11px; color: #CCC; word-break: break-all; text-decoration: underline; }
.link-card .link-cat { font-size: 10px; color: var(--ink-tertiary); margin-top: 2px; }
.link-card .link-fav { font-size: 16px; cursor: pointer; }
.link-card .link-fav.active { color: #1D1D1F; font-weight: 700; }

/* Progress bars */
.progress-bar {
  height: 6px;
  border-radius: 3px;
  background: var(--bg-card-hover);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}

/* Subject Banner */
.subject-banner {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.sb-top-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.sb-left h3 { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.sb-left p { font-size: 12px; color: var(--ink-tertiary); margin-top: 4px; }
.sb-scores { display: flex; align-items: center; gap: 24px; }
.sb-score-box { text-align: center; }
.sb-label { font-size: 10px; font-weight: 700; color: var(--ink-tertiary); text-transform: uppercase; }
.sb-val { font-size: 22px; font-weight: 800; margin-top: 2px; }

/* Word popup */
.word-pop {
  position: fixed;
  z-index: 5000;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 14px;
  min-width: 220px;
  max-width: 320px;
  box-shadow: var(--shadow-lg);
  font-size: 12px;
}
.word-pop h4 { margin: 0 0 6px; font-size: 11px; color: var(--ink-tertiary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.word-pop .syn-list { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.word-pop .syn-chip { background: var(--bg-elev); padding: 4px 10px; border-radius: var(--radius-pill); cursor: pointer; font-size: 11px; color: var(--ink-secondary); }
.word-pop .syn-chip:hover { background: #FFF; color: #000; }
.word-pop .pop-actions { display: flex; gap: 6px; margin-top: 6px; }
.word-pop .pop-actions button {
  flex: 1;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  padding: 5px 8px;
  border-radius: 6px;
  font-size: 11px;
  color: var(--ink-secondary);
}
.word-pop .pop-actions button:hover { background: var(--bg-card-hover); color: var(--ink); }

/* Vocab & Wrong book items */
.list-item {
  padding: 10px 12px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
}
.list-item h4 { margin: 0 0 4px; font-size: 13px; font-weight: 600; }
.list-item .meta { color: var(--ink-tertiary); font-size: 11px; }
.list-item .actions { margin-top: 6px; display: flex; gap: 6px; }
.list-item .actions button {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-secondary);
}
.list-item .actions button:hover { background: var(--bg-card-hover); color: var(--ink); }
.chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.chip { background: var(--bg-elev); color: var(--ink-secondary); padding: 2px 8px; border-radius: var(--radius-pill); font-size: 11px; border: 1px solid var(--line); }

.syn-group-card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 8px;
}
.syn-group-card h4 { margin: 0 0 4px; font-size: 13px; font-weight: 600; }
.syn-group-card .chips .chip { background: var(--bg-elev); color: var(--ink); border: 1px solid var(--line); }
.syn-group-card .actions { margin-top: 6px; display: flex; gap: 6px; }
.syn-group-card .actions button {
  background: var(--bg-elev);
  border: 1px solid var(--line);
  padding: 4px 10px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  color: var(--ink-secondary);
}
.syn-group-card .actions button:hover { background: var(--bg-card-hover); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-tertiary);
  font-size: 13px;
  background: var(--bg-card);
  border: 1px dashed var(--line);
  border-radius: var(--radius);
}

/* Module edit rows */
.module-edit-row { display: grid; grid-template-columns: 2.2fr 1fr 1.2fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }
.subtask-edit-row { display: grid; grid-template-columns: 2.5fr 1.3fr auto; gap: 8px; margin-bottom: 8px; align-items: center; }

/* ============================================================
   APPLE HUMAN INTERFACE STYLE — DRAG & DROP AND ENHANCEMENTS
   ============================================================ */
.mod-section {
  transition: transform 0.28s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
  position: relative;
  margin-bottom: 24px;
}
.mod-section.dragging {
  opacity: 0.7;
  transform: scale(0.982);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
  border-radius: var(--radius);
  z-index: 1000;
  background: var(--bg-card);
  border: 1px solid var(--accent);
}
.mod-section.drag-over {
  border: 2px dashed var(--accent);
  border-radius: var(--radius);
  background: var(--bg-elev);
}
.mod-drag-handle { display: none !important; }

/* ---- Stat card scroll — no outline, clean Apple anchor feel ---- */
.mod-section, .res-section { outline: none !important; }
*:focus { outline: none !important; box-shadow: none !important; }
.subtask-draggable:focus, .ex-unified-item:focus, .res-card:focus { outline: none !important; box-shadow: none !important; border-color: var(--line) !important; }
.subtask-draggable.st-is-dragging { box-shadow: 0 8px 30px rgba(0,0,0,0.16) !important; outline: none !important; }

/* ---- Sub-task drag & drop ---- */
.subtask-draggable {
  cursor: default;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  touch-action: pan-y;
  border-radius: var(--radius-sm);
  transition: box-shadow 0.18s ease, transform 0.18s cubic-bezier(0.25,1,0.5,1);
  position: relative;
}
.subtask-draggable.st-is-dragging {
  opacity: 0.92;
  box-shadow: 0 8px 30px rgba(0,0,0,0.18), 0 0 0 2px var(--accent);
  transform: scale(1.025);
  z-index: 9999;
  background: var(--bg-card) !important;
  border-radius: var(--radius-sm);
}
.subtask-draggable.st-drag-over {
  box-shadow: 0 0 0 2px var(--accent) inset;
  background: var(--bg-elev);
}
.st-drag-grip {
  width: 18px;
  height: 18px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2.5px;
  flex-shrink: 0;
  opacity: 0.35;
  cursor: grab;
  touch-action: none;
  transition: opacity 0.15s ease;
}
.st-drag-grip:hover { opacity: 0.7; }
.st-drag-grip span {
  display: block;
  width: 11px;
  height: 1.5px;
  background: var(--ink);
  border-radius: 2px;
}

/* ---- Learning Resources progress ---- */
.lr-item {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: border-color 0.15s ease;
}
.lr-item:hover { border-color: var(--ink-faint); }
.lr-item-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
}
.lr-item-body {
  padding: 10px 14px 13px 14px;
  border-top: 1px solid var(--line-light);
  background: var(--bg-elev);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.lr-progress-row {

function srsIntervalMs(box) { return SRS_INTERVALS_DAY[Math.min(Math.max(box,0), SRS_INTERVALS_DAY.length-1)] * 86400000; }
function ensureSrs(obj) {
  if (typeof obj.srsBox !== 'number') obj.srsBox = 0;
  if (typeof obj.srsNext !== 'number') obj.srsNext = Date.now();
  if (typeof obj.srsReviews !== 'number') obj.srsReviews = 0;
  if (typeof obj.srsLapses !== 'number') obj.srsLapses = 0;
}
function srsGrade(obj, result) {
  ensureSrs(obj);
  if (result === 'again') { obj.srsBox = 0; obj.srsLapses = (obj.srsLapses||0)+1; }
  else if (result === 'hard') { obj.srsBox = Math.max(0, obj.srsBox); }
  else if (result === 'good') { obj.srsBox = Math.min(SRS_INTERVALS_DAY.length-1, obj.srsBox+1); }
  else if (result === 'easy') { obj.srsBox = Math.min(SRS_INTERVALS_DAY.length-1, obj.srsBox+2); }
  obj.srsReviews = (obj.srsReviews||0)+1;
  obj.srsNext = Date.now() + Math.max(srsIntervalMs(obj.srsBox), result==='hard'?86400000:0);
}

function saveAppState() { localStorage.setItem(APP_STATE_KEY, JSON.stringify(appState)); }
function loadAppState() {

}

function saveQuiz() {
  try {
    const json = JSON.stringify(quizState);
    localStorage.setItem(QUIZ_STORE_KEY, json);
    try { localStorage.setItem(QUIZ_BACKUP_KEY, json); } catch(_){}
  } catch(e) { toast('Quiz save failed: '+e.message); }
}
function loadQuiz() {
  try {
    let raw = localStorage.getItem(QUIZ_STORE_KEY);
    if (!raw) { const bak = localStorage.getItem(QUIZ_BACKUP_KEY); if(bak) raw = bak; }
    if (raw) {
      let parsed = JSON.parse(raw);
      parsed = migrateQuiz(parsed);
      quizState = Object.assign(quizState, parsed);
      quizState.activeQIndex = quizState.activeQIndex || {grammar:{},vocab:{}};
      quizState.answerLog = quizState.answerLog || {};
      quizState.wrongBook = quizState.wrongBook || [];
      quizState.highlights = quizState.highlights || [];
      quizState.wordMemory = quizState.wordMemory || {};
      quizState.wordBook = quizState.wordBook || [];
      quizState.synonymLibrary = quizState.synonymLibrary || [];
      quizState.quizSets = quizState.quizSets || [];
      quizState.currentQuizSetId = quizState.currentQuizSetId || {};
      quizState.activeQuizSetIds = quizState.activeQuizSetIds || {};
    }
  } catch(e) { console.error('Quiz load failed', e); }
}

function migrateQuiz(parsed) {
  const v = parsed.schemaVersion || 1;
  if (v < 5) {
    (parsed.vocabularyBook||[]).forEach(w => { ensureSrs(w); });
    (parsed.synonymLibrary||[]).forEach(g => { ensureSrs(g); });
  }
  if (v < 4) {
    parsed.quizSets = Array.isArray(parsed.quizSets) ? parsed.quizSets : [];
    parsed.currentQuizSetId = parsed.currentQuizSetId || {};
    (parsed.passages||[]).forEach(p => {
      if (!p.id) return;
      if (!parsed.quizSets.find(qs => qs.passageId === p.id)) {
        parsed.quizSets.push({ id:'qs_'+p.id+'_default', passageId:p.id, name:'1', createdAt:Date.now() });
      }
    });
    ['grammarQuestions','vocabularyQuestions'].forEach(k => {
      (parsed[k]||[]).forEach(q => {
        if (!q.quizSetId) {
          const def = parsed.quizSets.find(qs => qs.passageId === q.passageId);
          if (def) q.quizSetId = def.id;
        }
      });
    });
  }
  parsed.schemaVersion = QUIZ_SCHEMA;
  return parsed;
}

function uid(prefix='id') { return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), ms);
}
function todayISO() { return new Date().toISOString().slice(0,10); }
function parseInlineHighlight(subj, str) {
  const escaped = esc(str);
  return escaped.replace(/==([^=]+)==/g, (m,p1) => `<span class="inline-highlight" onclick="removeInlineHighlight('${subj}','${esc(p1).replace(/'/g,"\\'")}')">${p1}</span>`);
}
function removeInlineHighlight(subj, word) {
  const sc = subjectScores[subj]; if(!sc||!sc.note) return;
  sc.note = sc.note.replace(`==${word}==`, word);
  saveResState(); render();
}
function matchesSearch(text, q) { if(!q) return true; return text.toLowerCase().includes(q.toLowerCase()); }

  const matchedVQ = quizState.vocabularyQuestions.filter(x => matchesSearch(x.question,q) || matchesSearch(x.synonymGroup||'',q));

  const matchedResources = resources.filter(r => matchesSearch(r.title,q) || matchesSearch(r.path||'',q) || (r.tags||[]).some(t=>matchesSearch(t,q)));
  const matchedLinks = (studySuggest.links||[]).filter(l => matchesSearch(l.title,q) || matchesSearch(l.url||'',q) || matchesSearch(l.description||'',q));
  const matchedRoadmap = (roadmapPlans||[]).filter(p => matchesSearch(p.title,q) || matchesSearch(p.notes||'',q) || matchesSearch(roadmapStatusLabel(p.status),q));

  if (matchedPassages.length) html += `<div class="res-section"><div class="res-section-head"><h3>Passages <span class="count-pill">${matchedPassages.length}</span></h3></div><div>${matchedPassages.map(p=>`<div class="list-item"><h4>${esc(p.customName)}</h4><div class="meta">${esc((p.content||'').slice(0,120))}...</div></div>`).join('')}</div></div>`;
  if (matchedGQ.length) html += `<div class="res-section"><div class="res-section-head"><h3>Grammar Questions <span class="count-pill">${matchedGQ.length}</span></h3></div><div>${matchedGQ.slice(0,10).map(q=>`<div class="list-item"><h4>${esc(q.question.slice(0,100))}</h4><div class="meta">Answer: ${esc(q.answer)}</div></div>`).join('')}</div></div>`;
  if (matchedVQ.length) html += `<div class="res-section"><div class="res-section-head"><h3>Vocab Questions <span class="count-pill">${matchedVQ.length}</span></h3></div><div>${matchedVQ.slice(0,10).map(q=>`<div class="list-item"><h4>${esc(q.question.slice(0,100))}</h4><div class="meta">${esc(q.synonymGroup||'')}</div></div>`).join('')}</div></div>`;
  if (matchedVocab.length) html += `<div class="res-section"><div class="res-section-head"><h3>Vocabulary <span class="count-pill">${matchedVocab.length}</span></h3></div><div>${matchedVocab.map(v=>`<div class="list-item"><h4>${esc(v.text||'')}</h4><div class="meta">${esc(v.meaning||'')}</div></div>`).join('')}</div></div>`;
  if (matchedResources.length) html += `<div class="res-section"><div class="res-section-head"><h3>Resources <span class="count-pill">${matchedResources.length}</span></h3></div><div class="resource-grid">${matchedResources.map(r=>resourceCard(r)).join('')}</div></div>`;
  if (matchedLinks.length) html += `<div class="res-section"><div class="res-section-head"><h3>Links <span class="count-pill">${matchedLinks.length}</span></h3></div><div>${matchedLinks.map(l=>`<div class="link-card"><div class="link-info"><div class="link-title">${esc(l.title)}</div><div class="link-url">${esc(l.url)}</div></div></div>`).join('')}</div></div>`;
  if (matchedRoadmap.length) html += `<div class="res-section"><div class="res-section-head"><h3>Study Roadmap <span class="count-pill">${matchedRoadmap.length}</span></h3></div><div>${matchedRoadmap.map(p=>`<div class="list-item"><h4>${esc(p.title)}</h4><div class="meta">${formatDate(p.startDate)} — ${formatDate(p.targetFinishDate)} · ${roadmapStatusLabel(p.status)}</div></div>`).join('')}</div></div>`;

  const total = matchedPassages.length+matchedGQ.length+matchedVQ.length+matchedVocab.length+matchedResources.length+matchedLinks.length+matchedRoadmap.length;
  if (!total) html += `<div class="empty-state">No results found for "${esc(q)}"</div>`;
  return html;
}

function normalizePassages() { quizState.passages.forEach((p,i) => { if(!p.id) p.id=uid('sec'); if(!p.customName) p.customName = p.title || ('Section '+(i+1)); }); }
function currentPassage() { return quizState.passages.find(p=>p.id===quizState.currentPassageId) || null; }

  return quizState.passages.map(p => {

      <span class="pill-act" onclick="event.stopPropagation();deletePassage('${p.id}')">×</span>

  }).join('') + `<div class="pill add" onclick="addPassage()">+ New Section</div>`;

function switchSection(id) { quizState.currentPassageId = id; saveQuiz(); render(); }
function addPassage() {
  const name = prompt('Section name:');
  if (!name || !name.trim()) return;
  const p = { id:uid('sec'), customName:name.trim(), title:'', content:'' };
  quizState.passages.push(p);
  quizState.currentPassageId = p.id;
  saveQuiz(); render();
}
function renamePassage(id) {
  const p = quizState.passages.find(x=>x.id===id); if(!p) return;
  const name = prompt('Rename section:', p.customName);
  if (name===null) return;
  if (!name.trim()) { toast('Name cannot be empty'); return; }
  p.customName = name.trim(); saveQuiz(); render();
}
function deletePassage(id) {
  const p = quizState.passages.find(x=>x.id===id); if(!p) return;
  if (!confirm('Delete section "'+p.customName+'"? This removes all associated questions, highlights, and records.')) return;
  const gIds = quizState.grammarQuestions.filter(q=>q.passageId===id).map(q=>q.id);
  const vIds = quizState.vocabularyQuestions.filter(q=>q.passageId===id).map(q=>q.id);
  const removed = new Set([...gIds,...vIds]);
  quizState.grammarQuestions = quizState.grammarQuestions.filter(q=>q.passageId!==id);
  quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(q=>q.passageId!==id);
  quizState.highlights = quizState.highlights.filter(h=>h.passageId!==id);
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.passageId!==id && !removed.has(w.qId));
  quizState.quizSets = quizState.quizSets.filter(qs=>qs.passageId!==id);
  Object.keys(quizState.answerLog).forEach(k=>{ if(removed.has(k)) delete quizState.answerLog[k]; });
  const idx = quizState.passages.findIndex(x=>x.id===id);
  quizState.passages.splice(idx,1);
  quizState.currentPassageId = quizState.passages.length ? quizState.passages[Math.max(0,Math.min(idx,quizState.passages.length-1))].id : null;
  saveQuiz(); render();
}

// QuizSets
function getQuizSets(pid) { return quizState.quizSets.filter(qs=>qs.passageId===pid); }
function ensureDefaultQuizSet(pid) {
  const list = getQuizSets(pid);
  if (!list.length) { const qs = {id:uid('qs'),passageId:pid,name:'1',createdAt:Date.now()}; quizState.quizSets.push(qs); return qs; }
  return list[0];
}
function currentQuizSet() {
  const p = currentPassage(); if(!p) return null;
  const list = getQuizSets(p.id); if(!list.length) return ensureDefaultQuizSet(p.id);
  return list.find(x=>x.id===quizState.currentQuizSetId[p.id]) || list[0];
}
function getActiveQuizSetIds() {
  const p = currentPassage(); if(!p) return [];
  const list = getQuizSets(p.id); if(!list.length) return [];
  const stored = quizState.activeQuizSetIds[p.id];
  if (Array.isArray(stored) && stored.length) { const v = stored.filter(id=>list.some(x=>x.id===id)); if(v.length) return v; }
  const single = list.find(x=>x.id===quizState.currentQuizSetId[p.id]);
  return [single?.id || list[0].id];
}
function setActiveQuizSetIds(ids) {
  const p = currentPassage(); if(!p) return;
  quizState.activeQuizSetIds[p.id] = ids.slice();
  if (ids.length===1) quizState.currentQuizSetId[p.id] = ids[0];
  saveQuiz(); render();
}

        <span style="background:var(--green)18;color:var(--green);padding:4px 12px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;">✓ 进度: <b>${answeredCount}/${pool.length}</b> (${progPercent}%)</span>

function deleteCurrentQS() {

  const gc = quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).length;
  const vc = quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).length;
  if(!confirm(`Delete "${qs.name}"? Removes ${gc+vc} questions.`)) return;
  const removed = new Set([...quizState.grammarQuestions.filter(q=>q.quizSetId===qs.id).map(q=>q.id),...quizState.vocabularyQuestions.filter(q=>q.quizSetId===qs.id).map(q=>q.id)]);
  quizState.grammarQuestions = quizState.grammarQuestions.filter(q=>q.quizSetId!==qs.id);
  quizState.vocabularyQuestions = quizState.vocabularyQuestions.filter(q=>q.quizSetId!==qs.id);
  quizState.wrongBook = quizState.wrongBook.filter(w=>w.quizSetId!==qs.id && !removed.has(w.qId));

  quizState.quizSets = quizState.quizSets.filter(x=>x.id!==qs.id);
  const p = currentPassage();
  if(p){const list=getQuizSets(p.id); quizState.currentQuizSetId[p.id]=list[0]?.id||null;}

    <div style="font-size:13px;color:var(--ink-secondary);font-weight:600;">${pool.length} questions in current view</div>
    <div style="display:flex;gap:8px;align-items:center;">

function renderQuestionCard(q, num, qType) {
  const log = quizState.answerLog[q.id];

  // Tokenise text for word-level interaction. Escape every non-token part.
  function tokenise(text, areaId) {
    return String(text || '').split(/([^\s\p{P}]+)/u).map(part => {
      if (!part) return '';
      if (/^[^\s\p{P}]+$/u.test(part)) {
        const mem = wordMemoryLookup(part);
        const hl = qsIsHighlighted(part) ? ' qs-hl-persist' : (mem ? ' qs-memory' : '');
        const tags = mem?.tags?.length ? mem.tags.join(', ') : '';
        const tip = mem ? ` data-memory-tip="${esc(tags ? 'In Memory: '+tags : 'In Word Memory')}"` : '';
        return `<span class="q-word-token${hl}" data-area="${areaId}" data-token="${esc(part)}"${tip} onpointerdown="qsWordDown(event,this)" onclick="event.preventDefault();event.stopPropagation();">${esc(part)}</span>`;
      }
      return esc(part);
    }).join('');
  }

  let html = `<div class="q-card" data-qid="${q.id}">
    <div class="q-meta">Q${num} · ${qType.toUpperCase()}${q.synonymGroup?' · '+esc(q.synonymGroup):''}</div>
    <div class="q-text q-selectable" style="font-size:15px;font-weight:600;color:var(--ink);margin-bottom:8px;line-height:1.7;">${tokenise(q.question, 'q_'+q.id)}</div>
    <div class="q-options">`;

  q.options.forEach(opt => {
    const letter = (opt.match(/^([A-Z])[.\s、)]/) || [])[1] || opt[0];
    let cls = 'q-opt';
    if (log) { if(letter===q.answer) cls+=' correct'; else if(letter===log.chosen) cls+=' wrong'; }
    html += `<button class="${cls}" onclick="selectOption(this,'${letter}','${q.id}')"><span class="q-selectable">${tokenise(opt, 'opt_'+q.id+'_'+letter)}</span></button>`;
  });
  html += `</div>`;

  if (log) {
    html += `<div class="q-status ${log.correct?'ok':'err'}">${log.correct?'OK Correct':'X Wrong · Answer: '+esc(q.answer)}</div>`;
    html += `<div class="q-explain show" style="margin-top:8px;padding:12px;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius-sm);">
      <div style="font-weight:700;margin-bottom:6px;font-size:13px;">Explanation (答案解析):</div>
      <div class="q-selectable" style="line-height:1.8;">${tokenise(q.explanation||'No explanation provided.', 'exp_'+q.id)}</div>
    </div>`;
  }

  html += `<div class="q-actions">
    <button class="primary" onclick="submitAnswer('${q.id}','${qType}')">Submit</button>
    <button onclick="showAnswer('${q.id}')">Show Answer</button>
    <button onclick="openQuestionEditor('${q.id}','${qType}')">Edit</button>
    <button onclick="deleteQuestion('${q.id}','${qType}')">Delete</button>
  </div></div>`;
  return html;
}

function redoCurrentQuizSet() {
  const p = currentPassage();
  if (!p) { toast('No section selected (请先选择章节)'); return; }
  const activeIds = getActiveQuizSetIds();
  const activeSet = new Set(activeIds);
  
  const grammarPool = quizState.grammarQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId));
  const vocabPool = quizState.vocabularyQuestions.filter(q => q.passageId === p.id && activeSet.has(q.quizSetId));
  const allPool = [...grammarPool, ...vocabPool];

  if (!allPool.length) {
    toast('No questions in this set (本套题暂无题目)');
    return;
  }

  let answeredCount = 0;
  allPool.forEach(q => {
    if (quizState.answerLog[q.id]) answeredCount++;
  });

  if (!confirm(`确定要重新做一遍这套题吗？\n将清空本套题共 ${allPool.length} 道题目（已答 ${answeredCount} 题）的答题状态，以便重新自测练习！`)) {
    return;
  }

  allPool.forEach(q => {
    delete quizState.answerLog[q.id];
  });

  saveQuiz();
  renderSharedStats();
  render();
  toast('已重置！可以重新练习这套题了 ↻');
}

function redoAllWrongBookQuestions() {
  const p = currentPassage();
  const all = [...quizState.wrongBook];
  let filtered = p ? all.filter(w => w.passageId === p.id) : all;
  if (wbFilter === 'unresolved') filtered = filtered.filter(w => !w.completed);
  if (wbFilter === 'resolved') filtered = filtered.filter(w => w.completed);

  if (!filtered.length) { toast('No questions to reset'); return; }
  if (!confirm(`确定要重置当前视图下的 ${filtered.length} 道错题的答题状态吗？\n方便您重新从第一题自测刷题！`)) return;

  filtered.forEach(w => {
    w._chosen = null;
    w._checked = false;
  });
  wbCurrentIndex = 0;
  openQuizWrongBook(0, wbFilter);
  toast('错题已全部重置！请重新做题 ↻');
}

function toggleQuestionWrongBook(qId, qType) {
  const pool = qType === 'grammar' ? quizState.grammarQuestions : quizState.vocabularyQuestions;
  const q = pool.find(x => x.id === qId); if (!q) return;
  const idx = quizState.wrongBook.findIndex(w => w.qId === qId || w.question === q.question);

let replacementMap = {};
function buildReadingHTML(content, hls) {
  const re = /[A-Za-z]+(?:[''][A-Za-z]+)?|\s+|[^A-Za-z\s]+/g;
  const tokens = [];
  let m;
  while((m=re.exec(content))!==null) tokens.push({text:m[0],start:m.index,end:m.index+m[0].length});
  const parts = tokens.map(t => {
    const isWord = /^[A-Za-z]/.test(t.text);
    if(isWord){const key=t.text.toLowerCase();const rep=replacementMap[key];const dt=rep||t.text;return{html:`<span class="word${rep?' replaced':''}" data-word="${esc(t.text)}" data-start="${t.start}" data-end="${t.end}">${esc(dt)}</span>`,start:t.start,end:t.end,wordText:t.text};}
    return{html:esc(t.text),start:t.start,end:t.end};
  });
  let html='';
  const hlWordsMap = new Map();
  (quizState.wordBook||[]).filter(w=>w.highlight).forEach(w => {
    hlWordsMap.set(w.text.toLowerCase(), w);
  });
  for(const part of parts){
    const activeH = hls.find(h=>{const s=h.charStart??-1;const e=h.charEnd??-1;return s>=0&&e>=0&&part.start>=s&&part.end<=e;});
    const wbkItem = part.wordText ? hlWordsMap.get(part.wordText.toLowerCase()) : null;
    if(activeH || wbkItem){
      const hid = activeH ? activeH.id : (wbkItem?.id || '');
      const color = activeH?.highlightColor || wbkItem?.highlightColor || 'medium-brown';
      let bg = 'rgba(162,132,94,0.35)', border = '#A2845E';
      if (color === 'light-brown' || color === 'yellow') { bg = 'rgba(212,186,148,0.28)'; border = '#D4BA94'; }
      if (true) { bg = 'rgba(115,88,53,0.48)'; border = '#735835'; }
      const cls = `hl hl-${color}` + ((activeH && activeH.note) ? " has-note":"");
      html+=`<span class="${cls}" style="background:${bg};border-bottom:2px solid ${border};border-radius:3px;padding:0 2px;cursor:pointer;" data-hid="${esc(hid)}">${part.html}</span>`;
    }
    else html+=part.html;
  }
  return html;
}

// ================================================================
//  QUIZ WORD SELECTION ENGINE (Apple Books style)
// ================================================================
let qsSelection = { tokens: [], anchorToken: null, floatMenu: null };

function qsWordDown(e, token) {
  if (e.button !== undefined && e.button !== 0) return;
  e.stopPropagation();
  if (e.cancelable) try { e.preventDefault(); } catch(_) {}

  // Long press for phrase, single click for word
  let pressTimer = null;
  let didLong = false;

  const startToken = token;
  const area = token.dataset.area;
  let endToken = token;

  // Clear previous
  qsClearSelection();

  const onMove = me => {
    const el = document.elementFromPoint(me.clientX, me.clientY);
    const t = el?.closest('.q-word-token');
    if (t && t.dataset.area === area) {
      endToken = t;
      qsHighlightRange(area, startToken, endToken);
    }
  };

  const onUp = () => {
    clearTimeout(pressTimer);
    window.removeEventListener('pointermove', onMove);
    window.removeEventListener('pointerup', onUp);
    if (!didLong) {
      qsHighlightRange(area, startToken, endToken);
    }
    const tokens = Array.from(document.querySelectorAll(`.q-word-token.qs-selected`));
    if (tokens.length) qsShowFloatMenu(tokens);
  };

  pressTimer = setTimeout(() => {
    didLong = true;
    if (navigator.vibrate) try { navigator.vibrate(30); } catch(_) {}
    window.addEventListener('pointermove', onMove, { passive: true });
  }, 300);

  window.addEventListener('pointerup', onUp);
}

function qsHighlightRange(area, a, b) {
  const allTokens = Array.from(document.querySelectorAll(`.q-word-token[data-area="${area}"]`));
  const iA = allTokens.indexOf(a), iB = allTokens.indexOf(b);
  const lo = Math.min(iA, iB), hi = Math.max(iA, iB);
  allTokens.forEach((t, i) => {
    if (i >= lo && i <= hi) t.classList.add('qs-selected');
    else t.classList.remove('qs-selected');
  });
}

function qsClearSelection() {
  document.querySelectorAll('.q-word-token.qs-selected').forEach(t => t.classList.remove('qs-selected'));
  qsRemoveFloatMenu();
}

function qsRemoveFloatMenu() {
  const old = document.getElementById('qsFloatMenu');
  if (old) old.remove();
}

function memoryKey(word) { return String(word||'').trim().toLowerCase(); }
function memoryDisplayStatus(status) {
  if (status === 'Known') return 'Known';
  if (status === 'Learning') return 'Learning';
  return 'New';
}
function memoryNextReview(status, errorCount=0) {
  const day = 86400000;
  if (status === 'Known') return Date.now() + 30 * day;
  if (status === 'Learning') return Date.now() + (errorCount > 1 ? 7 : 3) * day;
  return Date.now() + day;
}
function wordMemoryEnsure(word, tag='Highlight', meta={}) {
  const text = String(word||'').trim();
  if (!text) return null;
  quizState.wordMemory = quizState.wordMemory || {};
  const key = memoryKey(text);
  let m = quizState.wordMemory[key];
  if (!m) {
    m = quizState.wordMemory[key] = {
      word: text,
      source: meta.source || '',
      sources: meta.source ? [meta.source] : [],
      context: meta.context || '',
      tags: [],
      reviewStatus: 'New',
      errorCount: 0,
      seenCount: 0,
      correctCount: 0,
      reviewCount: 0,
      lastSeenDate: todayISO(),
      createdAt: Date.now(),
      nextReview: memoryNextReview('New')
    };
  }
  if (tag && !m.tags.includes(tag)) m.tags.push(tag);
  if (meta.source) { m.source = meta.source; if (!m.sources.includes(meta.source)) m.sources.push(meta.source); }
  if (meta.context) m.context = meta.context;
  m.lastSeenDate = todayISO();
  m.seenCount = (m.seenCount || 0) + (meta.countSeen === false ? 0 : 1);
  if (!m.nextReview) m.nextReview = memoryNextReview(m.reviewStatus, m.errorCount);
  return m;
}
function wordMemoryLookup(word) {
  const key = memoryKey(word);
  const m = quizState.wordMemory?.[key];
  if (m) return m;
  const inWb = (quizState.wordBook||[]).find(w => memoryKey(w.text||w.word) === key);
  if (inWb) return wordMemoryEnsure(inWb.text || inWb.word, 'Word Book', {source:inWb.source||'Word Book', context:inWb.example||'', countSeen:false});
  const inSyn = (quizState.synonymLibrary||[]).find(g => (g.words||[]).some(w => memoryKey(w) === key));
  if (inSyn) return wordMemoryEnsure(word, 'Synonym', {source:'Synonyms', context:inSyn.groupName||'', countSeen:false});
  if (qsIsHighlighted && qsIsHighlighted(word)) return wordMemoryEnsure(word, 'Highlight', {source:'Highlight', countSeen:false});
  return null;
}
function wordMemoryContextFromToken(token) {
  const card = token?.closest?.('.q-card');
  const qid = card?.dataset?.qid || '';
  const q = qid ? [...quizState.grammarQuestions, ...quizState.vocabularyQuestions].find(x => x.id === qid) : null;
  return { source: q ? `Quiz Hub Q#${qid}` : 'Quiz Hub', context: q?.question || token?.closest?.('.q-text')?.textContent || '' };
}
function wordMemoryMarkKnown(word) {
  const m = wordMemoryEnsure(word, 'Word Book', {source:'Quiz Hub', countSeen:false});
  if (!m) return;
  m.reviewStatus = 'Known';
  m.reviewCount = (m.reviewCount || 0) + 1;
  m.nextReview = memoryNextReview('Known');
  const wb = (quizState.wordBook||[]).find(w => memoryKey(w.text||w.word) === memoryKey(word));
  if (wb) { wb.reviewStatus = 'Known'; wb.srsBox = Math.max(wb.srsBox||0, 5); wb.srsNext = m.nextReview; }
  saveQuiz();
  toast('Marked as Known');
  qsClearSelection();
}
function wordMemoryUpdateFromQuestion(q, correct) {
  if (!q || !quizState.wordMemory) return;
  const text = [q.question, ...(q.options||[]), q.explanation||''].join(' ').toLowerCase();
  Object.keys(quizState.wordMemory).forEach(key => {
    if (!key || !text.includes(key)) return;
    const m = quizState.wordMemory[key];
    m.lastSeenDate = todayISO();
    m.seenCount = (m.seenCount || 0) + 1;
    if (correct) {
      m.correctCount = (m.correctCount || 0) + 1;
      if ((m.correctCount || 0) >= 3 && (m.reviewCount || 0) > 0) m.reviewStatus = 'Known';
      else if (m.reviewStatus === 'New' && (m.seenCount || 0) > 1) m.reviewStatus = 'Learning';
    } else {
      m.errorCount = (m.errorCount || 0) + 1;
      m.reviewStatus = 'Learning';
    }
    m.nextReview = memoryNextReview(m.reviewStatus, m.errorCount || 0);
  });
}
function syncWordBookMemory() {
  quizState.wordMemory = quizState.wordMemory || {};
  (quizState.wordBook||[]).forEach(w => {
    const m = wordMemoryEnsure(w.text||w.word, 'Word Book', {source:w.source||'Word Book', context:w.example||'', countSeen:false});
    w.reviewStatus = m.reviewStatus;
    w.errorCount = m.errorCount || 0;
    w.seenCount = m.seenCount || 0;
    w.lastSeenDate = m.lastSeenDate;
    w.srsNext = m.nextReview || w.srsNext;
  });
  (quizState.highlights||[]).forEach(h => wordMemoryEnsure(h.text||h.selectedText, 'Highlight', {source:h.source||'Highlight', countSeen:false}));
  (quizState.synonymLibrary||[]).forEach(g => (g.words||[]).forEach(w => wordMemoryEnsure(w, 'Synonym', {source:'Synonyms', context:g.groupName||'', countSeen:false})));
}

function qsEscapeText(text) { return String(text || '').trim(); }
function qsNorm(text) { return String(text || '').trim().toLowerCase(); }
function qsIsHighlighted(text) {
  const n = qsNorm(text);
  return (quizState.highlights || []).some(h => qsNorm(h.text || h.selectedText) === n);
}
function qsShowFloatMenu(tokens) {
  qsRemoveFloatMenu();

  if (!text) return;

  const firstRect = tokens[0].getBoundingClientRect();

  const highlighted = qsIsHighlighted(text);
  const tokenContext = wordMemoryContextFromToken(tokens[0]);
  const mem = wordMemoryEnsure(text, highlighted ? 'Highlight' : '', tokenContext);
  saveQuiz();

  const menu = document.createElement('div');
  menu.id = 'qsFloatMenu';
  menu.className = 'qs-float-menu';

  const addButton = (label, handler, cls='') => {
    const btn = document.createElement('button');

  };

  addButton('Remove Highlight', () => qsRemoveHighlight(text));
  addButton('Mark as Known', () => wordMemoryMarkKnown(text), mem?.reviewStatus === 'Known' ? 'added' : '');

  document.body.appendChild(menu);

  requestAnimationFrame(() => {
    const margin = 8;
    const menuRect = menu.getBoundingClientRect();
    const center = (firstRect.left + lastRect.right) / 2 + window.scrollX;
    let left = center - menuRect.width / 2;
    left = Math.min(left, window.scrollX + window.innerWidth - menuRect.width - margin);
    left = Math.max(window.scrollX + margin, left);

    let top = firstRect.top + window.scrollY - menuRect.height - 10;
    if (top < window.scrollY + margin) top = firstRect.bottom + window.scrollY + 10;

    menu.style.left = left + 'px';
    menu.style.top = top + 'px';
  });

  setTimeout(() => {
    const handler = ev => {
      if (!menu.contains(ev.target) && !ev.target.closest('.q-word-token')) {
        qsClearSelection();
        document.removeEventListener('pointerdown', handler, true);
      }
    };
    document.addEventListener('pointerdown', handler, true);
  }, 10);
}

function qsAddToWordBook(btn, text) {
  const alreadyIn = (quizState.wordBook||[]).some(w => w.text.toLowerCase() === text.toLowerCase());
  const ctx = wordMemoryContextFromToken(document.querySelector('.q-word-token.qs-selected'));

function qsHighlightWord(text) {
  const textVal = qsEscapeText(text);
  if (!textVal) return;
  const p = currentPassage();
  if (!qsIsHighlighted(textVal)) {
    quizState.highlights.push({ id: uid('hl'), text: textVal, selectedText: textVal, passageId: p?.id || '', color:'brown', source:'Quiz Hub', ts: Date.now() });
  }
  wordMemoryEnsure(textVal, 'Highlight', {source:'Quiz Hub', context:p?.title||'', countSeen:false});
  document.querySelectorAll('.q-word-token').forEach(t => {
    if (qsNorm(t.textContent) === qsNorm(textVal)) t.classList.add('qs-hl-persist');
  });
  saveQuiz();
  toast('Highlighted');
  qsClearSelection();

function qsRemoveHighlight(text) {
  const textVal = qsEscapeText(text);
  if (!textVal) return;
  const n = qsNorm(textVal);
  quizState.highlights = (quizState.highlights || []).filter(h => qsNorm(h.text || h.selectedText) !== n);
  document.querySelectorAll('.q-word-token').forEach(t => {
    if (qsNorm(t.textContent) === n) t.classList.remove('qs-hl-persist');
  });
  saveQuiz();
  toast('Highlight removed');
  qsClearSelection();
}
