function bindReadingEvents() {
  const body = document.getElementById('readingBody');
  if (!body) return;
  body.querySelectorAll('.word').forEach(w => {
    w.addEventListener('click', e => {
      const sel = window.getSelection();
      if(sel && sel.toString().trim().length>1) return;
      showWordPopup(w, e);
    });
  });
  body.querySelectorAll('.hl').forEach(h => {
    h.addEventListener('click', e => { e.stopPropagation(); openHighlightEditor(h.dataset.hid); });
  });

  // Selection menu
  body.addEventListener('mouseup', handleReadingSelection);
}

function handleReadingSelection() {
  const sel = window.getSelection();
  const menu = document.getElementById('selMenu');
  if(!sel||sel.rangeCount===0||sel.isCollapsed){menu.style.display='none';return;}
  const text = sel.toString().trim();
  if(!text){menu.style.display='none';return;}
  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  if(rect.width===0){menu.style.display='none';return;}
  menu.style.display='flex';
  const w = menu.offsetWidth||300;
  let left = rect.left+rect.width/2-w/2;
  let top = rect.top-menu.offsetHeight-8;
  if(top<8) top=rect.bottom+8;
  left = Math.max(8,Math.min(left,window.innerWidth-w-8));
  menu.style.left=left+'px'; menu.style.top=top+'px';
  menu._selInfo = getSelectionOffsetInReading(range);
  menu._selText = text;
}

function getSelectionOffsetInReading(range) {
  const body = document.getElementById('readingBody');
  if(!body) return null;
  function findOff(node, isStart, offInNode) {
    let el = node.nodeType===1?node:node.parentElement;
    while(el&&el!==body&&!el.dataset?.start) el=el.parentElement;
    if(el?.dataset?.start!=null){const s=+el.dataset.start;const e=+el.dataset.end;return isStart?s:e;}
    return null;
  }
  const s=findOff(range.startContainer,true,range.startOffset);
  const e=findOff(range.endContainer,false,range.endOffset);
  if(s==null||e==null) return null;
  return{start:Math.min(s,e),end:Math.max(s,e)};
}

document.getElementById('selMenu').addEventListener('click', e => {
  const btn = e.target.closest('button'); if(!btn) return;
  const menu = document.getElementById('selMenu');
  const info = menu._selInfo; const text = menu._selText;
  if(!info||!text){menu.style.display='none';return;}
  const p = currentPassage(); if(!p){menu.style.display='none';return;}
  if(btn.dataset.color) addHighlight(p.id,info.start,info.end,text,btn.dataset.color,'');
  else if(btn.dataset.act==='note'){const note=prompt('Note:','');if(note!==null)addHighlight(p.id,info.start,info.end,text,'medium-brown',note.trim());}
  else if(btn.dataset.act==='vocab') addToWordBook(text.trim(), { source: 'Reading Passage', highlight: true, highlightColor: 'medium-brown' });
  menu.style.display='none'; window.getSelection().removeAllRanges();
});

function addHighlight(pid,start,end,text,color,note){

  });

function addToWordBook(text, extra={}) {
  text = (text||'').trim(); if(!text) return false;
  quizState.wordBook = quizState.wordBook || [];
  const mem = wordMemoryEnsure(text, extra.tag || 'Word Book', { source: extra.source || 'Quiz Hub', context: extra.example || extra.context || '', countSeen:false });
  const exists = quizState.wordBook.find(v => v.text.toLowerCase() === text.toLowerCase());
  if(exists){
    exists.reviewStatus = mem.reviewStatus;
    exists.errorCount = mem.errorCount || 0;
    exists.seenCount = mem.seenCount || 0;
    exists.lastSeenDate = mem.lastSeenDate;
    saveQuiz(); toast('Already in Word Book'); return false;
  }
  quizState.wordBook.push({
    id: uid('wbk'), text, meaning: extra.meaning || '', example: extra.example || '',
    source: extra.source || 'Quiz Hub', subject: extra.subject || 'english',
    dateAdded: todayISO(), addedAt: Date.now(), highlight: !!extra.highlight, starred: !!extra.starred,
    reviewStatus: mem.reviewStatus, errorCount: mem.errorCount || 0, seenCount: mem.seenCount || 0, lastSeenDate: mem.lastSeenDate,
    srsBox: 0, srsNext: mem.nextReview || Date.now(), srsReviews: 0, srsLapses: 0
  });
  saveQuiz(); renderSharedStats(); render(); toast('Saved to Word Book'); return true;
}

function addToVocabBook(text, extra={}) {
  return addToWordBook(text, extra);
}

let wbkSearchQ = '';
let wbkSort = 'dateDesc'; // 'dateDesc', 'alpha', 'highlight'
let wbkTab = 'all'; // 'all', 'due', 'highlight', 'starred'

function openQuizWordBook(searchQ = wbkSearchQ, _unused, filterSort = wbkSort, filterTab = wbkTab) {
  if (typeof searchQ === 'string') wbkSearchQ = searchQ;
  if (filterSort) wbkSort = filterSort;
  if (filterTab) wbkTab = filterTab;
  syncWordBookMemory();

  const wbByKey = {};
  (quizState.wordBook || []).forEach(w => { wbByKey[memoryKey(w.text || w.word)] = w; });
  let items = Object.values(quizState.wordMemory || {}).map(mem => {
    const wb = wbByKey[memoryKey(mem.word)];
    return { ...(wb || {}), id: wb?.id || ('mem_' + memoryKey(mem.word)), text: mem.word, _memory: mem, _memoryOnly: !wb, reviewStatus: mem.reviewStatus || 'New' };
  });
  const now = Date.now();
  const dueItems = items.filter(w => (w._memory?.nextReview || w.srsNext || 0) <= now);
  if (wbkSearchQ) {
    const q = wbkSearchQ.toLowerCase();
    items = items.filter(w => (w.text||'').toLowerCase().includes(q) || (w.meaning||'').toLowerCase().includes(q) || (w.example||'').toLowerCase().includes(q) || (w.source||'').toLowerCase().includes(q));
  }
  if (wbkTab === 'new') items = items.filter(w => (w._memory?.reviewStatus || 'New') === 'New');
  if (wbkTab === 'learning') items = items.filter(w => (w._memory?.reviewStatus || 'New') === 'Learning');
  if (wbkTab === 'known') items = items.filter(w => (w._memory?.reviewStatus || 'New') === 'Known');
  if (wbkTab === 'due') items = items.filter(w => (w._memory?.nextReview || w.srsNext || 0) <= now);
  if (wbkTab === 'highlight') items = items.filter(w => w.highlight || w._memory?.tags?.includes('Highlight'));

  if (wbkSort === 'alpha') items.sort((a,b) => (a.text||'').localeCompare(b.text||''));
  else items.sort((a,b) => (b.addedAt||b._memory?.createdAt||0) - (a.addedAt||a._memory?.createdAt||0));

  const all = Object.values(quizState.wordMemory || {});
  const counts = {
    all: all.length,
    new: all.filter(m=>m.reviewStatus==='New').length,
    learning: all.filter(m=>m.reviewStatus==='Learning').length,

    <div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="apple-btn primary" onclick="startWordBookReview('due')">Review Due (${counts.due})</button><button class="apple-btn" onclick="startWordBookReview('all')">Review All</button></div>
  </div>`;
  const tabBtn = (id,label,count) => `<button class="res-tab-btn ${wbkTab===id?'active':''}" onclick="openQuizWordBook(wbkSearchQ,null,wbkSort,'${id}')">${label} (${count})</button>`;
  const filterBar = `<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
    <div style="display:flex;gap:4px;flex-wrap:wrap;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius-sm);padding:3px;">${tabBtn('all','All',counts.all)}${tabBtn('new','New Words',counts.new)}${tabBtn('learning','Learning Words',counts.learning)}${tabBtn('known','Known Words',counts.known)}${tabBtn('due','Due',counts.due)}</div>
    <div style="flex:1;min-width:160px;display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius-sm);padding:6px 10px;"><span style="font-size:13px;color:var(--ink-tertiary);">⌕</span><input type="text" placeholder="Search memory…" value="${esc(wbkSearchQ)}" style="flex:1;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--ink);outline:none;" oninput="openQuizWordBook(this.value, null, wbkSort, wbkTab)"/></div>
    <button class="apple-btn primary" style="height:34px;padding:0 14px;font-size:13px;font-weight:700;" onclick="openAddWordBookDialog('', '', '')">+ Add</button>
  </div>`;

  const listHTML = items.length ? items.map(w => {
    const m = w._memory || {};
    const status = m.reviewStatus || 'New';
    const tags = (m.tags && m.tags.length ? m.tags : ['Memory']).join(' · ');
    const lastSeen = m.lastSeenDate || w.lastSeenDate || w.dateAdded || '-';
    const next = m.nextReview ? new Date(m.nextReview).toLocaleDateString() : '-';

let wbkReviewSession = null;

function startWordBookReview(mode = 'due') {
  quizState.wordBook = quizState.wordBook || [];
  syncWordBookMemory();
  const now = Date.now();
  const wbByKey = {}; (quizState.wordBook||[]).forEach(w => wbByKey[memoryKey(w.text||w.word)] = w);
  const memoryItems = Object.values(quizState.wordMemory||{}).map(m => ({ ...(wbByKey[memoryKey(m.word)] || {}), id:(wbByKey[memoryKey(m.word)]?.id || 'mem_'+memoryKey(m.word)), text:m.word, source:m.source||'Memory Center', example:m.context||'', srsNext:m.nextReview, highlight:(m.tags||[]).includes('Highlight'), _memoryOnly:!wbByKey[memoryKey(m.word)] }));
  let queue = [];
  if (mode === 'due') {
    queue = memoryItems.filter(w => (w.srsNext || 0) <= now);
    if (!queue.length) { toast('All due items completed. Starting full review.'); queue = [...memoryItems]; mode = 'random'; }
  } else if (mode === 'random') {
    queue = [...memoryItems].sort(() => Math.random() - 0.5);
  } else {
    queue = [...memoryItems];
  }

  if (!queue.length) { toast('Memory Center is empty. Add words from Quiz Hub first.'); return; }

  wbkReviewSession = { queue, index: 0, showMeaning: false, mode, total: queue.length };
  renderWordBookReviewCard();
}

function renderWordBookReviewCard() {
  if (!wbkReviewSession || !wbkReviewSession.queue.length) return;
  const cur = wbkReviewSession.queue[wbkReviewSession.index];
  if (!cur) {
    openGenericSheet('复习完成', `<div style="text-align:center;padding:30px;">
      <h3 style="font-size:22px;color:var(--green);margin-bottom:10px;">太棒了！本组共 ${wbkReviewSession.total} 个单词/短语已全部复习！</h3>
      <p style="color:var(--ink-secondary);font-size:14px;">继续保持每日复习，提升词汇记忆持久度与阅读速度！</p>
    </div>`, [{ text: '返回生词本', cls: 'primary', onclick: () => openQuizWordBook() }]);
    return;
  }

  const idx = wbkReviewSession.index;
  const total = wbkReviewSession.total;
  const isHl = !!cur.highlight;
  const sColor = customSubjects[cur.subject]?.color || 'var(--ink-tertiary)';
  const sLabel = customSubjects[cur.subject]?.label || cur.subject || 'General';

  const cardStyle = isHl ? 'background:rgba(162,132,94,0.18);border:2px solid #A2845E;' : 'background:var(--bg-elev);border:1px solid var(--line);';

  const headerBar = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:10px;">
    <span style="font-size:14px;font-weight:700;color:var(--accent);">复习进度: ${idx + 1} / ${total} (${wbkReviewSession.mode.toUpperCase()})</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="apple-btn small" onclick="wbkReviewSession.queue.sort(()=>Math.random()-0.5); wbkReviewSession.index=0; wbkReviewSession.showMeaning=false; renderWordBookReviewCard();">🔀 打乱顺序</button>
      <button class="apple-btn small" onclick="openQuizWordBook()">退出复习</button>
    </div>
  </div>`;

  let mainContent = `<div style="padding:28px 20px;border-radius:var(--radius);text-align:center;margin-bottom:20px;box-shadow:var(--shadow-md);transition:all 0.25s ease;${cardStyle}">
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <span style="font-size:11px;padding:3px 10px;border-radius:4px;background:${sColor}18;color:${sColor};font-weight:700;">${esc(sLabel)}</span>
      ${cur.source ? `<span style="font-size:11px;color:var(--ink-secondary);background:var(--bg-card);padding:3px 10px;border-radius:4px;border:1px solid var(--line);">Src: ${esc(cur.source)}</span>` : ''}
      ${isHl ? `<span style="font-size:11px;background:#A2845E;color:#fff;padding:3px 10px;border-radius:12px;font-weight:700;">Highlighted (浅棕高亮)</span>` : ''}
    </div>
    <div style="font-size:32px;font-weight:800;color:var(--ink);margin:24px 0;letter-spacing:-0.5px;">${esc(cur.text)}</div>`;

  if (!wbkReviewSession.showMeaning) {
    mainContent += `<div style="margin-top:30px;">
      <button class="apple-btn primary" style="width:100%;padding:14px;font-size:16px;font-weight:700;box-shadow:var(--shadow-sm);" onclick="wbkReviewSession.showMeaning = true; renderWordBookReviewCard();">👁 显示释义与例句 (Show Meaning)</button>
    </div>`;
  } else {
    mainContent += `<div style="margin-top:20px;padding-top:18px;border-top:1px dashed var(--line);text-align:left;background:var(--bg-card);padding:18px;border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);">
      <div style="font-size:13px;color:var(--ink-tertiary);font-weight:700;margin-bottom:4px;">释义 (Meaning):</div>
      <div style="font-size:18px;font-weight:700;color:var(--ink);margin-bottom:12px;">${esc(cur.meaning || '暂无释义')}</div>
      ${cur.example ? `<div style="font-size:13px;color:var(--ink-tertiary);font-weight:700;margin-bottom:4px;">例句 (Example):</div>
      <div style="font-size:15px;color:var(--ink-secondary);font-style:italic;line-height:1.5;">"${esc(cur.example)}"</div>` : ''}
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <button class="apple-btn danger" style="flex:1;padding:12px;font-size:15px;font-weight:700;" onclick="markWordBookReviewItem('${cur.id}', 'forgot')">不会 (重复复习)</button>
      <button class="apple-btn primary" style="flex:1;padding:12px;font-size:15px;font-weight:700;background:var(--green);border-color:var(--green);" onclick="markWordBookReviewItem('${cur.id}', 'remembered')">✓ 记住了 (完成 / 增加间隔)</button>
    </div>`;
  }
  mainContent += `</div>`;

  const footerBar = `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
    <button class="apple-btn" onclick="wbkReviewStep(-1)" ${idx === 0 ? 'disabled' : ''}>← 上一词 (Prev)</button>
    <div style="display:flex;gap:8px;">
      <button class="apple-btn small" style="${isHl ? 'background:#A2845E;color:#fff;font-weight:700;border-color:#A2845E;' : 'color:#A2845E;font-weight:600;'}" onclick="toggleWordBookHighlight('${cur.id}'); renderWordBookReviewCard();">切换高亮</button>
      <button class="apple-btn small ${cur.starred ? 'active' : ''}" style="${cur.starred ? 'color:var(--yellow);font-weight:700;' : ''}" onclick="toggleWordBookStar('${cur.id}'); renderWordBookReviewCard();">收藏</button>
    </div>
    <button class="apple-btn" onclick="wbkReviewStep(1)" ${idx >= total - 1 ? 'disabled' : ''}>下一词 (Next) →</button>
  </div>`;

  openGenericSheet(`Word Book 卡片复习 (${idx + 1}/${total})`, headerBar + mainContent + footerBar, [
    { text: '结束复习返回列表', cls: 'primary', onclick: () => openQuizWordBook() }
  ]);
}

function wbkReviewStep(dir) {
  if (!wbkReviewSession) return;
  const newIdx = wbkReviewSession.index + dir;
  if (newIdx >= 0 && newIdx < wbkReviewSession.total) {
    wbkReviewSession.index = newIdx;
    wbkReviewSession.showMeaning = false;
    renderWordBookReviewCard();
  }
}

function markWordBookReviewItem(id, result) {
  let item = quizState.wordBook.find(x => x.id === id);
  if (!item && wbkReviewSession) item = wbkReviewSession.queue[wbkReviewSession.index];
  if (item) {
    const mem = wordMemoryEnsure(item.text || item.word, item._memoryOnly ? 'Highlight' : 'Word Book', {source:item.source||'Memory Center', context:item.example||'', countSeen:false});
    const now = Date.now();
    if (result === 'forgot') {
      item.srsBox = 0;
      item.srsNext = now; // due immediately or tomorrow
      item.srsLapses = (item.srsLapses || 0) + 1;
      mem.errorCount = (mem.errorCount || 0) + 1; mem.reviewCount = (mem.reviewCount || 0) + 1; mem.reviewStatus = 'Learning'; mem.nextReview = item.srsNext;
      toast('Marked as Learning');
    } else {
      item.srsBox = (item.srsBox || 0) + 1;
      // Spaced repetition intervals: 1d, 3d, 7d, 14d, 30d
      const days = [1, 3, 7, 14, 30][Math.min(4, item.srsBox)] || 1;
      item.srsNext = now + days * 86400000;
      item.srsReviews = (item.srsReviews || 0) + 1;
      mem.reviewCount = (mem.reviewCount || 0) + 1; mem.correctCount = (mem.correctCount || 0) + 1; mem.reviewStatus = mem.correctCount >= 2 ? 'Known' : 'Learning'; mem.nextReview = item.srsNext; item.reviewStatus = mem.reviewStatus;
      toast(`Review scheduled in ${days} days`);
    }
    saveQuiz();
    renderSharedStats();
  }
  if (wbkReviewSession.index < wbkReviewSession.total - 1) {
    wbkReviewStep(1);
  } else {
    toast('当前队列已刷完');
    openQuizWordBook();
  }
}

function openAddWordBookDialog(defaultText = '', defaultExample = '', defaultSource = '', _unusedSubj = '', editId = null) {

  openGenericSheet(editId ? 'Edit Word (编辑生词)' : 'Add to Word Book (录入生词)', `
    <div class="field"><label style="font-weight:700;">Word / Phrase</label><input id="add_wbk_text" value="${esc(item ? item.text : defaultText)}" placeholder="e.g. abandon · depend on"/></div>
    <div class="field"><label style="font-weight:700;">Meaning (释义)</label><input id="add_wbk_mean" value="${esc(item ? item.meaning : '')}" placeholder="e.g. 放弃；依赖"/></div>
    <div class="field"><label style="font-weight:700;">Example (例句)</label><textarea id="add_wbk_ex" rows="2" placeholder="e.g. The project depends on careful planning.">${esc(item ? item.example : defaultExample)}</textarea></div>
    <div class="field"><label style="font-weight:700;">Source (出处)</label><input id="add_wbk_src" value="${esc(item ? item.source : (defaultSource || 'Quiz Hub'))}"/></div>
    <div style="display:flex;gap:14px;margin-top:8px;padding:10px;background:var(--bg-elev);border-radius:var(--radius-sm);align-items:center;">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600;font-size:13px;color:#A2845E;">
        <input type="checkbox" id="add_wbk_hl" ${item && item.highlight ? 'checked' : (!item && defaultText ? 'checked' : '')}/> 设为高亮
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:600;font-size:13px;color:var(--yellow);">
        <input type="checkbox" id="add_wbk_st" ${item && item.starred ? 'checked' : ''}/> 加入收藏
      </label>
    </div>
  `, [
    { text: 'Cancel', onclick: () => closeSheet('genericSheet') },
    { text: editId ? 'Save Changes' : 'Save', cls: 'primary', onclick: () => {
      const textVal = document.getElementById('add_wbk_text').value.trim();
      if (!textVal) { toast('请填写单词或短语！'); return; }
      const meaning = document.getElementById('add_wbk_mean').value.trim();
      const example = document.getElementById('add_wbk_ex').value.trim();
      const source = document.getElementById('add_wbk_src').value.trim();
      const highlight = document.getElementById('add_wbk_hl').checked;
      const starred = document.getElementById('add_wbk_st').checked;

      quizState.wordBook = quizState.wordBook || [];
      const mem = wordMemoryEnsure(textVal, 'Word Book', {source:source||'Word Book', context:example||'', countSeen:false});
      if (highlight) wordMemoryEnsure(textVal, 'Highlight', {source:source||'Word Book', context:example||'', countSeen:false});
      if (editId && item) {
        item.text = textVal; item.meaning = meaning; item.example = example;
        item.source = source; item.subject = 'english';
        item.highlight = highlight; item.starred = starred; item.reviewStatus = mem.reviewStatus; item.errorCount = mem.errorCount||0; item.seenCount = mem.seenCount||0; item.lastSeenDate = mem.lastSeenDate;
        toast('✓ 生词修改已保存！');
      } else {
        const exists = quizState.wordBook.find(x => x.text.toLowerCase() === textVal.toLowerCase());
        if (exists) {
          exists.meaning = meaning || exists.meaning; exists.example = example || exists.example;
          exists.source = source || exists.source; exists.subject = 'english';
          exists.highlight = highlight || exists.highlight; exists.starred = starred || exists.starred; exists.reviewStatus = mem.reviewStatus; exists.errorCount = mem.errorCount||0; exists.seenCount = mem.seenCount||0; exists.lastSeenDate = mem.lastSeenDate;
          toast('已更新生词: ' + textVal);
        } else {
          quizState.wordBook.push({
            id: uid('wbk'), text: textVal, meaning, example, source, subject: 'english',
            dateAdded: todayISO(), addedAt: Date.now(), highlight, starred, reviewStatus: mem.reviewStatus, errorCount: mem.errorCount||0, seenCount: mem.seenCount||0, lastSeenDate: mem.lastSeenDate,
            srsBox: 0, srsNext: mem.nextReview||Date.now(), srsReviews: 0, srsLapses: 0
          });
          toast('已存入: ' + textVal);
        }
      }
      saveQuiz(); closeSheet('genericSheet'); renderSharedStats(); render();
      if (document.querySelector('.list-item')) openQuizWordBook();
    }}
  ]);
}

function openAddSynonymDialog(qId) {

}

// ================================================================
//  WRONG BOOK — INTERACTIVE QUESTION PRACTICING INTERFACE
// ================================================================
let wbCurrentIndex = 0;
let wbFilter = 'all'; // 'all', 'unresolved', 'resolved'

function openQuizWrongBook(idx = 0, filter = wbFilter) {
  if (typeof idx === 'number') wbCurrentIndex = idx;
  if (filter) wbFilter = filter;
  const p = currentPassage();
  const all = [...quizState.wrongBook];
  let filtered = p ? all.filter(w => w.passageId === p.id) : all;
  if (wbFilter === 'unresolved') filtered = filtered.filter(w => !w.completed);
  if (wbFilter === 'resolved') filtered = filtered.filter(w => w.completed);

  if (wbCurrentIndex >= filtered.length) wbCurrentIndex = Math.max(0, filtered.length - 1);
  if (wbCurrentIndex < 0) wbCurrentIndex = 0;

  const totalAll = all.length;
  const totalUnres = all.filter(w => !w.completed).length;
  const totalRes = all.filter(w => w.completed).length;

  const filterBar = `<div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
    <span style="font-size:12px;font-weight:700;color:var(--ink-secondary);margin-right:4px;">Filter:</span>
    <button class="apple-btn small ${wbFilter === 'all' && !p ? 'active' : ''}" onclick="quizState.currentPassageId=null;openQuizWrongBook(0, 'all')">All (${totalAll})</button>
    <button class="apple-btn small ${wbFilter === 'unresolved' ? 'active' : ''}" onclick="openQuizWrongBook(0, 'unresolved')">Unresolved (${totalUnres})</button>
    <button class="apple-btn small ${wbFilter === 'resolved' ? 'active' : ''}" onclick="openQuizWrongBook(0, 'resolved')">Resolved (${totalRes})</button>
    ${quizState.passages.map(pp => `<button class="apple-btn small ${pp.id === p?.id ? 'active' : ''}" onclick="quizState.currentPassageId='${pp.id}';openQuizWrongBook(0, '${wbFilter}')">${esc(pp.customName)}</button>`).join('')}
    <button class="apple-btn small primary" style="margin-left:auto;font-weight:700;" onclick="redoAllWrongBookQuestions()">↻ Reset All in View (全部重做)</button>
  </div>`;

  if (!filtered.length) {
    openGenericSheet('X Wrong Book Practice', filterBar + `<div class="empty-state">No wrong questions found in this filter!</div>`, [
      { text: 'Close', cls: 'primary', onclick: () => closeSheet('genericSheet') }
    ]);
    return;
  }

  const w = filtered[wbCurrentIndex];
  const qNum = wbCurrentIndex + 1;
  const total = filtered.length;
  const isResolved = !!w.completed;

  // Options rendering
  let optionsHTML = `<div class="q-options" style="margin-top:12px;margin-bottom:16px;">`;
  (w.options || []).forEach(opt => {
    const letter = (opt.match(/^([A-Z])[.\s、)]/) || [])[1] || opt[0];
    let cls = 'q-opt wb-opt';
    if (w._checked) {
      if (letter === w.correctAnswer) cls += ' correct';
      else if (letter === w._chosen) cls += ' wrong';
    } else if (w._chosen === letter) {
      cls += ' selected';
    }
    optionsHTML += `<button class="${cls}" style="text-align:left;width:100%;padding:10px 14px;margin-bottom:6px;border-radius:var(--radius-sm);border:1px solid var(--line);" onclick="selectWbOption(this, '${letter}', '${w.id}')">${esc(opt)}</button>`;
  });
  optionsHTML += `</div>`;

  // Explanation if checked
  let explainHTML = '';
  if (w._checked) {
    const isOk = w._chosen === w.correctAnswer;
    explainHTML = `<div class="q-status ${isOk ? 'ok' : 'err'}" style="margin-top:12px;padding:10px;border-radius:var(--radius-sm);background:${isOk?'rgba(52,199,89,0.1)':'rgba(255,59,48,0.1)'};color:${isOk?'var(--green)':'var(--red)'};font-weight:700;">
      ${isOk ? 'OK Correct!' : 'X Wrong · Correct Answer: ' + esc(w.correctAnswer)}
    </div>
    <div class="q-explain show" style="margin-top:10px;padding:14px;background:var(--bg-elev);border:1px solid var(--line);border-radius:var(--radius-sm);">
      <div style="font-weight:700;margin-bottom:6px;font-size:13px;color:var(--ink);">Explanation (答案解析):</div>
      <div style="font-size:14px;color:var(--ink-secondary);line-height:1.5;">${esc(w.explanation || 'No explanation provided.')}</div>
    </div>`;
  }

  const cardHTML = `<div class="q-card wb-practice-card" data-wbid="${w.id}" style="padding:18px;background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:10px;">
      <span style="font-size:13px;font-weight:700;color:var(--accent);">Question ${qNum} of ${total} (${w.qType ? w.qType.toUpperCase() : 'QUIZ'})</span>
      <div style="display:flex;gap:6px;align-items:center;">
        ${isResolved ? `<span style="background:var(--green);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;">✓ Resolved</span>` : `<span style="background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;">Unresolved</span>`}
      </div>
    </div>
    <div class="q-text" style="font-size:16px;font-weight:600;color:var(--ink);line-height:1.4;">${esc(w.question)}</div>
    ${optionsHTML}
    ${explainHTML}
    <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:14px;align-items:center;">
      <button class="apple-btn primary" onclick="checkWbAnswer('${w.id}')">Check Answer (做题)</button>
      <button class="apple-btn" onclick="retryWbQuestion('${w.id}')">Retry (重新做)</button>
      <button class="apple-btn" style="${isResolved ? 'color:var(--orange);' : 'color:var(--green);font-weight:600;'}" onclick="toggleWbResolved('${w.id}')">
        ${isResolved ? 'Unmark / Add Back (再次加入错题)' : '✓ Mark Completed (标记完成)'}
      </button>
      <button class="apple-btn danger" style="margin-left:auto;" onclick="deleteWbQuestion('${w.id}')">Delete (删除错题)</button>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;">
    <button class="apple-btn" onclick="openQuizWrongBook(${wbCurrentIndex - 1}, '${wbFilter}')" ${wbCurrentIndex === 0 ? 'disabled' : ''}>← Previous</button>
    <span style="font-size:12px;color:var(--ink-secondary);font-weight:500;">Wrong Book Practice Mode</span>
    <button class="apple-btn" onclick="openQuizWrongBook(${wbCurrentIndex + 1}, '${wbFilter}')" ${wbCurrentIndex >= total - 1 ? 'disabled' : ''}>Next →</button>
  </div>`;

  openGenericSheet(`X Wrong Book (${all.length}) — Practice Mode`, filterBar + cardHTML, [
    { text: 'Close', cls: 'primary', onclick: () => { closeSheet('genericSheet'); render(); } }
  ]);
}

function selectWbOption(btn, letter, wbId) {
  const card = btn.closest('.wb-practice-card');
  card.querySelectorAll('.wb-opt').forEach(o => o.classList.remove('selected'));
  btn.classList.add('selected');
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (w) w._chosen = letter;
}

function checkWbAnswer(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  if (!w._chosen) { toast('Select an option first'); return; }
  w._checked = true;
  openQuizWrongBook(wbCurrentIndex, wbFilter);
}

function retryWbQuestion(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  w._chosen = null;
  w._checked = false;
  openQuizWrongBook(wbCurrentIndex, wbFilter);
  toast('Question reset for retry');
}

function toggleWbResolved(wbId) {
  const w = quizState.wrongBook.find(x => x.id === wbId);
  if (!w) return;
  w.completed = !w.completed;
  saveQuiz();
  renderSharedStats();
  openQuizWrongBook(wbCurrentIndex, wbFilter);
  toast(w.completed ? 'Marked as completed / resolved!' : 'Added back to unresolved wrong book!');
}

function deleteWbQuestion(wbId) {
  if (!confirm('Delete this question from Wrong Book?')) return;
  quizState.wrongBook = quizState.wrongBook.filter(x => x.id !== wbId);
  saveQuiz();
  renderSharedStats();
  openQuizWrongBook(wbCurrentIndex, wbFilter);
  toast('Deleted from Wrong Book');
}

function retryWrong(wId) {
  retryWbQuestion(wId);
}

let srsSession = null;
function startSrsReview(mode, customList) {
  const source = mode==='vocab' ? (quizState.wordBook||[]) : quizState.synonymLibrary;
  source.forEach(ensureSrs);
  let queue;
  if(Array.isArray(customList)&&customList.length){customList.forEach(ensureSrs);queue=customList.slice();}
  else{const due=srsDueList(source);if(!due.length){toast('Nothing due! !');return;}queue=due.slice().sort(()=>Math.random()-0.5);}
  srsSession = {mode,queue,total:queue.length,done:0,showAnswer:false};
  renderSrsCard();
}

function renderSrsCard() {
  if(!srsSession||!srsSession.queue.length){
    openGenericSheet('! Review Complete',`<div style="text-align:center;padding:20px;font-size:14px;">Reviewed <b>${srsSession?.total||0}</b> items</div>`,
      [{text:'Close',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
    return;
  }
  const cur=srsSession.queue[0];const isVocab=srsSession.mode==='vocab';
  const frontHTML=isVocab?`<div style="font-size:28px;font-weight:700">${esc(cur.word)}</div>`:`<div style="font-size:22px;font-weight:700">${esc(cur.groupName||'Group')}</div><div style="color:var(--ink-tertiary);font-size:11px;margin-top:4px">${(cur.words||[]).length} words</div>`;
  const backHTML=isVocab?`<div style="font-size:15px;color:var(--ink)">${esc(cur.meaning||'')}</div>${cur.example?`<div style="margin-top:10px;padding:8px 12px;background:var(--bg-card);border-radius:8px;font-size:12px;color:var(--ink-secondary)">${esc(cur.example)}</div>`:''}`:`<div class="chips">${(cur.words||[]).map(w=>`<span class="chip" style="font-size:14px;padding:6px 14px">${esc(w)}</span>`).join('')}</div>`;

  const btnHTML = !srsSession.showAnswer
    ? `<button class="apple-btn primary" style="padding:10px 40px" onclick="srsSession.showAnswer=true;renderSrsCard();">Show Answer</button>`
    : `<div style="display:flex;gap:8px;justify-content:center">
        <button class="apple-btn" style="background:rgba(255,69,58,0.1);color:var(--red)" onclick="srsGradeCurrent('again')">Again</button>
        <button class="apple-btn" style="background:rgba(255,159,10,0.1);color:var(--orange)" onclick="srsGradeCurrent('hard')">Hard</button>
        <button class="apple-btn" style="background:rgba(48,209,88,0.1);color:var(--green)" onclick="srsGradeCurrent('good')">Good</button>
        <button class="apple-btn" style="background:rgba(10,132,255,0.1);color:var(--accent)" onclick="srsGradeCurrent('easy')">Easy</button>
      </div>`;

  openGenericSheet(`Rev Review · ${isVocab?'Vocabulary':'Synonyms'}`,`
    <div style="max-width:500px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--ink-tertiary);margin-bottom:16px"><span>${srsSession.done+1}/${srsSession.total}</span><span>Box ${cur.srsBox||0}</span></div>
      <div style="background:var(--bg-card);border:1px solid var(--line);border-radius:var(--radius);padding:40px 24px;text-align:center;min-height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center">
        ${frontHTML}
        <div style="width:100%;margin-top:20px;padding-top:20px;border-top:1px dashed var(--line);${srsSession.showAnswer?'':'display:none'}">${backHTML}</div>
      </div>
      <div style="margin-top:20px;text-align:center">${btnHTML}</div>
    </div>
  `,[{text:'End Review',cls:'primary',onclick:()=>{srsSession=null;closeSheet('genericSheet');}}]);
}

function srsGradeCurrent(grade) {
  if(!srsSession) return;
  const cur=srsSession.queue.shift();
  srsGrade(cur,grade);
  srsSession.done++;srsSession.showAnswer=false;
  saveQuiz();renderSrsCard();
}

// Keyboard shortcuts for SRS
document.addEventListener('keydown', e => {
  if(!srsSession) return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(!srsSession.showAnswer&&(e.code==='Space'||e.key==='Enter')){e.preventDefault();srsSession.showAnswer=true;renderSrsCard();}
  else if(srsSession.showAnswer){const map={1:'again',2:'hard',3:'good',4:'easy'};if(map[e.key]){e.preventDefault();srsGradeCurrent(map[e.key]);}}
});

function exportQuizJSON() {
  const obj = {version:'2.0',schemaVersion:QUIZ_SCHEMA,exportedAt:Date.now(),passages:quizState.passages,quizSets:quizState.quizSets,grammarQuestions:quizState.grammarQuestions,vocabularyQuestions:quizState.vocabularyQuestions,wordBook:quizState.wordBook,synonymLibrary:quizState.synonymLibrary,highlights:quizState.highlights,wrongBook:quizState.wrongBook,wordMemory:quizState.wordMemory,answerLog:quizState.answerLog,currentPassageId:quizState.currentPassageId,currentQuizSetId:quizState.currentQuizSetId};
  downloadJSON(obj,'quiz_export_'+todayISO()+'.json');
  toast('Exported OK');
}

function importQuizJSON() {
  if(quizState.passages.length&&!confirm('This will OVERWRITE all quiz data. Continue?')) return;
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = () => { try { importQuizData(JSON.parse(r.result)); toast('Imported OK'); } catch(err) { alert('Import failed: '+err.message); } };
    r.readAsText(f);
  };
  inp.click();
}

function importQuizData(data) {
  if(!data||typeof data!=='object') throw new Error('Invalid JSON');
  const passages = Array.isArray(data.passages)?data.passages:[];
  passages.forEach((p,i)=>{if(!p.id)p.id=uid('sec');if(!p.customName)p.customName=p.title||('Section '+(i+1));if(typeof p.content!=='string')p.content='';});
  quizState.passages=passages;
  quizState.quizSets=Array.isArray(data.quizSets)?data.quizSets:[];
  quizState.grammarQuestions=Array.isArray(data.grammarQuestions)?data.grammarQuestions:[];
  quizState.vocabularyQuestions=Array.isArray(data.vocabularyQuestions)?data.vocabularyQuestions:[];
  quizState.wordBook=Array.isArray(data.wordBook)?data.wordBook:(Array.isArray(data.vocabularyBook)?data.vocabularyBook:[]);
  quizState.synonymLibrary=Array.isArray(data.synonymLibrary)?data.synonymLibrary:[];
  quizState.highlights=Array.isArray(data.highlights)?data.highlights:[];
  quizState.wrongBook=Array.isArray(data.wrongBook)?data.wrongBook:[];
  quizState.wordMemory=data.wordMemory||{};
  quizState.answerLog=data.answerLog||{};
  quizState.currentQuizSetId=data.currentQuizSetId||{};
  quizState.currentPassageId=data.currentPassageId||(passages[0]&&passages[0].id)||null;
  quizState.highlights.forEach(h=>{if(!h.id)h.id=uid('hl');});
  quizState.quizSets.forEach(qs=>{if(!qs.id)qs.id=uid('qs');});
  passages.forEach(p=>{if(!quizState.quizSets.some(qs=>qs.passageId===p.id)){quizState.quizSets.push({id:uid('qs'),passageId:p.id,name:'1',createdAt:Date.now()});}});
  saveQuiz(); render();
}

function clearAllQuiz() {
  if(!confirm('Clear ALL quiz data? This cannot be undone.')) return;
  quizState = {version:'2.0',schemaVersion:QUIZ_SCHEMA,passages:[],quizSets:[],grammarQuestions:[],vocabularyQuestions:[],wordBook:[],synonymLibrary:[],highlights:[],wrongBook:[],wordMemory:{},answerLog:{},currentPassageId:null,currentQuizSetId:{},activeQuizSetIds:{},activeTab:'grammar',activeQIndex:{grammar:{},vocab:{}}};
  saveQuiz(); render();
}

function loadSeedData() {
  localStorage.removeItem('study_demo_data_removed');
  if(quizState.passages.length&&!confirm('Merge sample data?')) return;
  const seed = getSeedData();
  seed.passages.forEach(p=>{if(!quizState.passages.find(x=>x.id===p.id))quizState.passages.push(p);});
  seed.grammarQuestions.forEach(q=>{if(!quizState.grammarQuestions.find(x=>x.id===q.id))quizState.grammarQuestions.push(q);});
  seed.vocabularyQuestions.forEach(q=>{if(!quizState.vocabularyQuestions.find(x=>x.id===q.id))quizState.vocabularyQuestions.push(q);});
  (seed.wordBook||[]).forEach(w=>{if(!quizState.wordBook.find(x=>x.text===w.text))quizState.wordBook.push(w);});
  seed.synonymLibrary.forEach(g=>{if(!quizState.synonymLibrary.find(x=>x.groupName===g.groupName))quizState.synonymLibrary.push(g);});
  if(!quizState.currentPassageId&&quizState.passages.length) quizState.currentPassageId=quizState.passages[0].id;
  saveQuiz(); render(); toast('Sample data loaded');
}

function confirmAIImport(tab) {
  const raw = document.getElementById('aiJsonPasteArea')?.value.trim();
  if (!raw) { toast('请先粘贴 JSON'); return; }
  let data;
  try { data = JSON.parse(raw); } catch(e) { toast('JSON 格式错误：' + e.message); return; }

  const mode = document.querySelector('input[name="aiImportMode"]:checked')?.value || 'merge';
  const overwrite = mode === 'overwrite';

  if (overwrite && !confirm('覆盖模式会替换现有数据，确认继续？')) return;

  try {
    if (tab === 'quiz' || tab === 'passage') {
      // passages
      if (data.passages?.length) {
        if (overwrite) { quizState.passages = data.passages; }
        else { data.passages.forEach(p => { if (!p.id) p.id = uid('sec'); if (!quizState.passages.find(x=>x.id===p.id)) quizState.passages.push(p); }); }
      }
      // quizSets
      if (data.quizSets?.length) {
        if (overwrite) { quizState.quizSets = data.quizSets; }
        else { data.quizSets.forEach(qs => { if (!qs.id) qs.id = uid('qs'); if (!quizState.quizSets.find(x=>x.id===qs.id)) quizState.quizSets.push(qs); }); }
      }
      // auto-create quizSets for passages without one
      quizState.passages.forEach(p => { if (!quizState.quizSets.some(qs=>qs.passageId===p.id)) quizState.quizSets.push({id:uid('qs'),passageId:p.id,name:'1',createdAt:Date.now()}); });
      // questions
      if (data.grammarQuestions?.length) {

async function cloudUpload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token){alert('Token required');return;}
  try{
    toast('Uploading...');
    const body={description:'Quiz Backup',public:false,files:{[filename]:{content:JSON.stringify({version:'2.0',schemaVersion:QUIZ_SCHEMA,exportedAt:Date.now(),passages:quizState.passages,quizSets:quizState.quizSets,grammarQuestions:quizState.grammarQuestions,vocabularyQuestions:quizState.vocabularyQuestions,wordBook:quizState.wordBook,synonymLibrary:quizState.synonymLibrary,highlights:quizState.highlights,wrongBook:quizState.wrongBook,wordMemory:quizState.wordMemory,answerLog:quizState.answerLog,currentPassageId:quizState.currentPassageId,currentQuizSetId:quizState.currentQuizSetId},null,2)}}};
    let url='https://api.github.com/gists';let method='POST';
    if(gistId){url+='/'+gistId;method='PATCH';}
    const res=await fetch(url,{method,headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    quizMeta.gist={token,gistId:data.id||gistId,filename,lastSyncTs:Date.now()};
    try{localStorage.setItem(QUIZ_META_KEY,JSON.stringify(quizMeta));}catch(_){}
    toast('OK Uploaded');
  }catch(e){alert('Upload failed: '+e.message);}
}

async function cloudDownload() {
  const token=(document.getElementById('gistToken')?.value||'').trim();
  const gistId=(document.getElementById('gistId')?.value||'').trim();
  const filename=(document.getElementById('gistFn')?.value||'dashboard.json').trim();
  if(!token||!gistId){alert('Token and Gist ID required');return;}
  if(!confirm('Overwrite local data with cloud?')) return;
  try{
    toast('Downloading...');
    const res=await fetch('https://api.github.com/gists/'+gistId,{headers:{'Accept':'application/vnd.github+json','Authorization':'Bearer '+token}});
    if(!res.ok) throw new Error(res.status);
    const data=await res.json();
    const file=data.files?.[filename]||Object.values(data.files||{})[0];
    if(!file?.content) throw new Error('No data file');
    importQuizData(JSON.parse(file.content));
    toast('OK Downloaded');closeSheet('genericSheet');
  }catch(e){alert('Download failed: '+e.message);}
}

function normalizeRoadmapStatus(status) {
  const s = String(status || '').toLowerCase().trim().replace(/[\s-]+/g, '_');
  if (['completed','complete','done','finished','finish'].includes(s)) return 'completed';
  if (['in_progress','progress','started','pending','ongoing'].includes(s)) return 'in_progress';
  return 'not_started';
}
function roadmapStatusLabel(status) {
  if (status === 'completed') return 'Completed';
  if (status === 'in_progress') return 'In Progress';
  return 'Not Started';
}
function roadmapSubjectLabel(key) { return customSubjects[key]?.label || key || 'Subject'; }
function roadmapSubjectOptions(selected) {
  return getSidebarSubjectKeys().map(k => `<option value="${k}" ${k===selected?'selected':''}>${esc(roadmapSubjectLabel(k))}</option>`).join('');
}
function detectSubjectKey(text) {
  const q = String(text || '').toLowerCase().replace(/[^a-z\u4e00-\u9fff]/g, '');
  if (!q) return '';
  const aliases = { english:['english','eng'], chinese:['chinese','中文','语文'], politic:['politics','politic','政治'], collegeEnglish:['collegeenglish','cet','大学英语'] };
  for (const k of getSidebarSubjectKeys()) {
    const label = (customSubjects[k]?.label || k).toLowerCase().replace(/[^a-z\u4e00-\u9fff]/g, '');
    if (q === label || q.includes(label) || label.includes(q)) return k;
  }
  for (const [k, arr] of Object.entries(aliases)) if (arr.some(a => q === a || q.includes(a))) return k;
  return '';
}
function parseMonthNameDate(str) {
  const months = {jan:1,january:1,feb:2,february:2,mar:3,march:3,apr:4,april:4,may:5,jun:6,june:6,jul:7,july:7,aug:8,august:8,sep:9,sept:9,september:9,oct:10,october:10,nov:11,november:11,dec:12,december:12};
  const s = String(str || '').trim();
  let m = s.match(/\b([A-Za-z]+)\s*[–—-]\s*([A-Za-z]+)\s+(20\d{2}|19\d{2})\b/);
  if (m && months[m[1].toLowerCase()]) return `${m[3]}-${String(months[m[1].toLowerCase()]).padStart(2,'0')}-01`;
  m = s.match(/\b([A-Za-z]+)\s+(20\d{2}|19\d{2})\b/);
  if (m && months[m[1].toLowerCase()]) return `${m[2]}-${String(months[m[1].toLowerCase()]).padStart(2,'0')}-01`;
  m = s.match(/\b(20\d{2}|19\d{2})[\.\/-](\d{1,2})(?:[\.\/-](\d{1,2}))?\b/);
  if (m) return `${m[1]}-${String(parseInt(m[2])).padStart(2,'0')}-${String(parseInt(m[3]||'1')).padStart(2,'0')}`;
  m = s.match(/\b(\d{1,2})[\.\/-](\d{1,2})[\.\/-](20\d{2}|19\d{2})\b/);
  if (m) return `${m[3]}-${String(parseInt(m[1])).padStart(2,'0')}-${String(parseInt(m[2])).padStart(2,'0')}`;
  return '';
}
function normalizePlanDate(dateStr) {
  if (!dateStr) return '';
  const s = String(dateStr).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d{4}-\d{2}$/.test(s)) return s + '-01';
  return parseMonthNameDate(s) || '';
}
function formatDate(dateStr) {
  if (!dateStr) return 'Not set';
  const d = new Date(dateStr + 'T00:00:00');
  if (Number.isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}
function formatMilestoneRange(start, finish) {
  if (!start && !finish) return 'Dates not set';
  if (!start) return `Until ${formatDate(finish)}`;
  if (!finish) return `From ${formatDate(start)}`;
  const s = new Date(start + 'T00:00:00');
  const f = new Date(finish + 'T00:00:00');
  if (Number.isNaN(s.getTime()) || Number.isNaN(f.getTime())) return `${formatDate(start)} – ${formatDate(finish)}`;
  const sameYear = s.getFullYear() === f.getFullYear();
  const sameMonth = sameYear && s.getMonth() === f.getMonth();
  if (sameMonth) return s.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  const left = s.toLocaleDateString('en-US', { month:'long' });
  const right = f.toLocaleDateString('en-US', { month:'long', year:'numeric' });
  return sameYear ? `${left} – ${right}` : `${formatDate(start)} – ${formatDate(finish)}`;
}
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const t = new Date(dateStr + 'T00:00:00');
  const n = new Date(); n.setHours(0,0,0,0);
  if (Number.isNaN(t.getTime())) return null;
  return Math.ceil((t - n) / 86400000);
}

  const title = normTitle(plan.title);
  const lrMatches = learningItems.filter(lr => (!plan.subject || lr.subject === plan.subject) && title && (normTitle(lr.title).includes(title) || title.includes(normTitle(lr.title))));

  const vals = [];

function executeRoadmapAIImport() {
  const text = document.getElementById('roadmapAIImportText')?.value.trim();
  if (!text) {
    toast('Invalid JSON format.');
    return;
  }
  let data = null;
  try {
    data = JSON.parse(text);
  } catch(e) {
    toast('Invalid JSON format.');
    return;
  }
  if (!Array.isArray(data) || !data.length || !data.every(item => item && typeof item === 'object')) {
    toast('Invalid JSON format.');
    return;
  }

  const newMilestones = [];
  const newPlans = [];
  let msOrder = 0;
  let planOrder = 0;

  data.forEach((mItem, idx) => {
    const msId = uid('rm');
    const title = String(mItem.milestone || mItem.title || `Milestone ${idx + 1}`).trim();
    const startDate = normalizePlanDate(mItem.startDate || mItem.start || '');
    const targetFinishDate = normalizePlanDate(mItem.targetFinishDate || mItem.end || mItem.targetDate || '');
    let msStatus = normalizeRoadmapStatus(mItem.status || 'not_started');

    const subjectsArr = Array.isArray(mItem.subjects) ? mItem.subjects : (mItem.subject ? [mItem.subject] : []);
    subjectsArr.forEach(sItem => {
      if (!sItem || typeof sItem !== 'object') return;
      const rawSubj = String(sItem.name || sItem.subject || sItem.label || '').trim();
      const subjectKey = detectSubjectKey(rawSubj) || Object.keys(customSubjects)[0] || 'english';
      const planStatus = normalizeRoadmapStatus(sItem.status || mItem.status || 'not_started');
      const targetStr = String(sItem.target || sItem.targetDate || sItem.date || targetFinishDate || '').trim();
      const planFinishDate = normalizePlanDate(targetStr);
      const planStartDate = normalizePlanDate(sItem.startDate || startDate || '');

      const notesArr = [];
      if (rawSubj && !detectSubjectKey(rawSubj)) notesArr.push(rawSubj);
      if (targetStr && !planFinishDate) notesArr.push(`Target: ${targetStr}`);
      if (sItem.notes) notesArr.push(sItem.notes);
      const planNotes = notesArr.join(' · ');

      const tasksArr = Array.isArray(sItem.tasks) ? sItem.tasks : (sItem.task ? [sItem.task] : (sItem.title ? [sItem.title] : (rawSubj ? [rawSubj] : ['Untitled Task'])));
      tasksArr.forEach(taskTitle => {
        newPlans.push({
          id: uid('rp'),
          milestoneId: msId,
          subject: subjectKey,
          title: String(taskTitle || 'Untitled Plan').trim(),
          startDate: planStartDate,
          targetFinishDate: planFinishDate,
          status: planStatus,
          notes: planNotes,
          order: planOrder++,
          createdAt: todayISO()
        });
      });
    });

    const msPlans = newPlans.filter(p => p.milestoneId === msId);
    if (msPlans.length > 0) {
      if (msPlans.every(p => p.status === 'completed')) msStatus = 'completed';
      else if (msPlans.some(p => p.status === 'in_progress' || p.status === 'completed')) msStatus = 'in_progress';
    }

    newMilestones.push({
      id: msId,
      title: title,
      startDate: startDate,
      targetFinishDate: targetFinishDate,
      status: msStatus,
      notes: String(mItem.notes || '').trim(),
      order: msOrder++,
      createdAt: todayISO()
    });
  });

  roadmapMilestones = newMilestones;
  roadmapPlans = newPlans;
  roadmapMilestoneExpanded = null;
  roadmapSubjectExpanded = null;

  localStorage.setItem('study_roadmap_milestones_pro', JSON.stringify(roadmapMilestones));
  localStorage.setItem('study_roadmap_plans_pro', JSON.stringify(roadmapPlans));
  if (typeof saveRoadmap === 'function') saveRoadmap();

  closeSheet('genericSheet');
  if (typeof render === 'function') render();
  toast('Roadmap imported successfully');
}

function parseAIStudyPlan(raw) {
  const text=String(raw||'').replace(/\r/g,'').trim(); const warnings=[]; if(!text)return{milestones:[],plans:[],warnings:['Paste a study plan before importing.']};
  const blocks=text.split(/\n\s*(?:-{3,}|—{3,}|_{3,})\s*\n/g).map(b=>b.trim()).filter(Boolean);
  const milestones=[]; const plans=[];
  blocks.forEach((block,idx)=>{
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean); let curMilestone=null; let subject='', title='', startDate='', targetFinishDate='', status='not_started', notes=[]; let inNotes=false;
    lines.forEach((line,li)=>{ const clean=line.replace(/^[-*•]\s*/,'').trim(); const kv=clean.match(/^([^:：]+)\s*[:：]\s*(.*)$/); const key=kv?kv[1].toLowerCase().trim():''; const val=kv?kv[2].trim():'';
      if(inNotes && (!kv || !/^(milestone|phase|subject|title|start|finish|target|end|status|notes?)$/i.test(key))){notes.push(clean);return;}
      if(kv){
        if(key.includes('milestone')||key.includes('phase')) curMilestone = val || clean.replace(/^Milestone\s*\d*\s*[:：-]?\s*/i,'') || `Imported Milestone ${idx+1}`;
        else if(key.includes('subject')) subject=detectSubjectKey(val)||subject;
        else if(key.includes('title')||key.includes('plan')) title=val||title;
        else if(key.includes('start')) startDate=normalizePlanDate(val)||startDate;
        else if(key.includes('finish')||key.includes('target')||key.includes('end')) targetFinishDate=normalizePlanDate(val)||targetFinishDate;
        else if(key.includes('status')) status=normalizeRoadmapStatus(val);
        else if(key.includes('note')){inNotes=true;if(val)notes.push(val);}
      } else {
        const msMatch=clean.match(/^Milestone\s*\d*\s*(.*)$/i); if(msMatch){curMilestone=msMatch[1].trim()||`Imported Milestone ${idx+1}`; return;}
        const maybe=detectSubjectKey(clean); if(!subject&&maybe&&clean.length<40)subject=maybe; else if(!title && !curMilestone)title=clean; else if(!title && curMilestone && li>0)title=clean; else notes.push(clean);
      }
    });
    if(curMilestone) milestones.push({id:uid('rm'),title:curMilestone,startDate,targetFinishDate,status,notes:notes.join('\n').trim(),order:0,createdAt:todayISO()});
    if(title){ if(!subject){subject=appState.currentSubject||'english'; warnings.push(`Block ${idx+1}: Subject not recognized; assigned to ${roadmapSubjectLabel(subject)}.`);} plans.push({id:uid('rp'),subject,title,startDate,targetFinishDate,status,notes:notes.join('\n').trim(),order:0,createdAt:todayISO()}); }
    if(!curMilestone && !title) warnings.push(`Block ${idx+1}: No milestone or plan title recognized.`);
  });
  return {milestones,plans,warnings};
}
function applyImportedRoadmap(parsed, mode) {
  if(mode==='replace'){roadmapMilestones=[]; roadmapPlans=[];}
  let msOrder=roadmapMilestones.length?Math.max(...roadmapMilestones.map(m=>m.order||0))+1:0;
  const importedMilestones=[];
  parsed.milestones.forEach((m,i)=>{const item={...m,id:uid('rm'),order:msOrder+i}; roadmapMilestones.push(item); importedMilestones.push(item);});
  normalizeRoadmapMilestones();
  let pOrder=roadmapPlans.length?Math.max(...roadmapPlans.map(p=>p.order||0))+1:0;
  parsed.plans.forEach((p,i)=>{ const milestoneId = importedMilestones.find(m => p.startDate && (!m.startDate || m.startDate<=p.startDate) && (!m.targetFinishDate || p.startDate<=m.targetFinishDate))?.id || findMilestoneForDate(p.startDate||p.targetFinishDate); roadmapPlans.push({...p,id:uid('rp'),milestoneId,order:pOrder+i}); });
  normalizeRoadmapPlans(); saveRoadmap(); closeSheet('genericSheet'); render(); toast(mode==='replace'?'Roadmap replaced':'Roadmap merged');
}
function openExportPlanModal() {
  openGenericSheet('Export Plan', `<div style="font-size:13px;color:var(--ink-secondary);line-height:1.6;">Export milestones, study plans, and exams for saving, sharing, AI optimization, or re-importing later.</div>`, [
    {text:'Markdown (.md)', onclick:()=>exportRoadmap('md')},{text:'JSON', onclick:()=>exportRoadmap('json')},{text:'CSV', onclick:()=>exportRoadmap('csv')},{text:'Close', cls:'primary', onclick:()=>closeSheet('genericSheet')}
  ]);
}
function exportRoadmap(type) {
  normalizeRoadmapMilestones(); normalizeRoadmapPlans(); normalizeRoadmapExams(); const date=todayISO();
  if(type==='json') downloadText(JSON.stringify({version:'roadmap-milestones-1.0',exportDate:new Date().toISOString(),milestones:roadmapMilestones,plans:roadmapPlans,exams:roadmapExams},null,2),`study_roadmap_${date}.json`,'application/json');
  else if(type==='csv'){ const rows=[['Type','Milestone','Subject','Title','Start Date','Target Finish Date','Status','Notes']]; roadmapMilestones.forEach(m=>rows.push(['Milestone','', '',m.title,m.startDate,m.targetFinishDate,roadmapStatusLabel(m.status),m.notes])); roadmapPlans.forEach(p=>rows.push(['Plan',roadmapMilestones.find(m=>m.id===p.milestoneId)?.title||'',roadmapSubjectLabel(p.subject),p.title,p.startDate,p.targetFinishDate,roadmapStatusLabel(p.status),p.notes])); roadmapExams.forEach(e=>rows.push(['Exam','',roadmapSubjectLabel(e.subject),e.title,e.examDate,'','',e.notes])); downloadText(rows.map(r=>r.map(csvCell).join(',')).join('\n'),`study_roadmap_${date}.csv`,'text/csv'); }
  else downloadText(roadmapToMarkdown(),`study_roadmap_${date}.md`,'text/markdown');
  toast('Plan exported');
}
function csvCell(v){ const s=String(v??''); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function roadmapToMarkdown(){ let md=`# Study Roadmap\n\nExported: ${new Date().toLocaleString()}\n\n`; getOrderedMilestones().forEach((m,i)=>{ md+=`## Milestone ${i+1}: ${m.title}\n\n- Start Date: ${m.startDate||'Not set'}\n- Target Finish Date: ${m.targetFinishDate||'Not set'}\n- Status: ${roadmapStatusLabel(m.status)}\n- Progress: ${getMilestoneProgress(m)}%\n\n${m.notes?`Notes:\n${m.notes}\n\n`:''}`; getSidebarSubjectKeys().forEach(k=>{ const ps=getMilestonePlans(m.id).filter(p=>p.subject===k); if(ps.length){ md+=`### ${roadmapSubjectLabel(k)}\n\n`; ps.forEach(p=>{md+=`- ${p.title} (${roadmapStatusLabel(p.status)}, ${getRoadmapPlanProgress(p).percent}%)\n`;}); md+='\n'; } }); }); if(roadmapExams.length){md+='## Exams\n\n';roadmapExams.forEach(e=>{md+=`- ${e.title} (${roadmapSubjectLabel(e.subject)}): ${e.examDate||'Not set'}\n`;});} return md; }
function downloadText(text, filename, type='text/plain') { const blob=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href); }

// Resource Card — Compact Grid Card
function resourceCard(r) {
  const isDone = r.status==='completed';
  const isNotStarted = r.status==='not_started'||(r.startDate&&r.startDate>todayISO());
  const pathText = String(r.path || '');
  const pathLower = pathText.toLowerCase().trim();
  const pathBase = pathLower.split(/[?#]/)[0];
  const rawType = String(r.type || '').toLowerCase().trim();
  let fileType = 'OTHER';
  if (rawType.includes('pdf') || pathBase.endsWith('.pdf')) fileType = 'PDF';
  else if (rawType.includes('doc') || pathBase.endsWith('.docx') || pathBase.endsWith('.doc')) fileType = 'DOCX';
  else if (rawType.includes('video') || /\.(mp4|mov|m4v|avi|mkv|webm)$/.test(pathBase) || /(youtube\.com|youtu\.be|vimeo\.com)/.test(pathLower)) fileType = 'VIDEO';
  else if (rawType.includes('folder') || /[\\/]$/.test(pathText) || (!/\.[a-z0-9]{2,6}$/.test(pathBase) && /^[a-z]:[\\/]/i.test(pathText))) fileType = 'FOLDER';
  else if (rawType.includes('web') || /^https?:\/\//.test(pathLower)) fileType = 'WEB';
  else if (rawType.includes('link') || /^[a-z]+:\/\//.test(pathLower)) fileType = 'LINK';

  const subjectLabel = customSubjects[r.subject]?.label || r.subject || 'General';
  const tags = Array.isArray(r.tags) ? r.tags.filter(Boolean) : [];
  const dateVal = r.createdAt || r.startDate || '';
  const dateText = dateVal ? `${r.createdAt ? 'Added' : 'Start'} ${formatDate(dateVal)}` : 'Added date not set';
  const numericProgress = Number(r.progress ?? r.percent ?? r.completion);
  let progressPct = isDone ? 100 : (isNotStarted ? 0 : 50);
  if (Number.isFinite(numericProgress)) progressPct = numericProgress <= 1 ? Math.round(numericProgress * 100) : Math.round(numericProgress);
  progressPct = Math.max(0, Math.min(100, progressPct));
  const safePath = encodeURIComponent(pathText);

  return `<div class="res-card subtask-draggable ${isDone?'completed':''}" data-resid="${r.id}">
    <div class="res-resource-main-row">
      <div class="st-drag-grip" title="长按拖拽排序"><span></span><span></span><span></span></div>
      <span class="res-file-badge type-${fileType.toLowerCase()}">${fileType}</span>
      <div class="res-title" title="${esc(r.title)}">${esc(r.title)}</div>
      <div class="res-resource-controls">
        <div class="res-check ${isDone?'checked':''}" onclick="toggleResourceStatus('${r.id}')" title="Toggle complete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12l5 5L19 7"/></svg>
        </div>
        <div class="res-resource-menu-wrap">
          <button class="res-more-btn" type="button" aria-label="Resource actions">⋯</button>
          <div class="res-resource-menu" role="menu">
            ${pathText ? `<a class="res-menu-item" href="${esc(pathText)}" target="_blank" rel="noopener">Open File</a>` : `<span class="res-menu-item disabled">Open File</span>`}
            ${pathText ? `<details class="res-path-reveal"><summary>Reveal Path</summary><div class="res-menu-path">${esc(pathText)}</div></details>` : `<span class="res-menu-item disabled">Reveal Path</span>`}
            ${pathText ? `<button class="res-menu-item" onclick="if(navigator.clipboard){navigator.clipboard.writeText(decodeURIComponent('${safePath}')).then(()=>toast('Path copied')).catch(()=>toast('Copy failed'));}else{toast('Copy failed');}">Copy Path</button>` : `<span class="res-menu-item disabled">Copy Path</span>`}
            <button class="res-menu-item" onclick="openEditResourceModal('${r.id}')">Edit</button>
            <button class="res-menu-item danger" onclick="deleteResource('${r.id}')">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <div class="res-resource-meta-row">
      ${tags.length ? `<div class="res-tags">${tags.map(t=>`<span class="pill-tag">${esc(t)}</span>`).join('')}</div><span class="res-meta-dot">•</span>` : ''}
      <span class="res-subject-label">${esc(subjectLabel)}</span>
    </div>

    <div class="res-resource-date">${esc(dateText)}</div>

    ${(r.status || Number.isFinite(numericProgress)) ? `<div class="res-resource-progress-row" title="${isDone?'Done':isNotStarted?'Not Started':'In Progress'}">
      <div class="res-resource-progress"><div style="width:${progressPct}%"></div></div>
      <span>${progressPct}%</span>
    </div>` : ''}
  </div>`;
}

// Resource Actions
function toggleResourceStatus(id) {
  try {
    const r = (resources || []).find(x => x.id === id);
    if (r) {
      r.status = r.status === 'completed' ? 'pending' : 'completed';
      saveResState();
      render();
    }
  } catch (e) { console.error("Toggle resource error", e); }
}

function deleteResource(id) {
  try {
    if (!confirm('Delete this resource?')) return;
    resources = (resources || []).filter(x => x.id !== id);
    saveResState();
    render();
  } catch (e) { console.error("Delete resource error", e); }
}

function getCountdownDays() {
  try {
    if (!countdownConfig || !countdownConfig.targetDate) return '-- Days';
    const t = new Date(countdownConfig.targetDate);
    const n = new Date();
    n.setHours(0, 0, 0, 0);
    t.setHours(0, 0, 0, 0);
    const d = Math.ceil((t - n) / (86400000));
    if (isNaN(d)) return '-- Days';
    if (d > 0) return d + ' Days';
    if (d === 0) return 'Today!';
    return 'Passed';
  } catch (e) {
    console.error("Countdown calculation error", e);
    return '-- Days';
  }
}

// Note selection highlight for Study Resources
function handleNoteSelection(subj) {
  try {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const text = sel.toString().trim();
    if (!text) return;
    const sc = subjectScores[subj];
    if (!sc || !sc.note) return;
    if (sc.note.includes(text) && !sc.note.includes('==' + text + '==')) {
      sc.note = sc.note.replace(text, '==' + text + '==');
      sel.removeAllRanges();
      saveResState();
      render();
    }
  } catch (e) { console.error("Note selection error", e); }
}

function updateSubjectField(key, field, val) {
  if (!customSubjects[key]) return;
  if (field === 'label') {
    customSubjects[key].label = val.trim() || key;
  } else if (field === 'color') {
    customSubjects[key].color = val;
    customSubjects[key].tint = val + '18';
    customSubjects[key].text = val;
  }
  saveResState();
  renderSharedStats();
  render();
  toast('Subject updated & synced!');
}

function moveSubjectOrder(key, dir) {
  const keys = Object.keys(customSubjects);
  const idx = keys.indexOf(key);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= keys.length) return;
  
  const newObj = {};
  keys.splice(idx, 1);
  keys.splice(newIdx, 0, key);
  keys.forEach(k => { newObj[k] = customSubjects[k]; });
  customSubjects = newObj;
  saveResState();
  openSubjectManagerModal();
  renderSharedStats();
  render();
}

function deleteSubjectManager(key) {
  const keys = Object.keys(customSubjects);
  if (keys.length <= 1) { toast('Cannot delete the last subject'); return; }
  if (!confirm(`Delete subject "${customSubjects[key]?.label}"?`)) return;
  delete customSubjects[key];
  if (subjectScores[key]) delete subjectScores[key];
  if (appState.currentSubject === key) {
    appState.currentSubject = Object.keys(customSubjects)[0];
  }
  saveResState();
  openSubjectManagerModal();
  renderSharedStats();
  render();
  toast('Subject deleted');
}

function executeRemoveDemoData() {
  let foundDemo = false;

  if (customSubjects && typeof customSubjects === 'object') {
    Object.keys(customSubjects).forEach(k => {
      if (customSubjects[k] && customSubjects[k].isSample === true) {
        delete customSubjects[k];
        foundDemo = true;
      }
    });
  }
  if (subjectScores && typeof subjectScores === 'object') {
    Object.keys(subjectScores).forEach(k => {
      if (subjectScores[k] && subjectScores[k].isSample === true) {
        delete subjectScores[k];
        foundDemo = true;
      }
    });
  }
  if (customSubjects && !customSubjects[appState.currentSubject]) {
    appState.currentSubject = Object.keys(customSubjects)[0] || '';
  }

  if (Array.isArray(resources)) {
    const len = resources.length;
    resources = resources.filter(r => r && r.isSample !== true);
    if (resources.length < len) foundDemo = true;
  }

  if (Array.isArray(exercises)) {
    const len = exercises.length;
    exercises = exercises.filter(e => e && e.isSample !== true);
    if (exercises.length < len) foundDemo = true;
  }

  if (Array.isArray(learningItems)) {
    const len = learningItems.length;
    learningItems = learningItems.filter(l => l && l.isSample !== true);
    if (learningItems.length < len) foundDemo = true;
  }

  if (Array.isArray(studyTasks)) {
    const len = studyTasks.length;
    studyTasks = studyTasks.filter(t => t && t.isSample !== true);
    if (studyTasks.length < len) foundDemo = true;
  }

  if (Array.isArray(roadmapMilestones)) {
    const len = roadmapMilestones.length;
    roadmapMilestones = roadmapMilestones.filter(m => m && m.isSample !== true);
    if (roadmapMilestones.length < len) foundDemo = true;
  }
  if (Array.isArray(roadmapPlans)) {
    const len = roadmapPlans.length;
    roadmapPlans = roadmapPlans.filter(p => p && p.isSample !== true);
    if (roadmapPlans.length < len) foundDemo = true;
  }
  if (Array.isArray(roadmapExams)) {
    const len = roadmapExams.length;
    roadmapExams = roadmapExams.filter(e => e && e.isSample !== true);
    if (roadmapExams.length < len) foundDemo = true;
  }

  if (weeklyPlan && typeof weeklyPlan === 'object') {
    if (Array.isArray(weeklyPlan.tasks)) {
      const len = weeklyPlan.tasks.length;
      weeklyPlan.tasks = weeklyPlan.tasks.filter(t => t && t.isSample !== true);
      if (weeklyPlan.tasks.length < len) foundDemo = true;
    }
    if (Array.isArray(weeklyPlan.history)) {
      const len = weeklyPlan.history.length;
      weeklyPlan.history = weeklyPlan.history.filter(h => h && h.isSample !== true);
      if (weeklyPlan.history.length < len) foundDemo = true;
    }
    if (weeklyPlan.isSample === true) {
      weeklyPlan.isSample = false;
      foundDemo = true;
    }
  }

  if (typeof studyMilestones !== 'undefined' && Array.isArray(studyMilestones)) {
    const len = studyMilestones.length;
    studyMilestones = studyMilestones.filter(m => m && m.isSample !== true);
    if (studyMilestones.length < len) foundDemo = true;
  }
  if (typeof progressCheckState !== 'undefined' && progressCheckState && Array.isArray(progressCheckState.history)) {
    const len = progressCheckState.history.length;
    progressCheckState.history = progressCheckState.history.filter(h => h && h.isSample !== true);
    if (progressCheckState.history.length < len) foundDemo = true;
  }

  if (quizState && typeof quizState === 'object') {
    ['passages', 'quizSets', 'grammarQuestions', 'vocabularyQuestions', 'wordBook', 'synonymLibrary', 'highlights', 'wrongBook'].forEach(prop => {
      if (Array.isArray(quizState[prop])) {
        const len = quizState[prop].length;
        quizState[prop] = quizState[prop].filter(x => x && x.isSample !== true);
        if (quizState[prop].length < len) foundDemo = true;
      }
    });
    if (quizState.passages && !quizState.passages.find(p => p.id === quizState.currentPassageId)) {
      quizState.currentPassageId = quizState.passages[0]?.id || null;
    }
  }

  if (countdownConfig && countdownConfig.isSample === true) {
    countdownConfig = { title: '', targetDate: '' };
    foundDemo = true;
  }

  if (foundDemo) {
    localStorage.setItem('study_demo_data_removed', 'true');
  }

  localStorage.setItem('study_subjects_pro', JSON.stringify(customSubjects || {}));
  localStorage.setItem('study_scores_pro', JSON.stringify(subjectScores || {}));
  localStorage.setItem('study_resources_pro', JSON.stringify(resources || []));
  localStorage.setItem('study_exercises_pro', JSON.stringify(exercises || []));
  localStorage.setItem('study_tasks_pro', JSON.stringify(studyTasks || []));
  if (typeof saveLearning === 'function') saveLearning(); else localStorage.setItem('study_learning_pro', JSON.stringify(learningItems || []));
  if (typeof saveRoadmap === 'function') saveRoadmap();
  if (typeof saveWeeklyPlan === 'function') saveWeeklyPlan();
  if (typeof saveStudyMilestones === 'function') saveStudyMilestones();
  if (typeof saveProgressCheck === 'function') saveProgressCheck();
  if (typeof saveQuiz === 'function') saveQuiz();
  if (typeof saveAppState === 'function') saveAppState();
  if (typeof saveResState === 'function') saveResState();
  if (typeof saveSuggest === 'function') saveSuggest();

  if (typeof renderSharedStats === 'function') renderSharedStats();
  if (typeof renderSidebar === 'function') renderSidebar();
  render();

  if (foundDemo) {
    toast('Demo data removed successfully.');
  } else {
    toast('No demo data found.');
  }
}

    quizState = {version:'2.0',schemaVersion:QUIZ_SCHEMA,passages:[],quizSets:[],grammarQuestions:[],vocabularyQuestions:[],wordBook:[],synonymLibrary:[],highlights:[],wrongBook:[],wordMemory:{},answerLog:{},currentPassageId:null,currentQuizSetId:{},activeQuizSetIds:{},activeTab:'grammar',activeQIndex:{grammar:{},vocab:{}}};
    saveQuiz();
  }

  if (!selected.includes('quiz_hub') && selected.includes('synonyms')) { quizState.synonymLibrary = []; saveQuiz(); }
  saveAll(); closeSheet('genericSheet'); render(); toast('Selected data reset');
}

function downloadJSON(obj, filename) {
  const blob = new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function deleteHighlight(hid) {
  const h = (quizState.highlights || []).find(x => x.id === hid);
  if (!h) return;
  if (!confirm(`确定要删除 Highlight 摘录: "${h.selectedText}" 吗？`)) return;
  quizState.highlights = quizState.highlights.filter(x => x.id !== hid);
  saveQuiz();
  renderSharedStats();
  renderSuggestContent();
  render();
  toast('已删除 Highlight');
}

function transferHighlightToWordBook(hid) {
  const h = quizState.highlights.find(x => x.id === hid);
  if (!h) return;
  quizState.wordBook = quizState.wordBook || [];
  const textVal = (h.selectedText || '').trim();
  if (!textVal) return;
  
  const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
  if (exists) {
    exists.highlight = true;
    exists.example = exists.example || (h.note ? `Note: ${h.note}` : '');
    toast(`"${textVal}" 已在生词本中，已为您更新为浅棕色高亮！`);
  } else {
    quizState.wordBook.push({
      id: uid('wbk'), text: textVal, meaning: h.note || 'From reading passage highlight', example: `Highlighted in passage`,
      source: 'Reading Highlight', subject: appState.currentSubject,
      dateAdded: todayISO(), addedAt: Date.now(), highlight: true, starred: false,
      srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
    });
    toast(`已高亮并存入生词本: "${textVal}"`);
  }
  saveQuiz();
  renderSharedStats();
  renderSuggestContent();
  render();
}

function transferAllHighlightsToWordBook() {
  const hls = quizState.highlights || [];
  if (!hls.length) { toast('暂无任何 Highlights 记录'); return; }
  let count = 0;
  quizState.wordBook = quizState.wordBook || [];
  hls.forEach(h => {
    const textVal = (h.selectedText || '').trim();
    if (!textVal) return;
    const exists = quizState.wordBook.find(w => w.text.toLowerCase() === textVal.toLowerCase());
    if (exists) {
      exists.highlight = true;
    } else {
      quizState.wordBook.push({
        id: uid('wbk'), text: textVal, meaning: h.note || 'From reading passage highlight', example: `Highlighted in passage`,
        source: 'Reading Highlight', subject: appState.currentSubject,
        dateAdded: todayISO(), addedAt: Date.now(), highlight: true, starred: false,
        srsBox: 0, srsNext: Date.now(), srsReviews: 0, srsLapses: 0
      });
      count++;
    }
  });
  saveQuiz();
  renderSharedStats();
  renderSuggestContent();
  render();
  toast(`✓ 成功将 ${count} 个 Highlights 转入生词本并开启高亮！`);
}

function calculateOverallCompletion() {
  if (!weeklyPlan.history.length) return 0;
  const sum = weeklyPlan.history.reduce((a, b) => a + (b.completionRate || 0), 0);
  return Math.round(sum / weeklyPlan.history.length);
}

function toggleWeeklyTaskCompletion(id) {
  const task = weeklyPlan.tasks.find(t => t.id === id);
  if (task) {

    if (task.status === 'completed') task.currentProgress = task.targetProgress;
    else task.currentProgress = task.startProgress;
    saveWeeklyPlan();
    render();

}

function completeCurrentWeek() {
  if (!confirm('Finish this week and generate Review? This will move the current plan to Archive.')) return;
  
  const tasks = weeklyPlan.tasks;
  const completedCount = tasks.filter(t => t.status === 'completed').length;
  const completionRate = tasks.length > 0 ? Math.round((completedCount / tasks.length) * 100) : 0;
  
  const review = {
    week: weeklyPlan.currentWeek,
    startDate: weeklyPlan.startDate,
    endDate: weeklyPlan.endDate,
    tasks: JSON.parse(JSON.stringify(tasks)),
    completionRate: completionRate,
    vocabAdded: (quizState.wordBook || []).length,
    quizzesCompleted: Object.keys(quizState.answerLog || {}).length,
    wrongReviewed: (quizState.wrongBook || []).length, 
    suggestion: weeklyPlan.suggestion,
    reflection: '',
    achievement: ''
  };

  weeklyPlan.history.unshift(review);
  
  // Update Overall Stats
  weeklyPlan.overallStats.totalWeeks++;
  weeklyPlan.overallStats.totalStudyTime += tasks.length * 0.75;
  weeklyPlan.overallStats.vocabAdded = (quizState.wordBook || []).length;

  if (completionRate >= 80) {
    weeklyPlan.overallStats.currentStreak++;
    if (weeklyPlan.overallStats.currentStreak > weeklyPlan.overallStats.longestStreak) {
      weeklyPlan.overallStats.longestStreak = weeklyPlan.overallStats.currentStreak;
    }
  } else {
    weeklyPlan.overallStats.currentStreak = 0;
  }

  // Show "Generate Next Week" Modal
  openNextWeekGenerationModal(tasks);
}

  openGenericSheet('Generate Next Week?', `
    <div style="display:flex; flex-direction:column; gap:12px;">
      <button class="apple-btn" style="padding:16px; justify-content:flex-start; text-align:left; height:auto; flex-direction:column; align-items:flex-start;" onclick="processNextWeek('ai')">
        <strong style="font-size:15px;">Use AI</strong>

        <strong style="font-size:15px;">Duplicate Unfinished Tasks</strong>

      </button>

  `, [{text:'Cancel', onclick:()=>closeSheet('genericSheet')}]);
}

function processNextWeek(mode, lastTasks = []) {
  // Update dates
  weeklyPlan.currentWeek++;
  const nextStart = new Date(weeklyPlan.endDate);
  nextStart.setDate(nextStart.getDate() + 1);
  const nextEnd = new Date(nextStart);
  nextEnd.setDate(nextEnd.getDate() + 6);
  
  weeklyPlan.startDate = nextStart.toISOString().slice(0, 10);
  weeklyPlan.endDate = nextEnd.toISOString().slice(0, 10);
  weeklyPlan.status = 'In Progress';

  if (mode === 'ai') {
    generateWeeklyPlan();
  } else if (mode === 'duplicate') {
    weeklyPlan.tasks = lastTasks.filter(t => t.status !== 'completed').map(t => ({
      ...t,
      id: 'w_dup_' + Date.now() + Math.random(),
      date: weeklyPlan.startDate // Reset to start of week
    }));
    weeklyPlan.suggestion = "Tasks carried over from previous week. Focus on completing these first.";
  } else {
    weeklyPlan.tasks = [];
    weeklyPlan.suggestion = "Fresh start. Add tasks manually or use AI Regenerate.";
  }

  saveWeeklyPlan();
  closeSheet('genericSheet');
  toast('✓ New week generated');
  render();
}

function exportWeekly(format) {
  const data = weeklyPlan.tasks;
  if (format === 'json') {
    downloadJSON(data, `study_week_${weeklyPlan.currentWeek}.json`);
  } else if (format === 'csv') {

let weeklyTaskDragState = null;
function initWeeklyTaskDrag() {
  const list = document.getElementById('weeklyTaskList');
  if (!list) return;
  list.querySelectorAll('.st-drag-grip').forEach(grip => {
    grip.onpointerdown = e => {
      const item = e.target.closest('.ex-card');
      if (!item) return;
      weeklyTaskDragState = { item, startY: e.clientY };
      item.classList.add('st-is-dragging');
      
      const onMove = me => {
        if (!weeklyTaskDragState) return;
        const sibs = Array.from(list.querySelectorAll('.ex-card:not(.st-is-dragging)'));
        const over = sibs.find(s => {
          const r = s.getBoundingClientRect();
          return me.clientY > r.top && me.clientY < r.bottom;
        });
        if (over) {
          const r = over.getBoundingClientRect();
          if (me.clientY < r.top + r.height/2) over.before(item);
          else over.after(item);
        }
      };
      const onUp = () => {
        item.classList.remove('st-is-dragging');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        // Persist order
        const newIds = Array.from(list.querySelectorAll('.ex-card')).map(el => el.dataset.taskId);
        const reordered = [];
        newIds.forEach(id => { const t = weeklyPlan.tasks.find(x => x.id === id); if(t) reordered.push(t); });
        weeklyPlan.tasks = reordered;
        saveWeeklyPlan();
        weeklyTaskDragState = null;
      };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
    };
  });
}

    const time = t.time || "19:00";
    const priority = t.priority || "Medium";
    const list = t.list || "Study";

  const exportContent = exportLines.join('\n');

  if (navigator.share && window.isSecureContext) {
    navigator.share({
      title: 'StudyHub Weekly Plan',

    }).then(() => {
      toast('✓ Shared successfully');
    }).catch((err) => {

        copyTextToClipboard(exportContent);
      }
    });
  } else {

  }

function copyTextToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      toast('Study plan copied. Open Shortcuts and paste to import.');
    }).catch(err => {
      fallbackCopyText(text);
    });
  } else {
    fallbackCopyText(text);
  }
}

function fallbackCopyText(text) {
  const textArea = document.createElement("textarea");
  textArea.value = text;
  textArea.style.position = "fixed";
  textArea.style.left = "-9999px";
  textArea.style.top = "0";
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  try {
    document.execCommand('copy');
    toast('Study plan copied. Open Shortcuts and paste to import.');
  } catch (err) {
    toast('Copy failed');
  }
  document.body.removeChild(textArea);
}
